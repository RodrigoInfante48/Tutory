<style>
/* --- DESIGN TOKENS ----------------------------------------- */
:root {
  --brand:     #86ef86;
  --brand2:    #5ddb5d;
  --brandDim:  rgba(134,239,134,.12);
  --brandBorder: rgba(134,239,134,.25);
  --radius:    16px;
  --radiusL:   20px;
  --radiusXL:  26px;
}

[data-theme="dark"] {
  --bg0:    #05070B;
  --bg1:    #080d14;
  --bg2:    #0A0F18;
  --bg3:    #0d1520;
  --surface: rgba(255,255,255,.04);
  --surfaceHover: rgba(255,255,255,.07);
  --stroke: rgba(255,255,255,.08);
  --strokeBrand: rgba(134,239,134,.2);
  --text:   #F2F6FF;
  --textSub:#C6D0E2;
  --textMuted:#7a8ba8;
  --shadow: 0 24px 80px rgba(0,0,0,.7);
  --shadowS:0 8px 32px rgba(0,0,0,.5);
  --inputBg: rgba(0,0,0,.3);
  --toggleBg: #1a2535;
}

[data-theme="light"] {
  --bg0:    #f0f4f0;
  --bg1:    #f8faf8;
  --bg2:    #ffffff;
  --bg3:    #eef3ee;
  --surface: rgba(0,0,0,.03);
  --surfaceHover: rgba(0,0,0,.05);
  --stroke: rgba(0,0,0,.08);
  --strokeBrand: rgba(56,160,56,.3);
  --text:   #0d1a0d;
  --textSub:#2d4a2d;
  --textMuted:#5a7a5a;
  --shadow: 0 24px 80px rgba(0,0,0,.1);
  --shadowS:0 8px 32px rgba(0,0,0,.08);
  --inputBg: rgba(255,255,255,.8);
  --toggleBg: #d4ebd4;
  --brand:  #2d8a2d;
  --brand2: #1f6b1f;
  --brandDim: rgba(45,138,45,.1);
  --brandBorder: rgba(45,138,45,.3);
}

/* --- RESET ------------------------------------------------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);transition:background .3s,color .3s}
body{font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5{font-family:'Sora',sans-serif}
input,select,textarea,button{font-family:inherit}

/* --- DATE/TIME INPUT ICONS -------------------------------- */
[data-theme="dark"] input[type="date"],
[data-theme="dark"] input[type="time"]{color-scheme:dark}
[data-theme="light"] input[type="date"],
[data-theme="light"] input[type="time"]{color-scheme:light}
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator,
[data-theme="dark"] input[type="time"]::-webkit-calendar-picker-indicator{
  filter:invert(1);
  opacity:.85;
  cursor:pointer;
}
[data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator,
[data-theme="light"] input[type="time"]::-webkit-calendar-picker-indicator{
  opacity:.6;
  cursor:pointer;
}
textarea{resize:vertical}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:4px}

/* --- CONFETTI --------------------------------------------- */
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity:1; }
  60%  { opacity:1; }
  100% { transform: translateY(220px) rotate(1080deg) scale(.7); opacity:0; }
}
@keyframes confettiWiggle {
  0%   { transform: translateY(-20px) rotate(0deg) translateX(0); opacity:1; }
  25%  { transform: translateY(60px) rotate(360deg) translateX(12px); }
  50%  { transform: translateY(120px) rotate(720deg) translateX(-8px); }
  75%  { transform: translateY(170px) rotate(900deg) translateX(6px); opacity:.8; }
  100% { transform: translateY(220px) rotate(1080deg) translateX(0); opacity:0; }
}
.confetti-piece {
  position:absolute;
  width:9px; height:9px;
  border-radius:2px;
  animation: confettiWiggle 1.2s ease-out forwards;
  pointer-events:none;
}
/* --- ANIMATIONS ------------------------------------------- */
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes pulse   {0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes glow    {0%,100%{box-shadow:0 0 16px var(--brandDim)}50%{box-shadow:0 0 32px rgba(134,239,134,.3)}}

/* Quiz question rich content */
.quiz-q-html p,.quiz-q-html div,.quiz-q-html h1,.quiz-q-html h2,.quiz-q-html h3,.quiz-q-html li{display:inline;font-size:inherit;}
.quiz-q-html p::after,.quiz-q-html div::after,.quiz-q-html h1::after,.quiz-q-html h2::after,.quiz-q-html h3::after{content:'\A\A';white-space:pre;}
.quiz-q-html li::after{content:'\A';white-space:pre;}
.quiz-q-html p:last-child::after,.quiz-q-html div:last-child::after,.quiz-q-html h1:last-child::after,.quiz-q-html h2:last-child::after,.quiz-q-html h3:last-child::after,.quiz-q-html li:last-child::after{content:''!important;}
.quiz-q-html *{font-size:inherit;}
/* Telegram emoji images (class="emoji emoji-small") — constrain to text height everywhere */
img.emoji,img.emoji-small{max-height:1.2em!important;width:auto!important;display:inline-block!important;vertical-align:middle!important;}

.fade-up{animation:fadeUp .4s ease both}
.fade-in{animation:fadeIn .3s ease both}
.spin-anim{animation:spin .8s linear infinite}

/* --- THEME TOGGLE ----------------------------------------- */
.themeToggle {
  width:44px;height:24px;
  background:var(--toggleBg);
  border:1px solid var(--stroke);
  border-radius:999px;
  cursor:pointer;
  position:relative;
  transition:background .3s;
  flex-shrink:0;
}
.themeToggle::after {
  content:'';
  position:absolute;
  top:3px;left:3px;
  width:16px;height:16px;
  border-radius:50%;
  background:var(--brand);
  transition:transform .3s;
}
[data-theme="light"] .themeToggle::after{transform:translateX(20px)}

/* --- SHARED UI -------------------------------------------- */
.card {
  background:var(--surface);
  border:1px solid var(--stroke);
  border-radius:var(--radiusL);
  padding:20px;
  margin-bottom:14px;
  transition:border-color .2s,background .3s;
}
.card:hover{border-color:var(--strokeBrand)}

.badge {
  display:inline-flex;align-items:center;gap:5px;
  border-radius:999px;padding:3px 10px;
  font-size:11px;font-weight:700;font-family:'Sora',sans-serif;
  white-space:nowrap;
  border:1.5px solid;
  transition:background .3s;
}

.btn {
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--radius);cursor:pointer;
  font-family:'Sora',sans-serif;font-weight:700;
  transition:transform .15s,opacity .15s,box-shadow .15s;
  white-space:nowrap;
}
.btn:hover:not(:disabled){transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--brand);color:#031a03;padding:11px 18px;font-size:14px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn-ghost{background:transparent;border:1px solid var(--stroke);color:var(--textMuted);padding:11px 18px;font-size:14px}
.btn-ghost:hover:not(:disabled){border-color:var(--strokeBrand);color:var(--brand)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:7px 12px;font-size:12px}
.btn-blue{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#60a5fa;padding:11px 18px;font-size:14px}

.input {
  display:block;width:100%;
  background:var(--inputBg);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:10px 14px;
  color:var(--text);
  font-size:14px;outline:none;
  margin-bottom:10px;
  transition:border-color .2s,background .3s;
}
.input:focus{border-color:var(--brandBorder)}
.input::placeholder{color:var(--textMuted)}

.select {
  display:block;width:100%;
  background:var(--inputBg);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:10px 14px;
  color:var(--text);
  font-size:14px;outline:none;
  margin-bottom:10px;
  transition:border-color .2s;
  cursor:pointer;
}
.select:focus{border-color:var(--brandBorder)}

.label {
  display:block;
  font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--brand);
  margin-bottom:10px;
}

.section-title {
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
}
.section-title h3{font-size:17px;font-weight:800;color:var(--text)}

/* --- HEADER ----------------------------------------------- */
.appHeader {
  padding:16px 18px 12px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--stroke);
  position:sticky;top:0;
  background:var(--bg0);
  z-index:10;
  backdrop-filter:blur(12px);
  gap:10px;
}
.headerLeft p{margin:0;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--textMuted);margin-bottom:2px}
.headerLeft h2{margin:0;font-size:18px;font-weight:800;color:var(--text);line-height:1.1}
.headerRight{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* --- TAB BAR ---------------------------------------------- */
.tabBar {
  display:flex;
  flex-wrap:wrap;
  border-bottom:1px solid var(--stroke);
  position:sticky;top:65px;
  background:var(--bg0);
  z-index:9;
}
.tabBar::-webkit-scrollbar{display:none}
.tab {
  flex:0 0 auto;padding:9px 12px;
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  color:var(--textMuted);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;
  cursor:pointer;white-space:nowrap;position:relative;
  transition:color .2s,border-color .2s;
}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab .notif {
  position:absolute;top:6px;right:4px;
  background:#ef4444;border-radius:50%;
  width:16px;height:16px;font-size:9px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;
}

/* --- CONTENT ---------------------------------------------- */
.content{padding:18px 16px 100px}

/* --- LOADER ----------------------------------------------- */
.loaderFull{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:var(--bg0);
}
.spinEl{width:40px;height:40px;border:3px solid var(--stroke);border-top:3px solid var(--brand);border-radius:50%}

/* --- LOGIN ------------------------------------------------ */
.loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:var(--bg0);
  background-image:
    radial-gradient(ellipse 700px 400px at 15% 0%,var(--brandDim),transparent 60%),
    radial-gradient(ellipse 500px 400px at 85% 20%,var(--brandDim),transparent 60%);
}
.loginBox{
  width:100%;max-width:360px;
  background:var(--surface);
  border:1px solid var(--stroke);
  border-radius:var(--radiusXL);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.loginBoxBody{padding:24px 26px 32px}
  box-shadow:var(--shadow);
}
.loginLogo{text-align:center;margin-bottom:16px}
.pinDots{display:flex;gap:14px;justify-content:center;margin-bottom:18px}
.pinDot{width:18px;height:18px;border-radius:50%;border:2px solid var(--stroke);transition:all .2s}
.pinDot.active{background:var(--brand);border-color:var(--brand);box-shadow:0 0 12px var(--brandDim),0 0 0 4px var(--brandDim)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.numKey{
  padding:15px;
  background:var(--bg3);border:1px solid var(--stroke);
  border-radius:14px;color:var(--text);
  font-size:20px;font-family:'Sora',sans-serif;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.numKey:hover{background:var(--surfaceHover);border-color:var(--strokeBrand)}
.numKey.confirm{background:var(--brand);color:#031a03;border-color:var(--brand)}
.numKey.confirm:hover{background:var(--brand2)}

/* --- CYCLE CARD ------------------------------------------- */
.cycleCard{
  border-radius:var(--radiusL);
  padding:20px;margin-bottom:14px;
  border:1px solid var(--strokeBrand);
  background:var(--bg1);
  background-image:radial-gradient(ellipse 200px 120px at 0% 0%,var(--brandDim),transparent);
  position:relative;overflow:hidden;
}
.cycleProgress{height:5px;background:var(--stroke);border-radius:999px;overflow:hidden;margin:12px 0}
.cycleProgressBar{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:999px;transition:width .8s ease}
.tokenRow{display:flex;gap:6px;align-items:center;margin-top:10px}
.token{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border:2px solid;transition:all .3s;
}
.token.full{background:var(--brandDim);border-color:var(--brand)}
.token.empty{background:var(--surface);border-color:var(--stroke);color:var(--textMuted)}

/* --- PAYMENT BANNER --------------------------------------- */
.payBanner{
  background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(239,68,68,.05));
  border:2px solid rgba(239,68,68,.4);
  border-radius:var(--radiusL);
  padding:20px;margin-bottom:14px;
  text-align:center;
}

/* --- QUIZ ------------------------------------------------- */
.quizOption{
  display:flex;align-items:center;gap:10px;width:100%;
  border:1.5px solid;border-radius:var(--radius);
  padding:11px 14px;font-size:14px;cursor:pointer;
  margin-bottom:8px;text-align:left;
  transition:all .2s;color:var(--textSub);
  background:var(--bg3);border-color:var(--stroke);
}
.quizOption:hover{border-color:var(--strokeBrand);color:var(--text)}
.quizOption.correct{background:rgba(134,239,134,.1);border-color:var(--brand);color:var(--brand)}
.quizOption.wrong{background:rgba(239,68,68,.1);border-color:#ef4444;color:#ef4444}
.optLetter{background:var(--bg1);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--textMuted);flex-shrink:0}

/* --- CHAT ------------------------------------------------- */
.chatWrap{min-height:160px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px;padding:4px}
.chatBubble{display:flex}
.chatBubble.student{justify-content:flex-end}
.chatBubble.teacher{justify-content:flex-start}
.bubble{max-width:80%;padding:10px 14px;border-radius:16px}
.chatBubble.student .bubble{background:var(--brand);color:#031a03;border-radius:16px 16px 4px 16px}
.chatBubble.teacher .bubble{background:var(--bg3);border:1px solid var(--stroke);color:var(--text);border-radius:16px 16px 16px 4px}
.bubbleTime{font-size:10px;opacity:.5;margin-top:4px}

/* --- CHISPA ----------------------------------------------- */
.chispaCard{
  border-radius:var(--radiusL);padding:20px;margin-bottom:14px;
  background:var(--bg1);
  border:1px solid var(--strokeBrand);
  background-image:radial-gradient(ellipse 300px 150px at 100% 0%,var(--brandDim),transparent);
}

/* --- STUDY PLAN ------------------------------------------- */
.competency{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--stroke)}
.competency:last-child{border-bottom:none}
.checkBox{
  width:22px;height:22px;border-radius:6px;
  border:2px solid var(--stroke);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#031a03;flex-shrink:0;transition:all .2s;
}
.checkBox.done{background:var(--brand);border-color:var(--brand)}

/* --- MOVEMENT --------------------------------------------- */
.agreementBox{
  background:rgba(134,239,134,.06);
  border:1px solid var(--strokeBrand);
  border-radius:var(--radius);padding:12px 14px;margin-top:8px;
}

/* --- EYEBROW ---------------------------------------------- */
.eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--brand);background:var(--brandDim);
  border:1px solid var(--brandBorder);
  padding:4px 10px;border-radius:999px;margin-bottom:10px;
}
.liveDot{width:7px;height:7px;border-radius:50%;background:var(--brand);animation:pulse 2s infinite;flex-shrink:0}
</style>
</head>

// Convert a Colombia time string (HH:MM) + date to user's local timezone
// Returns {local: "10:00 AM", diff: true, colTime: "3:00 PM"} 
const COL_TZ = 'America/Bogota';
function convertColombiaTime(dateStr, timeStr) {
  if (!dateStr || !timeStr) return {local: timeStr, diff: false};
  try {
    // Build a Date from the Colombia date+time
    const [h, m] = timeStr.split(':').map(Number);
    // Use Intl to get Colombia's UTC offset for that date
    const colDate = new Date(`${dateStr}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`);
    // Format as Colombia time to get the offset
    const colFormatter = new Intl.DateTimeFormat('en-US', {
      timeZone: COL_TZ, hour:'2-digit', minute:'2-digit', hour12:false
    });
    const userFormatter = new Intl.DateTimeFormat('en-US', {
      timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      hour:'2-digit', minute:'2-digit', hour12:false
    });
    // Get Colombia offset vs UTC
    const colParts = colFormatter.formatToParts(colDate);
    const colH = parseInt(colParts.find(p=>p.type==='hour').value);
    const colMin = parseInt(colParts.find(p=>p.type==='minute').value);
    // Diff between input time and what Colombia formatter says = offset correction
    const inputMinutes = h * 60 + m;
    const colMinutes = colH * 60 + colMin;
    const offsetMs = (inputMinutes - colMinutes) * 60000;
    const utcDate = new Date(colDate.getTime() + offsetMs);
    // User's local time
    const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const isDiff = userTZ !== COL_TZ && !userTZ.includes('Bogota') && !userTZ.includes('Lima') && !userTZ.includes('Jamaica');
    if (!isDiff) return {local: timeStr, diff: false};
    const localStr = new Intl.DateTimeFormat('es-CO', {
      timeZone: userTZ, hour:'2-digit', minute:'2-digit', hour12:false
    }).format(utcDate);
    return {local: localStr, colTime: timeStr, diff: true};
  } catch(e) { return {local: timeStr, diff: false}; }
}

// Render a class time -- shows local time + "(Col: X)" if different timezone
function ClassTime({date, time, style={}}){
  const conv = React.useMemo(()=>convertColombiaTime(date, time),[date, time]);
  if(!time) return null;
  if(!conv.diff) return <span style={style}>{time}</span>;
  return(
    <span style={style}>
      {conv.local} <span style={{fontSize:'0.85em',opacity:.7,fontWeight:400}}>(Col: {conv.colTime})</span>
    </span>
  );
}

// Normalize sessions client-side: if expires_at has passed and status is still
// to_reschedule or holiday_impacts_min, treat as expired for all rendering purposes.
// This handles the case where the backend hasn't run yet for this session.
function normalizeExpiredSessions(sessions) {
  if (!Array.isArray(sessions)) return [];
  const nowCOT = new Date(new Date().toLocaleString('en-US', {timeZone:'America/Bogota'}));
  const todayStr = nowCOT.getFullYear()+'-'+String(nowCOT.getMonth()+1).padStart(2,'0')+'-'+String(nowCOT.getDate()).padStart(2,'0');
  return sessions.map(s => {
    if (s.status === 'to_reschedule' || s.status === 'holiday_impacts_min') {
      // Use expires_at if available, otherwise fall back to scheduled_date + 1 month
      let expiresAt = s.expires_at;
      if (!expiresAt && s.scheduled_date) {
        const d = new Date(s.scheduled_date + 'T00:00:00');
        d.setMonth(d.getMonth() + 1);
        expiresAt = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      if (expiresAt && expiresAt <= todayStr) {
        return {...s, status: 'expired', counts_as_taken: 1, expires_at: expiresAt};
      }
    }
    return s;
  });
}

function useTheme(){
  const [dark,setDark] = React.useState(()=>localStorage.getItem('leap_theme')!=='light');
  React.useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');

  },[dark]);
  const toggle = ()=>setDark(d=>!d);
  return [dark,toggle];
}

  const today=new Date();today.setHours(0,0,0,0);
  const s=start?new Date(start+'T00:00:00'):null;
  const e=end?new Date(end+'T00:00:00'):null;
  if(!s||!e)return{label:'Sin fecha',color:'var(--textMuted)',bg:'var(--bg3)'};
  if(today<s)return{label:'Próximo',color:'#60a5fa',bg:'rgba(96,165,250,.12)'};
  if(today>e)return{label:'Pasado',color:'var(--textMuted)',bg:'var(--bg3)'};
  const diff=Math.ceil((e-today)/(1000*60*60*24));
  if(diff<=3)return{label:`⚠️ ${diff}d`,color:'#f97316',bg:'rgba(249,115,22,.12)'};
  return{label:'Activo',color:'var(--brand)',bg:'var(--brandDim)'};
};
const sanitizeHtml=s=>{
  if(!s)return '';
  try{
    const d=document.createElement('div');
    d.innerHTML=s;
    d.querySelectorAll('[style]').forEach(el=>{
      const allowed=['font-weight','font-style','text-decoration'];
      const st=el.getAttribute('style')||'';
      const filtered=st.split(';').filter(r=>{const p=r.split(':')[0]?.trim();return allowed.includes(p);}).join(';');
      if(filtered)el.setAttribute('style',filtered);else el.removeAttribute('style');
    });
    // Strip trailing <br>, empty text nodes, and empty elements from root and last element child
    const stripTrailing=el=>{
      let changed=true;
      while(changed&&el.lastChild){changed=false;
        const n=el.lastChild;
        if(n.nodeName==='BR'){el.removeChild(n);changed=true;}
        else if(n.nodeType===3&&!n.textContent.trim()){el.removeChild(n);changed=true;}
        else if(n.nodeType===1&&!n.textContent.trim()&&!n.querySelector('img')){el.removeChild(n);changed=true;}
      }
    };
    stripTrailing(d);
    if(d.lastElementChild)stripTrailing(d.lastElementChild);
    return d.innerHTML;
  }catch(e){return s;}
};
// Convert quiz question HTML to plain text for rendering.
// Handles Telegram/WhatsApp emoji pasted as <img> tags (converts to Unicode via alt attr).
// Uses double newline for paragraph breaks so white-space:pre-wrap shows spacing correctly.
const quizQText=html=>{
  if(!html)return'';
  try{
    const processed=html
      .replace(/<img[^>]+alt="([^"]*)"[^>]*\/?>/gi,'$1')  // <img alt="😼"> → 😼
      .replace(/<\/p>|<\/div>|<\/h[1-6]>|<\/li>/gi,'\n\n')
      .replace(/<br\s*\/?>/gi,'\n');
    const d=document.createElement('div');
    d.innerHTML=processed;
    return(d.textContent||d.innerText||'').replace(/\n{3,}/g,'\n\n').trim();
  }catch(e){return html;}
};
// --- RICH TEXT UTILITIES -----------------------------------
const mdToHtml=text=>{
  if(!text)return'';
  return text
    .replace(/~~(.*?)~~/g,'<s>$1</s>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.*?)__/g,'<u>$1</u>')
    .replace(/_(.*?)_/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(0,0,0,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.9em">$1</code>')
    .replace(/\n• /g,'<br>• ')
    .replace(/\n/g,'<br>');
};

function RichTaskEditor({id,value,onChange,placeholder,rows=7}){

    if(!ta)return;
    const{selectionStart:s,selectionEnd:e,value:v}=ta;
    const sel=v.slice(s,e)||'texto';
    const wrapped=
      tag==='bold'  ?`**${sel}**`:
      tag==='italic'?`_${sel}_`:
      tag==='strike'?`~~${sel}~~`:
      tag==='bullet'?`\n• ${sel}`:sel;
    const nv=v.slice(0,s)+wrapped+v.slice(e);
    onChange(nv);

    if(!username.trim()){setErr('Ingresa tu usuario');return;}

  };

  const attempt=async(p=pin)=>{
    if(p.length!==4||busy) return;
    setBusy(true);
    try{
      const res=await authApi(username.trim().toLowerCase(),p);
      if(res.error){setErr('Usuario o PIN incorrecto.');setShake(true);setTimeout(()=>setShake(false),500);setPin('');setBusy(false);return;}

  const press=d=>{
    if(busy) return;
    if(d==='⌫'){setPin(p=>p.slice(0,-1));setErr('');}

    if(e.key==='Backspace'&&!pins[i]&&i>0){const n=[...pins];n[i-1]='';setPins(n);pinRefs[i-1].current?.focus();}
  };
  const resetPin=()=>{setPins(['','','','']);setPinStep('new');setFirstPin('');setPErr('');pinRefs[0].current?.focus();};

  React.useEffect(()=>{
    if(currentPin.length===4&&!pSaving){
      if(pinStep==='new'){setFirstPin(currentPin);setPinStep('confirm');setPins(['','','','']);setTimeout(()=>pinRefs[0].current?.focus(),50);}
      else if(pinStep==='confirm'){
        if(currentPin!==firstPin){setPErr('Los PINs no coinciden. Intenta de nuevo.');resetPin();return;}
        savePinFn(currentPin);
      }
    }
  },[currentPin]);

  const savePinFn=async(pin)=>{
    setPSaving(true);setPErr('');
    const r=await api('students',{action:'change_pin',id:user.id,pin});
    if(r?.error){setPErr(r.error);resetPin();setPSaving(false);return;}
    setPOk(true);setPSaving(false);
    // Update persisted user object so PIN shows correct after refresh
    setTimeout(()=>{onClose();onLogout&&onLogout();},1800);
  };

  const saveUsername=async()=>{
    const u=newUser.trim().toLowerCase();
    if(u.length<3){setUErr('Mínimo 3 caracteres');return;}
    if(!/^[a-z0-9._]+$/.test(u)){setUErr('Solo letras minúsculas, números, puntos y guiones bajos');return;}

              style={{flex:1,border:'none',borderRadius:8,padding:'7px 0',fontWeight:700,fontSize:12,cursor:'pointer',
                background:tab===t?'var(--bg2)':'transparent',
                color:tab===t?'var(--brand)':'var(--textMuted)',

              <div style={{fontSize:40,marginBottom:8}}>✅</div>
              <p style={{color:'var(--brand)',fontWeight:700,fontSize:14}}>¡Username actualizado!</p>
              <p style={{color:'var(--textMuted)',fontSize:12,marginTop:4}}>Tu nuevo usuario es <strong style={{color:'var(--text)',fontFamily:'monospace'}}>@{newUser}</strong></p>

  );

function CredModal({user,role,onClose,onSaved}){

  const [uSaving,setUSaving]=React.useState(false);
  const [uErr,setUErr]=React.useState('');

  const [pins,setPins]=React.useState(['','','','']);
  const [pinStep,setPinStep]=React.useState('new');
  const [firstPin,setFirstPin]=React.useState('');
  const [pSaving,setPSaving]=React.useState(false);
  const [pErr,setPErr]=React.useState('');
  const [pOk,setPOk]=React.useState(false);
  const pinRefs=[React.useRef(),React.useRef(),React.useRef(),React.useRef()];
  const currentPin=pins.join('');

  const handlePinDigit=(i,v)=>{
    if(!/^\d?$/.test(v))return;
    const next=[...pins];next[i]=v;setPins(next);setPErr('');
    if(v&&i<3)pinRefs[i+1].current?.focus();
    if(!v&&i>0)pinRefs[i-1].current?.focus();
  };
  const handlePinKey=(i,e)=>{
    if(e.key==='Backspace'&&!pins[i]&&i>0){const n=[...pins];n[i-1]='';setPins(n);pinRefs[i-1].current?.focus();}
  };
  const resetPin=()=>{setPins(['','','','']);setPinStep('new');setFirstPin('');setPErr('');pinRefs[0].current?.focus();};

      if(pinStep==='new'){setFirstPin(currentPin);setPinStep('confirm');setPins(['','','','']);setTimeout(()=>pinRefs[0].current?.focus(),50);}
      else if(pinStep==='confirm'){
        if(currentPin!==firstPin){setPErr('Los PINs no coinciden. Intenta de nuevo.');resetPin();return;}
        savePinFn(currentPin);
      }
    }
  },[currentPin]);

  const savePinFn=async(pin)=>{
    setPSaving(true);setPErr('');
    let r;
    if(role==='admin'){
      r=await api('chispa',{action:'change_admin_pin',pin}).catch(e=>({error:e.message}));
    } else {
      r=await api('teachers',{action:'update_pin',id:user.id,pin}).catch(e=>({error:e.message}));
    }
    if(r?.error){setPErr(r.error);resetPin();setPSaving(false);return;}
    setPOk(true);setPSaving(false);
    setTimeout(()=>{onClose();onSaved&&onSaved();},1800);
  };

  const saveUsername=async()=>{
    const u=newUser.trim().toLowerCase();
    if(u.length<3){setUErr('Minimo 3 caracteres');return;}
    if(!/^[a-z0-9._]+$/.test(u)){setUErr('Solo letras minusculas, numeros, puntos y guiones bajos');return;}

      r=await api('chispa',{action:'change_admin_username',username:u}).catch(e=>({error:e.message}));
    } else {
      r=await api('teachers',{action:'update_username',id:user.id,username:u}).catch(e=>({error:e.message}));
    }
    if(r?.error){setUErr(r.error);setUSaving(false);return;}
    setUOk(true);setUSaving(false);
    setTimeout(()=>{onClose();onSaved&&onSaved({username:u});},1600);

  const DIGIT_BTN={width:48,height:52,borderRadius:10,border:'1.5px solid var(--stroke)',background:'var(--inputBg)',color:'var(--text)',fontSize:20,fontFamily:'monospace',letterSpacing:1,textAlign:'center',outline:'none',caretColor:'var(--brand)',transition:'border-color .15s'};

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(6px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg2)',border:'1px solid var(--strokeBrand)',borderRadius:20,padding:28,maxWidth:380,width:'100%',boxShadow:'var(--shadow)',animation:'fadeUp .25s ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <h3 style={{fontFamily:'Sora',fontWeight:700,fontSize:16,margin:0,color:'var(--text)'}}>🔑 Mi cuenta</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:20,lineHeight:1}}>x</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:20,background:'var(--bg3)',borderRadius:10,padding:3}}>
          {['username','pin'].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setUErr('');setPErr('');setUOk(false);setPOk(false);resetPin();}}
              style={{flex:1,border:'none',borderRadius:8,padding:'7px 0',fontWeight:700,fontSize:12,cursor:'pointer',
                background:tab===t?'var(--bg2)':'transparent',
                color:tab===t?'var(--brand)':'var(--textMuted)',
                boxShadow:tab===t?'0 1px 4px rgba(0,0,0,.2)':'none',transition:'all .2s'}}>
              {t==='username'?'Usuario':'PIN'}
            </button>
          ))}
        </div>
        {tab==='username'&&(
          uOk
          ?<div style={{textAlign:'center',padding:'20px 0'}}>
            <p style={{fontSize:28,margin:'0 0 8px'}}>ok</p>
            <p style={{color:'var(--brand)',fontWeight:700,fontSize:14}}>Usuario actualizado!</p>

            <button onClick={saveUsername} disabled={uSaving||!newUser.trim()}
              style={{width:'100%',background:'var(--brand)',border:'none',borderRadius:10,padding:'11px 0',color:'#031a03',fontWeight:800,fontSize:14,cursor:'pointer',opacity:uSaving?0.6:1}}>
              {uSaving?'Guardando...':'Guardar usuario'}
            </button>
          </div>
        )}
        {tab==='pin'&&(
          pOk
          ?<div style={{textAlign:'center',padding:'20px 0'}}>
            <p style={{fontSize:28,margin:'0 0 8px'}}>ok</p>
            <p style={{color:'var(--brand)',fontWeight:700,fontSize:14}}>PIN actualizado!</p>
          </div>
          :<>
            <p style={{fontSize:13,color:'var(--textMuted)',margin:'0 0 14px',textAlign:'center'}}>
              {pinStep==='new'?'Ingresa tu nuevo PIN de 4 digitos':'Confirma tu nuevo PIN'}
            </p>
            <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:12}}>
              {pins.map((d,i)=>(
                <input key={i} ref={pinRefs[i]} value={d} maxLength={1} inputMode="numeric"
                  onChange={e=>handlePinDigit(i,e.target.value)} onKeyDown={e=>handlePinKey(i,e)}
                  style={{...DIGIT_BTN,borderColor:pErr?'#ef4444':d?'var(--brandBorder)':'var(--stroke)'}}

            </div>
            {pErr&&<p style={{color:'#ef4444',fontSize:12,textAlign:'center',margin:'0 0 8px'}}>{pErr}</p>}

              </button>
            )}
          </>
        )}
      </div>
    </div>
  );
}


function StudentMessages({user,onRead,onClearBadge,classSessions=[]}){
  const [thread,setThread]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [msg,setMsg]=React.useState('');
  const [sending,setSending]=React.useState(false);
  const chatEndRef=React.useRef(null);
  const [chatCancelModal,setChatCancelModal]=React.useState(null);
  const [cancelledIds,setCancelledIds]=React.useState(()=>{
    try{return new Set(JSON.parse(sessionStorage.getItem('leap_cancelled_sess')||'[]'));}
    catch(e){return new Set();}
  });

  // Fast polling while on chat tab -- 2s
  React.useEffect(()=>{
    const iv=setInterval(()=>loadSilent(),2000);
    return()=>clearInterval(iv);
  },[]);

  const loadSilent=async()=>{
    const r=await api('chispa',{action:'get_thread',studentId:user.id}).catch(()=>null);
    if(r&&Array.isArray(r)){
      const hasNew=r.some(m=>m.sender!=='student'&&!parseInt(m.is_read));
      setThread(prev=>{
        if(prev.length!==r.length||JSON.stringify(prev.map(m=>m.id+m.message))!==JSON.stringify(r.map(m=>m.id+m.message)))
          return r;
        return prev;
      });
      // Si llegaron mensajes nuevos, marcarlos leidos y refrescar badge
      if(hasNew){
        await api('chispa',{action:'mark_read',studentId:user.id}).catch(()=>{});
        if(onRead) onRead();
      }
    }
  };

  const load=async()=>{
    const r=await api('chispa',{action:'get_thread',studentId:user.id});
    setThread(Array.isArray(r)?r:[]);
    setLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),100);
    // Mark teacher messages as read and clear badge immediately
    if(onClearBadge) onClearBadge();
    await api('chispa',{action:'mark_read',studentId:user.id}).catch(()=>{});
    if(onRead) onRead();
  };

  // Clear badge immediately when chat tab opens
  React.useEffect(()=>{if(onClearBadge)onClearBadge();},[]);

  React.useEffect(()=>{load();},[]);
  React.useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[thread]);

  const sendMsg=async()=>{
    if(!msg.trim()||sending)return;
    setSending(true);
    await api('chispa',{action:'send_message',studentId:user.id,sender:'student',senderName:user.name,message:msg.trim()});
    setMsg('');
    await load();
    setSending(false);
  };
  const sendMsgWithVoice=async(voiceSrc)=>{
    await api('chispa',{action:'send_message',studentId:user.id,sender:'student',senderName:user.name,message:'',voiceData:voiceSrc});
    await load();
  };

  const NAME_COLORS=['#6366f1','#f59e0b','#10b981','#ec4899','#8b5cf6','#14b8a6'];
  const nameColor=(name)=>{let h=0;for(const c of(name||''))h=(h*31+c.charCodeAt(0))%NAME_COLORS.length;return NAME_COLORS[h];};

  return(
    <>
      {chatCancelModal&&<CancelModal
        session={chatCancelModal.session}
        cycleStart={chatCancelModal.cycleStart}
        cycleEnd={chatCancelModal.cycleEnd}
        min={chatCancelModal.min}
        user={user}
        onClose={()=>setChatCancelModal(null)}
        onDone={()=>{
          setCancelledIds(s=>{
            const newSet=new Set([...s,String(chatCancelModal.session.id)]);
            try{sessionStorage.setItem('leap_cancelled_sess',JSON.stringify([...newSet]));}catch(e){}
            return newSet;
          });
          setChatCancelModal(null);
          load();
          if(onRead) onRead(); // triggers parent onRefresh → reloads class sessions
        }}
      />}
      <SectionTitle>💬 Mensajes</SectionTitle>
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{height:'calc(100dvh - 260px)',minHeight:260,overflowY:'auto',padding:'12px 12px 4px',display:'flex',flexDirection:'column'}}>
          {loading&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',marginTop:40}}>Cargando…</p>}
          {!loading&&thread.length===0&&(
            <p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',marginTop:40}}>Aún no hay mensajes. ¡Escribe algo! 👋</p>
          )}
          {thread.map(m=>(
            <ChatBubble key={m.id} m={m}
              isMe={m.sender==='student'}
              canDelete={false} canEdit={false}
              onDelete={()=>{}} onEdit={()=>{}}
              viewerRole="student"
              nameColor={nameColor(m.sender_name)}
              reactorId={`student:${user.id}`}
              onReact={async(id,emoji)=>{
                await api('chispa',{action:'react_message',id,emoji,reactor:`student:${user.id}`});
                await loadSilent();
              }}
              cancelCtx={{
                onOpenCancel:(data)=>setChatCancelModal(data),
                cancelledIds,
                classSessions,
              }}/>
          ))}
          <div ref={chatEndRef}/>
        </div>
        <ChatInput value={msg} onChange={setMsg} onSend={sendMsg} sending={sending}
          placeholder="Escribe un mensaje… (Enter para enviar)" onVoice={sendMsgWithVoice}/>
      </Card>
    </>
  );
}

function StudentHome({user,data,pkg,locked,onRefresh,onNav,resourceViewed,planViewed}){

  const [lastRes,setLastRes]=React.useState(null);

  const [tqActive,setTqActive]=React.useState(null);
  const [tqSelected,setTqSelected]=React.useState(null);
  const [tqResult,setTqResult]=React.useState(null);
