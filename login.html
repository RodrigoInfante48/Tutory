  const doneToday=(data.results||[]).find(r=>r.quizId===todayQ?.id);
  const cyclePct=cycle.start&&cycle.end?Math.max(0,Math.min(100,Math.round(((new Date()-new Date(cycle.start))/(new Date(cycle.end)-new Date(cycle.start)))*100))):0;

  // Topic quiz data
  const topicData=data.topicData||[];
  const topicsWithPending=topicData.filter(t=>t.assignQuiz&&(t.unanswered?.length||0)>0);
  const totalPending=topicsWithPending.reduce((a,t)=>a+(t.unanswered?.length||0),0);

  // Pick a random question from all pending topics combined
  const pickRandomQ=React.useCallback((freshData)=>{
    const arr=freshData||topicsWithPending;
    if(!arr.length)return null;
    const topic=arr[Math.floor(Math.random()*arr.length)];
    const q=topic.unanswered[Math.floor(Math.random()*topic.unanswered.length)];
    return{topic,q};
  },[topicsWithPending.map(t=>t.topicId+':'+t.unanswered.length).join(',')]);

  // Auto-load first question on mount if there are pending ones and not already active
  React.useEffect(()=>{
    if(!tqActive&&totalPending>0&&!locked){
      const picked=pickRandomQ();
      if(picked)setTqActive(picked);
    }
  },[totalPending]);

  // Notifications
  const pendingTasks=(data.tasks||[]).filter(t=>t.status==='pending').length;
  const myResources=(data.resources||[]).filter(r=>!r.student_id||String(r.student_id)===String(user?.id));
  const resLsKey=`res_seen2_${user?.id}`;
  // Store as {id: updated_at_when_seen} so edited resources reappear
  const resSeenMap=React.useMemo(()=>{try{return JSON.parse(localStorage.getItem(resLsKey)||'{}');}catch(e){return {};}},[resLsKey]);
  const resIsUnseen=r=>{
    if(!r.id)return false;
    const seenAt=resSeenMap[String(r.id)];
    if(!seenAt)return true; // never seen
    if(!r.updated_at)return false; // seen and never updated
    return r.updated_at>seenAt; // seen but updated since
  };
  const unreadResource=myResources.filter(r=>resIsUnseen(r)).length;
  const myPlans=(data.plans||[]).filter(p=>String(p.student_id)===String(user?.id));
  const planLsKey=`plan_seen_${user?.id}`;
  const seenPlanIds=React.useMemo(()=>{try{return new Set(JSON.parse(localStorage.getItem(planLsKey)||'[]'));}catch(e){return new Set();}},[planLsKey,planViewed]);
  const unreadPlan=myPlans.filter(p=>!seenPlanIds.has(String(p.id||''))).length;

  // Classic quiz handlers
  const startQuiz=()=>{setAQ(todayQ);setQIdx(0);setAns([]);setSel(null);setQS('active');};
  const handleAns=i=>{if(sel!==null)return;setSel(i);};
  const nextQ=async()=>{
    const newA=[...answers,sel];
    if(qIdx+1<activeQ.questions.length){setAns(newA);setQIdx(qIdx+1);setSel(null);}
    else{
      const score=newA.reduce((a,ans,i)=>a+(ans===activeQ.questions[i].correct?1:0),0);
      const res={studentId:user.id,quizId:activeQ.id,quizTitle:activeQ.title,score,total:activeQ.questions.length};
      await api('results',res);
      setLastRes({...res,date:today()});setQS('done');onRefresh();
    }
  };

  // Topic quiz answer -- manual advance with Siguiente button (same as Temas)
  const answerTopicQ=async(optIdx)=>{
    if(tqSelected!==null||tqAdvancing)return;
    setTqSelected(optIdx);
    const res=await api('topics',{action:'answer_question',topicId:tqActive.topic.topicId,studentId:user.id,questionId:tqActive.q.id,answer:optIdx});
    setTqResult(res);
  };

  const tqGoNext=async()=>{
    if(tqAdvancing)return;
    setTqAdvancing(true);
    const fresh=await api('topics',{action:'get_student_data',studentId:user.id}).catch(()=>[]);
    const freshArr=Array.isArray(fresh)?fresh:[];
    const pending=freshArr.filter(t=>t.assignQuiz&&(t.unanswered?.length||0)>0);
    if(pending.length>0){
      const topic=pending[Math.floor(Math.random()*pending.length)];
      const q=topic.unanswered[Math.floor(Math.random()*topic.unanswered.length)];
      setTqActive({topic,q});
      setTqSelected(null);
      setTqResult(null);
      setTqAdvancing(false);
    } else {
      setTqActive(null);setTqSelected(null);setTqResult(null);setTqAdvancing(false);
    }
    onRefresh();
  };

  // Ciclo stats (merged from StudentCiclo)
  const assignedTopics=topicData.filter(t=>t.assignQuiz&&t.questions?.length>0);
  const completedTopics=assignedTopics.filter(t=>t.completed);
  const totalQuestions=assignedTopics.reduce((a,t)=>a+(t.questions?.length||0),0);
  const answeredQuestions=assignedTopics.reduce((a,t)=>a+(t.answeredIds?.length||0),0);
  const tasks=data.tasks||[];
  const doneTasks=tasks.filter(t=>t.status==='reviewed').length;
  const reviewTasks=tasks.filter(t=>t.status==='ready_review').length;
  const results=data.results||[];
  const avgScore=results.length>0?Math.round(results.reduce((a,r)=>a+(r.score/r.total*100),0)/results.length):null;
  const movements=data.movements||[];
  const myPlan=myPlans.find(p=>String(p.student_id)===String(user.id))||myPlans[0];
  const competencies=myPlan?.competencies||[];
  const achievedComps=competencies.filter(c=>parseInt(c.achieved)===1).length;

  const StatBox=({label,value,color,sub})=>(
    <div style={{flex:'1 1 calc(50% - 6px)',minWidth:120,background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:12,padding:'14px 16px'}}>
      <p style={{margin:'0 0 4px',fontFamily:'Sora',fontWeight:900,fontSize:24,color:color||'var(--brand)'}}>{value}</p>
      <p style={{margin:0,fontSize:11,color:'var(--textMuted)',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:600,lineHeight:1.3}}>{label}</p>
      {sub&&<p style={{margin:'3px 0 0',fontSize:11,color:'var(--textSub)'}}>{sub}</p>}
    </div>
  );

  // Compute urgency items for "Pendientes urgentes"
  const urgentItems=[];
  // Clases por reagendar
  const pendingReschedule=(data.classSessions||[]).filter(s=>s.status==='to_reschedule'||s.status==='holiday_impacts_min');
  pendingReschedule.forEach(s=>{
    const expiresIn=s.expires_at?Math.ceil((new Date(s.expires_at+'T23:59:59-05:00')-new Date())/(864e5)):null;
    urgentItems.push({
      emoji:'🗓️',color:'#f97316',
      label:`Clase del ${fmt(s.scheduled_date)} pendiente de reagendar`,
      sub:expiresIn!==null?(expiresIn<=0?'⚠️ Venció':expiresIn<=3?`⚠️ Expira en ${expiresIn}d`:`Expira en ${expiresIn}d`):null,
      urgent:expiresIn!==null&&expiresIn<=3,
      nav:'movements',
    });
  });
  // Extra Tasks pendientes (is_custom=1)
  (data.tasks||[]).filter(t=>t.status==='pending'&&parseInt(t.is_custom)===1).forEach(t=>{
    const dlDiff=t.due_date?Math.ceil((new Date(t.due_date+'T00:00:00')-new Date())/(864e5)):null;
    urgentItems.push({
      emoji:'📋',color:'#a78bfa',
      label:t.title||'Extra Task pendiente',
      sub:dlDiff!==null?(dlDiff<0?'⚠️ Deadline vencido':dlDiff===0?'⚠️ Deadline hoy':`Deadline en ${dlDiff}d`):null,
      urgent:dlDiff!==null&&dlDiff<=1,
      navFn:()=>onNav&&onNav('tasks',{taskId:t.id}),
    });
  });
  // Tareas de temas pendientes (is_custom=0, topic_id set) -- navega al tema exacto
  (data.tasks||[]).filter(t=>t.status==='pending'&&!parseInt(t.is_custom)&&t.topic_id).forEach(t=>{
    // Find the matching topic in topicData
    const topic=(data.topicData||[]).find(td=>td.linkedTask&&String(td.linkedTask.id)===String(t.id));
    const topicId=topic?.topicId||t.topic_id;
    urgentItems.push({
      emoji:'📋',color:'#a78bfa',
      label:`Tarea pendiente: "${t.title||'Tema'}"`,
      sub:'Ir al tema para responder',
      urgent:false,
      navFn:()=>onNav&&onNav('topics',{topicId}),
    });
  });
  // Recursos nuevos no vistos (sin deadline o con deadline futuro)
  myResources.filter(r=>resIsUnseen(r)).forEach(r=>{
    const dlDiff=r.deadline?Math.ceil((new Date(r.deadline+'T00:00:00')-new Date())/(864e5)):null;
    const dlPast=dlDiff!==null&&dlDiff<0;
    if(dlPast) return; // vencido y no visto -- no mostrar
    urgentItems.push({
      emoji:'🔗',color:'#fbbf24',
      label:r.title,
      sub:dlDiff!==null?(dlDiff===0?'⚠️ Ver hoy':dlDiff<=2?`⚠️ Ver antes del ${fmt(r.deadline)}`:`Ver antes del ${fmt(r.deadline)}`):'Recurso nuevo de tu profe',
      urgent:dlDiff!==null&&dlDiff<=1,
      navFn:()=>onNav&&onNav('resources'),
    });
  });
  // Recursos CON deadline proximo aunque ya hayan sido vistos
  myResources.filter(r=>r.deadline&&!resIsUnseen(r)).forEach(r=>{
    const dlDiff=Math.ceil((new Date(r.deadline+'T00:00:00')-new Date())/(864e5));
    if(dlDiff>=0&&dlDiff<=3){
      urgentItems.push({
        emoji:'🔗',color:'#fbbf24',
        label:r.title,
        sub:dlDiff===0?'⚠️ ¡Ver hoy!':dlDiff<=2?`⚠️ Ver antes del ${fmt(r.deadline)}`:`Ver antes del ${fmt(r.deadline)}`,
        urgent:dlDiff<=1,
        navFn:()=>onNav&&onNav('resources'),
      });
    }
  });
  // Feedback sin leer -- extra tasks (1 item per task)
  (data.tasks||[]).filter(t=>parseInt(t.is_custom)===1&&t.status==='reviewed'&&!parseInt(t.feedback_seen)&&!localSeenTaskIds.has(String(t.id))).forEach(t=>{
    urgentItems.push({
      emoji:'⭐',color:'#60a5fa',
      label:`"${t.title||'Tarea'}" -- tu profe dejó feedback`,
      sub:'Toca para ver la revisión',
      urgent:false,
      navFn:()=>{
        setLocalSeenTaskIds(s=>{const n=new Set(s);n.add(String(t.id));return n;});
        onNav&&onNav('tasks',{taskId:t.id});
      },
    });
  });
  // Feedback sin leer -- topic tasks (1 item per topic)
  (data.topicData||[]).filter(t=>{
    const task=t.linkedTask;
    return task&&task.status==='reviewed'&&!t.reviewSeen&&!parseInt(task.review_seen)&&!localSeenTopicIds.has(String(t.topicId));
  }).forEach(t=>{
    urgentItems.push({
      emoji:'⭐',color:'#60a5fa',
      label:`"${t.topicName}" -- tu profe dejó feedback en la tarea`,
      sub:'Toca para ver la revisión',
      urgent:false,
      navFn:()=>{
        setLocalSeenTopicIds(s=>{const n=new Set(s);n.add(String(t.topicId));return n;});
        onNav&&onNav('topics',{topicId:t.topicId});
      },
    });
  });
  // Sort: urgent first
  urgentItems.sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0));

  // Cycle progress
  const sessions=data.classSessions||[];
  const currentSessions=sessions.filter(s=>s.cycle_start<=new Date().toISOString().slice(0,10)&&s.cycle_end>=new Date().toISOString().slice(0,10));
  const takenSessions=currentSessions.filter(s=>parseInt(s.counts_as_taken)===1&&s.status!=='holiday_no_impact'&&s.status!=='cancelled_no_impact').length;
  // Power⚡: total sessions in cycle (excluding no-impact holidays/cancels)
  const totalCycleSessions=currentSessions.filter(s=>s.status!=='holiday_no_impact'&&s.status!=='cancelled_no_impact').length;
  const scheduledRemaining=currentSessions.filter(s=>s.status==='scheduled').length;
  const isPowerPkg=user?.pkg==='Power⚡';
  const cycleMin=isPowerPkg
    ?Math.max(0,totalCycleSessions-8)
    :PLAN_RULES[user?.pkg]?.min||pkg?.min||8;
  // For display: Power always shows taken/total, others show taken/min
  const displayTotal=isPowerPkg?totalCycleSessions:cycleMin;
  const classesLeft=Math.max(0,cycleMin-takenSessions);
  const classPct=displayTotal>0?Math.min(100,Math.round(takenSessions/displayTotal*100)):0;
  const classDone=isPowerPkg?(scheduledRemaining===0&&totalCycleSessions>0):(scheduledRemaining===0&&takenSessions>0);
  const minMet=!isPowerPkg&&takenSessions>=cycleMin;

  return(
    <>
      {locked&&(
        <div className="payBanner fade-up">
          <div style={{fontSize:36,marginBottom:8}}>🔒</div>
          <h3 style={{fontFamily:'Sora',color:'#fca5a5',marginBottom:6}}>Pago Pendiente</h3>
          <p style={{color:'#f87171',fontSize:13,lineHeight:1.6,marginBottom:14}}>Tu cuenta tiene un pago pendiente.<br/>Contacta a Sebas para activarla.</p>
          <a href="https://wa.me/573205571518?text=Hi%20Sebas!%20Te%20dejo%20ac%C3%A1%20el%20comprobante%20de%20mi%20pago%20%F0%9F%99%8F"
            target="_blank" rel="noopener noreferrer"
            style={{display:'inline-flex',alignItems:'center',gap:8,background:'#25d366',color:'#fff',fontWeight:700,fontSize:13,padding:'10px 20px',borderRadius:10,textDecoration:'none',boxShadow:'0 2px 8px rgba(37,211,102,.35)'}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Enviar comprobante a Sebas
          </a>
        </div>
      )}

      {!locked&&(
        <>
          {/* -- FLEX: Agendar clase -- */}
          {isFlex(user.pkg)&&<FlexScheduler user={user} onRefresh={onRefresh}/>}
          {/* -- 1. MI PROGRESO DEL CICLO -- */}
          <div className="cycleCard fade-up" style={{marginBottom:14}}>
            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <Eyebrow>Ciclo actual</Eyebrow>
                <p style={{fontFamily:'Sora',fontWeight:700,fontSize:14,color:'var(--text)',margin:'2px 0 0'}}>
                  {cycle.start?`${fmt(cycle.start)} → ${fmt(cycle.end)}`:' -- '}
                </p>
              </div>
              {cycle.expiring
                ?<div style={{background:'rgba(249,115,22,.15)',border:'1px solid rgba(249,115,22,.4)',borderRadius:8,padding:'4px 10px',fontSize:11,color:'#f97316',fontWeight:700}}>⚠️ {cycle.days_left}d</div>
                :<div style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:8,padding:'4px 10px',fontSize:11,color:'var(--brand)',fontWeight:700}}>{cycle.days_left||'?'}d restantes</div>
              }
            </div>

            {/* Class progress -- motivational */}
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>
                  {isPowerPkg
                    ?classDone
                      ?'🎯 ¡Ciclo completado!'
                      :`${takenSessions} de ${displayTotal} clases del ciclo`
                    :classDone
                      ?'🎯 ¡Ciclo completado!'
                      :minMet
                        ?`✅ Mínimo cumplido — ${takenSessions} de ${displayTotal} clases`
                        :classesLeft===1
                          ?`¡Solo te falta 1 clase para completar tu ciclo!`
                          :`${takenSessions} de ${cycleMin} clases del ciclo`}
                </span>
                <span style={{fontSize:13,fontWeight:900,color:classDone?'var(--brand)':classPct>=70?'var(--brand)':classPct>=40?'#f59e0b':'#ef4444',fontFamily:'Sora'}}>{classPct}%</span>
              </div>
              <div style={{height:8,background:'var(--bg3)',borderRadius:99,overflow:'hidden'}}>                <div style={{height:'100%',width:`${classPct}%`,background:classDone?'var(--brand)':classPct>=70?'var(--brand)':classPct>=40?'#f59e0b':'#ef4444',borderRadius:99,transition:'width .6s ease'}}/>              </div>
              {isPowerPkg?(
                scheduledRemaining>0&&<p style={{margin:'5px 0 0',fontSize:11,color:'var(--textMuted)'}}>
                  {scheduledRemaining===1?'Te falta 1 clase agendada por tomar este ciclo.':
                    `Te faltan ${scheduledRemaining} clases agendadas por tomar este ciclo.`}
                </p>
              ):(!classDone&&(
                <p style={{margin:'5px 0 0',fontSize:11,color:'var(--textMuted)'}}>
                  {minMet
                    ?scheduledRemaining===1?'Ya cumpliste tu mínimo — te queda 1 clase agendada. 👏'
                      :`Ya cumpliste tu mínimo — te quedan ${scheduledRemaining} clases agendadas. 👏`
                    :classesLeft===1?'¡Estás a una clase de completarlo! 💪'
                      :`Te faltan ${classesLeft} clases -- ¡sigue así! 💪`}
                </p>
              ))}
            </div>

            {/* Tokens */}
            <div style={{borderTop:'1px solid var(--stroke)',paddingTop:10}}>
              <p style={{color:'var(--textMuted)',fontSize:11,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>
                {isPowerPkg?'Cancelaciones disponibles · avisa 12h antes':'Tokens de movimiento · avisa 12h antes'}
              </p>
              <div className="tokenRow">
                {Array.from({length:user.tokensMax||2}).map((_,i)=>(
                  <div key={i} className={`token ${i<leftTok?'full':'empty'}`}>{i<leftTok?'🎟️':'✗'}</div>
                ))}
                <span style={{color:'var(--textMuted)',fontSize:12,marginLeft:4}}>{leftTok}/{user.tokensMax||2}</span>
              </div>
            </div>
          </div>

          {/* -- TODAY'S CLASS CARD -- */}
          {(()=>{
            // Always use Colombia time (UTC-5) for date and clock comparisons
            const nowCO=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Bogota'}));
            const todayStr=`${nowCO.getFullYear()}-${String(nowCO.getMonth()+1).padStart(2,'0')}-${String(nowCO.getDate()).padStart(2,'0')}`;
            const nowMinutes=nowCO.getHours()*60+nowCO.getMinutes();
            // Find today's upcoming or active session
            // Check both scheduled and rescheduled sessions
            const todays=sessions.filter(s=>{
              const isScheduled=s.status==='scheduled'&&s.scheduled_date===todayStr;
              const isRescheduled=(s.status==='rescheduled'||s.status==='rescheduled_taken')&&s.new_date===todayStr;
              return isScheduled||isRescheduled;
            });
            // For each, compute minutes until class (Colombia time)
            const withTiming=todays.map(s=>{
              const isRescheduled=s.status==='rescheduled'||s.status==='rescheduled_taken';
              const classTime=isRescheduled?(s.new_time||s.scheduled_time):s.scheduled_time;
              if(!classTime)return null;
              const [h,m]=classTime.split(':').map(Number);
              const classMinutes=h*60+m;
              const diff=classMinutes-nowMinutes;
              return{...s,classTime,classMinutes,diff,isRescheduled};
            }).filter(Boolean);
            // Show if class is within 30 min in the future OR started up to 60 min ago
            const active=withTiming.find(s=>s.diff>=-15&&s.diff<=30);
            if(!active)return null;
            const zoomUrl=active.teacher_zoom_url||null;
            const fmt12=t=>{
              if(!t)return'';
              const[h,m]=t.split(':').map(Number);
              const ampm=h>=12?'PM':'AM';
              const h12=h%12||12;
              return`${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
            };
            const teacherName=active.teacher_name||null;
            const minsUntil=active.diff;
            const label=minsUntil>0
              ?minsUntil<=5?'¡Tu clase empieza en unos minutos!':`Tu clase empieza en ${minsUntil} min`
              :'¡Tu clase está en curso!';
            return(
              <div className="fade-up" style={{marginBottom:14,background:'linear-gradient(135deg,rgba(20,184,166,.15),rgba(6,182,212,.1))',border:'1.5px solid rgba(20,184,166,.5)',borderRadius:14,padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:20}}>🎓</span>
                  <div>
                    <p style={{margin:0,fontFamily:'Sora',fontWeight:700,fontSize:13,color:'#14b8a6'}}>{label}</p>
                    <p style={{margin:0,fontSize:12,color:'var(--textMuted)',marginTop:2}}>
                      Hoy a las {fmt12(active.classTime)}{teacherName&&` · ${teacherName}`}
                    </p>
                  </div>
                </div>
                {zoomUrl?(
                  <a href={zoomUrl} target="_blank" rel="noopener noreferrer"
                    style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                      background:'#14b8a6',color:'#fff',fontWeight:700,fontSize:13,
                      padding:'10px 16px',borderRadius:10,textDecoration:'none',marginTop:6,
                      boxShadow:'0 2px 12px rgba(20,184,166,.35)',transition:'opacity .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.opacity='.85'}
                    onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6zm2 0v12h12V6H6zm10 2l-5 3.5L6 8v1.5l5 3.5 5-3.5V8z"/></svg>
                    Unirse a la clase
                  </a>
                ):(
                  <p style={{margin:'6px 0 0',fontSize:12,color:'var(--textMuted)',fontStyle:'italic'}}>
                    No encuentras el link de tu clase? Escríbele a tu profe 💬
                  </p>
                )}
              </div>
            );
          })()}

          {/* -- 2. PENDIENTES URGENTES -- */}
          {urgentItems.length>0&&(
            <div style={{marginBottom:14}}>
              <p className="label" style={{marginBottom:8}}>⚡ Pendientes</p>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {urgentItems.map((item,i)=>(
                  <div key={i} onClick={()=>item.navFn?item.navFn():(onNav&&onNav(item.nav))}
                    style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:10,
                      background:item.urgent?`rgba(${item.color==='#f97316'?'249,115,22':item.color==='#ef4444'?'239,68,68':item.color==='#fbbf24'?'251,191,36':'167,139,250'},.1)`:'var(--surface)',
                      border:`1px solid ${item.urgent?item.color+'55':'var(--stroke)'}`,cursor:'pointer',transition:'opacity .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.opacity='.8'}
                    onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                    <span style={{fontSize:16,flexShrink:0}}>{item.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:13,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.label}</p>
                      {item.sub&&<p style={{margin:'2px 0 0',fontSize:11,fontWeight:700,color:item.urgent?'#ef4444':item.color}}>{item.sub}</p>}
                    </div>
                    <span style={{color:'var(--textMuted)',fontSize:13,flexShrink:0}}>→</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* -- 3. PRÁCTICA DIARIA (quiz) -- */}
          {qs===null&&(
            <>
              {tqActive?(
                <Card style={{borderColor:'rgba(96,165,250,.4)',position:'relative',overflow:'visible'}}>
                  {tqResult?.isCorrect&&<ConfettiBlast/>}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:12,color:'#60a5fa',fontWeight:700,fontFamily:'Sora'}}>⚡ Práctica diaria</span>
                      {totalPending>0&&<span style={{fontSize:11,color:'var(--textMuted)'}}>{totalPending} pendiente{totalPending!==1?'s':''}</span>}
                    </div>
                    <button onClick={()=>{setTqActive(null);setTqSelected(null);setTqResult(null);setTqAdvancing(false);}} style={{background:'none',border:'none',color:'var(--textMuted)',cursor:'pointer',fontSize:16,lineHeight:1,padding:'2px 4px'}}>✕</button>
                  </div>
                  <div className="quiz-q-html" style={{fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:14,lineHeight:1.5,fontFamily:'Sora'}} dangerouslySetInnerHTML={{__html:sanitizeHtml(tqActive.q.question||'')}}/>
                  {[tqActive.q.option_a,tqActive.q.option_b,tqActive.q.option_c,tqActive.q.option_d,tqActive.q.option_e].filter(Boolean).map((o,i)=>{
                    let bg='var(--bg3)',bc='var(--stroke)',col='var(--text)';
                    if(tqSelected!==null){
                      if(i===parseInt(tqActive.q.correct)){bg='rgba(134,239,134,.18)';bc='var(--brand)';col='var(--brand)';}
                      else if(i===tqSelected&&i!==parseInt(tqActive.q.correct)){bg='rgba(239,68,68,.1)';bc='#ef4444';col='#ef4444';}
                    }
                    const tqIsSelCorrect=tqSelected===i&&i===parseInt(tqActive.q.correct);
                    return(
                      <button key={i} onClick={()=>answerTopicQ(i)}
                        style={{width:'100%',textAlign:'left',padding:'11px 13px',borderRadius:9,border:`1.5px solid ${bc}`,background:bg,color:col,fontSize:13,cursor:(tqSelected===null&&!tqAdvancing)?'pointer':'default',marginBottom:7,transition:'all .2s',
                          boxShadow:tqIsSelCorrect?'0 0 0 3px rgba(134,239,134,.25)':'none'}}>
                        <span style={{fontWeight:700,marginRight:8}}>{['A','B','C','D','E'][i]}.</span>{o}
                        {tqIsSelCorrect&&<span style={{float:'right'}}>✅</span>}
                        {tqSelected===i&&i!==parseInt(tqActive.q.correct)&&<span style={{float:'right'}}>❌</span>}
                      </button>
                    );
                  })}
                  {tqResult&&(
                    <div style={{marginTop:8,position:'relative'}}>
                      <p style={{textAlign:'center',fontSize:14,fontWeight:700,color:tqResult.isCorrect?'var(--brand)':'#ef4444'}}>
                        {tqResult.isCorrect?'🎉 ¡Correcto!':'❌ Incorrecto -- la respuesta era '+['A','B','C','D','E'][parseInt(tqResult.correct)]}
                      </p>
                      {!tqResult.isCorrect&&tqResult.feedback&&(
                        <div style={{marginTop:6,background:'rgba(96,165,250,.1)',border:'1px solid rgba(96,165,250,.3)',borderRadius:10,padding:'9px 12px'}}>
                          <p style={{margin:0,fontSize:13,color:'#60a5fa',lineHeight:1.5,whiteSpace:'pre-wrap'}}>💡 {tqResult.feedback}</p>
                        </div>
                      )}
                      <Btn full onClick={tqGoNext} disabled={tqAdvancing} style={{marginTop:10}}>
                        {tqAdvancing?'Cargando…':'Siguiente →'}
                      </Btn>
                    </div>
                  )}
                </Card>
              ):(
                assignedTopics.length>0&&(
                  <Card style={{borderColor:'var(--strokeBrand)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <Eyebrow style={{color:'var(--brand)'}}>⚡ Práctica diaria</Eyebrow>
                        <p style={{color:'var(--brand)',fontSize:13,marginTop:4,fontWeight:700}}>¡Todo al día! ✅</p>
                        <p style={{color:'var(--textMuted)',fontSize:12,marginTop:2}}>Completaste todas las preguntas asignadas.</p>
                      </div>
                      <span style={{fontSize:32}}>🎉</span>
                    </div>
                  </Card>
                )
              )}
            </>
          )}
          {qs==='active'&&activeQ&&<QuizWidget q={activeQ} qIdx={qIdx} sel={sel} onAnswer={handleAns} onNext={nextQ}/>}
          {qs==='done'&&lastRes&&<ResultCard result={lastRes} onClose={()=>setQS(null)}/>}
        </>
      )}
    </>
  );
}

function QuizWidget({q,qIdx,sel,onAnswer,onNext}){
  const qn=q.questions[qIdx];
  return(
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <span style={{color:'var(--brand)',fontSize:12,fontWeight:700}}>{q.title}</span>
        <span style={{color:'var(--textMuted)',fontSize:12}}>{qIdx+1}/{q.questions.length}</span>
      </div>
      <div style={{height:4,background:'var(--stroke)',borderRadius:99,overflow:'hidden',marginBottom:16}}>
        <div style={{height:'100%',width:`${(qIdx/q.questions.length)*100}%`,background:'var(--brand)',transition:'width .4s'}}/>
      </div>
      <h3 style={{fontSize:16,color:'var(--text)',marginBottom:14,lineHeight:1.5}}>{qn.q}</h3>
      {qn.opts.map((opt,i)=>{
        let cls='quizOption';
        if(sel!==null){if(i===qn.correct)cls+=' correct';else if(i===sel)cls+=' wrong';}
        return(
          <button key={i} className={cls} onClick={()=>onAnswer(i)}>
            <span className="optLetter">{['A','B','C','D'][i]}</span>
            {opt}
            {sel!==null&&i===qn.correct&&<span style={{marginLeft:'auto'}}>✓</span>}
            {sel===i&&i!==qn.correct&&<span style={{marginLeft:'auto'}}>✗</span>}
          </button>
        );
      })}
      {sel!==null&&<Btn full onClick={onNext} style={{marginTop:8}}>{qIdx+1<q.questions.length?'Siguiente →':'Ver resultado →'}</Btn>}
    </Card>
  );
}

function ResultCard({result,onClose}){
  const pct=Math.round(result.score/result.total*100);
  const col=pct>=70?'var(--brand)':pct>=50?'#f59e0b':'#ef4444';
  return(
    <Card style={{textAlign:'center',padding:28}}>
      <div style={{fontSize:48,marginBottom:8}}>{pct>=70?'🎉':'📚'}</div>
      <h3 style={{color:'var(--text)',marginBottom:4}}>{result.quizTitle}</h3>
      <div style={{margin:'18px auto',width:96,height:96,borderRadius:'50%',border:`4px solid ${col}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'Sora',fontWeight:900,fontSize:24,color:col}}>{result.score}/{result.total}</span>
        <span style={{color:col,fontSize:12}}>{pct}%</span>
      </div>
      <Btn full onClick={onClose}>Volver al inicio</Btn>
    </Card>
  );
}

function StudentTasks({data,user,onRefresh,locked,targetTaskId,onTargetConsumed}){
  // Only custom tasks -- topic tasks live inside StudentTopics (Temas tab)
  const tasks=(data.tasks||[]).filter(t=>parseInt(t.is_custom)===1);
  // Mark all pending tasks as seen when this component mounts
  React.useEffect(()=>{
    if(!user?.id||!tasks.length)return;
    const key='task_seen_'+user.id;
    try{
      const seen=new Set(JSON.parse(localStorage.getItem(key)||'[]'));
      tasks.filter(t=>t.status==='pending').forEach(t=>seen.add(String(t.id)));
      localStorage.setItem(key,JSON.stringify([...seen]));
    }catch(e){}
    onRefresh&&onRefresh();
  },[tasks.length,user?.id]);
  const [open,setOpen]=React.useState(null);
  const [drafts,setDrafts]=React.useState({});
  const [busy,setBusy]=React.useState(false);
  const [voiceData,setVoiceData]=React.useState({});
  const [imgData,setImgData]=React.useState({});
  const [recording,setRecording]=React.useState(null);
  const [recSeconds,setRecSeconds]=React.useState(0);
  const mediaRecRef=React.useRef(null);
  const chunksRef=React.useRef([]);
  const timerRef=React.useRef(null);
  const fmtSecs=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const stopRecording=()=>{
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive')mediaRecRef.current.stop();
    clearInterval(timerRef.current);
  };
  const toggleRecording=async(taskId)=>{
    if(recording===taskId){stopRecording();return;}
    if(recording)stopRecording();
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current=[];
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'});
      mediaRecRef.current=mr;
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType});
        if(blob.size>5*1024*1024){alert('El audio es muy grande (máx 5MB).');setRecording(null);setRecSeconds(0);return;}
        const reader=new FileReader();
        reader.onload=ev=>{setVoiceData(d=>({...d,[taskId]:ev.target.result}));};
        reader.readAsDataURL(blob);
        setRecording(null);setRecSeconds(0);
      };
      mr.start();
      setRecording(taskId);setRecSeconds(0);
      timerRef.current=setInterval(()=>setRecSeconds(s=>{if(s>=299){stopRecording();return 0;}return s+1;}),1000);
    }catch(e){alert('No se pudo acceder al micrófono.');}
  };
  // Auto-open target task (from feedback notification)
  React.useEffect(()=>{
    if(targetTaskId){
      setOpen(String(targetTaskId));
      onTargetConsumed&&onTargetConsumed();
      setTimeout(()=>{
        const el=document.getElementById('task-feedback-'+targetTaskId);
        if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      },200);
    }
  },[targetTaskId]);

  const SI={
    pending:      {l:'Pendiente',      c:'#f59e0b'},
    ready_review: {l:'Entregada 👀',   c:'#60a5fa'},
    reviewed:     {l:'Revisada ✓',     c:'var(--brand)'},
  };

  const submit=async(task)=>{
    const text=(drafts[task.id]||'').trim();
    const voice=voiceData[task.id]||null;
    const imgs=imgData[task.id]||[];
    if(!text&&!voice&&!imgs.length){alert('Escribe tu respuesta, graba un audio o adjunta una imagen antes de entregar.');return;}
    if(!confirm('¿Entregar la tarea? Ya no podrás editar la respuesta.'))return;
    setBusy(true);
    await api('tasks',{action:'submit_response',id:task.id,submissionText:text||null,submissionVoice:voice||null,submissionImages:imgs.length?imgs:undefined});
    setBusy(false);
    onRefresh();
    setOpen(null);
  };

  if(!tasks.length) return(
    <>
      <SectionTitle>📝 Extra Tasks</SectionTitle>
      <p style={{color:'var(--textMuted)',textAlign:'center',padding:32,fontSize:13}}>Tu profe no te ha asignado tareas personalizadas aún.<br/>Las tareas de temas aparecen en la pestaña 🎯 Temas.</p>
    </>
  );

  return(
    <>
      <SectionTitle>📝 Extra Tasks</SectionTitle>
      {locked&&<div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#ef4444',fontWeight:600}}>⚠️ Pago pendiente — puedes ver tus tareas pero no entregarlas hasta regularizar.</div>}
      {tasks.map(t=>{
        const si=SI[t.status]||SI.pending;
        const isOpen=open===t.id;
        const hasReview=t.status==='reviewed'&&(t.teacher_comment||t.teacher_grade);
        const hasFeedbackUnseen=hasReview&&!parseInt(t.feedback_seen);
        return(
          <div key={t.id} id={`task-feedback-${t.id}`} style={{marginBottom:10,borderRadius:'var(--radiusL)',border:`1.5px solid ${hasReview?'var(--strokeBrand)':isOpen?'var(--brandBorder)':'var(--stroke)'}`,background:'var(--surface)',overflow:'hidden',transition:'border-color .2s'}}>
            <div onClick={async()=>{
              const nowOpen=!isOpen;
              setOpen(nowOpen?t.id:null);
              if(nowOpen&&hasFeedbackUnseen){
                await api('tasks',{action:'mark_feedback_seen',id:t.id,studentId:user.id}).catch(()=>{});
                onRefresh();
              }
            }} style={{padding:'14px 16px',cursor:'pointer',userSelect:'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:'0 0 3px',fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14,lineHeight:1.3}}>{t.title}</p>
                  {t.topic&&<p style={{margin:0,color:'var(--brand)',fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>📌 {t.topic}</p>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                  <span style={{background:`${si.c}18`,border:`1.5px solid ${si.c}55`,color:si.c,borderRadius:999,padding:'2px 9px',fontSize:11,fontWeight:700}}>{si.l}</span>
                  <span style={{color:'var(--textMuted)',fontSize:12}}>{isOpen?'▲':'▼'}</span>
                </div>
              </div>
              {hasReview&&!isOpen&&<p style={{margin:'6px 0 0',fontSize:12,color:'var(--brand)',fontWeight:600}}>⭐ Tu profe dejó comentarios -- toca para ver</p>}
            </div>
            {isOpen&&(
              <div style={{borderTop:'1px solid var(--stroke)',padding:'14px 16px'}}>
                <p className="label" style={{marginBottom:6}}>📋 Instrucción</p>
                {t.instruction&&<div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 13px',marginBottom:t.instruction_voice?6:14,fontSize:13,color:'var(--text)',lineHeight:1.6}} dangerouslySetInnerHTML={{__html:sanitizeHtml(mdToHtml(t.instruction||''))}}/>}
                {t.instruction_voice&&<audio controls src={t.instruction_voice} style={{width:'100%',height:36,marginBottom:14,display:'block'}}/>}
                {t.image_data&&JSON.parse(t.image_data||'[]').map((img,i)=>(
                  <img key={i} src={img} alt="" onClick={()=>window.open(img,'_blank')}
                    style={{maxWidth:'100%',borderRadius:8,marginBottom:8,display:'block',cursor:'zoom-in'}}/>
                ))}
                {t.due_date&&<p style={{color:'var(--textMuted)',fontSize:12,marginBottom:12}}>📅 Fecha límite: <strong>{fmt(t.due_date)}</strong></p>}

                {t.status==='pending'&&(
                  <>
                    <p className="label" style={{marginBottom:8}}>✍️ Tu respuesta</p>
                    <RichTaskEditor id={`task-${t.id}`} value={drafts[t.id]||''} onChange={v=>setDrafts(d=>({...d,[t.id]:v}))} rows={7}/>
                    {voiceData[t.id]&&(
                      <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--stroke)'}}>
                        <p style={{margin:'0 0 4px',fontSize:11,color:'var(--textMuted)',fontWeight:600}}>🎙️ Audio adjunto</p>
                        <audio controls src={voiceData[t.id]} style={{width:'100%',height:36}}/>
                        <button onClick={()=>setVoiceData(d=>{const n={...d};delete n[t.id];return n;})} style={{marginTop:4,background:'none',border:'none',color:'#ef4444',fontSize:11,cursor:'pointer',padding:0}}>✕ Eliminar audio</button>
                      </div>
                    )}
                    {(imgData[t.id]||[]).length>0&&(
                      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
                        {(imgData[t.id]||[]).map((img,i)=>(
                          <div key={i} style={{position:'relative',width:72,height:72}}>
                            <img src={img} alt="" style={{width:72,height:72,objectFit:'cover',borderRadius:8,border:'1px solid var(--stroke)'}}/>
                            <button onClick={()=>setImgData(d=>({...d,[t.id]:(d[t.id]||[]).filter((_,j)=>j!==i)}))} style={{position:'absolute',top:-6,right:-6,background:'#ef4444',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',color:'#fff',fontSize:11,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>&#215;</button>
                          </div>
                        ))}
                      </div>
                    )}
                    {!locked&&(
                      <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center',flexWrap:'wrap'}}>
                        <button onClick={()=>toggleRecording(t.id)} style={{flexShrink:0,padding:'8px 12px',borderRadius:8,border:`1.5px solid ${recording===t.id?'#ef4444':'var(--stroke)'}`,background:recording===t.id?'rgba(239,68,68,.1)':'var(--bg3)',color:recording===t.id?'#ef4444':'var(--textMuted)',cursor:'pointer',fontSize:13,fontWeight:600}}>
                          {recording===t.id?`⏹ ${fmtSecs(recSeconds)}`:'🎙️'}
                        </button>
                        {(imgData[t.id]||[]).length<3&&(
                          <label style={{flexShrink:0,padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--stroke)',background:'var(--bg3)',color:'var(--textMuted)',cursor:'pointer',fontSize:13,fontWeight:600}}>
                            📷
                            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
                              const file=e.target.files?.[0];if(!file)return;
                              if(file.size>600000){alert('Imagen muy grande. Máx 600KB.');e.target.value='';return;}
                              const reader=new FileReader();
                              reader.onload=ev=>{setImgData(d=>({...d,[t.id]:[...(d[t.id]||[]),ev.target.result]}));};
                              reader.readAsDataURL(file);e.target.value='';
                            }}/>
                          </label>
                        )}
                        <Btn full onClick={()=>submit(t)} disabled={busy||recording===t.id||(!(drafts[t.id]||'').trim()&&!voiceData[t.id]&&!(imgData[t.id]||[]).length)}>{busy?'Enviando…':'📤 Entregar tarea'}</Btn>
                      </div>
                    )}
                    {locked&&<p style={{fontSize:12,color:'#ef4444',textAlign:'center',margin:'10px 0 0'}}>⚠️ Regulariza tu pago para entregar</p>}
                    <p style={{margin:'6px 0 0',fontSize:11,color:'var(--textMuted)',textAlign:'center'}}>Una vez entregada no podrás editarla.</p>
                  </>
                )}
                {t.status==='ready_review'&&(t.submission_text||t.submission_voice||t.submission_images)&&(
                  <>
                    <p className="label" style={{marginBottom:6,color:'#60a5fa'}}>📤 Tu respuesta entregada</p>
                    {t.submission_text&&<div style={{background:'rgba(96,165,250,.07)',border:'1px solid rgba(96,165,250,.25)',borderRadius:10,padding:'12px 14px',fontSize:13,color:'var(--text)',lineHeight:1.7}} dangerouslySetInnerHTML={{__html:mdToHtml(t.submission_text)}}/>}
                    {t.submission_voice&&<audio controls src={t.submission_voice} style={{width:'100%',height:36,marginTop:6,display:'block'}}/>}
                    {t.submission_images&&JSON.parse(t.submission_images||'[]').map((img,i)=>(
                      <img key={i} src={img} alt="" onClick={()=>window.open(img,'_blank')} style={{maxWidth:'100%',borderRadius:8,marginTop:6,display:'block',cursor:'zoom-in'}}/>
                    ))}
                    <p style={{margin:'8px 0 0',fontSize:11,color:'var(--textMuted)'}}>Entregada {t.submission_at?.slice(0,16)} · Tu profe la está revisando…</p>
                  </>
                )}
                {t.status==='reviewed'&&(
                  <>
                    {(t.submission_text||t.submission_voice)&&(
                      <>
                        <p className="label" style={{marginBottom:6}}>✍️ Tu respuesta</p>
                        {t.submission_text&&<div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',fontSize:13,color:'var(--text)',lineHeight:1.7,marginBottom:t.submission_voice||t.submission_images?6:12}} dangerouslySetInnerHTML={{__html:mdToHtml(t.submission_text)}}/>}
                        {t.submission_voice&&<audio controls src={t.submission_voice} style={{width:'100%',height:36,marginBottom:t.submission_images?6:12,display:'block'}}/>}
                        {t.submission_images&&JSON.parse(t.submission_images||'[]').map((img,i)=>(
                          <img key={i} src={img} alt="" onClick={()=>window.open(img,'_blank')} style={{maxWidth:'100%',borderRadius:8,marginBottom:6,display:'block',cursor:'zoom-in'}}/>
                        ))}
                      </>
                    )}
                    {hasReview&&(
                      <div style={{background:'linear-gradient(135deg,var(--brandDim),rgba(134,239,134,.03))',border:'1.5px solid var(--strokeBrand)',borderRadius:12,padding:'14px 16px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:t.teacher_comment?8:0}}>
                          <p style={{margin:0,fontSize:12,fontWeight:700,color:'var(--brand)',textTransform:'uppercase',letterSpacing:'.06em'}}>⭐ Revisión de tu profe</p>
                          {t.teacher_grade&&<span style={{fontFamily:'Sora',fontWeight:900,fontSize:18,color:'var(--brand)',background:'var(--bg0)',border:'1.5px solid var(--brandBorder)',borderRadius:10,padding:'2px 12px'}}>{t.teacher_grade}</span>}
                        </div>
                        {t.teacher_comment&&<div style={{fontSize:13,color:'var(--text)',lineHeight:1.7}} dangerouslySetInnerHTML={{__html:mdToHtml(t.teacher_comment)}}/>}
                        {t.teacher_voice&&<audio controls src={t.teacher_voice} style={{width:'100%',height:36,marginTop:8,display:'block'}}/>}
                        {t.reviewed_at&&<p style={{margin:'8px 0 0',fontSize:11,color:'var(--textMuted)'}}>Revisada el {t.reviewed_at?.slice(0,10)}</p>}
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

function StudentTopics({data,user,onRefresh,locked,onNav,targetTopicId,onTargetConsumed}){
  const topicData=data.topicData||[];
  const [activeTopicId,setActiveTopicId]=React.useState(null);
  const [activeQ,setActiveQ]=React.useState(null);
  const [selected,setSelected]=React.useState(null);
  const [result,setResult]=React.useState(null);
  const [quizComplete,setQuizComplete]=React.useState(null);
  const [taskOpen,setTaskOpen]=React.useState(null);
  const [drafts,setDrafts]=React.useState({});
  const [taskImgData,setTaskImgData]=React.useState({});
  const [taskVoiceData,setTaskVoiceData]=React.useState({});
  const [taskRecording,setTaskRecording]=React.useState(null);
  const [taskRecSeconds,setTaskRecSeconds]=React.useState(0);
  const taskMediaRecRef=React.useRef(null);
  const taskChunksRef=React.useRef([]);
  const taskTimerRef=React.useRef(null);
  const [taskBusy,setTaskBusy]=React.useState(false);
  const [topicSearch,setTopicSearch]=React.useState('');
  // Local optimistic state for steps
  const [localSummaryViewed,setLocalSummaryViewed]=React.useState({});
  const [localReviewSeen,setLocalReviewSeen]=React.useState({});
  const [openTopics,setOpenTopics]=React.useState(new Set());
  // Auto-open target topic with feedback (from notification)
  React.useEffect(()=>{
    if(targetTopicId){
      setOpenTopics(prev=>{const s=new Set(prev);s.add(String(targetTopicId));return s;});
      setTaskOpen(String(targetTopicId));
      onTargetConsumed&&onTargetConsumed();
      // Mark review as seen immediately on navigation -- no need to click "Ver Feedback"
      const topic=(data.topicData||[]).find(t=>String(t.topicId)===String(targetTopicId));
      const task=topic?.linkedTask;
      if(task?.id&&!localReviewSeen[task.id]){
        setLocalReviewSeen(s=>({...s,[task.id]:true}));
        api('topics',{action:'mark_review_seen',taskId:task.id,studentId:user.id})
          .then(()=>onRefresh()).catch(()=>{});
      }
      setTimeout(()=>{
        const el=document.getElementById('topic-feedback-'+targetTopicId);
        if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      },300);
    }
  },[targetTopicId]);
  const toggleTopic=id=>setOpenTopics(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  // Track answered question IDs locally so we don't repeat them
  const [localAnswered,setLocalAnswered]=React.useState({});  // topicId ? Set of question ids

  const startQuiz=(topic)=>{
    const alreadyAnswered=localAnswered[topic.topicId]||new Set();
    const allAnsweredIds=new Set([...(topic.answeredIds||[]),...alreadyAnswered]);
    const unanswered=(topic.questions||[]).filter(q=>!allAnsweredIds.has(q.id));
    if(!unanswered.length)return;
    const q=unanswered[Math.floor(Math.random()*unanswered.length)];
    setActiveTopicId(topic.topicId);
    setActiveQ(q);
    setSelected(null);
    setResult(null);
    setQuizComplete(null);
  };

  const answer=async(optIdx)=>{
    if(selected!==null)return;
    setSelected(optIdx);
    const res=await api('topics',{action:'answer_question',topicId:activeTopicId,studentId:user.id,questionId:activeQ.id,answer:optIdx});
    setResult(res);
    // Mark this question as answered locally so we don't show it again
    setLocalAnswered(prev=>{
      const s=new Set(prev[activeTopicId]||[]);
      s.add(activeQ.id);
      return {...prev,[activeTopicId]:s};
    });
  };

  const goNext=()=>{
    const topic=topicData.find(t=>t.topicId===activeTopicId);
    const alreadyAnswered=localAnswered[activeTopicId]||new Set();
    // Combine server-known answered + locally answered this session
    const allAnsweredIds=new Set([...(topic?.answeredIds||[]),...alreadyAnswered]);
    const remaining=(topic?.questions||[]).filter(q=>!allAnsweredIds.has(q.id));
    if(remaining.length>0){
      const next=remaining[Math.floor(Math.random()*remaining.length)];
      setActiveQ(next);
      setSelected(null);
      setResult(null);
    } else {
      // All done -- fetch fresh score then show completion screen
      api('topics',{action:'get_student_data',studentId:user.id}).then(fresh=>{
        const freshArr=Array.isArray(fresh)?fresh:[];
        const t=freshArr.find(t=>t.topicId===activeTopicId);
        if(t){
          api('topics',{action:'log_quiz_complete',topicId:activeTopicId,studentId:user.id,studentName:user.name,topicName:t.topicName}).catch(()=>{});
          const correct=t.correctCount||Object.values(t.answers||{}).filter(a=>a.is_correct===1).length;
          setQuizComplete({topicName:t.topicName,total:t.questions?.length||0,correct,topicId:activeTopicId});
        }
        onRefresh();
        setActiveQ(null);setSelected(null);setResult(null);setActiveTopicId(null);
        setLocalAnswered(prev=>({...prev,[activeTopicId]:new Set()}));
      }).catch(()=>{
        onRefresh();
        setActiveQ(null);setSelected(null);setResult(null);setActiveTopicId(null);
      });
    }
  };

  const fmtTopicSecs=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const stopTopicRecording=()=>{if(taskMediaRecRef.current&&taskMediaRecRef.current.state!=='inactive')taskMediaRecRef.current.stop();clearInterval(taskTimerRef.current);};
  const toggleTopicRecording=async(topicId)=>{
    if(taskRecording===topicId){stopTopicRecording();return;}
    if(taskRecording)stopTopicRecording();
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      taskChunksRef.current=[];
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'});
      taskMediaRecRef.current=mr;
      mr.ondataavailable=e=>{if(e.data.size>0)taskChunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(tk=>tk.stop());
        const blob=new Blob(taskChunksRef.current,{type:mr.mimeType});
        if(blob.size>5*1024*1024){alert('El audio es muy grande (máx 5MB).');setTaskRecording(null);setTaskRecSeconds(0);return;}
        const reader=new FileReader();
        reader.onload=ev=>{setTaskVoiceData(d=>({...d,[topicId]:ev.target.result}));};
        reader.readAsDataURL(blob);
        setTaskRecording(null);setTaskRecSeconds(0);
      };
      mr.start();setTaskRecording(topicId);setTaskRecSeconds(0);
      taskTimerRef.current=setInterval(()=>setTaskRecSeconds(s=>{if(s>=299){stopTopicRecording();return 0;}return s+1;}),1000);
    }catch(e){alert('No se pudo acceder al micrófono.');}
  };

  const submitTask=async(topic)=>{
    const text=(drafts[topic.topicId]||'').trim();
    const voice=taskVoiceData[topic.topicId]||null;
    const imgs=taskImgData[topic.topicId]||[];
    if(!text&&!voice&&!imgs.length){alert('Escribe tu respuesta, graba un audio o adjunta una imagen antes de entregar.');return;}
    if(!confirm('¿Entregar la tarea? Ya no podrás editar la respuesta.'))return;
    if(!topic.linkedTask?.id){alert('No se encontró la tarea vinculada a este tema. Contacta a tu profe.');return;}
    setTaskBusy(true);
    await api('tasks',{action:'submit_response',id:topic.linkedTask.id,submissionText:text||null,submissionVoice:voice||null,submissionImages:imgs.length?imgs:undefined});
    setTaskBusy(false);
    setTaskOpen(null);
    onRefresh();
  };

  // -- Quiz question view -------------------------------------
  if(activeQ){
    const activeTopic=topicData.find(t=>t.topicId===activeTopicId);
    const totalQs=activeTopic?.questions?.length||0;
    const answeredQs=new Set([...(activeTopic?.answeredIds||[]),...(localAnswered[activeTopicId]||[])]).size;
    const progressPct=totalQs>0?Math.round(answeredQs/totalQs*100):0;
    return(
      <div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <Btn sm cls="btn-ghost" onClick={()=>{setActiveQ(null);setSelected(null);setResult(null);}}>← Volver</Btn>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:11,color:'var(--textMuted)',fontWeight:600}}>{activeTopic?.topicName||''}</span>
              <span style={{fontSize:11,color:'var(--brand)',fontWeight:700}}>{answeredQs}/{totalQs}</span>
            </div>
            <div style={{height:4,background:'var(--bg3)',borderRadius:99,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progressPct}%`,background:'var(--brand)',borderRadius:99,transition:'width .5s'}}/>
            </div>
          </div>
        </div>
        <Card style={{borderColor:'var(--strokeBrand)',position:'relative',overflow:'visible'}}>
          <div className="quiz-q-html" style={{fontSize:15,fontWeight:700,fontFamily:'Sora',color:'var(--text)',marginBottom:16,lineHeight:1.5}} dangerouslySetInnerHTML={{__html:sanitizeHtml(activeQ.question||'')}}/>
          {[activeQ.option_a,activeQ.option_b,activeQ.option_c,activeQ.option_d,activeQ.option_e].filter(Boolean).map((o,i)=>{
            const correctIdx=parseInt(activeQ.correct);
            let bg='var(--bg3)',bc='var(--stroke)',col='var(--text)';
            if(selected!==null){
              if(i===correctIdx){
                bg='rgba(134,239,134,.18)';bc='var(--brand)';col='var(--brand)';
              } else if(i===selected&&i!==correctIdx){
                bg='rgba(239,68,68,.1)';bc='#ef4444';col='#ef4444';
              }
            }
            const isSelectedCorrect=selected===i&&i===correctIdx;
            return(
              <button key={i} onClick={()=>answer(i)}
                style={{width:'100%',textAlign:'left',padding:'12px 14px',borderRadius:10,border:`1.5px solid ${bc}`,background:bg,color:col,fontSize:13,cursor:selected===null?'pointer':'default',marginBottom:8,transition:'all .2s',
                  boxShadow:isSelectedCorrect?'0 0 0 3px rgba(134,239,134,.25)':'none'}}>
                <span style={{fontWeight:700,marginRight:8}}>{['A','B','C','D'][i]}.</span>{o}
                {isSelectedCorrect&&<span style={{float:'right'}}>✅</span>}
                {selected===i&&i!==correctIdx&&<span style={{float:'right'}}>❌</span>}
              </button>
            );
          })}
          {/* Confetti from top when correct */}
          {result?.isCorrect&&<ConfettiBlast/>}
          {result&&(
            <div style={{marginTop:12}}>
              <p style={{textAlign:'center',fontSize:14,fontWeight:700,color:result.isCorrect?'var(--brand)':'#ef4444',marginBottom:result.feedback?8:12}}>
                {result.isCorrect?'🎉 ¡Correcto!':'❌ Incorrecto -- la respuesta era '+['A','B','C','D'][result.correct]}
              </p>
              {!result.isCorrect&&result.feedback&&(
                <div style={{marginBottom:12,background:'rgba(96,165,250,.1)',border:'1px solid rgba(96,165,250,.3)',borderRadius:10,padding:'10px 13px'}}>
                  <p style={{margin:0,fontSize:13,color:'#60a5fa',lineHeight:1.6}}>💡 {result.feedback}</p>
                </div>
              )}
              <Btn full onClick={goNext}>Siguiente →</Btn>
            </div>
          )}
        </Card>
      </div>
    );
  }

  const withQuiz=topicData.filter(t=>t.assignQuiz&&t.questions?.length>0);

  // -- Quiz set complete screen -------------------------------
  if(quizComplete){
    const {topicName,total,correct,topicId}=quizComplete;
    const pct=total>0?Math.round(correct/total*100):0;
    const scoreColor=pct>=70?'var(--brand)':pct>=40?'#f59e0b':'#ef4444';
    const remaining=withQuiz.filter(t=>!t.completed).length;
    return(
      <div style={{textAlign:'center',padding:'32px 16px'}}>
        <div style={{fontSize:56,marginBottom:12}}>{pct>=70?'🎉':pct>=40?'💪':'📚'}</div>
        <h3 style={{fontFamily:'Sora',fontWeight:900,color:'var(--text)',marginBottom:6,fontSize:20}}>¡Quiz completado!</h3>
        <p style={{color:'var(--brand)',fontWeight:700,fontSize:15,marginBottom:16}}>{topicName}</p>

        {/* Score card */}
        <div style={{background:'var(--surface)',border:`2px solid ${scoreColor}33`,borderRadius:16,padding:'20px 24px',marginBottom:20,display:'inline-block',minWidth:180}}>
          <p style={{margin:'0 0 4px',fontFamily:'Sora',fontWeight:900,fontSize:48,color:scoreColor,lineHeight:1}}>{pct}%</p>
          <p style={{margin:'0 0 8px',fontSize:13,color:'var(--textMuted)'}}>{correct} de {total} correctas</p>
          <div style={{height:6,background:'var(--bg3)',borderRadius:99,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${pct}%`,background:scoreColor,borderRadius:99,transition:'width .8s'}}/>
          </div>
        </div>

        <p style={{color:'var(--textMuted)',fontSize:13,marginBottom:20}}>
          {pct>=70?'¡Excelente trabajo! Sigue así 🌟':pct>=40?'Buen intento. Sigue practicando 💪':'Revisa el material e inténtalo de nuevo 📚'}
        </p>

        {/* Buttons */}
        <div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:280,margin:'0 auto'}}>
          <Btn full onClick={()=>{setQuizComplete(null);if(onNav)onNav('results');}}>📊 Ver mis resultados</Btn>
          {remaining>0&&(
            <Btn full cls="btn-ghost" onClick={()=>{setQuizComplete(null);const next=withQuiz.find(t=>!t.completed);if(next)startQuiz(next);}}>Siguiente tema →</Btn>
          )}
          <button onClick={()=>setQuizComplete(null)} style={{background:'none',border:'none',color:'var(--textMuted)',fontSize:12,cursor:'pointer',textDecoration:'underline',marginTop:4}}>Volver a la lista</button>
        </div>
      </div>
    );
  }

  // -- Step badge helper --------------------------------------
  const StepBadge=({n,done,active})=>(
    <div style={{width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0,
      background:done?'var(--brand)':active?'rgba(96,165,250,.2)':'var(--bg3)',
      border:`1.5px solid ${done?'var(--brand)':active?'#60a5fa':'var(--stroke)'}`,
      color:done?'#031a03':active?'#60a5fa':'var(--textMuted)'}}>
      {done?'✓':n}
    </div>
  );

  // -- Main topic list ----------------------------------------
  const sq=topicSearch.toLowerCase();
  const filteredTopics=withQuiz.filter(t=>!sq||t.topicName.toLowerCase().includes(sq)||(t.topicLevel||'').toLowerCase().includes(sq));
  const groupedTopics={};
  filteredTopics.forEach(t=>{const lv=t.topicLevel||'Otros';if(!groupedTopics[lv])groupedTopics[lv]=[];groupedTopics[lv].push(t);});

  return(
    <>
      <SectionTitle>🎯 Mis Temas</SectionTitle>
      {locked&&<div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#ef4444',fontWeight:600}}>⚠️ Pago pendiente — puedes ver los temas pero no responder quizzes ni tareas hasta regularizar.</div>}
      {topicData.length===0&&<Card style={{textAlign:'center',padding:32}}><p style={{color:'var(--textMuted)'}}>Tu profe aún no te ha asignado temas.</p></Card>}
      {withQuiz.length>0&&(
        <input value={topicSearch} onChange={e=>setTopicSearch(e.target.value)}
          placeholder="🔍 Buscar tema…"
          style={{width:'100%',boxSizing:'border-box',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none',marginBottom:12,transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor='var(--brandBorder)'}
          onBlur={e=>e.target.style.borderColor='var(--stroke)'}/>
      )}
      {filteredTopics.length===0&&topicSearch&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:16,fontSize:13}}>Sin resultados para "{topicSearch}"</p>}

      {[...LEVELS].filter(lv=>groupedTopics[lv]?.length>0).map(lv=>{
        const lvTopics=groupedTopics[lv];
        const lvDone=lvTopics.filter(t=>{
          const ans=new Set([...(t.answeredIds||[]),...(localAnswered[t.topicId]||[])]).size;
          const tot=t.questions?.length||0;
          const task=t.linkedTask;
          const taskStatus=task?.status||'none';
          const hasTask=t.assignTask&&(t.taskTitle||task);
          const hasSummary=!!(t.assignSummary||t.canva_url);
          const s1=!hasSummary||(t.summaryViewed||localSummaryViewed[t.topicId]);
          const s2=t.completed;
          const s3=!hasTask||(taskStatus==='ready_review'||taskStatus==='reviewed');
          const s4=!hasTask||taskStatus==='reviewed';
          const s5=!hasTask||taskStatus!=='reviewed'||(t.reviewSeen||localReviewSeen[task?.id]);
          return s1&&s2&&s3&&s4&&s5;
        }).length;
        const lvPending=lvTopics.length-lvDone;
        const lvColor=LEVEL_COLORS[lv]||'#94a3b8';
        const isLvOpen=!openTopics.has('__level__'+lv);
        const lvFilter=openTopics.has('__filter__'+lv+'__done')?'done':openTopics.has('__filter__'+lv+'__pending')?'pending':null;
        const toggleLvFilter=(f,e)=>{e.stopPropagation();setOpenTopics(prev=>{const s=new Set(prev);const key='__filter__'+lv+'__'+f;s.has(key)?s.delete(key):(s.delete('__filter__'+lv+'__done'),s.delete('__filter__'+lv+'__pending'),s.add(key));return s;});};
        return(
        <div key={lv} style={{marginBottom:12}}>
          {/* Level header -- collapsible */}
          <button onClick={()=>setOpenTopics(prev=>{const s=new Set(prev);s.has('__level__'+lv)?s.delete('__level__'+lv):s.add('__level__'+lv);return s;})}
            style={{width:'100%',display:'flex',alignItems:'center',gap:8,marginBottom:isLvOpen?10:0,background:'transparent',border:'none',cursor:'pointer',padding:'4px 0',textAlign:'left'}}>
            <span style={{fontFamily:'Sora',fontWeight:900,fontSize:13,color:lvColor}}>{lv}</span>
            <span style={{fontSize:11,color:'var(--textMuted)'}}>{lvTopics.length} tema{lvTopics.length!==1?'s':''}</span>
            {lvDone>0&&<span onClick={e=>toggleLvFilter('done',e)}
              style={{fontSize:11,fontWeight:700,color:'var(--brand)',background:lvFilter==='done'?'var(--brand)':'var(--brandDim)',borderRadius:999,padding:'1px 8px',cursor:'pointer',color:lvFilter==='done'?'#000':'var(--brand)',transition:'all .15s'}}>✅ {lvDone}</span>}
            {lvPending>0&&<span onClick={e=>toggleLvFilter('pending',e)}
              style={{fontSize:11,fontWeight:700,color:lvFilter==='pending'?'#000':'#f59e0b',background:lvFilter==='pending'?'#f59e0b':'rgba(245,158,11,.1)',borderRadius:999,padding:'1px 8px',cursor:'pointer',transition:'all .15s'}}>⏳ {lvPending}</span>}
            <div style={{flex:1,height:1,background:`${lvColor}33`}}/>
            <span style={{color:'var(--textMuted)',fontSize:11}}>{isLvOpen?'▲':'▼'}</span>
          </button>
          {isLvOpen&&(
          <div>
          {(()=>{
            const isDone=t=>{
              const task=t.linkedTask; const taskStatus=task?.status||'none';
              const hasTask=t.assignTask&&(t.taskTitle||task);
              const hasSummary=!!(t.assignSummary||t.canva_url);
              const s1=!hasSummary||(t.summaryViewed||localSummaryViewed[t.topicId]);
              const s2=t.completed; const s3=!hasTask||(taskStatus==='ready_review'||taskStatus==='reviewed');
              const s4=!hasTask||taskStatus==='reviewed'; const s5=!hasTask||taskStatus!=='reviewed'||(t.reviewSeen||localReviewSeen[task?.id]);
              return s1&&s2&&s3&&s4&&s5;
            };
            const pending=lvTopics.filter(t=>!isDone(t));
            const done=lvTopics.filter(t=>isDone(t));
            const shown=lvFilter==='done'?done:lvFilter==='pending'?pending:[...pending,...done];
            return shown;
          })().map(t=>{
        const answered=new Set([...(t.answeredIds||[]),...(localAnswered[t.topicId]||[])]).size;
        const total=t.questions?.length||0;
        const quizPct=total>0?Math.round(answered/total*100):0;
        const remaining=t.unanswered?.length||0;
        const task=t.linkedTask;
        const taskStatus=task?.status||'none';
        const hasTask=t.assignTask&&(t.taskTitle||task);
        const taskDone=taskStatus==='reviewed';
        const taskSent=taskStatus==='ready_review'||taskDone;
        const taskPending=taskStatus==='pending';
        const isTaskOpen=taskOpen===t.topicId;
        const hasSummary=!!(t.assignSummary||t.canva_url);

        // 5-step completion logic
        const step1=!hasSummary||(t.summaryViewed||localSummaryViewed[t.topicId]);
        const step2=t.completed;
        const step3=!hasTask||taskSent||taskDone;
        const step4=!hasTask||taskDone;
        const step5=!hasTask||!taskDone||(t.reviewSeen||localReviewSeen[task?.id]);
        const allDone=step1&&step2&&step3&&step4&&step5;

        // Granular progress -- quiz counts proportionally, others are binary
        // Only count steps that are relevant to this topic
        let totalWeight=0, earnedWeight=0;
        if(hasSummary){
          totalWeight+=1;
          if(t.summaryViewed||localSummaryViewed[t.topicId]) earnedWeight+=1;
        }
        // Quiz always counts -- granular by questions answered
        if(total>0){
          totalWeight+=1;
          earnedWeight+= total>0 ? Math.min(1, answered/total) : 0;
        }
        if(hasTask){
          totalWeight+=1; // submit task
          if(taskSent||taskDone) earnedWeight+=1;
          totalWeight+=1; // teacher reviews
          if(taskDone) earnedWeight+=1;
          totalWeight+=1; // student sees feedback
          if(t.reviewSeen||localReviewSeen[task?.id]) earnedWeight+=1;
        }
        const topicPct=totalWeight>0?Math.round(earnedWeight/totalWeight*100):0;
        const barColor=topicPct===0?'var(--stroke)':topicPct<40?'#ef4444':topicPct<70?'#f59e0b':'var(--brand)';

        const isTopicOpen=openTopics.has(t.topicId);

        return(
          <div key={t.topicId} style={{marginBottom:12,borderRadius:'var(--radiusL)',border:`1.5px solid ${allDone?'var(--brandBorder)':isTaskOpen?'var(--brandBorder)':'var(--stroke)'}`,background:'var(--surface)',overflow:'hidden',transition:'border-color .2s'}}>

            {/* Topic header -- clickable to toggle checklist */}
            <div onClick={()=>toggleTopic(t.topicId)} style={{padding:'14px 16px 10px',cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:8}}>
                <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:15,lineHeight:1.3}}>{t.topicName}</p>
                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                  {allDone
                    ?<span style={{fontSize:12,fontWeight:700,color:'var(--brand)',background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:999,padding:'2px 10px'}}>✅ Completo</span>
                    :<span style={{fontSize:11,fontWeight:700,color:topicPct===0?'var(--textMuted)':barColor}}>{topicPct}%</span>
                  }
                  <span style={{color:'var(--textMuted)',fontSize:12}}>{isTopicOpen?'▲':'▼'}</span>
                </div>
              </div>
              {/* Progress bar always visible */}
              <div style={{height:5,background:'var(--bg3)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${topicPct}%`,background:barColor,borderRadius:99,transition:'width .5s'}}/>
              </div>
            </div>

            {/* Checklist -- only when open */}
            {isTopicOpen&&(
              <div style={{padding:'0 16px 14px',borderTop:'1px solid var(--stroke)'}}>

                    <StepBadge n={hasSummary?'2':'1'} done={step2} active={!step2}/>

                    {task.submission_images&&JSON.parse(task.submission_images||'[]').map((img,i)=>(

                        {task.submission_images&&JSON.parse(task.submission_images||'[]').map((img,i)=>(

                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:task.teacher_comment?8:0}}>

                          {task.teacher_grade&&<span style={{fontFamily:'Sora',fontWeight:900,fontSize:18,color:'var(--brand)',background:'var(--bg0)',border:'1.5px solid var(--brandBorder)',borderRadius:10,padding:'2px 12px'}}>{task.teacher_grade}</span>}

        );
          })}
          </div>
          )}
        </div>
        );
      })}
    </>
  );
}

function StudentResources({data,user}){
  const resources=(data.resources||[]).filter(r=>!r.student_id||String(r.student_id)===String(user?.id));
  const typeIcon={website:'🌐',video:'🎬',doc:'📄',exercise:'✏️',podcast:'🎧',other:'📌'};
  const lsKey=`res_seen2_${user?.id}`;

  const readSeenMap=()=>{
    try{return JSON.parse(localStorage.getItem(lsKey)||'{}');}catch(e){return {};}
  };
  const [seenMap,setSeenMap]=React.useState(readSeenMap);

  React.useEffect(()=>{
    setSeenMap(readSeenMap());
  },[user?.id, resources.length]);

  const isUnseen=r=>{
    if(!r.id)return false;
    const seenAt=seenMap[String(r.id)];
    if(!seenAt)return true;
    if(!r.updated_at)return false;
    return r.updated_at>seenAt;
  };

  const markSeen=(id,updatedAt)=>{
    if(!id)return;
    setSeenMap(prev=>{
      const next={...prev,[String(id)]:updatedAt||new Date().toISOString()};
      try{localStorage.setItem(lsKey,JSON.stringify(next));}catch(e){}
      return next;
    });
  };

  if(!resources.length)return(
    <>
      <SectionTitle>🔗 Recursos Recomendados</SectionTitle>
      <Card style={{textAlign:'center',padding:32}}><p style={{color:'var(--textMuted)'}}>Tu profe aún no ha agregado recursos.</p></Card>
    </>
  );
  return(
    <>
      <SectionTitle>🔗 Recursos Recomendados</SectionTitle>
      {resources.map(r=>{
        // Always use the server-assigned id -- never fall back to array index
        const rid=String(r.id||'');
        const isNew=isUnseen(r);
        const today=new Date(); today.setHours(0,0,0,0);
        const dl=r.deadline?new Date(r.deadline+'T00:00:00'):null;
        const dlDiff=dl?Math.ceil((dl-today)/(864e5)):null;
        const dlUrgent=dlDiff!==null&&dlDiff<=3&&dlDiff>=0;
        const dlPast=dlDiff!==null&&dlDiff<0;
        return(
          <Card key={rid||r.url} style={{borderColor:dlUrgent?'rgba(249,115,22,.5)':isNew?'var(--strokeBrand)':'var(--stroke)'}}>
            {r.deadline&&(
              <div style={{marginBottom:8,padding:'5px 10px',borderRadius:8,
                background:dlPast?'rgba(100,116,139,.12)':dlUrgent?'rgba(249,115,22,.1)':'rgba(96,165,250,.08)',
                border:`1px solid ${dlPast?'rgba(100,116,139,.3)':dlUrgent?'rgba(249,115,22,.4)':'rgba(96,165,250,.25)'}`,
                display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:13}}>{dlPast?'⏰':dlUrgent?'🔥':'📅'}</span>
                <span style={{fontSize:12,fontWeight:700,color:dlPast?'#64748b':dlUrgent?'#f97316':'#60a5fa'}}>
                  {dlPast?`Deadline vencido el ${fmt(r.deadline)}`
                    :dlDiff===0?'¡Deadline hoy!'
                    :`Ver antes del ${fmt(r.deadline)} · ${dlDiff}d`}
                </span>
              </div>
            )}
            <a href={r.url} target="_blank" rel="noreferrer" onClick={()=>markSeen(rid,r.updated_at)} style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none'}}>
              <span style={{fontSize:20}}>{typeIcon[r.type]||'🔗'}</span>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <p style={{margin:0,color:'var(--brand)',fontWeight:700,fontSize:14}}>{r.title}</p>
                  {isNew&&<span style={{fontSize:10,fontWeight:700,background:'var(--brand)',color:'#fff',padding:'1px 6px',borderRadius:999}}>NUEVO</span>}
                </div>
                <p style={{margin:0,color:'var(--textMuted)',fontSize:11}}>Toca para abrir →</p>
              </div>
            </a>
          </Card>
        );
      })}
    </>
  );
}

  if(!topicData.length) return(
    <>
      <SectionTitle>📊 Results</SectionTitle>
      <Card style={{textAlign:'center',padding:32}}>

    const pct=answered>0?Math.round(correct/answered*100):0;
    const color=pct>=70?'var(--brand)':pct>=40?'#f59e0b':'#ef4444';
    return{...t,total,answered,correct,pct,color};
  });
  const inProgress=topicsWithStats.filter(t=>t.answered>0&&t.answered<t.total);
  const toDo=topicsWithStats.filter(t=>t.answered===0);
  const completed=topicsWithStats.filter(t=>t.answered>0&&t.answered>=t.total);

  // Overall stats
  const totalQ=topicsWithStats.reduce((a,t)=>a+t.total,0);
  const answeredQ=topicsWithStats.reduce((a,t)=>a+t.answered,0);
  const correctQ=topicsWithStats.reduce((a,t)=>a+t.correct,0);
  const overallPct=answeredQ>0?Math.round(correctQ/answeredQ*100):0;
  const overallColor=overallPct>=70?'var(--brand)':overallPct>=40?'#f59e0b':'#ef4444';

  const TopicCard=({t})=>{
    const isOpen=open===t.topicId;
    const levelColor=LEVEL_COLORS[t.topicLevel||'Otros']||'#94a3b8';
    return(
      <Card key={t.topicId} style={{marginBottom:8,cursor:'pointer'}} onClick={()=>setOpen(isOpen?null:t.topicId)}>

              <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{t.topicName}</p>
            </div>
            <p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>
              {t.answered===0?'Sin responder aún'
                :t.answered<t.total?`${t.answered}/${t.total} respondidas`
                :'Completado ✅'}
            </p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {t.answered>0&&(
              <span style={{fontFamily:'Sora',fontWeight:900,fontSize:22,color:t.color}}>{t.pct}%</span>
            )}
            <span style={{color:'var(--textMuted)',fontSize:14}}>{isOpen?'▲':'▼'}</span>
          </div>
        </div>
        {t.answered>0&&(
          <div style={{height:5,background:'var(--bg3)',borderRadius:99,overflow:'hidden',marginBottom:isOpen?12:0}}>
            <div style={{height:'100%',width:`${t.pct}%`,background:t.color,borderRadius:99,transition:'width .6s'}}/>
          </div>
        )}
        {isOpen&&(
          <div style={{borderTop:'1px solid var(--stroke)',marginTop:10,paddingTop:12}} onClick={e=>e.stopPropagation()}>
