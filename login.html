              <p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:'8px 0'}}>Aún no has respondido preguntas de este tema.</p>
            ):(
              <>
                <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--brand)',background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:8,padding:'3px 10px'}}>✅ {t.correct} correctas</span>
                  {t.answered-t.correct>0&&<span style={{fontSize:12,fontWeight:700,color:'#ef4444',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.25)',borderRadius:8,padding:'3px 10px'}}>❌ {t.answered-t.correct} incorrectas</span>}
                  {t.total-t.answered>0&&<span style={{fontSize:12,color:'var(--textMuted)',background:'var(--bg3)',border:'1px solid var(--stroke)',borderRadius:8,padding:'3px 10px'}}>⏳ {t.total-t.answered} sin responder</span>}
                </div>
                {t.questions?.map((q,qi)=>{
                  const ans=t.answers?.[q.id];
                  if(!ans) return(
                    <div key={q.id} style={{marginBottom:8,padding:'10px 12px',borderRadius:10,background:'var(--bg3)',border:'1px solid var(--stroke)',opacity:.6}}>
                      <div className="quiz-q-html" style={{margin:0,fontSize:12,color:'var(--textMuted)',fontWeight:600}} dangerouslySetInnerHTML={{__html:`${qi+1}. ${sanitizeHtml(q.question||'')}`}}/>
                      <p style={{margin:'4px 0 0',fontSize:11,color:'var(--textMuted)'}}>⏳ Sin responder</p>
                    </div>
                  );
                  const isCorrect=ans.is_correct===1;
                  const allOpts=[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e].filter(Boolean);
                  return(
                    <div key={q.id} style={{marginBottom:8,padding:'10px 12px',borderRadius:10,
                      background:isCorrect?'rgba(134,239,134,.06)':'rgba(239,68,68,.05)',
                      border:`1.5px solid ${isCorrect?'rgba(134,239,134,.3)':'rgba(239,68,68,.25)'}`}}>
                      <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:8}}>
                        <span style={{fontSize:14,flexShrink:0}}>{isCorrect?'✅':'❌'}</span>
                        <div className="quiz-q-html" style={{margin:0,fontSize:12,color:'var(--text)',fontWeight:600,lineHeight:1.4}} dangerouslySetInnerHTML={{__html:`${qi+1}. ${sanitizeHtml(q.question||'')}`}}/>
                      </div>
                      {allOpts.map((o,oi)=>{
                        const isStudentAns=oi===ans.answer;
                        const isCorrectOpt=oi===parseInt(q.correct);
                        let bg='transparent',col='var(--textMuted)',fw=400,prefix='';
                        if(isCorrectOpt){bg='rgba(134,239,134,.1)';col='var(--brand)';fw=700;prefix='✓ ';}
                        if(isStudentAns&&!isCorrect){bg='rgba(239,68,68,.08)';col='#ef4444';fw=700;prefix='✗ ';}
                        if(isStudentAns&&isCorrect){prefix='✓ ';}
                        return(
                          <div key={oi} style={{padding:'4px 8px',borderRadius:7,background:bg,marginBottom:3,display:'flex',gap:6}}>
                            <span style={{fontSize:11,color:col,fontWeight:fw,minWidth:14}}>{opts[oi]}.</span>
                            <span style={{fontSize:11,color:col,fontWeight:fw}}>{prefix}{o}</span>
                            {isStudentAns&&<span style={{fontSize:10,color:col,marginLeft:'auto',flexShrink:0}}>{isCorrect?'Tu respuesta ✓':'Tu respuesta'}</span>}
                          </div>
                        );
                      })}
                      {!isCorrect&&q.feedback&&(
                        <div style={{marginTop:6,background:'rgba(96,165,250,.08)',border:'1px solid rgba(96,165,250,.2)',borderRadius:8,padding:'6px 10px'}}>
                          <p style={{margin:0,fontSize:11,color:'#60a5fa',lineHeight:1.5}}>💡 {q.feedback}</p>
                        </div>
                      )}
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}
      </Card>
    );
  };

  const SectionHeader=({label,count,open:isOpen,onToggle,color,badge})=>(
    <button onClick={onToggle} style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'transparent',border:'none',cursor:'pointer',padding:'6px 0',textAlign:'left',marginBottom:isOpen?8:12}}>
      <span style={{fontFamily:'Sora',fontWeight:900,fontSize:13,color:color||'var(--text)'}}>{label}</span>
      <span style={{fontSize:11,fontWeight:700,color:'#fff',background:color||'var(--textMuted)',borderRadius:999,padding:'1px 8px',minWidth:20,textAlign:'center'}}>{count}</span>
      {badge&&<span style={{fontSize:11,color:color,fontWeight:600}}>{badge}</span>}
      <div style={{flex:1,height:1,background:'var(--stroke)'}}/>
      <span style={{color:'var(--textMuted)',fontSize:11}}>{isOpen?'▲':'▼'}</span>
    </button>
  );

  return(
    <>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        {onNav&&<button onClick={()=>onNav('topics')} style={{background:'none',border:'none',color:'var(--textMuted)',fontSize:13,cursor:'pointer',padding:'4px 0',display:'flex',alignItems:'center',gap:4}}>← Temas</button>}
        <SectionTitle style={{margin:0}}>📊 Results</SectionTitle>
      </div>

      {/* Overall summary card */}
      {answeredQ>0&&(
        <Card style={{marginBottom:16,background:'linear-gradient(135deg,var(--surface),var(--bg3))'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div>
              <p style={{margin:'0 0 2px',fontSize:12,color:'var(--textMuted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Progreso general</p>
              <p style={{margin:0,fontSize:13,color:'var(--text)'}}>{answeredQ} de {totalQ} preguntas respondidas</p>
            </div>
            <span style={{fontFamily:'Sora',fontWeight:900,fontSize:32,color:overallColor}}>{overallPct}%</span>
          </div>
          <div style={{height:8,background:'var(--bg3)',borderRadius:99,overflow:'hidden',marginBottom:10}}>
            <div style={{height:'100%',width:`${Math.round(answeredQ/totalQ*100)}%`,background:'var(--brand)',borderRadius:99,transition:'width .6s'}}/>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {completed.length>0&&<span style={{fontSize:12,fontWeight:700,color:'var(--brand)',background:'var(--brandDim)',borderRadius:8,padding:'2px 10px'}}>✅ {completed.length} completado{completed.length!==1?'s':''}</span>}
            {inProgress.length>0&&<span style={{fontSize:12,fontWeight:700,color:'#f59e0b',background:'rgba(245,158,11,.1)',borderRadius:8,padding:'2px 10px'}}>⏳ {inProgress.length} en progreso</span>}
            {toDo.length>0&&<span style={{fontSize:12,color:'var(--textMuted)',background:'var(--bg3)',borderRadius:8,padding:'2px 10px'}}>📋 {toDo.length} por empezar</span>}
          </div>
        </Card>
      )}

      {/* In progress */}
      {inProgress.length>0&&(
        <>
          <SectionHeader label="⏳ En progreso" count={inProgress.length} open={sectionOpen.progress} onToggle={()=>toggleSection('progress')} color="#f59e0b"/>
          {sectionOpen.progress&&inProgress.map(t=><TopicCard key={t.topicId} t={t}/>)}
        </>
      )}

      {/* To do */}
      {toDo.length>0&&(
        <>
          <SectionHeader label="📋 Por empezar" count={toDo.length} open={sectionOpen.todo} onToggle={()=>toggleSection('todo')} color="var(--textMuted)"/>
          {sectionOpen.todo&&toDo.map(t=><TopicCard key={t.topicId} t={t}/>)}
        </>
      )}

      {/* Completed */}
      {completed.length>0&&(
        <>
          <SectionHeader label="✅ Completados" count={completed.length} open={sectionOpen.done} onToggle={()=>toggleSection('done')} color="var(--brand)"/>
          {sectionOpen.done&&completed.map(t=><TopicCard key={t.topicId} t={t}/>)}
        </>
      )}
    </>
  );
}
function StudentPlan({data,user,targetPlanId,onViewed}){
  const plans=data.plans||[];
  const myPlans=plans.filter(p=>String(p.student_id)===String(user?.id));
  // Mark all my plans as seen when this tab is opened
  React.useEffect(()=>{
    if(!user?.id||!myPlans.length)return;
    const lsKey=`plan_seen_${user.id}`;
    try{
      const existing=new Set(JSON.parse(localStorage.getItem(lsKey)||'[]'));
      myPlans.forEach(p=>existing.add(String(p.id||'')));
      localStorage.setItem(lsKey,JSON.stringify([...existing]));
    }catch(e){}
    if(onViewed)onViewed();
  },[myPlans.length,user?.id]);
  // Scroll to target plan if navigated from notification
  React.useEffect(()=>{
    if(!targetPlanId)return;
    setTimeout(()=>{
      const el=document.getElementById(`plan-${targetPlanId}`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },150);
  },[targetPlanId]);
  const today=new Date();today.setHours(0,0,0,0);
  const classify=p=>{
    if(p.cycle_start&&p.cycle_end){
      const s=new Date(p.cycle_start),e=new Date(p.cycle_end);
      if(today>=s&&today<=e)return 'current';
      if(today>e)return 'past';
      return 'future';
    }
    return p.is_closed==1?'past':'current';
  };
  const current=plans.find(p=>classify(p)==='current'&&p.is_closed!=1);
  const future=plans.filter(p=>classify(p)==='future'&&p.is_closed!=1);
  const past=plans.filter(p=>classify(p)==='past'||p.is_closed==1);
  const cycleTag=p=>{
    const c=classify(p);
    if(p.is_closed==1)return{label:'Completado',color:'#64748b'};
    if(c==='current')return{label:'Ciclo actual',color:'var(--brand)'};
    if(c==='future')return{label:'Próximo ciclo',color:'#8b5cf6'};
    return{label:'Ciclo anterior',color:'#64748b'};
  };
  const PV=({p})=>{
    const done=p.competencies?.filter(c=>parseInt(c.achieved)===1).length||0;
    const tot=p.competencies?.length||0;
    const pct=tot>0?Math.round(done/tot*100):0;
    const tag=cycleTag(p);
    // Build date range from cycle_start/cycle_end fields (avoids truncation of cycle_label string)
    const dateRange=p.cycle_start&&p.cycle_end
      ?`${fmtCycleDate(p.cycle_start)} – ${fmtCycleDate(p.cycle_end)}`
      :p.cycle_label||'';
    const cycleName=p.cycle_name||(p.cycle_label?.match(/Cycle -- (.+) \(/)?.[1])||null;
    return(
      <Card id={`plan-${p.id}`}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
          <div style={{flex:1,minWidth:0}}>
            <Badge color={tag.color}>{tag.label}</Badge>
            {cycleName&&<p style={{margin:'6px 0 2px',fontFamily:'Sora',fontWeight:700,fontSize:14,color:'var(--text)'}}>{cycleName}</p>}
            <p style={{margin:cycleName?'0':'6px 0 0',fontSize:12,color:'var(--textMuted)',lineHeight:1.4}}>{dateRange}</p>
          </div>
          <span style={{fontFamily:'Sora',fontWeight:900,fontSize:20,color:'var(--brand)',flexShrink:0,marginLeft:8}}>{pct}%</span>
        </div>
        <p style={{color:'var(--textSub)',fontSize:13,lineHeight:1.6,marginBottom:12}}>🎯 {p.objective}</p>
        <div style={{height:4,background:'var(--stroke)',borderRadius:99,marginBottom:14,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:'var(--brand)',transition:'width .8s'}}/>
        </div>
        {p.competencies?.map(c=>(
          <div key={c.id} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:8,
            padding:'8px 10px',borderRadius:10,
            background:parseInt(c.achieved)===1?'rgba(134,239,134,.08)':'var(--bg3)',
            border:`1px solid ${parseInt(c.achieved)===1?'var(--brandBorder)':'var(--stroke)'}`,
            transition:'all .2s'}}>
            <div style={{flexShrink:0,width:20,height:20,borderRadius:999,marginTop:1,
              background:parseInt(c.achieved)===1?'var(--brand)':'var(--bg0)',
              border:`2px solid ${parseInt(c.achieved)===1?'var(--brand)':'var(--stroke)'}`,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#fff',fontWeight:900}}>
              {parseInt(c.achieved)===1?'✓':''}
            </div>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:13,color:parseInt(c.achieved)===1?'var(--text)':'var(--textSub)',flex:1,
                fontWeight:parseInt(c.achieved)===1?600:400}}>{c.description}</p>
              {parseInt(c.achieved)===1&&<p style={{margin:'2px 0 0',fontSize:10,color:'var(--brand)',fontWeight:700,letterSpacing:'.04em'}}>✅ LOGRADO</p>}
            </div>
          </div>
        ))}
      </Card>
    );
  };
  const [pastOpen,setPastOpen]=React.useState(false);
  return(
    <>
      <SectionTitle>🗺️ Study Plan</SectionTitle>
      {!current&&future.length===0&&past.length===0&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32}}>Tu profe aún no ha creado tu plan del ciclo actual.</p>}
      {current&&<PV p={current}/>}
      {future.length>0&&<><p className="label" style={{marginTop:8,color:'#8b5cf6'}}>🔮 Próximos ciclos</p>{future.map(p=><PV key={p.id} p={p}/>)}</>}
      {past.length>0&&(
        <>
          <button onClick={()=>setPastOpen(o=>!o)}
            style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'transparent',border:'none',cursor:'pointer',padding:'8px 0',marginTop:8,textAlign:'left'}}>
            <span className="label" style={{margin:0}}>📚 Ciclos anteriores</span>
            <span style={{fontSize:11,fontWeight:700,color:'var(--textMuted)',background:'var(--bg3)',borderRadius:999,padding:'1px 8px'}}>{past.length}</span>
            <div style={{flex:1,height:1,background:'var(--stroke)'}}/>
            <span style={{color:'var(--textMuted)',fontSize:11}}>{pastOpen?'▲':'▼'}</span>
          </button>
          {pastOpen&&past.map(p=><PV key={p.id} p={p}/>)}
        </>
      )}
    </>
  );
}
// ── FlexScheduler — Flex students book their own classes ───────
function FlexScheduler({user,onRefresh}){
  const [step,setStep]=React.useState('idle'); // idle | picking_teacher | picking_slot | confirming | done | error
  const [teachers,setTeachers]=React.useState([]);
  const [selTeacher,setSelTeacher]=React.useState(null);
  const [slots,setSlots]=React.useState([]);
  const [selSlot,setSelSlot]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState('');
  const [booked,setBooked]=React.useState(null);
  // Clases restantes en el ciclo
  const [classesLeft,setClassesLeft]=React.useState(null);

  React.useEffect(()=>{loadInfo();},[]);

  const loadInfo=async()=>{
    setLoading(true);
    try{
      const [tRes,sessRes]=await Promise.all([
        api('teachers').catch(()=>[]),
        api('class_sessions','',`&student_id=${user.id}`).catch(()=>[]),
      ]);
      setTeachers(Array.isArray(tRes)?tRes:[]);
      // Compute classes left this cycle
      const todayStr=new Date().toISOString().slice(0,10);
      const current=(Array.isArray(sessRes)?sessRes:[]).filter(s=>s.cycle_start<=todayStr&&s.cycle_end>=todayStr);
      const taken=current.filter(s=>parseInt(s.counts_as_taken)===1).length;
      const min=PLAN_RULES[user.pkg]?.min||8;
      setClassesLeft(Math.max(0,min-taken));
    }catch(e){}
    setLoading(false);
  };

  const pickTeacher=async(t)=>{
    setSelTeacher(t);setStep('picking_slot');setLoading(true);setSlots([]);setErr('');
    try{
      const r=await fetch(`${BASE}/calendar.php`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'get_slots',teacherName:t.name,daysAhead:14})}).then(x=>x.json());
      if(r.error){setErr(r.error);setStep('picking_teacher');setLoading(false);return;}
      // Flatten grouped slots into array
      const flat=[];
      Object.values(r.grouped||{}).forEach(daySlots=>daySlots.forEach(sl=>flat.push(sl)));
      // Only show slots at least 12 hours from now (Colombia time UTC-5)
      const nowCO=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Bogota'}));
      const minCO=new Date(nowCO.getTime()+12*60*60*1000);
      const filtered=flat.filter(sl=>{
        const slotDt=new Date(`${sl.date}T${sl.time}:00`);
        return slotDt>=minCO;
      });
      setSlots(filtered);
      if(flat.length===0){setErr('Este profe no tiene espacios disponibles. Prueba con otro.');setStep('picking_teacher');}
    }catch(e){setErr('Error cargando espacios.');}
    setLoading(false);
  };

  const confirm=async()=>{
    if(!selSlot||!selTeacher)return;
    setLoading(true);setErr('');
    try{
      // Create a manual session for this Flex student
      const cyclesR=await api('students',{action:'get_cycles',studentId:user.id}).catch(()=>[]);
      const cycles=Array.isArray(cyclesR)?cyclesR:[];
      const cycle=cycles.find(c=>c.start<=selSlot.date&&c.end>=selSlot.date);
      if(!cycle){setErr('No hay un ciclo activo para esa fecha. Contacta a Sebas.');setLoading(false);return;}
      // Insert the session
      const r=await api('class_sessions',{
        action:'add_manual',
        studentId:user.id,
        cycleId:cycle.id,
        date:selSlot.date,
        time:selSlot.time,
        status:'scheduled',
        teacherName:selTeacher.name,
        teacherId:selTeacher.id,
        notes:'Agendada por estudiante (Flex)',
      });
      if(r?.error){setErr(r.error);setLoading(false);return;}
      // Book in Google Calendar — same as reschedule but without originalDate
      await fetch(`${BASE}/calendar.php`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          action:'create_event',
          date:selSlot.date,
          time:selSlot.time,
          teacherName:selTeacher.name,
          studentName:user.name,
          studentEmail:user.email||'',
          // no originalDate → no "rescheduled" text in title
        })}).catch(()=>{});
      setBooked({teacher:selTeacher.name,date:selSlot.date,time:selSlot.time});
      setStep('done');
      // Send automatic confirmation message to student
      const tokensLeft=(user.tokensMax||2)-(user.tokensUsed||0);
      const DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      const MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const dt=new Date(selSlot.date+'T12:00:00');
      const dayName=DAYS_ES[dt.getDay()];
      const dayNum=dt.getDate();
      const monthName=MONTHS_ES[dt.getMonth()];
      const timeStr=selSlot.time;
      const msg=`🎯 ¡Clase agendada con éxito!\n\nTu profe **${selTeacher.name}** te espera el **${dayName} ${dayNum} de ${monthName}** a las **${timeStr}** (hora Colombia).\n\nRecuerda que puedes cancelar siempre y cuando lo hagas con **más de 12 horas de anticipación** y tengas tokens de movimiento disponibles (tienes ${tokensLeft} de ${user.tokensMax||2} este ciclo). Si cancelas con menos de 12h o sin tokens disponibles, la clase queda registrada como tomada.\n\nSee you soon! 👋`;
      await api('chispa',{action:'send_message',studentId:user.id,sender:'teacher',senderName:'Inglés con Sebas',message:msg}).catch(()=>{});
      onRefresh();
    }catch(e){setErr('Error al agendar.');}
    setLoading(false);
  };

  const reset=()=>{setStep('idle');setSelTeacher(null);setSelSlot(null);setSlots([]);setErr('');setBooked(null);loadInfo();};

  const fmtSlotDate=d=>{if(!d)return'';const[y,m,day]=d.split('-');const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];const dt=new Date(d+'T12:00:00');return`${days[dt.getDay()]} ${parseInt(day)} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m)-1]}`;};

  if(loading&&step==='idle')return null;

  return(
    <Card style={{marginBottom:14,borderColor:'rgba(20,184,166,.3)',background:'rgba(20,184,166,.04)'}}>
      {step==='idle'&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div>
              <p style={{margin:0,fontFamily:'Sora',fontWeight:700,fontSize:14,color:'var(--text)'}}>🎯 Agendar clase</p>
              <p style={{margin:'3px 0 0',fontSize:12,color:'var(--textMuted)'}}>
                {classesLeft===null?'Cargando…':classesLeft===0?'✅ ¡Ciclo completado! Ya tomaste todas tus clases.':
                  `Te ${classesLeft===1?'falta 1 clase':'faltan '+classesLeft+' clases'} para completar tu ciclo.`}
              </p>
            </div>
            <Badge color="#14b8a6">{PKG[user.pkg]?.icon} {user.pkg}</Badge>
          </div>
          {(classesLeft===null||classesLeft>0)&&(
            <button onClick={()=>setStep('picking_teacher')}
              style={{width:'100%',background:'#14b8a6',color:'#fff',fontWeight:700,fontSize:14,border:'none',borderRadius:10,padding:'11px 0',cursor:'pointer'}}>
              + Agendar una clase
            </button>
          )}
        </>
      )}

      {step==='picking_teacher'&&(
        <>
          <p style={{margin:'0 0 12px',fontFamily:'Sora',fontWeight:700,fontSize:13,color:'var(--text)'}}>1. Selecciona un profe</p>
          {err&&<p style={{color:'#ef4444',fontSize:12,marginBottom:8}}>{err}</p>}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {teachers.map(t=>(
              <button key={t.id} onClick={()=>pickTeacher(t)} disabled={loading}
                style={{display:'flex',alignItems:'center',gap:10,background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:10,padding:'10px 14px',cursor:'pointer',textAlign:'left',opacity:loading?.5:1}}>
                <span style={{fontSize:22}}>👩‍🏫</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontWeight:700,fontSize:13,color:'var(--text)'}}>{t.name}</p>
                  {t.zoom_url&&<p style={{margin:'2px 0 0',fontSize:11,color:'#14b8a6'}}>🎥 Zoom disponible</p>}
                </div>
                <span style={{color:'var(--textMuted)',fontSize:12}}>→</span>
              </button>
            ))}
          </div>
          <button onClick={reset} style={{marginTop:10,background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:12,padding:0}}>← Cancelar</button>
        </>
      )}

      {step==='picking_slot'&&(
        <>
          <p style={{margin:'0 0 4px',fontFamily:'Sora',fontWeight:700,fontSize:13,color:'var(--text)'}}>2. Escoge un espacio</p>
          <p style={{margin:'0 0 12px',fontSize:12,color:'var(--textMuted)'}}>Profe: <strong>{selTeacher?.name}</strong></p>
          {loading&&<p style={{color:'var(--textMuted)',fontSize:12,textAlign:'center',padding:'16px 0'}}>Cargando espacios…</p>}

        </>
      )}

      {step==='confirming'&&selSlot&&selTeacher&&(

            <p style={{margin:0,fontSize:13,color:'var(--textMuted)'}}>👩‍🏫 <strong style={{color:'var(--text)'}}>{selTeacher.name}</strong></p>

          </div>

          <div style={{display:'flex',gap:8}}>

              style={{flex:1,background:'#14b8a6',color:'#fff',fontWeight:700,fontSize:14,border:'none',borderRadius:10,padding:'11px 0',cursor:'pointer',opacity:loading?.6:1}}>
              {loading?'Agendando…':'✅ Confirmar'}
            </button>
            <button onClick={()=>setStep('picking_slot')} style={{flex:1,background:'none',border:'1px solid var(--stroke)',borderRadius:10,padding:'11px 0',cursor:'pointer',fontSize:13,color:'var(--textMuted)',fontWeight:600}}>← Volver</button>
          </div>
        </>
      )}

      {step==='done'&&booked&&(
        <div style={{textAlign:'center',padding:'12px 0'}}>
          <div style={{fontSize:40,marginBottom:8}}>🎉</div>
          <p style={{fontFamily:'Sora',fontWeight:700,fontSize:15,color:'#14b8a6',margin:'0 0 6px'}}>¡Clase agendada!</p>
          <p style={{fontSize:13,color:'var(--textSub)',lineHeight:1.6,margin:'0 0 4px'}}>
            📅 <strong>{fmtSlotDate(booked.date)}</strong> a las <strong>{booked.time}</strong>
          </p>
          <p style={{fontSize:13,color:'var(--textSub)',margin:'0 0 16px'}}>👩‍🏫 {booked.teacher}</p>
          <button onClick={reset} style={{background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:10,padding:'8px 20px',cursor:'pointer',fontSize:13,color:'var(--text)',fontWeight:600}}>
            Agendar otra
          </button>
        </div>
      )}
    </Card>
  );
}

function RescheduleModal({user,sessionId,sessionDate,scheduledDate,onClose,onSuccess,originalZoomUrl,originalTeacherName,originalTeacherId,expiresAt,groupMembers=[]}){
  const [schedDuration,setSchedDuration]=React.useState(50);
  React.useEffect(()=>{
    api('schedule','',`&student_id=${user?.id}`).then(slots=>{
      if(Array.isArray(slots)&&slots.length>0){
        let dur=50;
        if(scheduledDate){
          const dow=new Date(scheduledDate+'T00:00:00').getDay()||7;
          const match=slots.find(s=>parseInt(s.day_of_week)===dow);
          if(match?.duration_minutes) dur=parseInt(match.duration_minutes);
        } else if(slots[0]?.duration_minutes){ dur=parseInt(slots[0].duration_minutes)||50; }
        setSchedDuration(dur);
      }
    }).catch(()=>{});
  },[user?.id]);
  const TEACHER_CALENDARS=[
    {name:'Caro',   url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=Y2Fyby50YXJxdWlub0BnbWFpbC5jb20&color=%23d50000'},
    {name:'Diego',  url:'https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=ZGllZ29laHlAZ21haWwuY29t&color=%234285f4'},
    {name:'Jana',   url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=amFubmFvcnRpejc1QGdtYWlsLmNvbQ&color=%23795548'},
    {name:'Marce',  url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=bW9yZW5vYy5hbGVqYW5kcmFAZ21haWwuY29t&color=%23a1ff85'},
    {name:'Marlon', url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=ZW5vdGxlaWdoQGdtYWlsLmNvbQ&color=%23f09300'},
    {name:'Meli',   url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=bWVsaXNzYXRlbGxlejk5MDZAZ21haWwuY29t&color=%23e67c73'},
    {name:'Valen',  url:'https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=America%2FBogota&showPrint=0&showTitle=0&showNav=0&showTabs=0&showCalendars=0&mode=WEEK&src=dmFsZW50aW5hYnVyYmFubzIwMDJAZ21haWwuY29t&color=%238e24aa'},
  ];

  const [step,setStep]=React.useState('slots'); // 'slots' | 'confirm'
  const [teachers,setTeachers]=React.useState([]);
  const [slots,setSlots]=React.useState(null);   // null=not loaded, []=loaded
  const [slotsError,setSlotsError]=React.useState(null);
  const [loadingSlots,setLoadingSlots]=React.useState(false);
  const [selected,setSelected]=React.useState(null); // {date,time,teacher}
  const [showFallback,setShowFallback]=React.useState(false); // iframe fallback
  const [browsingTeacherId,setBrowsingTeacherId]=React.useState(null);
  const [showOtherTeachers,setShowOtherTeachers]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [sent,setSent]=React.useState(false);
  const [eventCreated,setEventCreated]=React.useState(false);

  // Load teachers list (excluding Sebas)
  React.useEffect(()=>{
    api('teachers').then(r=>{
      if(Array.isArray(r)){
        const filtered=r.filter(t=>!t.name?.toLowerCase().includes('sebas'));
        setTeachers(filtered);
        const assigned=filtered.find(t=>t.id===user.teacherId);
        setBrowsingTeacherId(assigned?.id||filtered[0]?.id||null);
      }
    }).catch(()=>{});
  },[]);

  // Load available slots from calendar.php
  // Calculate daysAhead: if expiresAt, limit to end of that day in Colombia (UTC-5)
  const maxDaysAhead=React.useMemo(()=>{
    if(!expiresAt) return 14;
    // expires_at is the last valid day -- end of that day COT (UTC-5) = 05:00 UTC next day
    const expEndCOT=new Date(`${expiresAt}T23:59:59-05:00`);
    const nowCOT=new Date();
    const diff=Math.ceil((expEndCOT-nowCOT)/(1000*60*60*24));
    return Math.max(1, Math.min(diff, 30));
  },[expiresAt]);

  React.useEffect(()=>{
    setLoadingSlots(true);
    setSlotsError(null);
    fetch(`${BASE}/calendar.php`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_slots',daysAhead:maxDaysAhead})})
      .then(r=>r.json())
      .then(r=>{
        if(r.error) throw new Error(r.error);
        setSlots(r.grouped||{});
      })
      .catch(e=>{
        setSlotsError(e.message);
        setSlots({});
      })
      .finally(()=>setLoadingSlots(false));
  },[]);

  const selectedTeacher=teachers.find(t=>t.id===selected?.teacherId);
  const assignedTeacher=teachers.find(t=>t.id===user.teacherId);
  const otherTeachers=teachers.filter(t=>t.id!==user.teacherId);
  const browsingTeacher=teachers.find(t=>t.id===browsingTeacherId);

  const fmtDate=d=>{
    if(!d)return'';
    const dt=new Date(d+'T00:00:00');
    return dt.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  };

  // Convert a Colombia time slot to the user's local time
  // slot: {date:'2026-03-25', time:'18:00'}
  const toLocalTime=(date,time)=>{
    if(!date||!time)return null;
    // Create the datetime in Colombia timezone
    const bogotaStr=`${date}T${time}:00`;
    // Colombia is UTC-5, no DST
    const bogotaOffset=-5*60;
    const utcMs=new Date(bogotaStr).getTime()-(bogotaOffset*60*1000)+(new Date().getTimezoneOffset()*60*1000);
    // Actually use Intl to be precise
    try {
      const dt=new Date(`${date}T${time}:00-05:00`); // Colombia is UTC-5
      const localStr=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true});
      const localOffset=dt.getTimezoneOffset();
      const bogotaOffsetMin=-300; // UTC-5
      if(localOffset===bogotaOffsetMin) return null; // same timezone, no need to show
      return localStr;
    } catch(e){ return null; }
  };

  const userTz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const isBogotaTz=userTz==='America/Bogota';
  const fmtDateLong=d=>{
    if(!d)return'';
    const dt=new Date(d+'T00:00:00');
    return dt.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  };

  const buildCalendarLink=(date,time,teacherName)=>{
    const start=new Date(date+'T'+time+':00');
    const end=new Date(start.getTime()+60*60*1000);
    const pad=n=>String(n).padStart(2,'0');
    const fmt=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
    const title=encodeURIComponent(`Clase reagendada -- ${user.name}`);
    const details=encodeURIComponent(`Clase reagendada con ${user.name}. Solicitud enviada desde Leap.`);
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(start)}/${fmt(end)}&details=${details}&ctz=America/Bogota`;
  };

  const handleSend=async()=>{
    if(!selected||sending)return;
    setSending(true);
    try {
      // 1. Create the event in Google Calendar automatically
      const evRes=await fetch(`${BASE}/calendar.php`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          action:'create_event',
          date:selected.date,
          time:selected.time,
          teacherName:selected.teacher,
          studentName:groupMembers.length>0?[user.name,...groupMembers.map(m=>m.name.split(' ')[0])].join(' & '):user.name,
          studentEmail:user.email||null,
          originalDate:sessionDate||null,
          durationMinutes:schedDuration||50,
          isSameTeacher:selected.teacherId!=null&&originalTeacherId!=null?selected.teacherId===originalTeacherId:selected.teacher===originalTeacherName,
          originalZoomUrl:originalZoomUrl||null,
        })
      }).then(async r=>{
        const text=await r.text();
        try{ return JSON.parse(text); }
        catch(e){ console.error('calendar.php response:',text); return {ok:false,error:text}; }
      }).catch(e=>({ok:false,error:e.message}));
      if(evRes&&!evRes.ok) console.error('create_event error:',evRes.error||JSON.stringify(evRes));

      // Update session status to rescheduled -- always, regardless of Google Calendar result
      if(sessionId) {
        await api('class_sessions',{
          action:'set_reschedule_date',
          id:sessionId,
          newDate:selected.date,
          newTime:selected.time,
          status:'rescheduled',
          newTeacherId:selected.teacherId||null,
          googleEventId:evRes?.eventId||null,
        }).catch(()=>{});
      }

      // Student-facing message -- clean, no internal details
      const msg=`📆 Solicitud de reagendamiento

• Clase original: ${sessionDate||'--'}
• Nueva fecha: ${fmtDateLong(selected.date)}
• Hora: ${selected.time}
• Profe: ${selected.teacher}
• Estudiante: ${user.name}`;

      await api('chispa',{action:'send_message',studentId:user.id,sender:'student',senderName:user.name,message:msg}).catch(()=>{});
      if(groupMembers.length>0){
        const groupMsg=`📢 Aviso de tu compañero/a\n\n${user.name} reagendó una clase:\n\n• Clase original: ${sessionDate||'--'}\n• Nueva fecha: ${fmtDateLong(selected.date)}\n• Hora: ${selected.time}\n• Profe: ${selected.teacher}`;
        for(const m of groupMembers){ await api('chispa',{action:'send_message',studentId:m.id,sender:'teacher',senderName:'Inglés con Sebas',message:groupMsg}).catch(()=>{}); }
      }

      // Auto-reply from admin
      if(evRes?.ok){
        const autoReply=`✅ ¡Perfecto! Te esperamos en clase. En breve te llegará tu invite a tu correo para que tengas claro tu link de acceso para esta clase.

⚠️ Recuerda: no hay reagendamiento sobre reagendamiento. Esta clase ya no puede moverse nuevamente.

Tu profe ${selected.teacher} te espera en clase. ¡Hasta pronto! 🎉`;
        await api('chispa',{action:'send_message',studentId:user.id,sender:'teacher',senderName:'Inglés con Sebas',message:autoReply}).catch(()=>{});
      }

      // Create admin to-do tasks silently
      const todos=[];
      if(sessionDate) todos.push({
        type:'delete_event',
        text:`Eliminar la clase del ${sessionDate} del calendario de inglesconsebas@gmail.com y del calendario de ${selected.teacher} de ${user.name}`,
      });
      todos.push({
        type:'add_invite',
        text:`Agregar correo del estudiante al nuevo evento del ${fmtDateLong(selected.date)} a las ${selected.time} con ${selected.teacher} para enviarle el invite a ${user.name}`,
        studentEmail:user.email||null,
      });
      if(todos.length>0){
        api('todos',{action:'create_bulk',todos}).catch(()=>{});
      }
      setEventCreated(evRes.ok===true);
    } catch(e) {console.error(e);}
    setSending(false);
    setSent(true);
  };

  // Group slots by assigned teacher vs others
  const groupedByTeacher=(grouped)=>{
    const assignedName=assignedTeacher?.name||'';
    const byTeacher={};
    Object.entries(grouped||{}).forEach(([date,daySlots])=>{
      daySlots.forEach(slot=>{
        if(!byTeacher[slot.teacher])byTeacher[slot.teacher]=[];
        byTeacher[slot.teacher].push(slot);
      });
    });
    return byTeacher;
  };

  const byTeacher=groupedByTeacher(slots);
  const assignedName=assignedTeacher?.name||'';
  const assignedSlots=byTeacher[assignedName]||[];
  const hasAssignedSlots=assignedSlots.length>0;

  // Slots grouped by date for a given teacher
  const slotsByDate=(teacherSlots)=>{
    const g={};
    teacherSlots.forEach(s=>{
      if(!g[s.date])g[s.date]=[];
      g[s.date].push(s);
    });
    return g;
  };

  const [activeTeacherName,setActiveTeacherName]=React.useState(null);
  // Default to assigned teacher once slots load
  React.useEffect(()=>{
    if(slots!==null&&assignedName) setActiveTeacherName(assignedName);
  },[slots,assignedName]);

  const activeSlots=activeTeacherName?slotsByDate(byTeacher[activeTeacherName]||[]):{};
  const otherTeacherNames=Object.keys(byTeacher).filter(n=>n!==assignedName);

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(6px)',zIndex:10000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg2)',border:'1px solid var(--strokeBrand)',borderRadius:22,width:'100%',maxWidth:600,boxShadow:'0 32px 100px rgba(0,0,0,.8)',animation:'fadeUp .25s ease',overflow:'hidden'}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid var(--stroke)',background:'var(--brandDim)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>📆</span>
            <div>
              <p style={{margin:0,fontFamily:'Sora',fontWeight:700,fontSize:14,color:'var(--text)'}}>Reagendar clase</p>
              <p style={{margin:'2px 0 0',fontSize:11,color:'var(--brand)',fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>Clase original: {sessionDate||'--'}</p>
            </div>
          </div>
          <button onClick={onClose} style={{background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:8,width:28,height:28,fontSize:14,cursor:'pointer',color:'var(--textMuted)',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>

        {/* Step tabs */}
        {!sent&&(
          <div style={{display:'flex',borderBottom:'1px solid var(--stroke)'}}>
            {[['slots','1','Escoger espacio'],['confirm','2','Confirmar']].map(([s,n,lbl])=>(
              <button key={s} onClick={()=>selected&&setStep(s)} style={{flex:1,padding:'9px 0',background:step===s?'var(--brandDim)':'transparent',border:'none',borderBottom:step===s?'2px solid var(--brand)':'2px solid transparent',cursor:selected?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <span style={{width:18,height:18,borderRadius:'50%',background:step===s?'var(--brand)':'var(--stroke)',color:step===s?'#000':'var(--textMuted)',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{n}</span>
                <span style={{fontSize:12,fontWeight:600,color:step===s?'var(--brand)':'var(--textMuted)'}}>{lbl}</span>
              </button>
            ))}
          </div>
        )}

        {/* -- STEP 1: Slots -- */}
        {step==='slots'&&!sent&&(
          <div style={{maxHeight:'70vh',overflowY:'auto'}}>

            {loadingSlots&&(
              <div style={{padding:40,textAlign:'center'}}>
                <div style={{width:28,height:28,border:'3px solid var(--brandBorder)',borderTopColor:'var(--brand)',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 12px'}}/>
                <p style={{fontSize:13,color:'var(--textMuted)'}}>Buscando espacios disponibles…</p>
              </div>
            )}

            {!loadingSlots&&slotsError&&(
              <div style={{padding:24}}>
                <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:12,padding:'12px 16px',marginBottom:16}}>
                  <p style={{margin:0,fontSize:12,color:'#ef4444',fontWeight:600}}>⚠️ No se pudo conectar con Google Calendar</p>
                  <p style={{margin:'4px 0 0',fontSize:11,color:'var(--textMuted)'}}>{slotsError}</p>
                </div>
                <p style={{margin:'0 0 10px',fontSize:12,color:'var(--textMuted)'}}>Puedes ver la agenda visualmente y escribir el espacio manualmente:</p>
                {/* Fallback: iframe */}
                {!showFallback?(
                  <button onClick={()=>setShowFallback(true)} style={{width:'100%',background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:10,padding:'10px',fontSize:13,fontWeight:600,color:'var(--textMuted)',cursor:'pointer'}}>
                    📅 Ver agenda visualmente
                  </button>
                ):(
                  <>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                      {[assignedTeacher,...otherTeachers.slice(0,4)].filter(Boolean).map(t=>{
                        const cal=TEACHER_CALENDARS.find(c=>t.name?.toLowerCase().includes(c.name.toLowerCase()));
                        if(!cal)return null;
                        return(
                          <button key={t.id} onClick={()=>setBrowsingTeacherId(t.id)}
                            style={{padding:'5px 12px',borderRadius:999,border:'1.5px solid',fontSize:11,fontWeight:600,cursor:'pointer',
                              background:browsingTeacherId===t.id?'var(--brandDim)':'transparent',
                              borderColor:browsingTeacherId===t.id?'var(--brand)':'var(--stroke)',
                              color:browsingTeacherId===t.id?'var(--brand)':'var(--textMuted)'}}>
                            {t.name}{t.id===user.teacherId&&' ★'}
                          </button>
                        );
                      })}
                    </div>
                    {(()=>{const bt=teachers.find(t=>t.id===browsingTeacherId);const cal=bt?TEACHER_CALENDARS.find(c=>bt.name?.toLowerCase().includes(c.name.toLowerCase())):null;return cal?(<iframe src={cal.url} style={{width:'100%',height:360,border:'none',display:'block',background:'#fff'}} title="Agenda"/>):null;})()}
                  </>
                )}
              </div>
            )}

            {!loadingSlots&&!slotsError&&slots!==null&&(
              <div style={{padding:'12px 16px'}}>

                {/* Expiry warning */}
                {expiresAt&&(
                  <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'8px 12px',marginBottom:12,fontSize:11,color:'#ef4444',fontWeight:600}}>
                    ⏳ Debes reagendar antes del <strong>{new Date(expiresAt+'T23:59:59-05:00').toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'long'})}</strong> (hora Colombia). Solo se muestran fechas disponibles dentro de ese plazo.
                  </div>
                )}
                {/* Timezone note for non-Colombia students */}
                {!isBogotaTz&&(
                  <div style={{background:'rgba(134,239,134,.08)',border:'1px solid var(--brandBorder)',borderRadius:10,padding:'8px 12px',marginBottom:12,fontSize:11,color:'var(--textSub)',lineHeight:1.5}}>
                    🌍 Los horarios están en <strong style={{color:'var(--brand)'}}>hora Colombia (COT, UTC−5)</strong>. Tu hora local aparece debajo de cada opción.
                  </div>
                )}

                {/* Teacher selector */}
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:14}}>
                  {/* Assigned teacher */}
                  {assignedName&&(
                    <button onClick={()=>{setActiveTeacherName(assignedName);setShowOtherTeachers(false);}}
                      style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:999,border:'1.5px solid',cursor:'pointer',fontSize:12,fontWeight:700,transition:'all .15s',
                        background:activeTeacherName===assignedName&&!showOtherTeachers?'var(--brandDim)':'transparent',
                        borderColor:activeTeacherName===assignedName&&!showOtherTeachers?'var(--brand)':'var(--stroke)',
                        color:activeTeacherName===assignedName&&!showOtherTeachers?'var(--brand)':'var(--textMuted)'}}>
                      {assignedName}
                      <span style={{fontSize:10,background:'var(--brand)',color:'#000',borderRadius:4,padding:'1px 5px'}}>Tu profe</span>
                      {hasAssignedSlots&&<span style={{fontSize:10,background:'rgba(134,239,134,.2)',color:'var(--brand)',borderRadius:4,padding:'1px 5px'}}>{assignedSlots.length} espacios</span>}
                    </button>
                  )}

                  <span style={{color:'var(--stroke)',fontSize:14}}>|</span>

                  {!showOtherTeachers?(
                    <button onClick={()=>setShowOtherTeachers(true)}
                      style={{fontSize:11,color:'var(--textMuted)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted',textUnderlineOffset:3}}>
                      No hay disponibilidad -- ver otros profes
                    </button>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      {otherTeacherNames.map(n=>(
                        <button key={n} onClick={()=>setActiveTeacherName(n)}
                          style={{padding:'5px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .15s',
                            background:activeTeacherName===n?'rgba(255,255,255,.08)':'transparent',
                            borderColor:activeTeacherName===n?'var(--textSub)':'var(--stroke)',
                            color:activeTeacherName===n?'var(--text)':'var(--textMuted)'}}>
                          {n}
                        </button>
                      ))}
                      <button onClick={()=>{setShowOtherTeachers(false);setActiveTeacherName(assignedName);}}
                        style={{fontSize:11,color:'var(--textMuted)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted',textUnderlineOffset:3}}>
                        ← Mi profe
                      </button>
                    </div>
                  )}
                </div>

                {/* Slot list */}
                {Object.keys(activeSlots).length===0?(
                  <div style={{textAlign:'center',padding:'24px 0',color:'var(--textMuted)'}}>
                    <p style={{fontSize:24,marginBottom:8}}>😕</p>
                    <p style={{fontSize:13}}>No hay espacios disponibles en los próximos {14} días para este profe.</p>
                    <button onClick={()=>setShowOtherTeachers(true)} style={{marginTop:10,fontSize:12,color:'var(--brand)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Ver otros profes</button>
                  </div>
                ):(
                  Object.entries(activeSlots)
                  .filter(([date])=>!expiresAt||date<=expiresAt)
                  .map(([date,daySlots])=>{
                    // Filter out slots less than 12h from now (Colombia time)
                    const nowCO=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Bogota'}));
                    const minCO=new Date(nowCO.getTime()+12*60*60*1000);
                    const validSlots=daySlots.filter(sl=>{
                      const slotDt=new Date(`${sl.date}T${sl.time}:00`);
                      return slotDt>=minCO;
                    });
                    if(validSlots.length===0) return null;
                    return(
                    <div key={date} style={{marginBottom:16}}>
                      <p style={{margin:'0 0 8px',fontSize:12,fontWeight:700,color:'var(--textSub)',textTransform:'capitalize'}}>{fmtDate(date)}</p>
                      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                        {validSlots.map(slot=>{
                          const isSelected=selected&&selected.date===slot.date&&selected.time===slot.time&&selected.teacher===slot.teacher;
                          const localT=toLocalTime(slot.date,slot.time);
                          return(
                            <button key={slot.time} onClick={()=>{const tObj=teachers.find(t=>t.name===activeTeacherName);setSelected({...slot,teacherName:activeTeacherName,teacherId:tObj?.id||null});setStep('confirm');}}
                              style={{padding:'7px 14px',borderRadius:10,border:'1.5px solid',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .15s',
                                background:isSelected?'var(--brand)':'var(--bg3)',
                                borderColor:isSelected?'var(--brand)':'var(--stroke)',
                                color:isSelected?'#000':'var(--text)',
                                display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                              <span>{slot.time} <span style={{fontSize:10,opacity:.7}}>CO</span></span>
                              {localT&&<span style={{fontSize:10,opacity:.75,fontWeight:500}}>{localT} local</span>}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                  })
                  .filter(Boolean)
                )}
              </div>
            )}
          </div>
        )}

        {/* -- STEP 2: Confirm -- */}
        {step==='confirm'&&!sent&&selected&&(
          <div style={{padding:22}}>
            <p style={{margin:'0 0 16px',fontSize:13,fontWeight:700,color:'var(--text)'}}>Confirma tu solicitud</p>

            <div style={{background:'var(--bg3)',borderRadius:14,padding:'14px 16px',marginBottom:20,border:'1px solid var(--strokeBrand)'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 16px'}}>
                {[
                  ['📅 Clase original', sessionDate||'--'],
                  ['👩‍🏫 Profe', selected.teacher],
                  ['📆 Nueva fecha', fmtDate(selected.date)],
                  ['🕐 Hora', selected.time],
                ].map(([label,value])=>(
                  <div key={label}>
                    <p style={{margin:0,fontSize:10,fontWeight:700,color:'var(--textMuted)',textTransform:'uppercase',letterSpacing:.5}}>{label}</p>
                    <p style={{margin:'2px 0 0',fontSize:13,fontWeight:600,color:'var(--text)',textTransform:'capitalize'}}>{value}</p>
                  </div>
                ))}
              </div>
            </div>

            <div style={{display:'flex',justifyContent:'space-between',gap:10}}>
              <button onClick={()=>setStep('slots')} style={{background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:10,padding:'9px 18px',fontSize:13,fontWeight:600,color:'var(--textMuted)',cursor:'pointer'}}>← Cambiar</button>
              <button onClick={handleSend} disabled={sending}
                style={{background:'var(--brand)',border:'none',borderRadius:10,padding:'9px 24px',fontSize:13,fontWeight:700,color:'#000',cursor:'pointer',fontFamily:'DM Sans,sans-serif',display:'flex',alignItems:'center',gap:6}}>
                {sending?'Enviando…':'Enviar solicitud 📨'}
              </button>
            </div>
          </div>
        )}

        {/* -- Sent -- */}
        {sent&&(
          <div style={{textAlign:'center',padding:'32px 24px'}}>
            <p style={{fontSize:44,marginBottom:12}}>{eventCreated?'🎉':'📨'}</p>
            <p style={{fontFamily:'Sora',fontWeight:700,fontSize:16,color:'var(--text)',marginBottom:16}}>
              {eventCreated?'¡Clase reagendada!':'Solicitud enviada'}
            </p>
            {eventCreated?(
              <div style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:12,padding:'12px 16px',marginBottom:20,textAlign:'left'}}>
                <p style={{margin:'0 0 6px',fontSize:12,fontWeight:700,color:'var(--brand)'}}>✅ Todo listo automáticamente</p>
                <p style={{margin:0,fontSize:12,color:'var(--textSub)',lineHeight:1.6}}>El espacio quedó bloqueado en el calendario. Tu profe y el equipo de Inglés con Sebas te enviarán el invite de Google Calendar con el link de Zoom a tu correo.</p>
              </div>
            ):(
              <div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:12,padding:'12px 16px',marginBottom:20,textAlign:'left'}}>
                <p style={{margin:'0 0 4px',fontSize:12,fontWeight:700,color:'#f59e0b'}}>⚠️ Requiere confirmación manual</p>
                <p style={{margin:0,fontSize:12,color:'var(--textSub)',lineHeight:1.6}}>No se pudo crear el evento automáticamente. Tu profe recibió el mensaje por Mensajes y confirmará el espacio.</p>
              </div>
            )}
            <p style={{fontSize:12,color:'var(--textMuted)',marginBottom:20}}>También te llegó una notificación por <strong>Mensajes</strong>.</p>
            <button onClick={()=>{if(onSuccess)onSuccess();else if(onClose)onClose();}} style={{background:'var(--brand)',border:'none',borderRadius:10,padding:'10px 28px',fontSize:13,fontWeight:700,color:'#000',cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Cerrar ✓</button>
          </div>
        )}

      </div>
    </div>
  );
}

function CancelModal({session,cycleStart,cycleEnd,min,user,onClose,onDone,groupMembers}){
  // Determine if this is a rescheduled session (new_date is the relevant date)
  const isRescheduled = session.status==='rescheduled';
  const relevantDate  = isRescheduled ? session.new_date : session.scheduled_date;
  const relevantTime  = isRescheduled ? session.new_time  : session.scheduled_time;

  // Is the class within 12 hours? Always compare against Colombia time (UTC-5)
  const now      = new Date();
  const classTs  = new Date(`${relevantDate}T${relevantTime||'00:00'}:00-05:00`);
  const hoursLeft= (classTs - now) / (1000*60*60);
  const under12  = hoursLeft < 12;

  // Would cancelling affect the minimum?
  // counted sessions = sessions with counts_as_taken=1 (excluding this one)
  // plus sessions with status=scheduled/rescheduled that are future (they will count)
  // Simple approach: check if (current taken count - 1) < min
  // The session itself doesn't count_as_taken yet (it's scheduled)
  // So: affectsMin = (takenSoFar) < min  ?  removing this one would leave takenSoFar < min
  const [step,setStep]   = React.useState('confirm'); // 'confirm' | 'processing' | 'done'
  const [saving,setSaving] = React.useState(false);

  const fmtFull=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};
  const fmtTime=t=>{if(!t)return'';const[h,m]=t.split(':');const hh=parseInt(h);return`${hh>12?hh-12:hh}:${m} ${hh>=12?'pm':'am'}`;};

  // Build scenario
  let scenario, title, body, confirmLabel, confirmColor, resultStatus;

  const noTokens = (user.tokensUsed||0) >= (user.tokensMax||2);
  const isPower  = user.pkg === 'Power⚡';

  if(isPower && !isRescheduled){
    // Power: tokens descuentan al CANCELAR
    if(under12){
      // <12h: cancelled_late, cuenta como tomada, descuenta token si hay
      scenario='late_cancel';title='⏰ Cancelación tardía';
      body=`Tu clase está programada para el ${fmtFull(relevantDate)} a las ${fmtTime(relevantTime)} y faltan **menos de 12 horas**. La clase quedará registrada como tomada.${!noTokens?` Se usará ***1 cancelación*** (te quedan ${(user.tokensMax||8)-(user.tokensUsed||0)-1}).`:''}`;
      confirmLabel='Sí, entiendo -- cancelar';confirmColor='#ef4444';resultStatus='cancelled_late';
    } else if(noTokens){
      // Sin tokens, >12h: cancelled_no_tokens, cuenta como tomada
      scenario='no_tokens';title='⚠️ Sin cancelaciones disponibles';
      body=`Ya usaste tus **${user.tokensMax||8} cancelaciones** de este ciclo. La clase se cancelará y quedará registrada como tomada porque ya no hay tokens de movimiento disponibles. Los tokens se restablecen al inicio de tu próximo ciclo.`;
      confirmLabel='Sí, cancelar de todas formas';confirmColor='#ef4444';resultStatus='cancelled_no_tokens';
    } else {
      // >12h, tiene tokens: cancelled_no_impact, descuenta token
      scenario='power_cancel';title='🚫 Cancelar clase';
      body=`Vas a cancelar tu clase del ${fmtFull(relevantDate)} a las ${fmtTime(relevantTime)}. Se usará ***1 cancelación*** (te quedan ${(user.tokensMax||8)-(user.tokensUsed||0)-1} después de esta).`;
      confirmLabel='Sí, cancelar';confirmColor='#60a5fa';resultStatus='cancelled_no_impact';
    }
  } else if(isRescheduled){
    title        = '¿Cancelar clase reagendada?';
    body         = `Esta clase fue reagendada para el ${fmtFull(relevantDate)} a las ${fmtTime(relevantTime)}. Al cancelarla quedará registrada como **Rescheduled & Cancelled** y contará como tomada. Recuerda: no hay reagendamiento sobre reagendamiento -- no podrás moverla de nuevo.`;
    confirmLabel = 'Sí, cancelar';
    confirmColor = '#ef4444';
    resultStatus = 'rescheduled_cancelled';
  } else if(under12 && session._affectsMin){
    // Normal <12h y afecta mín: cancelled_late, cuenta como tomada, sin token
    scenario     = 'late_cancel';
    title        = '⏰ Cancelación tardía';
    body         = `Tu clase está programada para el ${fmtFull(relevantDate)} a las ${fmtTime(relevantTime)} y faltan **menos de 12 horas**. Al cancelar con tan poco tiempo, la clase quedará registrada como tomada en el sistema y **no podrás reagendarla**. Tu profe ya se preparó para esta sesión. ¿Estás seguro?`;
    confirmLabel = 'Sí, entiendo -- cancelar';
    confirmColor = '#ef4444';
    resultStatus = 'cancelled_late';
  } else if(session._affectsMin){
    if(noTokens){
      // Normal, afecta mín, sin tokens: cancelled_no_tokens, cuenta como tomada
      scenario     = 'no_tokens';
      title        = '⚠️ Sin tokens disponibles';
      body         = `Esta cancelación afectaría tu mínimo de **${min} clases** del ciclo, pero ya usaste todos tus tokens de movimiento. La clase se cancelará y quedará registrada como tomada porque ya no hay tokens disponibles. Los tokens se restablecen al inicio de tu próximo ciclo.`;
      confirmLabel = 'Sí, cancelar de todas formas';
      confirmColor = '#ef4444';
      resultStatus = 'cancelled_no_tokens';
    } else {
      // Normal, afecta mín, tiene tokens: to_reschedule, descuenta token
      scenario     = 'reschedule_needed';
      title        = '🔄 Cancelación con reagendamiento';
      body         = `Al cancelar esta clase estarías por debajo de tu mínimo de **${min} clases** en este ciclo. Como avisas con más de 12 horas, puedes reagendarla. Se usará **1 token** (te quedarán **${(user.tokensMax||2)-(user.tokensUsed||0)-1}** después de este movimiento) y tendrás ***1 mes*** a partir de la fecha original para escoger un nuevo espacio.`;
      confirmLabel = 'Sí, cancelar y reagendar';
      confirmColor = '#f59e0b';
      resultStatus = 'cancelled_impacts_min';
    }
  } else {
    // Normal, no afecta mín: cancelled_no_impact, sin token
    scenario     = 'no_impact';
    title        = '✅ Cancelación sin impacto';
    body         = `Al revisar tu ciclo (${fmtFull(cycleStart)} – ${fmtFull(cycleEnd)}), tienes suficientes clases para alcanzar tu mínimo de **${min} clases** incluso sin esta. La cancelación **no afecta tu progreso** y no necesitas reagendarla.`;
    confirmLabel = 'Sí, cancelar';
    confirmColor = '#60a5fa';
    resultStatus = 'cancelled_no_impact';
  }

  const handleConfirm=async()=>{
    setSaving(true);
    // ── 1. Actualizar status + deducir token ──
    try {
      const r=await api('class_sessions',{
        action:'update_status',
        id:session.id,
        status:resultStatus,
      });
      // api() never throws — check for error response explicitly
      if(r?.error){
        console.error('[CancelModal] update_status error:',r.error);
        alert('Error al cancelar la clase: '+r.error);
        setSaving(false);
        return;
      }
      // Token deduction rules:
      // Power: deduct on power_cancel (>12h) AND late_cancel (if has tokens)
      // Normal: deduct handled server-side on cancelled_impacts_min → to_reschedule
      if(isPower){
        if(scenario==='power_cancel' || (scenario==='late_cancel' && !noTokens)){
          await api('students',{action:'deduct_token',id:user.id}).catch(()=>{});
        }
      }
    } catch(e){ console.error('[CancelModal] update_status error:',e); setSaving(false); return; }

    // ── 2. Borrar evento de Google Calendar si es clase reagendada con eventId ──
    let calendarDeleted=false;
    if(resultStatus==='rescheduled_cancelled' && session.google_event_id){
      try{
        const delRes=await fetch(`${BASE}/calendar.php`,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'delete_event',eventId:session.google_event_id}),
        }).then(r=>r.json()).catch(()=>({ok:false}));
        calendarDeleted=delRes?.ok===true;
      }catch(e){}
    }

    // ── 3. To-Do + Mensajes — SIEMPRE ejecutan, fuera del try ─────────────────────
    const fmtForTodo=(d,t)=>{
      if(!d)return'?';
      const dt=new Date(d+'T00:00:00');
      const fecha=dt.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      return t?`${fecha} a las ${t}`:fecha;
    };

    // To-Do para admin solo si NO se borró automáticamente
    if(!calendarDeleted){
      api('todos',{action:'create_bulk',todos:[{
        type:'delete_event',
        text:`🗓️ Eliminar clase de ${user.name} del ${fmtForTodo(relevantDate,relevantTime)} del calendario de Google`,
      }]}).catch(()=>{});
    }

    // Mensaje al estudiante según escenario
    const firstName=user.name.split(' ')[0];
    const classFecha=fmtForTodo(relevantDate,relevantTime);
    const groupTails={
      late_cancel:`fue cancelada con menos de 12 horas de anticipación, por lo que queda registrada como clase tomada en el ciclo. ¡Nos vemos pronto!`,
      no_tokens:`fue cancelada. Ya no quedaban cancelaciones disponibles este ciclo, así que queda registrada como clase tomada. Los tokens se renuevan al inicio del próximo ciclo. ¡Hasta pronto!`,
      reschedule_needed:`fue cancelada y tiene 1 mes para reagendarla desde la plataforma. ¡Hasta pronto!`,
      no_impact:`fue cancelada. No afecta el progreso del ciclo — no hay nada que reagendar. ¡Nos vemos en clase!`,
      power_cancel:`fue cancelada usando 1 cancelación de su plan Power ⚡. ¡Nos vemos en clase!`,
      rescheduled_cancelled:`fue cancelada (clase reagendada). Queda registrada como clase tomada en el ciclo. ¡Nos vemos pronto!`,
    };
    const cancelMessages={
      late_cancel:`⏰ **Cancelación registrada**\n\nHola ${firstName} 👋 Tu clase del ${classFecha} fue cancelada con menos de 12 horas de anticipación, por lo que queda registrada como clase tomada en tu ciclo. ¡Te esperamos en la próxima!`,
      no_tokens:`🚫 **Cancelación registrada**\n\nHola ${firstName} 👋 Tu clase del ${classFecha} fue cancelada. Ya no te quedaban cancelaciones disponibles este ciclo, así que queda registrada como clase tomada. Los tokens se renuevan al inicio del próximo ciclo. ¡Hasta pronto!`,
      reschedule_needed:`🔄 **Cancelación con reagendamiento**\n\nHola ${firstName} 👋 Tu clase del ${classFecha} fue cancelada exitosamente. Tienes **1 mes** a partir de esa fecha para reagendarla — ingresa a la plataforma cuando quieras y escoge tu nuevo espacio. ¡Cuenta con nosotros!`,
      no_impact:`✅ **Cancelación registrada**\n\nHola ${firstName} 👋 Tu clase del ${classFecha} fue cancelada. ¡Buenas noticias! Esta cancelación no afecta tu progreso del ciclo y seguirás teniendo tus ${min} clases — no necesitas reagendar nada. ¡Nos vemos en la próxima!`,
      power_cancel:`✅ **Cancelación registrada**\n\nHola ${firstName} 👋 Tu clase del ${classFecha} fue cancelada. Se usó 1 cancelación de tu plan Power ⚡ (te quedan ${Math.max(0,(user.tokensMax||8)-(user.tokensUsed||0)-1)}). ¡Hasta la próxima!`,
      rescheduled_cancelled:`✅ **Cancelación registrada**\n\nHola ${firstName} 👋 Tu clase reagendada del ${classFecha} fue cancelada y queda registrada como clase tomada en tu ciclo. Recuerda que no hay reagendamiento sobre reagendamiento. ¡Te esperamos pronto!`,
    };
    const effScenario=scenario||(isRescheduled?'rescheduled_cancelled':'no_impact');
    const autoMsg=cancelMessages[effScenario];
    if(autoMsg){
      api('chispa',{action:'send_message',studentId:user.id,sender:'teacher',senderName:'Inglés con Sebas',message:autoMsg}).catch(()=>{});
      // Mensaje al compañero de grupo — personalizado por escenario
      if(groupMembers&&groupMembers.length>0){
        const tail=groupTails[effScenario]||'fue cancelada. ¡Nos vemos en clase!';
        const groupMsg=`👥 **Aviso de tu classmate**\n\n${firstName} canceló la clase del ${classFecha} — ${tail}`;
        api('chispa',{action:'send_message',studentId:groupMembers[0].id,sender:'teacher',senderName:'Inglés con Sebas',message:groupMsg}).catch(()=>{});
      }
    }

    onDone();
    setSaving(false);
  };

  // Parse bold markdown for body text
  const renderBody=(text)=>{
    const parts=text.split(/\*\*(.+?)\*\*/g);
    return parts.map((p,i)=>i%2===1?<strong key={i} style={{color:'var(--text)'}}>{p}</strong>:<span key={i}>{p}</span>);
  };

  const accentColor = confirmColor||'#ef4444';

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',backdropFilter:'blur(4px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg2)',border:`1px solid ${accentColor}44`,borderRadius:20,padding:28,maxWidth:400,width:'100%',boxShadow:`0 24px 80px rgba(0,0,0,.7)`,animation:'fadeUp .25s ease'}}>
        <p style={{margin:'0 0 14px',fontFamily:'Sora',fontWeight:700,fontSize:15,color:'var(--text)'}}>{title}</p>
        <p style={{margin:'0 0 20px',fontSize:13,color:'var(--textSub)',lineHeight:1.7}}>{renderBody(body)}</p>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} style={{flex:1,background:'var(--surface)',border:'1px solid var(--stroke)',borderRadius:10,padding:'9px 0',fontSize:13,fontWeight:600,color:'var(--textMuted)',cursor:'pointer'}}>
            No, mantener clase
          </button>
          <button onClick={handleConfirm} disabled={saving}
            style={{flex:1,background:accentColor,border:'none',borderRadius:10,padding:'9px 0',fontSize:13,fontWeight:700,color:'#fff',cursor:saving?'default':'pointer',opacity:saving?.7:1,transition:'opacity .2s'}}>
            {saving?'Procesando…':confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}
