function StudentClassLog({data,user,onRefresh,locked,onRefreshUser}){
  const [pastGroupOpen,setPastGroupOpen]=React.useState(false);
  const sessions=data.classSessions||[];
  const movements=data.movements||[];
  const rules=PLAN_RULES[user.pkg]||PLAN_RULES.Essential;
  const fmtFull=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short',year:'numeric'});};
  const todayStr=new Date().toISOString().slice(0,10);

  // Next cycle auto-generation handled at login (auth.php)

  if(sessions.length===0) return(
    <>
      {locked&&<div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#ef4444',fontWeight:600}}>⚠️ Pago pendiente — puedes ver tus clases pero no hacer cambios hasta regularizar.</div>}
      <p className="label" style={{marginBottom:8}}>📋 Class Log </p>
      <Card style={{textAlign:'center',padding:24}}>
        <p style={{fontSize:24,marginBottom:8}}>📅</p>
        <p style={{color:'var(--textMuted)',fontSize:13}}>No hay clases registradas aún.</p>
      </Card>
    </>
  );

  // Group by cycle_id
  const byCycle={};
  sessions.forEach(s=>{
    const k=s.cycle_id||'x';
    if(!byCycle[k])byCycle[k]={cycleStart:s.cycle_start,cycleEnd:s.cycle_end,sessions:[]};
    byCycle[k].sessions.push(s);
  });

  const groups=Object.values(byCycle).sort((a,b)=>new Date(b.cycleStart||0)-new Date(a.cycleStart||0));

  // Classify each group
  const classified=groups.map(g=>{
    const isCurrent=g.cycleStart&&g.cycleEnd&&todayStr>=g.cycleStart&&todayStr<=g.cycleEnd;
    const isFuture=g.cycleStart&&g.cycleStart>todayStr;
    const daysUntil=isFuture?Math.round((new Date(g.cycleStart+'T00:00:00')-new Date())/(1000*60*60*24)):null;
    const showFuture=isFuture&&daysUntil!==null&&daysUntil<=5;
    const isPast=!isCurrent&&!isFuture;
    return{...g,isCurrent,isFuture,isPast,showFuture,daysUntil};
  }).filter(g=>g.isCurrent||g.isPast||(g.isFuture&&g.showFuture));

  const [openGroups,setOpenGroups]=React.useState(new Set(['current']));
  const toggleGroup=key=>setOpenGroups(prev=>{const s=new Set(prev);s.has(key)?s.delete(key):s.add(key);return s;});
  const [sessionInfo,setSessionInfo]=React.useState(null);
  const [rescheduleSession,setRescheduleSession]=React.useState(null);
  const [cancelSession,setCancelSession]=React.useState(null);
  const [groupMembers,setGroupMembers]=React.useState([]);
  React.useEffect(()=>{
    if(user?.id){
      api('groups',{action:'get_group_members',studentId:user.id})
        .then(r=>{if(r?.members?.length>1)setGroupMembers(r.members.filter(m=>m.id!==user.id));})
        .catch(()=>{});
    }
  },[user?.id]);

  const openReschedule=(s)=>{
    setSessionInfo(null);
    setRescheduleSession(s);
  };

  const openCancel=(s,cycleStart,cycleEnd,takenCount,totalCycleCount,projectedCount)=>{
    setSessionInfo(null);
    const effectiveMin=user?.pkg==='Power⚡'
      ?Math.max(0,(totalCycleCount||0)-8)
      :rules.min;
    // projectedCount = taken + future scheduled (all sessions that will count)
    // minus 1 because we're cancelling this session
    const projected=(projectedCount||takenCount)-1;
    s._affectsMin = projected < effectiveMin;
    setCancelSession({session:s,cycleStart,cycleEnd,effectiveMin});
  };

  return(
    <>
      {rescheduleSession&&<RescheduleModal
        user={user}
        sessionId={rescheduleSession.sessionId||null}
        sessionDate={rescheduleSession.dateLabel}
        scheduledDate={rescheduleSession.scheduledDate||null}
        originalZoomUrl={rescheduleSession.zoomUrl||null}
        originalTeacherName={rescheduleSession.teacherName||null}
        originalTeacherId={rescheduleSession.teacherId||null}
        expiresAt={rescheduleSession.expiresAt||null}
        onClose={()=>setRescheduleSession(null)}
        onSuccess={()=>{setRescheduleSession(null);if(typeof onRefresh==='function')onRefresh();}}
        groupMembers={groupMembers}
      />}
      {cancelSession&&<CancelModal
        session={cancelSession.session}
        cycleStart={cancelSession.cycleStart}
        cycleEnd={cancelSession.cycleEnd}
        min={cancelSession.effectiveMin??rules.min}
        user={user}
        onClose={()=>setCancelSession(null)}
        onDone={()=>{setCancelSession(null);if(typeof onRefreshUser==='function')onRefreshUser();if(typeof onRefresh==='function')onRefresh();}}
        groupMembers={groupMembers}
      />}
      <SessionInfoModal info={sessionInfo} onClose={()=>setSessionInfo(null)} user={user}/>
      {groupMembers.length>0&&(
        <div style={{background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.25)',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:12,color:'#a78bfa',display:'flex',alignItems:'center',gap:8}}>
          <span>👫</span>
          <span>Estás en grupo con <strong>{groupMembers.map(m=>m.name).join(' y ')}</strong>. Los cambios en tus clases los afectan también.</span>
        </div>
      )}
      <p className="label" style={{marginBottom:8}}>📋 Class Log </p>
      {(()=>{
        const currentAndFuture=classified.filter(g=>!g.isPast);
        const pastCycles=classified.filter(g=>g.isPast);
        const renderCycleGroup=(g,gi)=>{
        const ss=[...g.sessions].sort((a,b)=>{const dd=new Date(a.scheduled_date)-new Date(b.scheduled_date);if(dd!==0)return dd;return (a.scheduled_time||'').localeCompare(b.scheduled_time||'');});
        const SKIP_STATUSES=['holiday_no_impact','cancelled_no_impact'];
        const taken=ss.filter(s=>parseInt(s.counts_as_taken)===1&&!SKIP_STATUSES.includes(s.status)).length;
        const totalCycleCount=ss.filter(s=>!SKIP_STATUSES.includes(s.status)).length;
        // projectedCount = sessions that will count by end of cycle (taken + future scheduled)
        const projectedCount=ss.filter(s=>!SKIP_STATUSES.includes(s.status)&&(parseInt(s.counts_as_taken)===1||s.status==='scheduled'||s.status==='rescheduled')).length;
        const effectiveMin=user?.pkg==='Power⚡'?Math.max(0,totalCycleCount-8):rules.min;
        const pending=ss.filter(s=>s.status==='to_reschedule'||s.status==='holiday_impacts_min').length;
        const pct=effectiveMin>0?Math.min(100,Math.round(taken/effectiveMin*100)):0;
        const ok=taken>=effectiveMin;
        const groupKey=g.isCurrent?'current':g.cycleStart||gi;
        const isOpen=openGroups.has(groupKey);
        const label=g.isCurrent?'📍 Current cycle':g.isFuture?`🔜 Next cycle · starts in ${g.daysUntil}d`:`📚 ${fmtFull(g.cycleStart)} → ${fmtFull(g.cycleEnd)}`;
        const labelColor=g.isCurrent?'var(--brand)':g.isFuture?'#a78bfa':'var(--textMuted)';
        return(
          <div key={groupKey} style={{marginBottom:10,borderRadius:10,border:`1px solid ${g.isCurrent?'var(--strokeBrand)':'var(--stroke)'}`,overflow:'hidden'}}>
            <button onClick={()=>toggleGroup(groupKey)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',background:g.isCurrent?'var(--brandDim)':'var(--surface)',border:'none',cursor:'pointer',padding:'10px 12px'}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:2}}>
                <span style={{fontSize:12,fontWeight:700,color:labelColor}}>{label}</span>
                {g.cycleStart&&<span style={{fontSize:10,color:'var(--textMuted)'}}>{fmtFull(g.cycleStart)} → {fmtFull(g.cycleEnd)}</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11,fontWeight:700,color:ok?'var(--brand)':'#f59e0b'}}>{taken}/{rules.min} ✓</span>
                <span style={{color:'var(--textMuted)',fontSize:12}}>{isOpen?'▲':'▼'}</span>
              </div>
            </button>
            {isOpen&&(
              <div style={{padding:'10px 12px',borderTop:'1px solid var(--stroke)'}}>
                <div style={{height:4,background:'var(--bg3)',borderRadius:99,overflow:'hidden',marginBottom:8}}>
                  <div style={{height:'100%',width:`${pct}%`,background:ok?'var(--brand)':'#f59e0b',borderRadius:99,transition:'width .5s'}}/>
                </div>
                {pending>0&&<p style={{fontSize:11,color:'#ef4444',fontWeight:700,marginBottom:6}}>⚠️ {pending} clase{pending!==1?'s':''} pendiente{pending!==1?'s':''} de reagendamiento</p>}
                {ss.map(s=>{
                  const disp=SESSION_STATUS_DISPLAY[s.status]||{emoji:'📅',label:s.status,color:'#94a3b8'};
                  const isRescheduled=s.status==='rescheduled'||s.status==='medical_exception'||s.status==='rescheduled_taken'||s.status==='rescheduled_no_show'||s.status==='rescheduled_cancelled';
                  const nowMs=new Date().getTime();
                  // Use Colombia time (UTC-5) for class datetime comparison
                  const classMs=(date,time)=>{
                    if(!date||!time)return 0;
                    return new Date(`${date}T${time}:00-05:00`).getTime();
                  };
                  const schedMs=classMs(s.scheduled_date,s.scheduled_time);
                  const newMs=s.new_date?classMs(s.new_date,s.new_time):0;
                  // Can cancel only if the class hasn't started yet (in Colombia time)
                  const canCancel=(s.status==='scheduled'&&schedMs>nowMs)||
                                  (s.status==='rescheduled'&&newMs&&newMs>nowMs);
                  const canReschedule=s.status==='to_reschedule'||s.status==='holiday_impacts_min';
                  return(
                    <div key={s.id}
                      style={{display:'flex',alignItems:'flex-start',gap:10,padding:'7px 10px',borderRadius:8,background:'var(--bg3)',marginBottom:4,position:'relative'}}
                    >
                      <div onClick={()=>setSessionInfo({type:s.status,cycleStart:g.cycleStart,cycleEnd:g.cycleEnd,min:rules.min,onReschedule:(!locked&&(s.status==='to_reschedule'||s.status==='holiday_impacts_min'))?()=>openReschedule({sessionId:s.id,scheduledDate:s.scheduled_date,dateLabel:fmtFull(s.scheduled_date),zoomUrl:s.teacher_zoom_url||s.zoom_url||null,teacherName:s.teacher_name||null,teacherId:s.teacher_id||null,expiresAt:s.expires_at||null}):undefined})}
                        style={{display:'flex',alignItems:'flex-start',gap:10,flex:1,cursor:'pointer',minWidth:0}}
                        onMouseEnter={e=>e.currentTarget.style.opacity='.8'}
                        onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                      >
                        <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{disp.emoji}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                            {s.class_number>0&&<span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>Class {s.class_number}</span>}
                            <span style={{fontSize:11,color:'var(--textMuted)'}}>{fmtFull(s.scheduled_date)} · <ClassTime date={s.scheduled_date} time={s.scheduled_time}/></span>
                          </div>
                          {isRescheduled&&s.new_date&&<p style={{margin:'3px 0 0',fontSize:12,color:'#34d399',fontWeight:600}}>→ {fmtFull(s.new_date)}{s.new_time&&<> · <ClassTime date={s.new_date} time={s.new_time}/></>}</p>}
                          {s.expires_at&&(s.status==='to_reschedule'||s.status==='holiday_impacts_min')&&<p style={{margin:'2px 0 0',fontSize:11,color:'#ef4444',fontWeight:600}}>⏳ Expira: {fmtFull(s.expires_at)}</p>}
                          {s.notes&&<p style={{margin:'2px 0 0',fontSize:11,color:'var(--textMuted)',fontStyle:'italic'}}>"{s.notes}"</p>}
                          <p style={{margin:'3px 0 0',fontSize:10,color:disp.color,fontWeight:600,opacity:.7}}>Toca para más info ›</p>
                        </div>
                        <Badge color={disp.color} style={{flexShrink:0}}>{disp.label}</Badge>
                      </div>
                      {canCancel&&(
                        <button
                          onClick={e=>{e.stopPropagation();if(!locked)openCancel(s,g.cycleStart,g.cycleEnd,taken,totalCycleCount,projectedCount);}}
                          disabled={locked}
                          style={{flexShrink:0,marginLeft:6,background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.3)',color:'#ef4444',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:700,cursor:locked?'default':'pointer',alignSelf:'center',opacity:locked?.4:1}}
                        >✕ Cancelar</button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
        }; // end renderCycleGroup
        return(
          <>
            {currentAndFuture.map((g,gi)=>renderCycleGroup(g,gi))}
            {pastCycles.length>0&&(
              <>
                <button onClick={()=>setPastGroupOpen(o=>!o)}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'transparent',
                    border:'none',cursor:'pointer',padding:'8px 0',marginTop:4,textAlign:'left'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--textMuted)'}}>📚 Past Cycles</span>
                  <span style={{fontSize:11,fontWeight:700,color:'var(--textMuted)',background:'var(--bg3)',
                    border:'1px solid var(--stroke)',borderRadius:999,padding:'1px 8px'}}>{pastCycles.length}</span>
                  <div style={{flex:1,height:1,background:'var(--stroke)'}}/>
                  <span style={{color:'var(--textMuted)',fontSize:11}}>{pastGroupOpen?'▲':'▼'}</span>
                </button>
                {pastGroupOpen&&pastCycles.map((g,gi)=>renderCycleGroup(g,gi))}
              </>
            )}
          </>
        );
      })()}
    </>
  );
}
function TClassLog({user,data,onRefresh,locked=false,isAdmin=false}){
  const students=data.students||[];
  const allSessions=data.classSessions||[];
  const movements=data.movements||[];
  const allGroups=data.groups||[];
  const allStudentsForGroup=data.allStudents||data.students||[];
  const [selSid,setSelSid]=React.useState('');
  const [editing,setEditing]=React.useState(null); // session id
  const [form,setForm]=React.useState({action:'',notes:'',newDate:'',newTime:''});
  const [saving,setSaving]=React.useState(false);
  const [localSessions,setLocalSessions]=React.useState(null); // optimistic override
  // Admin-only: edit pkg_snapshot for a past cycle
  const [editCyclePkg,setEditCyclePkg]=React.useState(null); // {cycleId, current}
  // Admin-only: edit start/end dates of a future cycle
  const [editCycleDates,setEditCycleDates]=React.useState(null); // {cycleId, start, end}
  // Admin-only: create a manual cycle
  const [newCycleForm,setNewCycleForm]=React.useState(null); // {start,end,pkg} | null
  // Cycles without sessions (fetched separately to show empty future cycles)
  const [allStudentCycles,setAllStudentCycles]=React.useState([]);
  const ALL_PKGS=['Starter','Essential','Progress','Intensive','Master','Power⚡','Flex4🎯','Flex8🎯','Flex12🎯','Flex16🎯','Flex20🎯'];
  const fmtFull=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short',year:'numeric'});};

  React.useEffect(()=>{setLocalSessions(null);},[allSessions]);

  // Load student cycles whenever the selected student changes (to catch empty future cycles)
  React.useEffect(()=>{
    if(!primarySid){setAllStudentCycles([]);return;}
    api('students',{action:'get_cycles',studentId:primarySid}).then(r=>setAllStudentCycles(Array.isArray(r)?r:[])).catch(()=>setAllStudentCycles([]));
  },[primarySid]);

  // Group vs individual selection
  const isGroupSel=selSid.startsWith('group:');
  const selGroupId=isGroupSel?parseInt(selSid.replace('group:','')):null;
  const selGroup=allGroups.find(g=>String(g.id)===String(selGroupId));
  const groupMemberIds=(selGroup?.memberIds||[]).map(String);
  // Use first member's sessions for display (mirrored = identical for all)
  const primarySid=isGroupSel?(groupMemberIds[0]||''):selSid;
  const student=students.find(s=>s.id===primarySid);
  const rules=PLAN_RULES[student?.pkg]||PLAN_RULES.Essential;
  const sessions=primarySid?(localSessions||allSessions).filter(s=>s.student_id===primarySid):[];
  const todayStr=new Date().toISOString().slice(0,10);

  // Group by cycle
  const byCycle={};
  sessions.forEach(s=>{
    const k=s.cycle_id||'x';
    if(!byCycle[k])byCycle[k]={cycleId:s.cycle_id,cycleStart:s.cycle_start,cycleEnd:s.cycle_end,pkgSnapshot:s.pkg_snapshot||null,sessions:[]};
    byCycle[k].sessions.push(s);
  });
  // Also include cycles that have no sessions yet (e.g. newly created future cycles)
  allStudentCycles.forEach(c=>{
    if(c.id&&!byCycle[c.id]){
      byCycle[c.id]={cycleId:c.id,cycleStart:(c.start||'').slice(0,10),cycleEnd:(c.end||'').slice(0,10),pkgSnapshot:c.pkg_snapshot||null,sessions:[]};
    }
  });
  const groups=Object.values(byCycle)
    .map(g=>{
      const isCurrent=g.cycleStart&&g.cycleEnd&&todayStr>=g.cycleStart&&todayStr<=g.cycleEnd;
      const isFuture=g.cycleStart&&g.cycleStart>todayStr;
      const daysUntil=isFuture?Math.round((new Date(g.cycleStart+'T00:00:00')-new Date())/(1000*60*60*24)):null;
      const showFuture=isFuture&&daysUntil!==null&&daysUntil<=5;
      const hasNoSessions=g.sessions.length===0;
      const isPast=!isCurrent&&!isFuture;
      return{...g,isCurrent,isFuture,isPast,showFuture,daysUntil,hasNoSessions};
    })
    .filter(g=>g.isCurrent||g.isPast||(g.isFuture&&(g.showFuture||g.hasNoSessions)))
    .sort((a,b)=>new Date(b.cycleStart||0)-new Date(a.cycleStart||0));
  const [openGroups,setOpenGroups]=React.useState(new Set(['current']));
  const toggleGroup=key=>setOpenGroups(prev=>{const s=new Set(prev);s.has(key)?s.delete(key):s.add(key);return s;});

  const [tRescheduleSession,setTRescheduleSession]=React.useState(null);
  const [tCancelSession,setTCancelSession]=React.useState(null);

  const saveStatus=async()=>{
    if((!form.action&&form._expiresAt===undefined)||saving)return;
    setSaving(true);
    try{
      let finalStatus=form.action;
      // Update expires_at if changed (temporal feature for transition)
      if(form._expiresAt!==undefined){
        await api('class_sessions',{action:'update_expires',id:editing,expiresAt:form._expiresAt||null}).catch(()=>{});
      }
      // If only updating expires_at with no status action, skip the rest
      if(!form.action){
        const base=localSessions||allSessions;
        setLocalSessions(base.map(s=>String(s.id)===String(editing)?{...s,expires_at:form._expiresAt||s.expires_at,status:form._expiresAt&&form._expiresAt>=new Date().toISOString().slice(0,10)?'to_reschedule':s.status}:s));
        setEditing(null);setForm({action:'',notes:'',newDate:'',newTime:'',_manualDate:false,_expiresAt:undefined});
        onRefresh();
        setSaving(false);
        return;
      }
      if((form.action==='rescheduled'||form.action==='medical_exception')&&form.newDate){
        await api('class_sessions',{action:'set_reschedule_date',id:editing,newDate:form.newDate,newTime:form.newTime||null,status:form.action});
        finalStatus=form.action;


      } else {
        const r=await api('class_sessions',{action:'update_status',id:editing,status:form.action,notes:form.notes||null});
        if(r?.finalStatus) finalStatus=r.finalStatus;
        if(r?.error) throw new Error(r.error);
      }
      // Auto no-show message to student
      if(form.action==='no_show'){
        const sess=(localSessions||allSessions).find(x=>String(x.id)===String(editing));
        if(sess&&student){
          const firstName=student.name?.split(' ')[0]||student.name||'';
          const classTs=new Date(`${sess.scheduled_date}T${sess.scheduled_time||'00:00'}:00-05:00`);
          const elapsedMin=Math.max(1,Math.round((new Date()-classTs)/(1000*60)));
          const noShowMsg=`Hii ${firstName} I waited for you ${elapsedMin}mn, since you didn't join I had to log out! I'll be happy to see you next class! 😊`;
          api('chispa',{action:'send_message',studentId:primarySid,sender:'teacher',senderName:user?.name||'Profe',message:noShowMsg}).catch(()=>{});
        }
      }
      const noNumberStatuses=['cancelled_no_impact','holiday_no_impact'];
      const countsStatuses=['taken','no_show','cancelled_late','rescheduled','rescheduled_taken','rescheduled_no_show','rescheduled_cancelled'];
      const base=localSessions||allSessions;
      setLocalSessions(base.map(s=>{
        if(String(s.id)!==String(editing)) return s;
        return {...s,
          status:finalStatus,
          notes:form.notes||s.notes,
          counts_as_taken:countsStatuses.includes(finalStatus)?1:0,
          class_number:noNumberStatuses.includes(finalStatus)?null:s.class_number,
          ...(form.newDate?{new_date:form.newDate,new_time:form.newTime||null}:{}),
        };
      }));
      setEditing(null);setForm({action:'',notes:'',newDate:'',newTime:'',_manualDate:false,_expiresAt:undefined});
      onRefresh();
    }catch(e){
      console.error('saveStatus error:',e);
      alert('Error al guardar: '+e.message);
    }finally{
      setSaving(false);
    }
  };

  const regenerateCycle=async(cycleId,cycleEnd)=>{
    if(!confirm('¿Regenerar todas las sesiones de este ciclo? Se eliminarán las existentes y se crearán nuevas según el horario actual.'))return;
    const sids=isGroupSel?groupMemberIds:[primarySid];
    for(const sid of sids){
      await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId,cycleEnd:cycleEnd||undefined});
    }
    setLocalSessions(null);onRefresh();
  };

  return(
    <>
      {tRescheduleSession&&<RescheduleModal
        user={tRescheduleSession.student}
        sessionId={tRescheduleSession.sessionId}
        sessionDate={tRescheduleSession.dateLabel}
        scheduledDate={tRescheduleSession.scheduledDate}
        originalZoomUrl={tRescheduleSession.zoomUrl||null}
        originalTeacherName={tRescheduleSession.teacherName||null}
        originalTeacherId={tRescheduleSession.teacherId||null}
        onClose={()=>setTRescheduleSession(null)}
        onSuccess={()=>{setTRescheduleSession(null);setEditing(null);onRefresh();}}
      />}
      {tCancelSession&&<CancelModal
        session={tCancelSession.session}
        cycleStart={tCancelSession.cycleStart}
        cycleEnd={tCancelSession.cycleEnd}
        min={tCancelSession.effectiveMin}
        user={tCancelSession.studentUser}
        onClose={()=>setTCancelSession(null)}
        onDone={()=>{setTCancelSession(null);onRefresh();}}
      />}
      {/* Admin: modal para corregir plan de un ciclo pasado */}
      {isAdmin&&editCyclePkg&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setEditCyclePkg(null)}>
          <div style={{background:'var(--surface)',borderRadius:16,padding:24,width:'100%',maxWidth:340,border:'1px solid var(--stroke)'}} onClick={e=>e.stopPropagation()}>

            <Select value={editCyclePkg.current||''} onChange={e=>setEditCyclePkg(f=>({...f,current:e.target.value}))}>
              <option value="">-- Plan --</option>
              {ALL_PKGS.map(p=><option key={p} value={p}>{p}</option>)}
            </Select>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <Btn full onClick={async()=>{
                await api('students',{action:'update_cycle_pkg',cycleId:editCyclePkg.cycleId,pkg:editCyclePkg.current});
                setEditCyclePkg(null);onRefresh();
              }}>Guardar</Btn>

      {/* Admin: modal para cambiar fechas de un ciclo futuro */}
      {isAdmin&&editCycleDates&&(

          <div style={{background:'var(--surface)',borderRadius:16,padding:24,width:'100%',maxWidth:360,border:'1px solid var(--stroke)'}} onClick={e=>e.stopPropagation()}>
            <p style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:15,marginBottom:4}}>📅 Cambiar fechas del ciclo</p>
            <p style={{fontSize:12,color:'var(--textMuted)',marginBottom:14}}>Las sesiones actuales del ciclo se eliminarán y se regenerarán con las nuevas fechas. A partir de aquí, los siguientes ciclos se crearán automáticamente con el nuevo patrón de fechas.</p>
            <label style={{fontSize:11,color:'var(--textMuted)',fontWeight:600,display:'block',marginBottom:4}}>NUEVO INICIO</label>

            <label style={{fontSize:11,color:'var(--textMuted)',fontWeight:600,display:'block',marginBottom:4}}>NUEVO FIN</label>
            <Input type="date" value={editCycleDates.end} onChange={e=>setEditCycleDates(f=>({...f,end:e.target.value}))} style={{marginBottom:14}}/>
            <div style={{display:'flex',gap:8}}>
              <Btn full onClick={async()=>{
                if(!editCycleDates.start||!editCycleDates.end){alert('Completa ambas fechas.');return;}
                if(editCycleDates.start>=editCycleDates.end){alert('La fecha de inicio debe ser antes del fin.');return;}
                const sid=isGroupSel?groupMemberIds[0]:primarySid;
                await api('students',{action:'update_cycle_dates',cycleId:editCycleDates.cycleId,start:editCycleDates.start,end:editCycleDates.end});
                await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId:editCycleDates.cycleId,cycleEnd:editCycleDates.end}).catch(()=>{});

              }}>Guardar y regenerar</Btn>
              <Btn full cls="btn-ghost" onClick={()=>setEditCycleDates(null)}>Cancelar</Btn>

              {ALL_PKGS.map(p=><option key={p} value={p}>{p}</option>)}
            </Select>

                if(!newCycleForm.start||!newCycleForm.end||!newCycleForm.pkg){alert('Completa todos los campos.');return;}

        {(()=>{

            {myGroups.length>0&&<option disabled>── Grupos ──</option>}

            {myGroups.length>0&&<option disabled>── Individuales ──</option>}
          </>);

        <div style={{marginBottom:8,padding:'6px 12px',background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.25)',borderRadius:8,fontSize:12,color:'#a78bfa',fontWeight:600}}>
          👫 Grupo: {selGroup.name} · {groupMemberIds.length} miembros · Los cambios aplican a todos
        </div>
      )}

      {isGroupSel&&console.log('DIAG',{selSid,selGroup:selGroup?.name,groupMemberIds,primarySid,sessionsLen:sessions.length,allSessionsLen:allSessions.length,sampleSession:allSessions.find(s=>groupMemberIds.includes(String(s.student_id)))?.student_id})}
      {selSid&&sessions.length===0&&(

        const SKIP_STATUSES=['holiday_no_impact','cancelled_no_impact'];
        const taken=ss.filter(s=>parseInt(s.counts_as_taken)===1&&!SKIP_STATUSES.includes(s.status)).length;
        const totalCycleCount=ss.filter(s=>!SKIP_STATUSES.includes(s.status)).length;
        const selStudentPkg=(data.students||[]).find(s=>s.id===selSid)?.pkg||'';
        const cycleMin=g.pkgSnapshot?(PLAN_RULES[g.pkgSnapshot]?.min||rules.min):rules.min;

        const pending=ss.filter(s=>s.status==='to_reschedule'||s.status==='holiday_impacts_min').length;
        const pct=effectiveMin>0?Math.min(100,Math.round(taken/effectiveMin*100)):0;
        const ok=taken>=effectiveMin;
        const groupKey=g.isCurrent?'current':g.cycleStart||gi;
        const isOpen=openGroups.has(groupKey);
        const label=g.isCurrent?'📍 Current':g.isFuture?`🔜 Next · ${g.daysUntil}d`:'📚 Previous';

function StudentMovements({data}){
  const mvs=data.movements||[];
  const pend=mvs.filter(m=>m.status==='pending');
  const done=mvs.filter(m=>m.status==='rescheduled');
  const expired=mvs.filter(m=>m.status==='expired');

  const daysLeft=(expiresAt)=>{
    const d=Math.ceil((new Date(expiresAt)-new Date())/(864e5));
    return Math.max(0,d);
  };

  return(
    <>
      <SectionTitle>🗓️ Movimientos</SectionTitle>
      {mvs.length===0&&(
        <Card style={{textAlign:'center',padding:32}}>
          <p style={{fontSize:24,marginBottom:8}}>✅</p>
          <p style={{color:'var(--textMuted)'}}>No tienes movimientos registrados.</p>
        </Card>
      )}

      {pend.length>0&&(
        <>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <p className="label" style={{color:'#f97316',margin:0}}>⏳ Pendientes de reagendar ({pend.length})</p>
          </div>
          <div style={{background:'rgba(249,115,22,.06)',border:'1px solid rgba(249,115,22,.2)',borderRadius:12,padding:'12px',marginBottom:14}}>
            <p style={{margin:'0 0 10px',fontSize:12,color:'#f97316',lineHeight:1.5}}>
              Tu profe canceló {pend.length===1?'una clase':'estas clases'} y {pend.length===1?'está':'están'} pendiente{pend.length!==1?'s':''} de ser reagendada{pend.length!==1?'s':''}. Se descont{pend.length===1?'ó':'aron'} un token de tu ciclo por cada una.
            </p>
            {pend.map(m=>{
              const d=daysLeft(m.expires_at);
              const urgent=d<=7;
              return(
                <div key={m.id} style={{background:'var(--bg0)',borderRadius:10,padding:'12px 14px',marginBottom:8,border:`1.5px solid ${urgent?'rgba(239,68,68,.4)':'rgba(249,115,22,.3)'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                    <div>
                      <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14}}>
                        📅 Clase del {fmt(m.cancelled_date)}
                      </p>
                      {m.reason&&<p style={{margin:0,color:'var(--textMuted)',fontSize:12,fontStyle:'italic'}}>"{m.reason}"</p>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
                      <span style={{display:'block',fontFamily:'Sora',fontWeight:900,fontSize:18,color:urgent?'#ef4444':'#f97316'}}>{d}d</span>
                      <span style={{fontSize:10,color:'var(--textMuted)'}}>para expirar</span>
                    </div>
                  </div>
                  <p style={{margin:'6px 0 0',fontSize:11,color:'var(--textMuted)'}}>
                    {urgent?'⚠️ ':''}Expira el {fmt(m.expires_at)} · Registrado el {m.created_at?.slice(0,10)}
                  </p>
                </div>
              );
            })}
          </div>
        </>
      )}

      {done.length>0&&(
        <>
          <p className="label" style={{marginTop:pend.length>0?0:0}}>✅ Acuerdos confirmados ({done.length})</p>
          {done.map(m=>(
            <Card key={m.id} style={{borderColor:'var(--strokeBrand)',marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14}}>
                  Clase del {fmt(m.cancelled_date)}
                </p>
                <Badge color="var(--brand)">Reagendada ✓</Badge>
              </div>
              <div style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:10,padding:'10px 13px'}}>
                <p style={{margin:'0 0 3px',fontWeight:700,color:'var(--brand)',fontSize:14}}>
                  📅 Nueva fecha: {fmt(m.new_date)}{m.new_time&&<> · <ClassTime date={m.new_date} time={m.new_time}/></>}
                </p>
                {m.agreement_note&&(
                  <p style={{margin:'4px 0 0',color:'var(--textSub)',fontSize:12,fontStyle:'italic'}}>
                    "{m.agreement_note}"
                  </p>
                )}
              </div>
              <p style={{margin:'8px 0 0',fontSize:11,color:'var(--textMuted)'}}>
                Registrado por: {m.registered_by} · {m.created_at?.slice(0,10)}
              </p>
            </Card>
          ))}
        </>
      )}

      {expired.length>0&&(
        <>
          <p className="label" style={{marginTop:8,color:'#64748b'}}>⏰ Expiradas sin reagendar ({expired.length})</p>
          {expired.map(m=>(
            <div key={m.id} style={{marginBottom:6,padding:'10px 14px',borderRadius:12,border:'1px solid var(--stroke)',background:'var(--surface)',opacity:.7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--textMuted)',fontSize:13}}>
                    Clase del {fmt(m.cancelled_date)}
                  </p>
                  <p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>
                    Venció el {fmt(m.expires_at)} sin ser reagendada
                  </p>
                </div>
                <Badge color="#64748b">Expirada</Badge>
              </div>
            </div>
          ))}
        </>
      )}
    </>
  );
}

function TeacherView({user,data,onRefresh,onLogout,dark,toggleTheme}){
  const [tab,setTab]=React.useState('dashboard');
  const [openMsgStudent,setOpenMsgStudent]=React.useState(null);
  const [showCredModal,setShowCredModal]=React.useState(false);
  // Auto-refresh every 30s to pick up new messages
  React.useEffect(()=>{
    const iv=setInterval(onRefresh,5000);
    const onVisible=()=>{if(document.visibilityState==='visible')onRefresh();};
    document.addEventListener('visibilitychange',onVisible);
    return()=>{clearInterval(iv);document.removeEventListener('visibilitychange',onVisible);};
  },[]);
  const pendingTasks=(data.tasks||[]).filter(t=>t.status==='ready_review').length;
  const [targetReviewTaskId,setTargetReviewTaskId]=React.useState(null);
  const navTo=(id,extra)=>{
    if(id==='tasks'&&extra?.reviewTaskId){setTargetReviewTaskId(extra.reviewTaskId);}
    setTab(id);
  };
  const _autoTodos=(()=>{
    const myIds=new Set((data.students||[]).map(s=>String(s.id)));
    const myPl=(data.plans||[]).filter(p=>myIds.has(String(p.student_id)));
    const td=new Date();td.setHours(0,0,0,0);
    let n=0;
    (data.students||[]).filter(s=>s.is_active!==false&&s.is_active!==0).forEach(s=>{
      const ce=s.cycle?.end?new Date(s.cycle.end+'T00:00:00'):null;
      const cs=s.cycle?.start?new Date(s.cycle.start+'T00:00:00'):null;
      if(!ce||!cs||!(cs<=td&&td<=ce))return;
      const hp=myPl.some(p=>String(p.student_id)===String(s.id)&&p.cycle_start&&p.cycle_end&&new Date(p.cycle_start+'T00:00:00')<=td&&td<=new Date(p.cycle_end+'T00:00:00'));
      if(!hp)n++;
      const dl=Math.ceil((ce-td)/(1000*60*60*24));
      if(dl<=5&&dl>=0){const ns=new Date(ce);ns.setDate(ns.getDate()+1);const hnp=myPl.some(p=>String(p.student_id)===String(s.id)&&p.cycle_start&&new Date(p.cycle_start+'T00:00:00')>=ns);if(!hnp)n++;}
    });
    return n;
  })();
  const tabs=[
    {id:'dashboard', label:'🏠 Dashboard'},
    {id:'messages',  label:'💬 Mensajes', badge:data.msgUnread||0},
    {id:'students',  label:'👥 Estudiantes'},
    {id:'tasks',     label:'📋 Tareas', badge:pendingTasks},
    {id:'topics',    label:'🎯 Temas'},
    {id:'resources', label:'🔗 Recursos'},
    {id:'plan',      label:'🗺️ Study Plan'},
    {id:'movements', label:'🗓️ Classes'},
    {id:'results',   label:'📊 Resultados'},
    {id:'todos',     label:'📋 Pendientes', badge:_autoTodos},
  ];
  const navToMsg=(sid)=>{setOpenMsgStudent(sid||null);setTab('messages');};
  const p={user,data,onRefresh,onNav:navTo,onNavMsg:navToMsg};
  return(
    <>
      <AppHeader title={user.name} sub="Panel Profe"
        right={<button onClick={()=>setShowCredModal(true)} title="Cambiar usuario/PIN" style={{background:'none',border:'1px solid var(--stroke)',borderRadius:8,padding:'4px 9px',cursor:'pointer',color:'var(--textMuted)',fontSize:15,lineHeight:1}}>🔑</button>}
        dark={dark} toggleTheme={toggleTheme} onLogout={onLogout}/>
      {showCredModal&&<CredModal user={user} role="teacher" onClose={()=>setShowCredModal(false)} onSaved={onRefresh}/>}
      <TabBar tabs={tabs} active={tab} onSelect={setTab}/>
      <div className="content">
        {tab==='dashboard' &&<TDashboard {...p} onNav={setTab} onNavMsg={navToMsg}/>}
        {tab==='students'  &&<TStudents  {...p}/>}
        {tab==='tasks'     &&<TTasks     {...p} targetReviewTaskId={targetReviewTaskId} onTargetConsumed={()=>setTargetReviewTaskId(null)}/>}
        {tab==='topics'    &&<TTopics    {...p} user={user}/>}
        {tab==='resources' &&<TResources {...p}/>}
        {tab==='plan'      &&<TPlan      {...p}/>}
        {tab==='movements' &&<TClassLog {...p} locked={false}/>}
        {tab==='messages'  &&<Messages user={user} data={data} role="teacher" initialStudent={openMsgStudent} onRefresh={onRefresh}/>}
        {tab==='results'   &&<TResults   {...p}/>}
        {tab==='todos'     &&<TTodos      data={data} user={user} onNav={setTab}/>}
      </div>
    </>
  );
}

// Student profile sub-panel for teacher
function TStudentProfile({s,data,user,onRefresh}){
  const [stab,setStab]=React.useState('overview');
  const pkg=PKG[s.pkg]||PKG.Essential;
  const left=(s.tokensMax||2)-(s.tokensUsed||0);
  const sPlans=(data.plans||[]).filter(p=>String(p.student_id)===String(s.id));
  const sTasks=(data.tasks||[]).filter(t=>String(t.student_id)===String(s.id));
  // Topics loaded async when tab opened
  const [topicResults,setTopicResults]=React.useState(null);
  const [loadingTopics,setLoadingTopics]=React.useState(false);
  React.useEffect(()=>{
    if(topicResults!==null||loadingTopics)return;
    setLoadingTopics(true);
    api('topics','',`&student_id=${s.id}&with_results=1`)
      .then(r=>{setTopicResults(Array.isArray(r)?r.filter(t=>t.assignment):[]);setLoadingTopics(false);})
      .catch(()=>{setTopicResults([]);setLoadingTopics(false);});
  },[s.id]);
  const allSessions=(data.classSessions||[]).filter(cs=>cs.student_id===s.id);
  const todayStr=new Date().toISOString().slice(0,10);
  const deduct=async()=>{if(left===0)return;await api('students',{action:'deduct_token',id:s.id});onRefresh();};
  const undoToken=async()=>{if(s.tokensUsed===0)return;await api('students',{action:'undo_token',id:s.id});onRefresh();};

  // Class sessions grouped by cycle (current + past collapsed)
  const byCycle={};
  allSessions.forEach(cs=>{
    const k=cs.cycle_id||'x';
    if(!byCycle[k])byCycle[k]={cycleId:cs.cycle_id,cycleStart:cs.cycle_start,cycleEnd:cs.cycle_end,sessions:[]};
    byCycle[k].sessions.push(cs);
  });
  const groups=Object.values(byCycle)
    .sort((a,b)=>new Date(b.cycleStart||0)-new Date(a.cycleStart||0));
  const currentGroup=groups.find(g=>g.cycleStart<=todayStr&&g.cycleEnd>=todayStr);
  const pastGroups=groups.filter(g=>g!==currentGroup&&(!g.cycleStart||g.cycleStart<todayStr));
  const [pastOpen,setPastOpen]=React.useState(false);
  const fmtFull=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'});};

  const statusDots={'scheduled':'🔵','taken':'✅','no_show':'❌','cancelled_late':'🟠','cancelled_no_impact':'⚪','cancelled_no_tokens':'🔴',
    'holiday_no_impact':'⚪','holiday_impacts_min':'🟡','to_reschedule':'🟡','rescheduled':'✅',
    'rescheduled_taken':'✅','rescheduled_no_show':'❌','rescheduled_cancelled':'🟠',
    'medical_exception':'✅','expired':'⌛'};

  const CycleBlock=({g})=>{
    const taken=g.sessions.filter(s=>parseInt(s.counts_as_taken)===1).length;
    const total=g.sessions.filter(s=>s.status!=='holiday_no_impact'&&s.status!=='cancelled_no_impact').length;
    return(
      <div style={{marginBottom:10,background:'var(--bg3)',borderRadius:10,padding:'10px 12px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{g.cycleStart?`${fmt(g.cycleStart)} → ${fmt(g.cycleEnd)}`:'Sin fecha'}</span>
          <span style={{fontSize:11,color:'var(--brand)',fontWeight:700}}>{taken}/{total} clases</span>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {g.sessions.map(cs=>(
            <div key={cs.id} title={`Clase ${cs.class_number||'--'} · ${fmtFull(cs.scheduled_date)} · ${cs.status}`}
              style={{fontSize:14,lineHeight:1}}>{statusDots[cs.status]||'🔵'}</div>
          ))}
        </div>
      </div>
    );
  };

  const stabs=[
    {id:'overview',label:'📋 Resumen'},
    {id:'classes', label:'🗓️ Clases'},
    {id:'tasks',   label:`📝 Tareas${sTasks.filter(t=>t.status==='ready_review').length>0?' 🔴':''}`},
    {id:'topics',  label:'🎯 Temas'},
  ];

  return(
    <div>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,padding:'10px 12px',background:'var(--bg3)',borderRadius:10}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:4}}>
            <span style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:15}}>{s.name}</span>
            <Badge color={pkg.color}>{pkg.icon} {s.pkg}</Badge>
            {s.paymentPending&&<Badge color="#ef4444">💳 Pago pendiente</Badge>}
            {s.cycle?.expiring&&<Badge color="#f59e0b">⚠️ {s.cycle.days_left}d</Badge>}
          </div>
          <span style={{color:'var(--textMuted)',fontSize:11}}>PIN: {s.pin} · {s.cycle?.start?`${fmt(s.cycle.start)} → ${fmt(s.cycle.end)}`:' -- '}</span>
        </div>
        {/* Tokens inline */}
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          {Array.from({length:s.tokensMax||2}).map((_,i)=>(
            <span key={i} style={{fontSize:16}}>{i<left?'🎟️':'◻️'}</span>
          ))}
          <Btn sm cls={left===0?'btn-ghost':'btn-primary'} disabled={left===0} onClick={deduct}>−</Btn>
          <Btn sm cls="btn-ghost" disabled={s.tokensUsed===0} onClick={undoToken}>↩️</Btn>
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,marginBottom:12,overflowX:'auto',paddingBottom:2}}>
        {stabs.map(t=>(
          <button key={t.id} onClick={()=>setStab(t.id)}
            style={{padding:'6px 12px',borderRadius:8,border:`1.5px solid ${stab===t.id?'var(--brand)':'var(--stroke)'}`,
              background:stab===t.id?'var(--brandDim)':'transparent',
              color:stab===t.id?'var(--brand)':'var(--textMuted)',
              fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Overview */}
      {stab==='overview'&&(
        <>
          {/* Study Plan */}
          {sPlans.length>0?(
            <>
              <p className="label" style={{marginBottom:6}}>🗺️ Study Plan actual</p>
              {sPlans.slice(0,1).map(p=>{
                const done=p.competencies?.filter(c=>parseInt(c.achieved)===1).length||0;
                const tot=p.competencies?.length||0;
                const pct=tot>0?Math.round(done/tot*100):0;
                return(
                  <Card key={p.id} style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:12,color:'var(--textMuted)'}}>{p.cycle_label||''}</span>
                      <span style={{fontFamily:'Sora',fontWeight:900,color:'var(--brand)',fontSize:16}}>{pct}%</span>
                    </div>
                    <p style={{fontSize:13,color:'var(--text)',marginBottom:8}}>🎯 {p.objective}</p>
                    {p.competencies?.map(c=>(
                      <div key={c.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <span style={{fontSize:13}}>{parseInt(c.achieved)===1?'✅':'⭕'}</span>
                        <span style={{fontSize:12,color:parseInt(c.achieved)===1?'var(--text)':'var(--textMuted)'}}>{c.description}</span>
                      </div>
                    ))}
                  </Card>
                );
              })}
            </>
          ):<p style={{color:'var(--textMuted)',fontSize:12,marginBottom:8}}>Sin Study Plan aún.</p>}

          {/* Quick stats */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <div style={{flex:'1 1 120px',background:'var(--bg3)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
              <p style={{margin:0,fontFamily:'Sora',fontWeight:900,fontSize:20,color:'var(--brand)'}}>{sTasks.filter(t=>t.status==='reviewed').length}</p>
              <p style={{margin:0,fontSize:10,color:'var(--textMuted)',textTransform:'uppercase'}}>Tareas revisadas</p>
            </div>
            <div style={{flex:'1 1 120px',background:'var(--bg3)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
              <p style={{margin:0,fontFamily:'Sora',fontWeight:900,fontSize:20,color:'#f59e0b'}}>{sTasks.filter(t=>t.status==='ready_review').length}</p>
              <p style={{margin:0,fontSize:10,color:'var(--textMuted)',textTransform:'uppercase'}}>Por revisar</p>
            </div>
            <div style={{flex:'1 1 120px',background:'var(--bg3)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
              <p style={{margin:0,fontFamily:'Sora',fontWeight:900,fontSize:20,color:'var(--brand)'}}>{allSessions.filter(s=>parseInt(s.counts_as_taken)===1).length}</p>
              <p style={{margin:0,fontSize:10,color:'var(--textMuted)',textTransform:'uppercase'}}>Clases tomadas</p>
            </div>
          </div>
        </>
      )}

      {/* Classes - compact visual */}
      {stab==='classes'&&(
        <>
          {currentGroup&&(
            <>
              <p className="label" style={{marginBottom:6}}>Ciclo actual</p>
              <CycleBlock g={currentGroup}/>
            </>
          )}
          {pastGroups.length>0&&(
            <>
              <button onClick={()=>setPastOpen(o=>!o)}
                style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'transparent',border:'none',cursor:'pointer',padding:'6px 0',marginBottom:pastOpen?8:0,textAlign:'left'}}>
                <span className="label" style={{margin:0}}>Past Cycles</span>
                <span style={{fontSize:11,fontWeight:700,color:'var(--textMuted)',background:'var(--bg3)',borderRadius:999,padding:'1px 8px'}}>{pastGroups.length}</span>
                <div style={{flex:1,height:1,background:'var(--stroke)'}}/>
                <span style={{color:'var(--textMuted)',fontSize:11}}>{pastOpen?'▲':'▼'}</span>
              </button>
              {pastOpen&&pastGroups.map((g,i)=><CycleBlock key={i} g={g}/>)}
            </>
          )}
          {!currentGroup&&pastGroups.length===0&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:16}}>Sin sesiones registradas.</p>}
        </>
      )}

      {/* Tasks */}
      {stab==='tasks'&&(
        <>
          {sTasks.length===0&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:16}}>Sin tareas asignadas.</p>}
          {sTasks.map(t=>{
            const si={pending:{l:'Pendiente',c:'#f59e0b'},ready_review:{l:'Para revisar 👀',c:'#60a5fa'},reviewed:{l:'Revisada ✓',c:'var(--brand)'}}[t.status]||{l:t.status,c:'var(--textMuted)'};
            return(
              <div key={t.id} style={{marginBottom:6,padding:'10px 12px',background:'var(--bg3)',borderRadius:10,border:`1.5px solid ${si.c}44`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                  <div style={{flex:1}}>
                    <p style={{margin:'0 0 2px',fontWeight:700,fontSize:13,color:'var(--text)'}}>{t.title}</p>
                    {t.topic_id&&<span style={{fontSize:10,color:'#60a5fa',fontWeight:700}}>DE TEMA</span>}
                    {parseInt(t.is_custom)===1&&<span style={{fontSize:10,color:'#a78bfa',fontWeight:700}}>EXTRA TASK</span>}
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:si.c,background:`${si.c}18`,borderRadius:999,padding:'2px 8px',flexShrink:0}}>{si.l}</span>
                </div>
                {t.submission_text&&t.status==='ready_review'&&(
                  <p style={{margin:'6px 0 0',fontSize:11,color:'var(--textMuted)',lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{t.submission_text?.replace(/<[^>]*>/g,'')}</p>
                )}
              </div>
            );
          })}
        </>
      )}

      {/* Topics progress - load from topics bank with per-student results */}
      {stab==='topics'&&loadingTopics&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:16}}>Cargando…</p>}
      {stab==='topics'&&!loadingTopics&&topicResults!==null&&topicResults.length===0&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:16}}>Sin temas asignados.</p>}
      {stab==='topics'&&!loadingTopics&&(topicResults||[]).map(t=>{
          const tot=t.questions?.length||0;
          const ans=t.answeredCount||0;
          const pct=tot>0?Math.round(ans/tot*100):0;
          const col=pct>=70?'var(--brand)':pct>=40?'#f59e0b':'#ef4444';
          return(
            <div key={t.id} style={{marginBottom:6,padding:'10px 12px',background:'var(--bg3)',borderRadius:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:tot>0?6:0}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{t.name}</span>
                  {t.level&&<span style={{marginLeft:6,fontSize:10,fontWeight:700,color:'#94a3b8',background:'rgba(148,163,184,.15)',borderRadius:999,padding:'1px 6px'}}>{t.level}</span>}
                </div>
                {tot>0?<span style={{fontFamily:'Sora',fontWeight:900,fontSize:16,color:col}}>{ans}/{tot}</span>
                  :<span style={{fontSize:11,color:'var(--textMuted)'}}>Sin preguntas</span>}
              </div>
              {tot>0&&(
                <div style={{height:4,background:'var(--stroke)',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:99,transition:'width .4s'}}/>
                </div>
              )}
            </div>
          );
      })}
    </div>
  );
}

function TStudents({user,data,onRefresh}){
  const students=data.students||[];
  const [openS,setOpenS]=React.useState(null);
  const [search,setSearch]=React.useState('');
  const filtered=students.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.pkg.toLowerCase().includes(search.toLowerCase()));
  return(
    <>
      <SectionTitle>👥 Mis Estudiantes ({students.length})</SectionTitle>
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder={`🔍 Buscar entre ${students.length} estudiantes…`}
        style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'9px 14px',color:'var(--text)',fontSize:13,outline:'none',marginBottom:12,boxSizing:'border-box'}}
        onFocus={e=>e.target.style.borderColor='var(--brandBorder)'}
        onBlur={e=>e.target.style.borderColor='var(--stroke)'}/>
      {filtered.length===0&&search&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:24,fontSize:13}}>Sin resultados para "{search}"</p>}
      {filtered.map(s=>{
        const pkg=PKG[s.pkg]||PKG.Essential;
        const left=(s.tokensMax||2)-(s.tokensUsed||0);
        const isOpen=openS===s.id;
        const hasPending=(data.tasks||[]).filter(t=>String(t.student_id)===String(s.id)&&t.status==='ready_review').length;
        return(
          <div key={s.id} style={{marginBottom:6,borderRadius:12,border:`1.5px solid ${isOpen?'var(--brandBorder)':hasPending?'rgba(96,165,250,.4)':'var(--stroke)'}`,overflow:'hidden',background:'var(--surface)',transition:'border-color .2s'}}>
            <div onClick={()=>setOpenS(isOpen?null:s.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',userSelect:'none'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14}}>{s.name}</span>
                  <Badge color={pkg.color}>{pkg.icon} {s.pkg}</Badge>
                  {s.paymentPending&&<Badge color="#ef4444">💳</Badge>}
                  {hasPending>0&&<Badge color="#60a5fa">📝 {hasPending} por revisar</Badge>}
                  {s.groupId&&(()=>{const g=(data.groups||[]).find(x=>x.id===s.groupId);return g?<Badge color="#a78bfa">👫 {g.name}</Badge>:null;})()}
                </div>
                <span style={{color:'var(--textMuted)',fontSize:11}}>{s.cycle?.start?`${fmt(s.cycle.start)} → ${fmt(s.cycle.end)}`:' -- '}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                {Array.from({length:s.tokensMax||2}).map((_,i)=>(
                  <span key={i} style={{fontSize:12}}>{i<left?'🎟️':'◻️'}</span>
                ))}
                <span style={{color:'var(--textMuted)',fontSize:12}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>
            {isOpen&&(
              <div style={{borderTop:'1px solid var(--stroke)',padding:'12px 14px',background:'var(--bg3)'}}>
                <TStudentProfile s={s} data={data} user={user} onRefresh={onRefresh}/>
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}


function SubstituteClassCard({sess,student,user,onRefresh,onNavMsg}){
  const [marked,setMarked]=React.useState(null); // 'taken'|'no_show'
  const [saving,setSaving]=React.useState(false);
  const [zoomSent,setZoomSent]=React.useState(false);
  const [sendingZoom,setSendingZoom]=React.useState(false);

  // Already marked in DB?
  const dbStatus=sess.status;
  const alreadyMarked=dbStatus==='rescheduled_taken'?'taken':dbStatus==='rescheduled_no_show'?'no_show':null;
  const finalMark=marked||alreadyMarked;

  const fmt12=t=>{if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;};

  const markAttendance=async(status)=>{
    if(saving)return;
    setSaving(true);
    const r=await api('class_sessions',{action:'update_status',id:sess.id,status,teacherId:String(user.id),teacherName:user.name||'Profe'});
    if(!r?.error){
      setMarked(status==='rescheduled_taken'?'taken':'no_show');
      if(status==='rescheduled_no_show'&&student){
        const firstName=student.name?.split(' ')[0]||student.name||'';
        const classDate=sess.new_date||sess.scheduled_date;
        const classTime=sess.new_time||sess.scheduled_time||'00:00';
        const classTs=new Date(`${classDate}T${classTime}:00-05:00`);
        const elapsedMin=Math.max(1,Math.round((new Date()-classTs)/(1000*60)));
        const noShowMsg=`Hii ${firstName} I waited for you ${elapsedMin}mn, since you didn't join I had to log out! I'll be happy to see you next class! 😊`;
        api('chispa',{action:'send_message',studentId:String(sess.student_id),sender:'teacher',senderName:user.name||'Profe',message:noShowMsg}).catch(()=>{});
      }
      onRefresh();
    }
    else alert('Error al guardar: '+r.error);
    setSaving(false);
  };

  const sendZoom=async()=>{
    if(sendingZoom||!student)return;
    setSendingZoom(true);
    const firstName=student.name?.split(' ')[0]||student.name||'';
    const zoomUrl=user.zoom_url||sess.new_teacher_zoom_url||sess.teacher_zoom_url||'';
    let text=`Hi ${firstName} I'm waiting for you on Zoom! 🎥`;
    if(zoomUrl) text+=`\n[ZOOM_BTN:${zoomUrl}]`;
    await api('chispa',{action:'send_message',studentId:String(sess.student_id),sender:'teacher',senderName:user.name||'Profe',message:text});
    setSendingZoom(false);
    setZoomSent(true);
    setTimeout(()=>setZoomSent(false),3000);
  };

  return(
    <div className="fade-up" style={{background:'linear-gradient(135deg,rgba(139,92,246,.12),rgba(99,102,241,.08))',border:'2px solid rgba(139,92,246,.45)',borderRadius:14,padding:'14px 16px',marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
        <span style={{fontSize:20}}>🎓</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontFamily:'Sora',fontWeight:800,fontSize:13,color:'#8b5cf6'}}>Clase cubierta hoy</p>
          <p style={{margin:'2px 0 0',fontSize:12,color:'var(--textMuted)'}}>
            <b style={{color:'var(--text)'}}>{student?.name||'Estudiante'}</b> · {fmt12(sess.new_time)}
          </p>
        </div>
        <span style={{fontSize:11,fontWeight:700,color:'#8b5cf6',background:'rgba(139,92,246,.12)',borderRadius:6,padding:'3px 8px'}}>Sustituto</span>
      </div>

      {/* Attendance */}
      {!finalMark&&(
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <button onClick={()=>markAttendance('rescheduled_taken')} disabled={saving}
            style={{flex:1,background:'rgba(20,184,166,.15)',border:'1px solid rgba(20,184,166,.4)',borderRadius:8,padding:'8px 0',color:'#14b8a6',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            {saving?'…':'✅ Taken'}
          </button>
          <button onClick={()=>markAttendance('rescheduled_no_show')} disabled={saving}

function TTodos({data,user,onNav}){
  const students=data.students||[];
  const plans=data.plans||[];
  const myStudentIds=new Set(students.map(s=>String(s.id)));
  const myPlans=plans.filter(p=>myStudentIds.has(String(p.student_id)));
  const today=new Date();today.setHours(0,0,0,0);
  const todos=[];
  students.filter(s=>s.is_active!==false&&s.is_active!==0).forEach(s=>{
    const cycleEnd=s.cycle?.end?new Date(s.cycle.end+'T00:00:00'):null;
    const cycleStart=s.cycle?.start?new Date(s.cycle.start+'T00:00:00'):null;
    if(!cycleEnd||!cycleStart)return;
    const inCycle=cycleStart<=today&&today<=cycleEnd;
    const daysLeft=Math.ceil((cycleEnd-today)/(1000*60*60*24));
    if(inCycle){
      const hasPlan=myPlans.some(p=>{
        if(String(p.student_id)!==String(s.id))return false;
        if(p.cycle_start&&p.cycle_end){
          const ps=new Date(p.cycle_start+'T00:00:00'),pe=new Date(p.cycle_end+'T00:00:00');
          return ps<=today&&today<=pe;
        }
        return false;
      });
      if(!hasPlan){
        todos.push({type:'missing_plan',student:s,msg:`Aún no tiene Study Plan para el ciclo actual`});
      }
      if(daysLeft<=5&&daysLeft>=0){
        const nextStart=new Date(cycleEnd);nextStart.setDate(nextStart.getDate()+1);
        const hasNextPlan=myPlans.some(p=>{
          if(String(p.student_id)!==String(s.id))return false;
          if(p.cycle_start){const ps=new Date(p.cycle_start+'T00:00:00');return ps>=nextStart;}
          return false;
        });
        if(!hasNextPlan){
          todos.push({type:'cycle_ending',student:s,daysLeft,msg:`El ciclo termina en ${daysLeft===0?'hoy':daysLeft===1?'1 día':`${daysLeft} días`} — crea el Study Plan del próximo ciclo`});
        }
      }
    }
  });
  return(
    <>
      <SectionTitle>📋 Pendientes ({todos.length})</SectionTitle>
      {todos.length===0&&(
        <Card style={{textAlign:'center',padding:32}}>
          <p style={{fontSize:28,marginBottom:8}}>🎉</p>
          <p style={{color:'var(--textMuted)',fontSize:13}}>¡Todo al día! No hay tareas pendientes.</p>
        </Card>
      )}
      {todos.map((t,i)=>(
        <div key={i} style={{display:'flex',gap:12,padding:'14px 16px',borderRadius:12,background:'var(--bg3)',border:`1px solid ${t.type==='cycle_ending'?'rgba(245,158,11,.4)':'rgba(99,102,241,.4)'}`,marginBottom:8,alignItems:'center'}}>
          <span style={{fontSize:22,flexShrink:0}}>{t.type==='cycle_ending'?'⏰':'🗺️'}</span>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:'0 0 2px',fontSize:13,fontWeight:700,color:'var(--text)'}}>{t.student.name}</p>
            <p style={{margin:0,fontSize:12,color:'var(--textSub)',lineHeight:1.5}}>{t.msg}</p>
          </div>
          <button onClick={()=>onNav('plan')} style={{flexShrink:0,background:'var(--brandDim)',border:'1px solid var(--brandBorder)',color:'var(--brand)',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Ir →</button>
        </div>
      ))}
    </>
  );
}

function TDashboard({user,data,onRefresh,onNav,onNavMsg}){
  const students=data.students||[];

  const unreadMap=data.msgUnreadMap||{};
  const unreadStudents=students.filter(s=>(unreadMap[String(s.id)]||0)>0);
  const getUnread=s=>unreadMap[String(s.id)]||0;
  const pendingTasks=(data.tasks||[]).filter(t=>t.status==='ready_review');
  const expiring=students.filter(s=>s.cycle?.expiring);
  const activity=data.activity||{};
  const myStudentIds=new Set(students.map(s=>String(s.id)));
  const studentAct=(Array.isArray(activity.student)?activity.student:[])
    .filter(a=>myStudentIds.has(String(a.student_id))&&(a.type==='class_cancelled'||a.type==='class_rescheduled'));
  const [deletingAct,setDeletingAct]=React.useState(null);
  const deleteActEntry=async(e,id)=>{
    e.stopPropagation();
    setDeletingAct(id);
    try{await api('activity',{action:'delete',id});}catch(ex){}
    setDeletingAct(null);
    onRefresh();
  };

  // Substitute sessions: sessions rescheduled TO this teacher, happening today
  const todayStr=new Date().toISOString().slice(0,10);
  const nowColMin=(()=>{const d=new Date();const c=new Date(d.toLocaleString('en-US',{timeZone:'America/Bogota'}));return c.getHours()*60+c.getMinutes();})();
  const subSessions=(data.classSessions||[]).filter(s=>{
    if(String(s.new_teacher_id)!==String(user.id))return false;

    if((s.new_date||'')!==todayStr)return false;
    const[h,m]=(s.new_time||'00:00').split(':').map(Number);
    const classMin=h*60+m;
    const diff=nowColMin-classMin; // positive = started N min ago
    return diff>=-30&&diff<=75; // 30min before start, 75min after (50min class + 25min grace)
  });

  return(
    <>
      <SectionTitle>🏠 Dashboard</SectionTitle>

        const stu=allStudents.find(s=>String(s.id)===String(sess.student_id));

      {unreadStudents.map(s=>(
        <div key={s.id} onClick={()=>onNavMsg&&onNavMsg(s.id)} style={{background:'rgba(134,239,134,.12)',border:'1px solid rgba(134,239,134,.4)',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,cursor:'pointer',marginBottom:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>💬</span>
            <span style={{color:'#16a34a',fontSize:13,fontWeight:700}}>{s.name} -- {getUnread(s)} mensaje{getUnread(s)!==1?'s':''} nuevo{getUnread(s)!==1?'s':''}</span>
          </div>
          <span style={{color:'#16a34a',fontSize:13}}>Abrir →</span>
        </div>
      ))}
      {pendingTasks.length>0&&(
        <Card style={{borderColor:'rgba(96,165,250,.4)',marginBottom:8}}>
          <p className="label" style={{color:'#60a5fa',marginBottom:6}}>📋 Tareas para revisar</p>
          {pendingTasks.map(t=>(
            <div key={t.id} onClick={()=>onNav('tasks',{reviewTaskId:t.id})}
              style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,
                padding:'6px 8px',borderRadius:8,cursor:'pointer',background:'var(--bg3)',
                transition:'opacity .15s'}}
              onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
              <span style={{fontSize:13,color:'var(--text)'}}>{t.student_name} — {t.title}</span>
              <Badge color="#60a5fa">Revisar →</Badge>

      {expiring.length>0&&(
        <Card style={{borderColor:'rgba(245,158,11,.3)',marginBottom:8}}>
          <p className="label" style={{color:'#f59e0b',marginBottom:6}}>⏰ Ciclos por vencer</p>
          {expiring.map(s=><div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}><span style={{fontSize:13,color:'var(--text)'}}>{s.name}</span><Badge color="#f59e0b">{s.cycle.days_left}d</Badge></div>)}

  const tStopRec=()=>{if(tMediaRef.current&&tMediaRef.current.state!=='inactive')tMediaRef.current.stop();clearInterval(tTimerRef.current);};
  const [cRecording,setCRecording]=React.useState(false);
  const [cRecSecs,setCRecSecs]=React.useState(0);

  const cToggleRec=async()=>{
    if(cRecording){cStopRec();return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      cChunksRef.current=[];
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'});
      cMediaRef.current=mr;
      mr.ondataavailable=e=>{if(e.data.size>0)cChunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(cChunksRef.current,{type:mr.mimeType});
        if(blob.size>5*1024*1024){alert('El audio es muy grande (máx 5MB).');setCRecording(false);setCRecSecs(0);return;}
        const reader=new FileReader();
        reader.onload=ev=>{setForm(f=>({...f,voice:ev.target.result}));};
        reader.readAsDataURL(blob);
        setCRecording(false);setCRecSecs(0);
      };
      mr.start();setCRecording(true);setCRecSecs(0);
      cTimerRef.current=setInterval(()=>setCRecSecs(s=>{if(s>=299){cStopRec();return 0;}return s+1;}),1000);
    }catch(e){alert('No se pudo acceder al micrófono.');}

        {reviewing.instruction_voice&&<audio controls src={reviewing.instruction_voice} style={{width:'100%',height:36,marginBottom:14,display:'block'}}/>}

        {/* Student response */}
        <p className="label" style={{marginBottom:6,color:'#60a5fa'}}>✍️ Respuesta del estudiante</p>
        {(reviewing.submission_text||reviewing.submission_voice)
