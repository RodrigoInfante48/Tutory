function AResults({data,onRefresh}){
  const students=data.students||[];
  const [selStudent,setSelStudent]=React.useState('');
  const [results,setResults]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const [open,setOpen]=React.useState({});

  const load=async(sid)=>{
    if(!sid){setResults(null);setOpen({});return;}
    setLoading(true);
    const r=await api('topics','',`&student_id=${sid}&with_results=1`);
    setResults(Array.isArray(r)?r:[]);
    setOpen({});
    setLoading(false);
  };

  React.useEffect(()=>{load(selStudent);},[selStudent]);

  const toggle=id=>setOpen(o=>({...o,[id]:!o[id]}));
  const scoreColor=pct=>pct>=70?'var(--brand)':pct>=40?'#f59e0b':'#ef4444';

  const filtered=results?results.filter(t=>t.assignment):[];
  const totalTopics=filtered.length;
  const doneTopics=filtered.filter(t=>{
    const ans=t.answers||[];
    const total=t.questions?.length||0;
    return ans.length>=total&&total>0;
  }).length;

  return(
    <>
      <SectionTitle>📊 Resultados por Tema</SectionTitle>
      <Select value={selStudent} onChange={e=>setSelStudent(e.target.value)} style={{marginBottom:12}}>
        <option value="">-- Selecciona un estudiante --</option>
        {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
      </Select>
      {loading&&<Loader/>}
      {!selStudent&&!loading&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32}}>Selecciona un estudiante para ver sus resultados.</p>}
      {results&&results.length===0&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32}}>Este estudiante no tiene temas asignados aún.</p>}

      {/* Summary bar */}
      {filtered.length>0&&(
        <div style={{display:'flex',gap:8,marginBottom:12,padding:'10px 14px',background:'var(--surface)',borderRadius:12,border:'1px solid var(--stroke)',alignItems:'center',flexWrap:'wrap'}}>
          <span style={{color:'var(--textMuted)',fontSize:12,fontWeight:600}}>{totalTopics} tema{totalTopics!==1?'s':''} asignado{totalTopics!==1?'s':''}</span>
          <span style={{color:'var(--stroke)'}}>·</span>
          <span style={{color:'var(--brand)',fontSize:12,fontWeight:600}}>{doneTopics} completado{doneTopics!==1?'s':''}</span>
          <span style={{color:'var(--stroke)'}}>·</span>
          <span style={{color:'var(--textMuted)',fontSize:12}}>{totalTopics-doneTopics} pendiente{(totalTopics-doneTopics)!==1?'s':''}</span>
          <button onClick={()=>{const allOpen={};filtered.forEach(t=>allOpen[t.topicId||t.id]=true);setOpen(allOpen);}} style={{marginLeft:'auto',background:'none',border:'1px solid var(--stroke)',borderRadius:7,padding:'3px 10px',fontSize:11,color:'var(--textMuted)',cursor:'pointer'}}>Expandir todo</button>
          <button onClick={()=>setOpen({})} style={{background:'none',border:'1px solid var(--stroke)',borderRadius:7,padding:'3px 10px',fontSize:11,color:'var(--textMuted)',cursor:'pointer'}}>Colapsar todo</button>
        </div>
      )}

      {filtered.map(t=>{
        const answers=t.answers||[];
        const total=t.questions?.length||0;
        const correct=answers.filter(a=>a.is_correct==1).length;
        const attempted=answers.length;
        const pct=total>0?Math.round(correct/total*100):0;
        const col=scoreColor(pct);
        const tid=t.topicId||t.id;
        const isOpen=!!open[tid];

        // Status icon
        const quizDone=attempted>=total&&total>0;
        const statusIcon=quizDone?(pct>=70?'🟢':pct>=40?'🟡':'🔴'):'⚪';

        return(
          <div key={tid} style={{marginBottom:6,borderRadius:12,border:'1px solid var(--stroke)',overflow:'hidden',background:'var(--surface)'}}>
            {/* Header row -- always visible, click to expand */}
            <div onClick={()=>toggle(tid)} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',cursor:'pointer',userSelect:'none'}}>
              <span style={{fontSize:14}}>{statusIcon}</span>
              <span style={{flex:1,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{t.topicName||t.name}</span>
              {/* Mini badges */}
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                {t.assignment?.assignSummary&&<span style={{fontSize:11,color:t.assignment.summary_viewed?'var(--brand)':'#94a3b8',fontWeight:700}}>{t.assignment.summary_viewed?'✓':'○'} R</span>}
                {t.assignment?.assignTask&&<span style={{fontSize:11,color:t.assignment.task_submitted?'var(--brand)':'#94a3b8',fontWeight:700}}>{t.assignment.task_submitted?'✓':'○'} T</span>}
                {total>0&&<span style={{fontSize:11,fontWeight:700,color:attempted>0?col:'#94a3b8'}}>{attempted>0?`${correct}/${total}`:'○'} Q</span>}
              </div>
              {attempted>0&&total>0&&<span style={{fontFamily:'Sora',fontWeight:900,fontSize:15,color:col,minWidth:36,textAlign:'right'}}>{pct}%</span>}
              <span style={{color:'var(--textMuted)',fontSize:12,marginLeft:2}}>{isOpen?'▲':'▼'}</span>
            </div>

            {/* Expanded detail */}
            {isOpen&&(
              <div style={{padding:'0 14px 12px',borderTop:'1px solid var(--stroke)'}}>
                {/* Progress bar */}
                {attempted>0&&total>0&&(
                  <div style={{height:3,background:'var(--bg3)',borderRadius:99,margin:'10px 0',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:col,transition:'width .6s'}}/>
                  </div>
                )}
                {/* Status badges full */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10,marginTop:8}}>
                  {t.assignment?.assignSummary&&<Badge color={t.assignment.summary_viewed?'var(--brand)':'#94a3b8'}>{t.assignment.summary_viewed?'✓':'○'} Resumen</Badge>}
                  {t.assignment?.assignTask&&<Badge color={t.assignment.task_submitted?'var(--brand)':'#94a3b8'}>{t.assignment.task_submitted?'✓':'○'} Tarea</Badge>}
                  <Badge color={attempted>0?col:'#94a3b8'}>{attempted>0?`Quiz: ${correct}/${total} correctas`:'○ Quiz sin responder'}</Badge>
                </div>
                {/* Questions breakdown */}
                {total>0&&t.questions?.map((q,qi)=>{
                  const ans=answers.find(a=>a.question_id==q.id);
                  const opts=[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e];
                  const bg=ans?(parseInt(ans.is_correct)===1?'rgba(34,197,94,.07)':'rgba(239,68,68,.07)'):'var(--bg3)';
                  const bc=ans?(parseInt(ans.is_correct)===1?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)'):'var(--stroke)';
                  return(
                    <div key={q.id} style={{marginBottom:5,padding:'7px 10px',borderRadius:8,background:bg,border:`1px solid ${bc}`}}>
                      <div className="quiz-q-html" style={{margin:'0 0 3px',fontSize:12,color:'var(--text)',fontWeight:600}} dangerouslySetInnerHTML={{__html:sanitizeHtml(q.question)}}/>
                      {ans?(
                        <p style={{margin:0,fontSize:11,color:parseInt(ans.is_correct)===1?'var(--brand)':'#ef4444'}}>
                          {parseInt(ans.is_correct)===1?'✓':'✗'} Respondió: <b>{opts[parseInt(ans.answer)]||'?'}</b>
                          {!parseInt(ans.is_correct)&&<> · Correcta: <b>{opts[q.correct]||'?'}</b></>}
                        </p>
                      ):<p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>Sin respuesta aún</p>}
                    </div>
                  );
                })}
                {total===0&&<p style={{color:'var(--textMuted)',fontSize:12,margin:0}}>Este tema no tiene preguntas de quiz.</p>}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}
