                        <input type="time" value={opManualForm.time} onChange={e=>setOpManualForm(f=>({...f,time:e.target.value}))}
                          style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}/></div>
                      <div style={{flex:'1 1 140px'}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>ESTADO</p>
                        <select value={opManualForm.status} onChange={e=>setOpManualForm(f=>({...f,status:e.target.value}))}
                          style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}>
                          <option value="taken">✅ Taken</option>
                          <option value="no_show">👻 No Show</option>
                          <option value="cancelled_late">⏰ Cancelled &lt; 12h</option>
                          <option value="cancelled_no_impact">🚫 Cancelled (No impact)</option>
                          <option value="cancelled_no_tokens">🚫 Cancelled (Sin tokens)</option>
                          <option value="scheduled">📅 Scheduled</option>
                        </select></div>
                    </div>
                    <Input value={opManualForm.notes} onChange={e=>setOpManualForm(f=>({...f,notes:e.target.value}))} placeholder="Nota opcional…" style={{marginBottom:10}}/>
                    <div style={{display:'flex',gap:8}}>
                      <Btn full onClick={()=>applyManualSessionToGroup(g)} disabled={opSaving}>{opSaving?'Insertando…':'✅ Insertar para todos'}</Btn>
                      <Btn cls="btn-ghost" onClick={()=>setGroupOp(null)}>Cancelar</Btn>
                    </div>
                  </div>
                )}

                {/* Members info */}
                <p style={{fontSize:11,fontWeight:700,color:'var(--textMuted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Miembros</p>
                {gStudents.map(s=>{
                  const left=(s.tokensMax||2)-(s.tokensUsed||0);
                  return(
                    <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--surface)',borderRadius:8,marginBottom:4,border:'1px solid var(--stroke)'}}>
                      <div>
                        <span style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{s.name}</span>
                        <span style={{fontSize:11,color:'var(--textMuted)',marginLeft:8}}>PIN: {s.pin}</span>
                        {s.email&&<span style={{fontSize:11,color:'var(--textMuted)',marginLeft:8}}>{s.email}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        {Array.from({length:s.tokensMax||2}).map((_,i)=><span key={i} style={{fontSize:11}}>{i<left?'🎟️':'◻️'}</span>)}
                        <span style={{fontSize:11,color:'var(--textMuted)'}}>{left}/{s.tokensMax||2}</span>
                        <button onClick={()=>{if(left===0)return;api('students',{action:'deduct_token',id:s.id}).then(()=>onRefresh());}}
                          disabled={left===0} title="Descontar token"
                          style={{background:'none',border:'1px solid var(--stroke)',borderRadius:6,padding:'1px 6px',fontSize:11,cursor:left===0?'default':'pointer',color:left===0?'var(--textMuted)':'#ef4444',opacity:left===0?.4:1,lineHeight:1}}>−</button>
                        <button onClick={()=>{if((s.tokensUsed||0)===0)return;api('students',{action:'undo_token',id:s.id}).then(()=>onRefresh());}}
                          disabled={(s.tokensUsed||0)===0} title="Devolver token"
                          style={{background:'none',border:'1px solid var(--stroke)',borderRadius:6,padding:'1px 6px',fontSize:11,cursor:(s.tokensUsed||0)===0?'default':'pointer',color:(s.tokensUsed||0)===0?'var(--textMuted)':'#34d399',opacity:(s.tokensUsed||0)===0?.4:1,lineHeight:1}}>↩</button>
                        {s.paymentPending&&<Badge color="#ef4444">💳</Badge>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </Card>
        );
      })}
    </>
  );
}

function AStudents({data,onRefresh,dark,toggleTheme}){
  const students=data.students||[],teachers=data.teachers||[];
  const [search,setSearch]=React.useState('');
  const [adding,setAdding]=React.useState(false);
  const [editing,setEditing]=React.useState(null);
  const [quickEdit,setQuickEdit]=React.useState(null); // studentId for quick edit
  const [qForm,setQForm]=React.useState({name:'',pin:'',email:'',pkg:'Essential',username:''});
  const [qSaving,setQSaving]=React.useState(false);
  const saveQuickEdit=async()=>{
    if(!qForm.name||String(qForm.pin).length!==4){alert('Nombre y PIN (4 digitos) requeridos');return;}
    setQSaving(true);
    const s=students.find(x=>x.id===quickEdit);
    await api('students',{action:'update',...s,...qForm,
      teacherIds:qForm.teacherIds?.length?qForm.teacherIds:(s.teacherIds||(s.teacherId?[s.teacherId]:[])),
      teacherZooms:s.teacherZooms||{},
      cycleStartDay:s.cycleStartDay,cycleStartMonth:s.cycleStartMonth,cycleStartYear:s.cycleStartYear,
      id:quickEdit});
    // Save username separately if changed
    const newU=(qForm.username||'').trim().toLowerCase();
    if(newU&&newU!==(s.username||'')){
      const ur=await api('students',{action:'change_username',id:quickEdit,username:newU});
      if(ur?.error){alert('Error username: '+ur.error);setQSaving(false);return;}
    }
    setQuickEdit(null);setQSaving(false);onRefresh();
  };
  const [form,setForm]=React.useState({name:'',pin:'',email:'',pkg:'Essential',teacherIds:[],teacherZooms:{},cycleStart:'',cycleEnd:'',paymentDate:''});
  const [simulating,setSimulating]=React.useState(null);
  const [simData,setSimData]=React.useState(null);
  const [simLoading,setSimLoading]=React.useState(false);
  const [cyclesPanel,setCyclesPanel]=React.useState(null);
  const [cyclesList,setCyclesList]=React.useState([]);
  const [addPastCycle,setAddPastCycle]=React.useState(null);
  const [manualSession,setManualSession]=React.useState(null); // {studentId}
  const [manualForm,setManualForm]=React.useState({date:'',time:'',status:'taken',notes:''});
  const [manualSaving,setManualSaving]=React.useState(false);

  const saveManualSession=async()=>{
    if(!manualForm.date||!manualForm.time){alert('Ingresa fecha y hora');return;}
    setManualSaving(true);
    // Find the cycle that contains this date
    const cyclesR=await api('students',{action:'get_cycles',studentId:manualSession}).catch(()=>[]);
    const cycles=Array.isArray(cyclesR)?cyclesR:[];
    const cycle=cycles.find(c=>c.start<=manualForm.date&&c.end>=manualForm.date);
    if(!cycle){alert('No hay un ciclo que contenga esa fecha. Crea primero el ciclo.');setManualSaving(false);return;}
    // Insert session directly
    await api('class_sessions',{
      action:'add_manual',
      studentId:manualSession,
      cycleId:cycle.id,
      date:manualForm.date,
      time:manualForm.time,
      status:manualForm.status,
      notes:manualForm.notes||null,
    });
    setManualSaving(false);
    setManualSession(null);
    setManualForm({date:'',time:'',status:'taken',notes:''});
    onRefresh();
  };
  const [pastCycleForm,setPastCycleForm]=React.useState({start:'',end:''});
  const [pastCycleSlots,setPastCycleSlots]=React.useState([]);
  const [pastCycleSlotDay,setPastCycleSlotDay]=React.useState('1');
  const [pastCycleSlotTime,setPastCycleSlotTime]=React.useState('15:00');
  const [pastCycleSaving,setPastCycleSaving]=React.useState(false);
  const addPastCycleSlot=()=>{
    const d=parseInt(pastCycleSlotDay);
    if(pastCycleSlots.find(s=>s.day===d&&s.time===pastCycleSlotTime)){alert('Ya hay clase ese día a esa hora');return;}
    setPastCycleSlots(v=>[...v,{day:d,time:pastCycleSlotTime}].sort((a,b)=>a.day-b.day));
  };

  // Create past cycle manually
  const savePastCycle=async()=>{
    if(!pastCycleForm.start||!pastCycleForm.end){alert('Ingresa fechas de inicio y fin');return;}
    setPastCycleSaving(true);
    const useCustom=pastCycleSlots.length>0;
    const r=await api('students',{action:'create_cycle',studentId:addPastCycle,
      cycleStart:pastCycleForm.start,cycleEnd:pastCycleForm.end});
    if(r?.cycleId){
      if(useCustom){
        // Temporarily swap to custom schedule, generate, restore
        const orig=await api('schedule','',`&student_id=${addPastCycle}`).catch(()=>[]);
        await api('schedule',{action:'save_schedule',studentId:addPastCycle,slots:pastCycleSlots});
        await api('class_sessions',{action:'generate_cycle',studentId:addPastCycle,cycleId:r.cycleId});
        const origSlots=Array.isArray(orig)?orig.map(x=>({day:x.day_of_week,time:x.class_time})):[];
        await api('schedule',{action:'save_schedule',studentId:addPastCycle,slots:origSlots});
      } else {
        await api('class_sessions',{action:'generate_cycle',studentId:addPastCycle,cycleId:r.cycleId});
      }
    }
    setPastCycleSaving(false);setAddPastCycle(null);
    setPastCycleForm({start:'',end:''});setPastCycleSlots([]);onRefresh();
  };

  const openCycles=async(s)=>{if(cyclesPanel===s.id){setCyclesPanel(null);return;}const r=await api('students',{action:'get_cycles',studentId:s.id});setCyclesList(Array.isArray(r)?r:[]);setCyclesPanel(s.id);};
  const deleteCycle=async(cycleId,studentId)=>{if(!window.confirm('¿Eliminar este ciclo?'))return;await api('students',{action:'delete_cycle',cycleId});const r=await api('students',{action:'get_cycles',studentId});setCyclesList(Array.isArray(r)?r:[]);};

  const toggleT=id=>setForm(f=>({...f,teacherIds:f.teacherIds.includes(id)?f.teacherIds.filter(x=>x!==id):[...f.teacherIds,id]}));

  // Inline schedule slots for new/edit student form
  const [formSlots,setFormSlots]=React.useState([]);
  const [formSlotDay,setFormSlotDay]=React.useState('1');
  const [formSlotTime,setFormSlotTime]=React.useState('15:00');
  const [formSlotTeacherId,setFormSlotTeacherId]=React.useState('');
  const [formSlotDuration,setFormSlotDuration]=React.useState('50');
  const DURATIONS=[{v:'50',l:'50 min'},{v:'80',l:'1h 20min'},{v:'90',l:'1h 30min'},{v:'110',l:'1h 50min'},{v:'120',l:'2h'}];
  const fmtDur=m=>{const n=parseInt(m);return n===50?'50min':n===80?'1h20':n===90?'1h30':n===110?'1h50':n===120?'2h':`${n}min`;};
  const addFormSlot=()=>{
    const d=parseInt(formSlotDay);
    if(formSlots.find(s=>s.day===d&&s.time===formSlotTime)){alert('Ya hay clase ese día a esa hora');return;}
    setFormSlots(v=>[...v,{day:d,time:formSlotTime,teacherId:formSlotTeacherId||null,duration:parseInt(formSlotDuration)||50}].sort((a,b)=>a.day-b.day));
  };

  const save=async()=>{
    if(!form.name.trim()){alert('El nombre es requerido');return;}
    if(String(form.pin).length!==4){alert('El PIN debe tener exactamente 4 dígitos');return;}
    if(!editing&&(!form.cycleStart||!form.cycleEnd)){alert('Ingresa las fechas del ciclo actual');return;}
    // Parse dates directly from YYYY-MM-DD to avoid UTC shift
    const parseLocal=str=>{if(!str)return{year:0,month:0,day:0};const[y,m,d]=str.split('-').map(Number);return{year:y,month:m,day:d};};
    const cs=parseLocal(form.cycleStart);
    const payload={...form,teacherId:form.teacherIds[0]||'',teacherIds:form.teacherIds,teacherZooms:form.teacherZooms||{},
      cycleStart:form.cycleStart, cycleEnd:form.cycleEnd,
      cycleStartDay:cs.day,cycleStartMonth:cs.month,cycleStartYear:cs.year};
    let studentId=editing;
    if(editing){
      await api('students',{action:'update',...payload,id:editing});setEditing(null);
    } else {
      const r=await api('students',{action:'create',...payload});
      studentId=r?.id;
      setAdding(false);
    }
    // Save schedule first
    if(formSlots.length>0&&studentId){
      await api('schedule',{action:'save_schedule',studentId,slots:formSlots});
    }
    // Generate sessions for the cycle
    if(studentId&&form.cycleStart&&formSlots.length>0){
      const cyclesR=await api('students',{action:'get_cycles',studentId});
      const existing=Array.isArray(cyclesR)?cyclesR:[];
      // Find cycle by exact start date
      const matchCycle=existing.find(c=>c.start===form.cycleStart||(c.start||'').slice(0,10)===form.cycleStart);
      if(matchCycle?.id){
        await api('class_sessions',{action:'generate_cycle',studentId,cycleId:matchCycle.id,cycleEnd:form.cycleEnd});
      }
    }
    setForm({name:'',pin:'',email:'',pkg:'Essential',teacherIds:[],cycleStart:'',cycleEnd:'',paymentDate:''});
    setFormSlots([]);onRefresh();
  };

  // Create past cycle manually
  const [schedSid,setSchedSid]=React.useState(null);
  const [zoomSid,setZoomSid]=React.useState(null);
  const [zoomData,setZoomData]=React.useState({});
  const [zoomSaving,setZoomSaving]=React.useState(false);
  const [schedSlots,setSchedSlots]=React.useState([]);
  const [schedForm,setSchedForm]=React.useState({day:'1',time:'15:00',teacherId:null,duration:'50'});
  const [schedSaving,setSchedSaving]=React.useState(false);
  const [schedChangeModal,setSchedChangeModal]=React.useState(null); // {studentId, newSlots, student}
  const openSchedule=async(s)=>{
    const r=await api('schedule','',`&student_id=${s.id}`).catch(()=>[]);
    setSchedSlots(Array.isArray(r)?r.map(x=>({day:x.day_of_week,time:x.class_time,teacherId:x.teacher_id||null,duration:x.duration_minutes||50})):[]);
    setSchedSid(s.id);
  };
  const openZoom=(s)=>{
    setZoomSid(s.id);
    setZoomData(s.teacherZooms||{});
    setSchedSid(null);setEditing(null);
  };
  const saveZoom=async(s)=>{
    setZoomSaving(true);
    await api('students',{action:'update',...s,
      teacherId:s.teacherId,teacherIds:s.teacherIds||(s.teacherId?[s.teacherId]:[]),
      teacherZooms:zoomData,
      cycleStartDay:s.cycleStartDay,cycleStartMonth:s.cycleStartMonth||1,cycleStartYear:s.cycleStartYear||2025,
      paymentDate:s.paymentDate||null,email:s.email||null,
    });
    setZoomSid(null);setZoomData({});setZoomSaving(false);onRefresh();
  };
  const saveSchedule=async()=>{
    // Find the student to check if they have an active cycle
    const stu=students.find(s=>s.id===schedSid);
    if(stu?.cycle?.start){
      // Has active cycle -- ask when to apply
      setSchedChangeModal({studentId:schedSid,newSlots:schedSlots,student:stu});
    } else {
      // No active cycle -- just save
      setSchedSaving(true);
      await api('schedule',{action:'save_schedule',studentId:schedSid,slots:schedSlots});
      setSchedSid(null);setSchedSlots([]);setSchedSaving(false);onRefresh();
    }
  };

  const applyScheduleChange=async(mode, customDate)=>{
    const {studentId,newSlots,student}=schedChangeModal;
    setSchedSaving(true);
    setSchedChangeModal(null);

    // 1. Save new schedule
    await api('schedule',{action:'save_schedule',studentId,slots:newSlots});

    if(mode==='next'){
      // Next cycle only -- don't touch current cycle
      setSchedSid(null);setSchedSlots([]);setSchedSaving(false);onRefresh();
      return;
    }

    // For 'today' or 'custom' -- apply from a specific date
    const fromDate = mode==='today'
      ? new Date().toISOString().slice(0,10)
      : customDate;

    // 2. Find current cycle (and any future cycle that contains fromDate)
    const cyclesR=await api('students',{action:'get_cycles',studentId}).catch(()=>[]);
    const cycles=Array.isArray(cyclesR)?cyclesR:[];

    // Find the cycle that contains fromDate
    const affectedCycle=cycles.find(c=>c.start<=fromDate&&c.end>=fromDate);

    if(affectedCycle?.id){
      await api('class_sessions',{
        action:'cancel_future_from_schedule_change',
        studentId,
        fromDate,
      }).catch(()=>{});
      await api('class_sessions',{
        action:'generate_from_date',
        studentId,
        cycleId:affectedCycle.id,
        fromDate,
      }).catch(()=>{});
    } else {
      alert(`⚠️ El horario se guardó, pero no se encontró un ciclo activo para la fecha ${fromDate}. Las sesiones del ciclo actual no fueron actualizadas -- regenera el ciclo manualmente si es necesario.`);
    }

    setSchedSid(null);setSchedSlots([]);setSchedSaving(false);onRefresh();
  };
  const addSchedSlot=()=>{
    const d=parseInt(schedForm.day);
    if(schedSlots.find(s=>parseInt(s.day)===d&&s.time===schedForm.time)){alert('Ya hay clase ese día a esa hora');return;}
    setSchedSlots(v=>[...v,{day:d,time:schedForm.time,teacherId:schedForm.teacherId||null,duration:parseInt(schedForm.duration)||50}].sort((a,b)=>a.day-b.day));
  };
  const togglePay=async s=>{await api('students',{action:'payment_pending',id:s.id,value:s.paymentPending?0:1});onRefresh();};
  const archive=async s=>{if(confirm(`¿Archivar a ${s.name}? Quedará inactivo.`)){await api('students',{action:'archive',id:s.id});onRefresh();}};
  const deletePerm=async s=>{if(confirm(`¿ELIMINAR PERMANENTEMENTE a ${s.name}? Esto no se puede deshacer.`)){await api('students',{action:'delete_permanent',id:s.id});onRefresh();}};
  const [showArchived,setShowArchived]=React.useState(false);
  const [archivedStudents,setArchivedStudents]=React.useState([]);
  React.useEffect(()=>{if(showArchived)api('students','','&archived=1').then(r=>{if(Array.isArray(r))setArchivedStudents(r);});},[showArchived]);

  const simulate=async s=>{
    setSimLoading(true);setSimulating(s);
    try{
      const [q,res,tasks,sums,resources,plans,mvs,topicData,sessions,msgUnread,groups]=await Promise.all([
        api('quizzes','',`&student_id_filter=${s.id}`).catch(()=>[]),
        api('results','',`&student_id=${s.id}`),
        api('tasks','',`&student_id=${s.id}`),
        api('summaries','',`&student_id=${s.id}`),
        api('resources','',`&student_id=${s.id}`).catch(()=>[]),
        api('study_plans','',`&student_id=${s.id}`),
        api('movements','',`&student_id=${s.id}`),
        api('topics',{action:'get_student_data',studentId:s.id}).catch(()=>[]),
        api('class_sessions','',`&student_id=${s.id}`).catch(()=>[]),
        api('chispa',{action:'get_unread',studentId:s.id}).catch(()=>({})),
        api('groups').catch(()=>[]),
      ]);
      const myQ=Array.isArray(q)?q.filter(x=>x.assignedTo?.includes(s.id)):[];
      const topicData2=Array.isArray(topicData)?topicData:[];
      setSimData({quizzes:myQ,results:Array.isArray(res)?res:[],tasks:Array.isArray(tasks)?tasks:[],
        summaries:Array.isArray(sums)?sums:[],resources:Array.isArray(resources)?resources:[],
        plans:Array.isArray(plans)?plans:[],movements:Array.isArray(mvs)?mvs:[],
        topicData:topicData2,
        classSessions:normalizeExpiredSessions(sessions),
        groups:Array.isArray(groups)?groups:[],
        msgUnread:msgUnread?.unread||0,
        feedbackUnread:topicData2.filter(t=>parseInt(t.is_custom)===1&&t.status==='reviewed'&&!parseInt(t.feedback_seen)).length,
        topicFeedbackUnread:topicData2.filter(t=>{const task=t.linkedTask;return task&&task.status==='reviewed'&&!t.reviewSeen&&!parseInt(task.review_seen);}).length});
    }catch(e){console.error(e);}
    setSimLoading(false);
  };

  if(simulating&&simData){
    return(
      <div>
        <div style={{padding:'10px 16px',background:'var(--brandDim)',borderBottom:'1px solid var(--strokeBrand)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--brand)',fontSize:13,fontWeight:700}}>👁️ Vista de: {simulating.name}</span>
          <Btn sm onClick={()=>{setSimulating(null);setSimData(null);}}>✕ Salir</Btn>
        </div>
        <StudentView user={{...simulating,role:'student'}} data={simData} onRefresh={()=>simulate(simulating)} onLogout={()=>{setSimulating(null);setSimData(null);}} dark={dark} toggleTheme={toggleTheme}/>
      </div>
    );
  }
  if(simulating&&simLoading) return <Loader/>;

  return(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <SectionTitle action={<Btn sm onClick={()=>setAdding(true)}>+ Agregar</Btn>}>👥 Estudiantes ({students.length})</SectionTitle>
        <Btn sm cls="btn-ghost" onClick={()=>setShowArchived(!showArchived)}>{showArchived?'👥 Activos':'📦 Archivados'}</Btn>
      </div>
      {showArchived&&(
        <div style={{marginBottom:12}}>
          <p className="label" style={{color:'#64748b'}}>📦 Archivados ({archivedStudents.length})</p>
          {archivedStudents.map(s=>(
            <Card key={s.id} style={{borderColor:'var(--stroke)',opacity:.7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <p style={{margin:0,color:'var(--textMuted)',fontSize:13}}>{s.name} · PIN: {s.pin}</p>
                <div style={{display:'flex',gap:5}}>
                  <Btn sm cls="btn-ghost" onClick={()=>api('students',{action:'restore',id:s.id}).then(()=>{onRefresh();setShowArchived(false);})}>↩️ Restaurar</Btn>
                  <Btn sm cls="btn-danger" onClick={()=>deletePerm(s)}>🗑</Btn>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}
      {adding&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <p className="label">{editing?'Editar estudiante':'Nuevo estudiante'}</p>
          <Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre completo"/>
          <Input value={form.pin} onChange={e=>setForm({...form,pin:e.target.value})} placeholder="PIN (4 dígitos)" type="number"/>
          <Input value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Correo electrónico (para invites de clase)" type="email"/>
          <Select value={form.pkg} onChange={e=>setForm({...form,pkg:e.target.value})}>{Object.keys(PKG).map(p=><option key={p}>{p}</option>)}</Select>
          <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>Profes asignados:</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
            {teachers.map(t=><button key={t.id} onClick={()=>toggleT(t.id)} style={{padding:'5px 10px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',background:form.teacherIds.includes(t.id)?'var(--brandDim)':'transparent',borderColor:form.teacherIds.includes(t.id)?'var(--brand)':'var(--stroke)',color:form.teacherIds.includes(t.id)?'var(--brand)':'var(--textMuted)'}}>{t.name}</button>)}
          </div>
          
          {/* Cycle dates */}
          <p style={{color:'var(--textMuted)',fontSize:12,margin:'4px 0 2px',fontWeight:600}}>📅 Ciclo actual:</p>
          <div style={{display:'flex',gap:8,marginBottom:8}}>

                    </div>

                    {pastCycleSlots.length>0&&(

function ATeachers({data,onRefresh}){
  const teachers=data.teachers||[];
  const students=data.students||[];
  const [adding,setAdding]=React.useState(false);
  const [form,setForm]=React.useState({name:'',pin:'',zoomUrl:''});
  const [editPin,setEditPin]=React.useState(null);
  const [newPin,setNewPin]=React.useState('');
  const [pinSaving,setPinSaving]=React.useState(false);
  const [editZoom,setEditZoom]=React.useState(null); // teacher id being edited
  const [newZoom,setNewZoom]=React.useState('');
  const [zoomSaving,setZoomSaving]=React.useState(false);
  const [editUsername,setEditUsername]=React.useState(null); // teacher id
  const [newUsername,setNewUsername]=React.useState('');
  const [usernameSaving,setUsernameSaving]=React.useState(false);

  const saveUsername=async(id)=>{
    const u=newUsername.trim().toLowerCase();
    if(u.length<3){alert('Mínimo 3 caracteres');return;}
    if(!/^[a-z0-9._]+$/.test(u)){alert('Solo letras minúsculas, números, puntos y guiones bajos.');return;}
    setUsernameSaving(true);
    const r=await api('teachers',{action:'update_username',id,username:u});
    if(r?.error){alert('Error: '+r.error);setUsernameSaving(false);return;}
    setEditUsername(null);setNewUsername('');onRefresh();
    setUsernameSaving(false);
  };

  const save=async()=>{
    if(!form.name||String(form.pin).length!==4)return;
    await api('teachers',{action:'create',...form});
    setAdding(false);setForm({name:'',pin:'',zoomUrl:''});onRefresh();
  };

  const saveZoom=async(id)=>{
    setZoomSaving(true);
    await api('teachers',{action:'update_zoom',id,zoomUrl:newZoom});
    setEditZoom(null);setNewZoom('');onRefresh();
    setZoomSaving(false);
  };

  const savePin=async(id)=>{
    if(String(newPin).length!==4){alert('El PIN debe tener 4 dígitos');return;}
    setPinSaving(true);
    const r=await api('teachers',{action:'update_pin',id,pin:newPin});
    if(r?.error) alert('Error: '+r.error);
    else{setEditPin(null);setNewPin('');onRefresh();}
    setPinSaving(false);
  };

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>setAdding(true)}>+ Agregar</Btn>}>👩‍🏫 Profes ({teachers.length})</SectionTitle>
      {adding&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre del profe"/>
          <Input value={form.pin} onChange={e=>setForm({...form,pin:e.target.value})} placeholder="PIN (4 dígitos)" type="number"/>
          <Input value={form.zoomUrl} onChange={e=>setForm({...form,zoomUrl:e.target.value})} placeholder="Link de Zoom (opcional)"/>
          <div style={{display:'flex',gap:8}}><Btn full onClick={save}>Guardar</Btn><Btn full cls="btn-ghost" onClick={()=>setAdding(false)}>Cancelar</Btn></div>
        </Card>
      )}
      {teachers.map(t=>{
        const myStudents=students.filter(s=>(s.teacherIds||[s.teacherId]).includes(t.id));
        const isEditingPin=editPin===t.id;
        return(
          <Card key={t.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)'}}>{t.name}</p>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  {isEditingPin?(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input
                        type="number"
                        value={newPin}
                        onChange={e=>setNewPin(e.target.value.slice(0,4))}
                        placeholder="Nuevo PIN"
                        autoFocus
                        style={{width:90,background:'var(--inputBg)',border:'1.5px solid var(--brand)',borderRadius:'var(--radius)',padding:'5px 8px',color:'var(--text)',fontSize:13,fontFamily:'monospace',letterSpacing:2}}
                      />
                      <Btn sm onClick={()=>savePin(t.id)} disabled={pinSaving}>{pinSaving?'…':'✓'}</Btn>
                      <Btn sm cls="btn-ghost" onClick={()=>{setEditPin(null);setNewPin('');}}>✕</Btn>
                    </div>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:12,color:'var(--textMuted)'}}>PIN: <span style={{fontFamily:'monospace',letterSpacing:2,color:'var(--brand)',fontWeight:700}}>{t.pin}</span></span>
                      <button onClick={()=>{setEditPin(t.id);setNewPin(t.pin);}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:12,padding:'0 2px'}}>✏️</button>
                    </div>
                  )}
                </div>
                {/* Username */}
                <div style={{marginBottom:6}}>
                  {editUsername===t.id?(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input value={newUsername} onChange={e=>setNewUsername(e.target.value.toLowerCase().replace(/[^a-z0-9._]/g,''))}
                        placeholder="usuario" autoFocus autoComplete="off"
                        style={{width:130,background:'var(--inputBg)',border:'1.5px solid var(--brand)',borderRadius:'var(--radius)',padding:'5px 8px',color:'var(--text)',fontSize:12,fontFamily:'monospace'}}/>
                      <Btn sm onClick={()=>saveUsername(t.id)} disabled={usernameSaving}>{usernameSaving?'…':'✓'}</Btn>
                      <Btn sm cls="btn-ghost" onClick={()=>{setEditUsername(null);setNewUsername('');}}>✕</Btn>
                    </div>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:12,color:'var(--textMuted)'}}>Usuario: <span style={{fontFamily:'monospace',color:'var(--brand)',fontWeight:700}}>{t.username||<em style={{opacity:.5}}>—</em>}</span></span>
                      <button onClick={()=>{setEditUsername(t.id);setNewUsername(t.username||'');}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:11,padding:'0 2px'}}>✏️</button>
                    </div>
                  )}
                </div>
                {/* Zoom URL */}
                <div style={{marginBottom:6}}>
                  {editZoom===t.id?(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input value={newZoom} onChange={e=>setNewZoom(e.target.value)}
                        placeholder="Link de Zoom" autoFocus
                        style={{flex:1,background:'var(--inputBg)',border:'1.5px solid var(--brand)',borderRadius:'var(--radius)',padding:'5px 8px',color:'var(--text)',fontSize:12,fontFamily:'inherit'}}/>
                      <Btn sm onClick={()=>saveZoom(t.id)} disabled={zoomSaving}>{zoomSaving?'…':'✓'}</Btn>
                      <Btn sm cls="btn-ghost" onClick={()=>{setEditZoom(null);setNewZoom('');}}>✕</Btn>
                    </div>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      {t.zoom_url
                        ?<span style={{fontSize:11,color:'var(--textMuted)'}}>🎥 <a href={t.zoom_url} target="_blank" rel="noopener" style={{color:'var(--brand)',textDecoration:'none',fontWeight:600}}>Zoom</a></span>
                        :<span style={{fontSize:11,color:'var(--textMuted)',opacity:.6}}>Sin link Zoom</span>
                      }
                      <button onClick={()=>{setEditZoom(t.id);setNewZoom(t.zoom_url||'');}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:11,padding:'0 2px'}}>✏️</button>
                    </div>
                  )}
                </div>
                {myStudents.length>0?(
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {myStudents.map(s=><span key={s.id} style={{fontSize:11,background:'var(--bg3)',border:'1px solid var(--stroke)',borderRadius:999,padding:'2px 8px',color:'var(--textSub)'}}>{s.name}</span>)}
                  </div>
                ):<p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>Sin estudiantes asignados</p>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                {(()=>{const on=parseInt(t.can_edit_topics)===1;return(
                <button onClick={async()=>{await api('teachers',{action:'update_can_edit_topics',id:t.id,value:on?0:1});onRefresh();}}
                  title={on?'Revocar acceso a Temas':'Dar acceso a Temas'}
                  style={{background:on?'var(--brand)':'var(--bg3)',border:`1.5px solid ${on?'var(--brand)':'var(--stroke)'}`,borderRadius:999,padding:'4px 12px',fontSize:11,fontWeight:700,color:on?'#fff':'var(--textMuted)',cursor:'pointer',whiteSpace:'nowrap',letterSpacing:'.02em'}}>
                  {on?'✅ Editor Temas':'🔒 Editor Temas'}
                </button>);})()}
                <Btn sm cls="btn-danger" onClick={()=>api('teachers',{action:'delete',id:t.id}).then(onRefresh)}>🗑</Btn>
              </div>
            </div>
          </Card>
        );
      })}
    </>
  );
}

function RichEditor({value,onChange,placeholder,minHeight=80}){
  const ref=React.useRef(null);
  const [focused,setFocused]=React.useState(false);
  const lastVal=React.useRef(value);
  // Initialize on mount
  React.useEffect(()=>{
    if(ref.current){ref.current.innerHTML=value||'';lastVal.current=value;}
  },[]);
  // Update when value changes externally (e.g. pre-filling editor for question edit)
  React.useEffect(()=>{
    if(ref.current&&!focused&&value!==lastVal.current){
      ref.current.innerHTML=value||'';
      lastVal.current=value;
    }
  },[value]);
  const exec=cmd=>{document.execCommand(cmd,false,null);ref.current.focus();};
  const execVal=(cmd,val)=>{document.execCommand(cmd,false,val);ref.current.focus();};
  const handleInput=()=>{const v=ref.current.innerHTML;lastVal.current=v;if(onChange)onChange(v);};
  return(
    <div style={{border:`1.5px solid ${focused?'var(--brand)':'var(--stroke)'}`,borderRadius:12,overflow:'hidden',background:'var(--bg3)',transition:'border-color .2s'}}>
      <div style={{display:'flex',gap:2,padding:'6px 8px',borderBottom:'1px solid var(--stroke)',background:'var(--surface)',flexWrap:'wrap'}}>
        {[['bold','𝐁'],['italic','𝑰'],['underline','U̲']].map(([cmd,lbl])=>(
          <button key={cmd} onMouseDown={e=>{e.preventDefault();exec(cmd);}} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:'var(--text)',cursor:'pointer',fontSize:13,fontWeight:cmd==='bold'?700:400}}>{lbl}</button>
        ))}
        <button onMouseDown={e=>{e.preventDefault();exec('insertUnorderedList');}} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:'var(--text)',cursor:'pointer',fontSize:13}}>• Lista</button>
        <button onMouseDown={e=>{e.preventDefault();exec('insertOrderedList');}} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:'var(--text)',cursor:'pointer',fontSize:13}}>1. Lista</button>
        <button onMouseDown={e=>{e.preventDefault();exec('formatBlock','blockquote');}} style={{padding:'3px 8px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:'var(--text)',cursor:'pointer',fontSize:13}}>" Cita</button>
      </div>
      <div
        ref={ref}
        contentEditable
        suppressContentEditableWarning
        onInput={handleInput}
        onFocus={()=>setFocused(true)}
        onBlur={()=>setFocused(false)}
        style={{minHeight,padding:'10px 12px',color:'var(--text)',fontSize:13,lineHeight:1.7,outline:'none'}}
        data-placeholder={placeholder||'Escribe aquí…'}
      />
      <style>{`
        [contenteditable]:empty:before{content:attr(data-placeholder);color:var(--textMuted);pointer-events:none;}
        [contenteditable] ul{padding-left:20px;margin:4px 0;}
        [contenteditable] ol{padding-left:20px;margin:4px 0;}
        [contenteditable] blockquote{border-left:3px solid var(--brand);margin:4px 0;padding-left:10px;color:var(--textSub);}
        [contenteditable] b,[contenteditable] strong{color:var(--text);}
      `}</style>
    </div>
  );
}

// --- QUESTION EDITOR (reusable: 2-5 opts + feedback) --------
function QuestionEditor({nq,setNQ,onAdd,label='+ Agregar pregunta',scrollTrigger}){
  const editorRef=React.useRef(null);
  const scrollToSelf=()=>{
    if(editorRef.current){
      setTimeout(()=>editorRef.current.scrollIntoView({behavior:'smooth',block:'center'}),50);
    }
  };
  React.useEffect(()=>{scrollToSelf();},[]);
  React.useEffect(()=>{if(scrollTrigger)scrollToSelf();},[scrollTrigger]);
  const numOpts=nq.opts.length;
  const addOpt=()=>{if(numOpts<5)setNQ({...nq,opts:[...nq.opts,'']});};
  const removeOpt=()=>{
    if(numOpts<=2)return;
    const newOpts=nq.opts.slice(0,-1);
    const newCorrect=Math.min(nq.correct,newOpts.length-1);
    setNQ({...nq,opts:newOpts,correct:newCorrect});
  };
  const validQ=nq.q.trim()&&nq.opts.slice(0,numOpts).every(o=>(o||'').trim());
  return(
    <div ref={editorRef} style={{background:'var(--bg3)',borderRadius:10,padding:12,marginTop:8,border:'1.5px solid var(--strokeBrand)',boxShadow:'0 0 0 3px var(--brandDim)'}}>
      <p className="label" style={{marginBottom:8}}>{label==='💾 Guardar cambios'?'✏️ Editando pregunta':'+ Nueva pregunta'}</p>
      <RichEditor value={nq.q} onChange={v=>setNQ({...nq,q:v})} placeholder="Pregunta (puedes usar formato: negrita, listas, etc.)" minHeight={60}/>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
        <span style={{color:'var(--textMuted)',fontSize:12}}>Opciones:</span>
        <button onClick={removeOpt} disabled={numOpts<=2} style={{padding:'2px 10px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:numOpts<=2?'var(--stroke)':'var(--textMuted)',cursor:numOpts<=2?'default':'pointer',fontSize:14}}>−</button>
        <span style={{fontSize:13,fontWeight:700,color:'var(--text)',minWidth:16,textAlign:'center'}}>{numOpts}</span>
        <button onClick={addOpt} disabled={numOpts>=5} style={{padding:'2px 10px',borderRadius:6,border:'1px solid var(--stroke)',background:'var(--bg3)',color:numOpts>=5?'var(--stroke)':'var(--textMuted)',cursor:numOpts>=5?'default':'pointer',fontSize:14}}>+</button>
      </div>
      {nq.opts.map((o,i)=>(
        <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'center'}}>
          <input type="radio" checked={nq.correct===i} onChange={()=>setNQ({...nq,correct:i})} style={{accentColor:'var(--brand)',flexShrink:0}}/>
          <Input value={o??''} onChange={e=>{const ops=[...nq.opts];ops[i]=e.target.value;setNQ({...nq,opts:ops});}} placeholder={`Opción ${['A','B','C','D','E'][i]}`} style={{margin:0,flex:1}}/>
        </div>
      ))}
      <Input
        value={nq.feedback||''}
        onChange={e=>setNQ({...nq,feedback:e.target.value})}
        placeholder='💡 Feedback si responde mal (ej: "Remember that Paris is the capital of France.")'
        style={{marginTop:4,marginBottom:8}}
        rows={2}
      />
      <Btn full sm onClick={onAdd} disabled={!validQ}>{label}</Btn>
    </div>
  );
}

function ATopics({data,onRefresh}){
  const topics=data.topics||[],students=data.students||[];
  const [open,setOpen]=React.useState(null);
  const [creating,setCreating]=React.useState(false);
  const [editing,setEditing]=React.useState(null);
  const [assigning,setAssigning]=React.useState(null);
  const [nq,setNQ]=React.useState({q:'',opts:['','',''],correct:0,feedback:''});
  const [editingQId,setEditingQId]=React.useState(null);
  const [assignForm,setAssignForm]=React.useState({studentId:'',_targets:[]});
  const [assignOpts,setAssignOpts]=React.useState({quiz:true,summary:true,task:true});
  const [assignSearch,setAssignSearch]=React.useState('');
  const blankForm={name:'',canvaUrl:'',taskTitle:'',taskInstruction:'',level:''};
  const [form,setForm]=React.useState(blankForm);
  const [search,setSearch]=React.useState('');
  const [filterLevel,setFilterLevel]=React.useState('');

  const save=async()=>{
    if(!form.name.trim())return;
    if(editing){await api('topics',{action:'update',id:editing,...form});}
    else{await api('topics',{action:'create',...form});}
    setCreating(false);setEditing(null);setForm(blankForm);onRefresh();
  };
  const delTopic=async(id)=>{if(!confirm('¿Eliminar este tema?'))return;await api('topics',{action:'delete',id});onRefresh();};
  const delQ=async(id)=>{await api('topics',{action:'delete_question',id});onRefresh();};
  const addQ=async(topicId,qCount)=>{
    if(!nq.q.trim())return;
    const validOpts=nq.opts.filter(o=>o.trim());
    if(validOpts.length<2){alert('Mínimo 2 opciones');return;}
    if(editingQId){
      await api('topics',{action:'update_question',id:editingQId,...nq,opts:validOpts});
      setEditingQId(null);
    } else {
      if((qCount||0)>=10){alert('Este tema ya tiene 10 preguntas');return;}
      await api('topics',{action:'add_question',topicId,...nq,opts:validOpts,sortOrder:0});
    }
    setNQ({q:'',opts:['','',''],correct:0,feedback:''});onRefresh();
  };
  const assign=async()=>{
    const targets=assignForm._targets||[];
    if(!targets.length)return;
    for(const sid of targets){
      await api('topics',{action:'assign',topicId:assigning,studentId:sid,
        assignQuiz:assignOpts.quiz?1:0,assignSummary:assignOpts.summary?1:0,assignTask:assignOpts.task?1:0,assignedBy:'admin'});
    }
    setAssigning(null);setAssignForm({studentId:'',_targets:[]});setAssignOpts({quiz:true,summary:true,task:true});onRefresh();
  };
  const unassignDirect=async(topicId,studentId)=>{
    if(!confirm('⚠️ ¿Desasignar este tema? Se borrarán todas las respuestas del quiz y la tarea del estudiante. Esta acción no se puede deshacer.'))return;
    await api('topics',{action:'unassign',topicId,studentId});onRefresh();
  };

  // A topic is ready when it has summary URL, task, and at least 1 question
  const isReady=t=>!!(t.canva_url&&t.task_title&&(t.questions?.length||0)>0);

  // Filter
  const q=search.toLowerCase();
  const filtered=topics.filter(t=>
    (!filterLevel||t.level===filterLevel||(!t.level&&filterLevel==='Otros'))&&
    (!q||t.name.toLowerCase().includes(q)||(t.level||'').toLowerCase().includes(q))
  );

  // Group by level
  const grouped={};
  const levelOrder=[...LEVELS];
  filtered.forEach(t=>{
    const lv=t.level||'Otros';
    if(!grouped[lv])grouped[lv]=[];
    grouped[lv].push(t);
  });

  const LevelPill=({level})=>level?(
    <span style={{fontSize:11,fontWeight:700,background:`${LEVEL_COLORS[level]||'#94a3b8'}22`,border:`1.5px solid ${LEVEL_COLORS[level]||'#94a3b8'}55`,color:LEVEL_COLORS[level]||'#94a3b8',borderRadius:999,padding:'2px 9px'}}>{level}</span>
  ):null;

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>{setCreating(true);setEditing(null);setForm(blankForm);}}>+ Nuevo</Btn>}>🎯 Temas ({topics.length})</SectionTitle>

      {/* Search + filter bar */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={`🔍 Buscar entre ${topics.length} temas…`}
          style={{flex:1,minWidth:160,background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none',transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor='var(--brandBorder)'}
          onBlur={e=>e.target.style.borderColor='var(--stroke)'}/>
        <select value={filterLevel} onChange={e=>setFilterLevel(e.target.value)}
          style={{background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontSize:13,cursor:'pointer',outline:'none'}}>
          <option value="">Todos los niveles</option>
          {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
      </div>

      {/* Create form (new topics only — editing is inline inside the card) */}
      {creating&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:12}}>
          <p className="label">Crear nuevo tema</p>
          <Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre del tema *"/>
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Nivel CEFR</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {LEVELS.map(l=>(
              <button key={l} onClick={()=>setForm({...form,level:form.level===l?'':l})}
                style={{padding:'5px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:700,
                  background:form.level===l?`${LEVEL_COLORS[l]}22`:'transparent',
                  borderColor:form.level===l?LEVEL_COLORS[l]:'var(--stroke)',
                  color:form.level===l?LEVEL_COLORS[l]:'var(--textMuted)'}}>
                {l}
              </button>
            ))}
          </div>
          <Input value={form.canvaUrl} onChange={e=>setForm({...form,canvaUrl:e.target.value})} placeholder="URL de Canva (resumen)"/>
          <p className="label" style={{marginTop:8}}>📋 Instrucción de tarea</p>
          <Input value={form.taskTitle} onChange={e=>setForm({...form,taskTitle:e.target.value})} placeholder="Título de la tarea"/>
          <RichEditor value={form.taskInstruction} onChange={v=>setForm({...form,taskInstruction:v})} placeholder="Instrucción (acepta texto enriquecido)"/>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <Btn full onClick={save}>Guardar</Btn>
            <Btn full cls="btn-ghost" onClick={()=>{setCreating(false);setForm(blankForm);}}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Assign panel */}
      {assigning&&(
        <div style={{position:'sticky',top:0,zIndex:100,marginBottom:12,background:'var(--bg0)',borderRadius:'var(--radiusL)',padding:2}}>
        <Card style={{borderColor:'var(--brandBorder)',boxShadow:'0 8px 32px rgba(0,0,0,.6)',background:'var(--bg2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <p className="label" style={{margin:0}}>Asignar tema</p>
            <p style={{margin:0,fontSize:12,color:'var(--brand)',fontWeight:700,fontFamily:'Sora'}}>
              {topics.find(t=>t.id===assigning)?.name}
            </p>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
            {[{k:'summary',label:'📄 Resumen'},{k:'quiz',label:'🎯 Quiz'},{k:'task',label:'📋 Tarea'}].map(({k,label})=>(
              <button key={k} onClick={()=>setAssignOpts(o=>({...o,[k]:!o[k]}))}
                style={{padding:'4px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:600,
                  background:assignOpts[k]?'var(--brandDim)':'transparent',
                  borderColor:assignOpts[k]?'var(--brand)':'var(--stroke)',
                  color:assignOpts[k]?'var(--brand)':'var(--textMuted)'}}>
                {assignOpts[k]?'✓ ':''}{label}
              </button>
            ))}
          </div>
          {/* Group quick-select */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
            {(data.groups||[]).filter(g=>(g.memberIds||[]).length>0).map(g=>{
              const allIn=(g.memberIds||[]).every(id=>(assignForm._targets||[]).map(String).includes(String(id)));
              return(
                <button key={'g'+g.id}
                  onClick={()=>setAssignForm(f=>{
                    const ids=g.memberIds.map(String);
                    const cur=(f._targets||[]).map(String);
                    const a=ids.every(id=>cur.includes(id));
                    return{...f,_targets:a?f._targets.filter(id=>!ids.includes(String(id))):[...new Set([...(f._targets||[]),...g.memberIds])]};
                  })}
                  style={{padding:'4px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:700,
                    background:allIn?'rgba(167,139,250,.15)':'transparent',
                    borderColor:allIn?'#a78bfa':'var(--stroke)',
                    color:allIn?'#a78bfa':'var(--textMuted)'}}>
                  👫 {g.name}
                </button>
              );
            })}
            <button onClick={()=>setAssignForm(f=>({...f,_targets:students.map(s=>s.id)}))}
              style={{padding:'4px 12px',borderRadius:999,border:'1.5px solid var(--stroke)',background:'transparent',color:'var(--textMuted)',fontSize:12,cursor:'pointer',fontWeight:700}}>
              Todos
            </button>
          </div>
          <input value={assignSearch} onChange={e=>setAssignSearch(e.target.value)} placeholder="🔍 Buscar estudiante..."
            style={{width:'100%',boxSizing:'border-box',padding:'7px 10px',borderRadius:8,border:'1px solid var(--stroke)',background:'var(--bg2)',color:'var(--text)',fontSize:13,marginBottom:8,outline:'none'}}/>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10,maxHeight:160,overflowY:'auto'}}>
            {students.filter(s=>!assignSearch||s.name.toLowerCase().includes(assignSearch.toLowerCase())).map(s=>(
              <button key={s.id} onClick={()=>setAssignForm(f=>({...f,studentId:f.studentId===s.id?'':s.id,_targets:f._targets?.includes(s.id)?f._targets.filter(x=>x!==s.id):[...(f._targets||[]),s.id]}))}
                style={{padding:'5px 11px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',
                  background:(assignForm._targets||[]).includes(s.id)?'var(--brandDim)':'transparent',
                  borderColor:(assignForm._targets||[]).includes(s.id)?'var(--brand)':'var(--stroke)',
                  color:(assignForm._targets||[]).includes(s.id)?'var(--brand)':'var(--textMuted)'}}>
                {s.name}
              </button>
            ))}
          </div>
          {(assignForm._targets||[]).length>0&&<p style={{fontSize:12,color:'var(--brand)',marginBottom:8}}>{(assignForm._targets||[]).length} estudiante{(assignForm._targets||[]).length!==1?'s':''} seleccionado{(assignForm._targets||[]).length!==1?'s':''}</p>}
          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={assign} disabled={!(assignForm._targets||[]).length}>Asignar</Btn>
            <Btn full cls="btn-ghost" onClick={()=>{setAssigning(null);setAssignForm({studentId:'',_targets:[]});setAssignOpts({quiz:true,summary:true,task:true});setAssignSearch('');}}>Cancelar</Btn>
          </div>
        </Card>
        </div>
      )}

      {filtered.length===0&&<Card style={{textAlign:'center',padding:32}}><p style={{color:'var(--textMuted)'}}>{search||filterLevel?'Sin resultados para ese filtro.':'Aún no hay temas. Crea el primero.'}</p></Card>}

      {/* Topics grouped by level */}
      {levelOrder.filter(lv=>grouped[lv]?.length>0).map(lv=>(
        <div key={lv} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontFamily:'Sora',fontWeight:900,fontSize:13,color:LEVEL_COLORS[lv]||'#94a3b8'}}>{lv}</span>
            <span style={{fontSize:11,color:'var(--textMuted)'}}>{grouped[lv].length} tema{grouped[lv].length!==1?'s':''}</span>
            <div style={{flex:1,height:1,background:`${LEVEL_COLORS[lv]||'#94a3b8'}33`}}/>
          </div>
          {grouped[lv].map(t=>{
            const isOpen=open===t.id;
            const qCount=t.questions?.length||0;
            const assigned=t.assignedStudents||[];
            const ready=isReady(t);
            const missing=[];
            if(!t.canva_url)missing.push('resumen');
            if(!t.task_title)missing.push('tarea');
            if(qCount===0)missing.push('preguntas');
            return(
              <Card key={t.id} style={{marginBottom:6,borderColor:editing===t.id?'var(--strokeBrand)':!ready?'#f59e0b44':undefined}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer'}} onClick={()=>{if(editing===t.id)return;setOpen(isOpen?null:t.id);}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                      <LevelPill level={t.level||'Otros'}/>
                      <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{t.name}</p>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      {!ready&&<Badge color="#f59e0b">⚠️ Borrador · falta {missing.join(', ')}</Badge>}
                      {t.canva_url&&<Badge color="#60a5fa">📄 Resumen</Badge>}
                      {t.task_title&&<Badge color="#a78bfa">📋 Tarea</Badge>}
                      <Badge color={qCount===10?'var(--brand)':qCount>0?'#f59e0b':'#ef4444'}>❓ {qCount}/10</Badge>
                      {assigned.length>0&&<Badge color="#94a3b8">👤 {assigned.length}</Badge>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    <Btn sm cls="btn-ghost" onClick={e=>{e.stopPropagation();setAssigning(t.id);setAssignOpts({quiz:true,summary:true,task:true});setAssignSearch('');}}>+ Asignar</Btn>
                    <Btn sm cls={editing===t.id?'btn-primary':'btn-ghost'} onClick={e=>{e.stopPropagation();if(editing===t.id){setEditing(null);setForm(blankForm);return;}setEditing(t.id);setCreating(false);setForm({name:t.name,canvaUrl:t.canva_url||'',taskTitle:t.task_title||'',taskInstruction:t.task_instruction||'',level:t.level||''});}}>✏️</Btn>
                    <Btn sm cls="btn-danger" onClick={e=>{e.stopPropagation();delTopic(t.id);}}>🗑</Btn>
                    <span style={{color:'var(--textMuted)',padding:'4px 4px'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {editing===t.id&&(
                  <div style={{borderTop:'1px solid var(--stroke)',marginTop:10,paddingTop:10}}>
                    <Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre del tema *"/>
                    <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Nivel CEFR</p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                      {LEVELS.map(l=>(
                        <button key={l} onClick={()=>setForm({...form,level:form.level===l?'':l})}
                          style={{padding:'5px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:700,
                            background:form.level===l?`${LEVEL_COLORS[l]}22`:'transparent',
                            borderColor:form.level===l?LEVEL_COLORS[l]:'var(--stroke)',
                            color:form.level===l?LEVEL_COLORS[l]:'var(--textMuted)'}}>
                          {l}
                        </button>
                      ))}
                    </div>
                    <Input value={form.canvaUrl} onChange={e=>setForm({...form,canvaUrl:e.target.value})} placeholder="URL de Canva (resumen)"/>
                    <p className="label" style={{marginTop:8}}>📋 Instrucción de tarea</p>
                    <Input value={form.taskTitle} onChange={e=>setForm({...form,taskTitle:e.target.value})} placeholder="Título de la tarea"/>
                    <RichEditor value={form.taskInstruction} onChange={v=>setForm({...form,taskInstruction:v})} placeholder="Instrucción (acepta texto enriquecido)"/>
                    <div style={{display:'flex',gap:8,marginTop:8}}>
                      <Btn full onClick={save}>Guardar</Btn>
                      <Btn full cls="btn-ghost" onClick={()=>{setEditing(null);setForm(blankForm);}}>Cancelar</Btn>
                    </div>
                  </div>
                )}
                {isOpen&&editing!==t.id&&(
                  <div style={{borderTop:'1px solid var(--stroke)',marginTop:10,paddingTop:10}}>
                    {/* Assigned students */}
                    {assigned.length>0&&(
                      <div style={{marginBottom:12}}>
                        <p className="label" style={{marginBottom:6}}>👤 Asignado a</p>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {assigned.map(s=>(
                            <div key={s.student_id} style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg3)',border:'1px solid var(--stroke)',borderRadius:999,padding:'3px 8px 3px 10px'}}>
                              <span style={{fontSize:12,color:'var(--text)'}}>{s.student_name}</span>
                              <button onClick={()=>unassignDirect(t.id,s.student_id)} title="Desasignar"
                                style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:13,lineHeight:1,padding:'0 2px'}}>×</button>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* Questions */}
                    <p className="label">❓ Preguntas ({qCount}/10)</p>
                    {t.questions?.map((q,i)=>(
                      <div key={q.id} style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
                          <div style={{flex:1}}>
                            <p style={{margin:'0 0 4px',color:'var(--text)',fontWeight:600}} dangerouslySetInnerHTML={{__html:`${i+1}. ${sanitizeHtml(q.question)}`}}/>
                            {[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e].filter(o=>o&&o.trim()).map((o,j)=>(
                              <p key={j} style={{margin:'2px 0',color:j===parseInt(q.correct)?'var(--brand)':'var(--textSub)',fontSize:11}}>{j===q.correct?'✓':''} {['A','B','C','D','E'][j]}. {o}</p>
                            ))}
                            {q.feedback&&<p style={{margin:'6px 0 0',fontSize:11,color:'#f59e0b',fontStyle:'italic',borderTop:'1px solid var(--stroke)',paddingTop:5,whiteSpace:'pre-wrap'}}>💬 {q.feedback}</p>}
                          </div>
                          <div style={{display:'flex',gap:4,flexShrink:0}}>
                            <Btn sm cls="btn-ghost" onClick={()=>{setEditingQId(q.id);const opts=[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e].map(o=>o??'').filter((_,i,a)=>i<2||a.slice(0,i).some(x=>x!=='')||a[i]!=='');const cleanOpts=opts.length>=2?opts:['',''];setNQ({q:sanitizeHtml(q.question),opts:cleanOpts,correct:parseInt(q.correct)||0,feedback:q.feedback||''});setOpen(t.id);}}>✏️</Btn>
                            <Btn sm cls="btn-danger" onClick={()=>{if(editingQId===q.id)setEditingQId(null);delQ(q.id);}}>🗑</Btn>
                          </div>
                        </div>
                      </div>
                    ))}
                    <QuestionEditor nq={nq} setNQ={setNQ} onAdd={()=>addQ(t.id,qCount)} label={editingQId?'💾 Guardar cambios':'+ Agregar pregunta'} scrollTrigger={editingQId}/>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      ))}
    </>
  );
}

  const save=async()=>{if(!form.title||!form.questions.length||!form.assignedTo.length)return;await api('quizzes',{action:'create',...form,teacherId:'admin'});setCreating(false);setForm({title:'',date:today(),assignedTo:[],questions:[]});onRefresh();};

          <p style={{color:'var(--textMuted)',fontSize:12,marginBottom:8}}>Asignar a:</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {students.map(s=><button key={s.id} onClick={()=>toggleS(s.id)} style={{padding:'5px 10px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',background:form.assignedTo.includes(s.id)?'var(--brandDim)':'transparent',borderColor:form.assignedTo.includes(s.id)?'var(--brand)':'var(--stroke)',color:form.assignedTo.includes(s.id)?'var(--brand)':'var(--textMuted)'}}>{s.name}</button>)}
            <button onClick={()=>setForm(f=>({...f,assignedTo:students.map(s=>s.id)}))} style={{padding:'5px 10px',borderRadius:999,border:'1.5px solid var(--stroke)',background:'transparent',color:'var(--textMuted)',fontSize:12,cursor:'pointer'}}>Todos</button>
          </div>
          {form.questions.map((q,i)=><div key={i} style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:12,color:'var(--textSub)'}}>{i+1}. {q.q} <span style={{color:'var(--brand)'}}>✓ {q.opts[q.correct]}</span></div>)}
          <div style={{background:'var(--bg3)',borderRadius:12,padding:12,marginBottom:10}}>

              <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'center'}}>
                <input type="radio" checked={nq.correct===i} onChange={()=>setNQ({...nq,correct:i})} style={{accentColor:'var(--brand)'}}/>
                <Input value={o} onChange={e=>{const ops=[...nq.opts];ops[i]=e.target.value;setNQ({...nq,opts:ops});}} placeholder={`Opción ${['A','B','C','D'][i]}`} style={{margin:0,flex:1}}/>

function APlans({data,onRefresh,user}){
  const students=data.students||[];
  const plans=data.plans||[];
  const [creating,setCreating]=React.useState(false);
  const [editingPlan,setEditingPlan]=React.useState(null);
  const [open,setOpen]=React.useState(null);
  const [newComp,setNewComp]=React.useState('');
  const emptyComps=['','',''];
  const [form,setForm]=React.useState({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});
  const [cycles,setCycles]=React.useState([]);
  const [loadingCycles,setLoadingCycles]=React.useState(false);
  const dragItem=React.useRef(null);
  const dragOverItem=React.useRef(null);

  const handleDragStart=(i)=>{dragItem.current=i;};
  const handleDragEnter=(i)=>{dragOverItem.current=i;};
  const handleDrop=async()=>{
    const from=dragItem.current;
    const to=dragOverItem.current;
    if(from===null||to===null||from===to){dragItem.current=null;dragOverItem.current=null;return;}
    const nc=[...form.competencies];
    const dragged=nc.splice(from,1)[0];
    nc.splice(to,0,dragged);
    setForm(f=>({...f,competencies:nc}));
    dragItem.current=null;dragOverItem.current=null;
    const allHaveIds=nc.every(c=>typeof c==='object'&&c.id);
    if(allHaveIds){
      await api('study_plans',{action:'reorder_competencies',order:nc.map((c,i)=>({id:c.id,sortOrder:i}))});
    }
  };
  const handleDropInView=async(comps)=>{
    const from=dragItem.current;
    const to=dragOverItem.current;
    if(from===null||to===null||from===to){dragItem.current=null;dragOverItem.current=null;return;}
    const nc=[...comps];
    const dragged=nc.splice(from,1)[0];
    nc.splice(to,0,dragged);
    dragItem.current=null;dragOverItem.current=null;
    await api('study_plans',{action:'reorder_competencies',order:nc.map((c,i)=>({id:c.id,sortOrder:i}))});
    onRefresh();
  };

  const loadCycles=async(studentId)=>{
    if(!studentId)return;
    setLoadingCycles(true);
    const r=await api('students',{action:'get_cycles',studentId});
    setCycles(Array.isArray(r)?r:[]);
    setLoadingCycles(false);
  };

  const save=async()=>{
    if(editingPlan){
      const lbl=form.cycleName&&form.cycleId?fmtCycleLabel(form.cycleName,cycles.find(c=>String(c.id)===String(form.cycleId))?.start,cycles.find(c=>String(c.id)===String(form.cycleId))?.end):(form.cycleName||'');
      await api('study_plans',{action:'update_objective',id:editingPlan,objective:form.objective,cycleLabel:lbl});
      if(form.cycleId&&form.cycleName) await api('students',{action:'update_cycle_name',cycleId:form.cycleId,name:form.cycleName});
      // Update existing competencies by id, add brand-new ones (no id)
      const ops=form.competencies.map(c=>{
        const isObj=typeof c==='object';
        const desc=isObj?c.description:c;
        const cid=isObj?c.id:null;
        if(!desc||!desc.trim())return null;
        if(cid) return api('study_plans',{action:'update_competency',id:cid,description:desc});
        return api('study_plans',{action:'add_competency',planId:editingPlan,description:desc,sortOrder:99});
      }).filter(Boolean);
      await Promise.all(ops);
      setEditingPlan(null);setCreating(false);
      setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});
      onRefresh();return;
    }
    if(!form.studentId){alert('Selecciona un estudiante');return;}
    if(!form.cycleId){alert('Selecciona un ciclo');return;}
    if(!form.objective){alert('Escribe el objetivo general del ciclo');return;}
    const cycle=cycles.find(c=>String(c.id)===String(form.cycleId));
    const label=fmtCycleLabel(form.cycleName,cycle?.start,cycle?.end);
    if(form.cycleName&&cycle) await api('students',{action:'update_cycle_name',cycleId:cycle.id,name:form.cycleName});
    const res=await api('study_plans',{action:'create',studentId:form.studentId,teacherId:null,cycleLabel:label,objective:form.objective,cycleId:form.cycleId});
    const planId=res.id;
    const comps=form.competencies.map(c=>typeof c==='object'?c.description:c).filter(c=>c&&c.trim());
    await Promise.all(comps.map((c,i)=>api('study_plans',{action:'add_competency',planId,description:c,sortOrder:i})));
    setCreating(false);setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});onRefresh();
  };

  const toggle=async(id,achieved)=>{await api('study_plans',{action:'toggle_competency',id,achieved:!achieved});onRefresh();};
  const addComp=async(planId)=>{if(!newComp.trim())return;await api('study_plans',{action:'add_competency',planId,description:newComp,sortOrder:99});setNewComp('');onRefresh();};
  const deletePlan=async(p)=>{if(!window.confirm(`¿Eliminar el study plan de ${students.find(s=>s.id===p.student_id)?.name||'este estudiante'}? Esto eliminará también las competencias.`))return;await api('study_plans',{action:'delete',id:p.id});onRefresh();};

  const [openStudent,setOpenStudent]=React.useState(null);

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>{setCreating(true);setEditingPlan(null);setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});}} >+ Crear</Btn>}>🗺️ Study Plans</SectionTitle>
      {creating&&!editingPlan&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <p className="label">Nuevo Study Plan</p>
          {(
            <Select value={form.studentId} onChange={e=>{setForm({...form,studentId:e.target.value,cycleId:'',cycleName:''});loadCycles(e.target.value);}}>
              <option value="">-- Estudiante --</option>
              {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
          )}
          {(form.studentId||editingPlan)&&(
            <>
              <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>📅 Selecciona el ciclo:</p>
              {loadingCycles?<p style={{color:'var(--textMuted)',fontSize:12,padding:8}}>Cargando ciclos…</p>:(
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
                  {cycles.map(c=>{const cs=cycleStatus(c.start,c.end);const sel=String(form.cycleId)===String(c.id);return(
                    <button key={c.id} onClick={()=>setForm({...form,cycleId:String(c.id),cycleName:c.name||''})}
                      style={{textAlign:'left',padding:'10px 12px',borderRadius:10,border:`1.5px solid ${sel?'var(--brand)':'var(--stroke)'}`,background:sel?'var(--brandDim)':'var(--bg3)',cursor:'pointer'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <p style={{margin:0,fontSize:13,color:sel?'var(--brand)':'var(--text)',fontWeight:600}}>{fmtCycleLabel(c.name,c.start,c.end)}</p>
                        <span style={{fontSize:11,fontWeight:700,color:cs.color,background:cs.bg,padding:'2px 8px',borderRadius:999,flexShrink:0,marginLeft:8}}>{cs.label}</span>
                      </div>
                    </button>
                  );})}
                  {cycles.length===0&&<p style={{color:'var(--textMuted)',fontSize:12}}>Este estudiante no tiene ciclos creados aún.</p>}
                </div>
              )}
            </>
          )}
          {form.cycleId&&(
            <>
              <Input value={form.cycleName} onChange={e=>setForm({...form,cycleName:e.target.value})} placeholder='Nombre del ciclo (ej: "Building Confidence in English")'/>
              {form.cycleName&&<p style={{color:'var(--textMuted)',fontSize:11,marginBottom:8,fontStyle:'italic'}}>{fmtCycleLabel(form.cycleName,cycles.find(c=>String(c.id)===form.cycleId)?.start,cycles.find(c=>String(c.id)===form.cycleId)?.end)}</p>}
              <Input value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})} placeholder="Objetivo general del ciclo…" rows={2}/>
              <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>Competencias a alcanzar:</p>
              {form.competencies.map((c,i)=>{
                const isObj=typeof c==='object';
                const val=isObj?c.description:c;
                const cId=isObj?c.id:null;
                return(
                  <div key={cId||i} draggable onDragStart={()=>handleDragStart(i)} onDragEnter={()=>handleDragEnter(i)} onDragEnd={handleDrop} onDragOver={e=>e.preventDefault()} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                    <span style={{color:'var(--textMuted)',fontSize:16,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                    <Input value={val} onChange={e=>{const nc=[...form.competencies];nc[i]=isObj?{...c,description:e.target.value}:e.target.value;setForm({...form,competencies:nc});}} placeholder={`Competencia ${i+1}…`} style={{margin:0,flex:1}}/>
                    <button onClick={async()=>{if(cId&&window.confirm('¿Eliminar esta competencia?')){await api('study_plans',{action:'delete_competency',id:cId});onRefresh();}setForm(f=>({...f,competencies:f.competencies.filter((_,j)=>j!==i)}));}} style={{flexShrink:0,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>✕</button>
                  </div>
                );
              })}
              {form.competencies.length<10&&<Btn sm cls="btn-ghost" onClick={()=>setForm(f=>({...f,competencies:[...f.competencies,'']}))}>+ Agregar competencia</Btn>}
            </>
          )}
          <div style={{display:'flex',gap:8,marginTop:8}}><Btn full onClick={save} disabled={!form.cycleId&&!editingPlan}>Guardar</Btn><Btn full cls="btn-ghost" onClick={()=>{setCreating(false);setEditingPlan(null);}}>Cancelar</Btn></div>
        </Card>
      )}
      {(()=>{
        const teachers=data.teachers||[];
        const today=new Date();today.setHours(0,0,0,0);
        const missing=students.filter(s=>{
          if(s.is_active===false||s.is_active===0)return false;
          const cs=s.cycle?.start?new Date(s.cycle.start+'T00:00:00'):null;
          const ce=s.cycle?.end?new Date(s.cycle.end+'T00:00:00'):null;
          if(!cs||!ce||!(cs<=today&&today<=ce))return false;
          return!plans.some(p=>{
            if(String(p.student_id)!==String(s.id))return false;
            if(!p.cycle_start||!p.cycle_end)return false;
            const ps=new Date(p.cycle_start+'T00:00:00'),pe=new Date(p.cycle_end+'T00:00:00');
            return ps<=today&&today<=pe;
          });
        });
        if(missing.length===0)return null;
        // Group by teacher
        const byTeacher={};
        missing.forEach(s=>{
          const tids=(s.teacherIds&&s.teacherIds.length)?s.teacherIds:[s.teacherId].filter(Boolean);
          const tnames=tids.length?tids.map(tid=>{const t=teachers.find(t=>String(t.id)===String(tid));return t?.name||tid;}).join(', '):'Sin profe asignado';
          if(!byTeacher[tnames])byTeacher[tnames]=[];
          byTeacher[tnames].push(s);
        });
        return(
          <div style={{marginBottom:16,borderRadius:12,border:'1.5px solid rgba(245,158,11,.4)',background:'rgba(245,158,11,.06)',padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <span style={{fontSize:18}}>⚠️</span>
              <div>
                <p style={{margin:0,fontFamily:'Sora',fontWeight:800,fontSize:13,color:'#f59e0b'}}>Study Plans faltantes — ciclo activo</p>
                <p style={{margin:'2px 0 0',fontSize:12,color:'var(--textMuted)'}}>{missing.length} estudiante{missing.length!==1?'s':''} sin plan en su ciclo actual</p>
              </div>
            </div>
            {Object.entries(byTeacher).map(([teacherName,studs])=>(
              <div key={teacherName} style={{marginBottom:10}}>
                <p style={{margin:'0 0 5px',fontSize:11,fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.06em'}}>👤 {teacherName}</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {studs.map(s=>{
                    const ce=new Date(s.cycle.end+'T00:00:00');
                    const daysLeft=Math.ceil((ce-today)/(1000*60*60*24));
                    return(
                      <div key={s.id} style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:`1px solid ${daysLeft<=5?'rgba(239,68,68,.4)':'rgba(245,158,11,.25)'}`,borderRadius:8,padding:'5px 10px'}}>
                        <span style={{fontSize:12,color:'var(--text)',fontWeight:600}}>{s.name}</span>
                        <span style={{fontSize:10,color:daysLeft<=5?'#ef4444':'var(--textMuted)',fontWeight:700}}>{daysLeft<=0?'Hoy':daysLeft===1?'1 día':daysLeft<=5?`${daysLeft} días`:`${daysLeft}d`}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        );
      })()}
      {students.map(s=>{
        const sPlans=plans.filter(p=>String(p.student_id)===String(s.id));
        if(sPlans.length===0)return null;
        const isOpenS=openStudent===s.id;
        return(
          <div key={s.id} style={{marginBottom:6,borderRadius:12,border:'1px solid var(--stroke)',overflow:'hidden',background:'var(--surface)'}}>
            <div onClick={()=>setOpenStudent(isOpenS?null:s.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',userSelect:'none'}}>
              <span style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14,flex:1}}>{s.name}</span>

              const pDates=p.cycle_start&&p.cycle_end?`${fmtCycleDate(p.cycle_start)} – ${fmtCycleDate(p.cycle_end)}`:'';

                    <div style={{flex:1,cursor:'pointer'}} onClick={()=>{if(editingPlan===p.id)return;setOpen(isOpenP?null:p.id);}}>
                      <p style={{margin:'0 0 1px',fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{pName}</p>
                      {pDates&&<p style={{margin:'0 0 2px',fontSize:11,color:'var(--textMuted)'}}>{pDates}</p>}
                      <p style={{margin:'0 0 3px',color:'var(--textMuted)',fontSize:12,lineHeight:1.4}}>{p.objective}</p>
                      <span style={{fontSize:11,color:'var(--textMuted)'}}>{done2}/{tot2} competencias</span>
                    </div>
                    <div style={{display:'flex',gap:5,marginLeft:8,flexShrink:0}}>
                      <Btn sm cls={editingPlan===p.id?'btn-primary':'btn-ghost'} onClick={e=>{e.stopPropagation();if(editingPlan===p.id){setEditingPlan(null);return;}const ec=p.competencies&&p.competencies.length>0?p.competencies.map(c=>Object.assign({},c)):emptyComps.map(t=>({description:t,id:null,achieved:false}));const cn=p.cycle_name||(p.cycle_label?.replace(/^Cycle\s*--\s*/,'').replace(/\s*\(.*$/,'').trim())||'';setForm({studentId:p.student_id,cycleId:String(p.cycle_id||''),cycleName:cn,objective:p.objective,competencies:ec});setEditingPlan(p.id);setOpen(p.id);}}>✏️</Btn>
                      <Btn sm cls="btn-danger" onClick={e=>{e.stopPropagation();deletePlan(p);}}>🗑</Btn>
                      <button onClick={e=>{e.stopPropagation();if(editingPlan===p.id)return;setOpen(isOpenP?null:p.id);}} style={{background:'none',border:'none',color:isOpenP?'var(--textMuted)':'var(--brand)',cursor:'pointer',fontSize:isOpenP?14:11,fontWeight:isOpenP?400:600,padding:'2px 6px',whiteSpace:'nowrap'}}>{isOpenP?'▲':`${done2}/${tot2} ✓ Marcar competencias →`}</button>
                    </div>
                  </div>
                  {isOpenP&&(
                    <div>
                      {editingPlan===p.id?(
                        <>
                          <Input value={form.cycleName} onChange={e=>setForm({...form,cycleName:e.target.value})} placeholder='Nombre del ciclo…'/>
                          <Input value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})} placeholder="Objetivo general…"/>
                          <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>Competencias:</p>
                          {form.competencies.map((c,i)=>{const isObj=typeof c==='object';const val=isObj?c.description:c;const cId=isObj?c.id:null;return(
                            <div key={cId||i} draggable onDragStart={()=>handleDragStart(i)} onDragEnter={()=>handleDragEnter(i)} onDragEnd={handleDrop} onDragOver={e=>e.preventDefault()} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                              <span style={{color:'var(--textMuted)',fontSize:16,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                              <Input value={val} onChange={e=>{const nc=[...form.competencies];nc[i]=isObj?{...c,description:e.target.value}:e.target.value;setForm({...form,competencies:nc});}} placeholder={`Competencia ${i+1}…`} style={{margin:0,flex:1}}/>
                              <button onClick={async()=>{if(cId&&window.confirm('¿Eliminar esta competencia?')){await api('study_plans',{action:'delete_competency',id:cId});onRefresh();}setForm(f=>({...f,competencies:f.competencies.filter((_,j)=>j!==i)}));}} style={{flexShrink:0,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>✕</button>
                            </div>
                          );})}
                          {form.competencies.length<10&&<Btn sm cls="btn-ghost" onClick={()=>setForm(f=>({...f,competencies:[...f.competencies,'']}))}>+ Agregar</Btn>}
                          <div style={{display:'flex',gap:8,marginTop:10}}>
                            <Btn full onClick={save}>💾 Guardar</Btn>
                            <Btn full cls="btn-ghost" onClick={()=>setEditingPlan(null)}>Cancelar</Btn>
                          </div>
                        </>
                      ):(
                        <>
