            {reviewing.submission_text&&<div style={{fontSize:14,color:'var(--text)',lineHeight:1.8}} dangerouslySetInnerHTML={{__html:mdToHtml(reviewing.submission_text)}}/>}
            {reviewing.submission_voice&&<audio controls src={reviewing.submission_voice} style={{width:'100%',height:36,marginTop:reviewing.submission_text?8:0,display:'block'}}/>}
            {reviewing.submission_images&&JSON.parse(reviewing.submission_images||'[]').map((img,i)=>(
              <img key={i} src={img} alt="" onClick={()=>window.open(img,'_blank')} style={{maxWidth:'100%',borderRadius:8,marginTop:8,display:'block',cursor:'zoom-in'}}/>
            ))}
          </div>
          :<div style={{background:'var(--bg3)',borderRadius:10,padding:'12px',marginBottom:16,textAlign:'center'}}>
            <p style={{color:'var(--textMuted)',fontSize:13,margin:0}}>El estudiante aún no ha entregado una respuesta.</p>
          </div>
        }

        {/* Previous review if exists */}
        {reviewing.status==='reviewed'&&reviewing.teacher_comment&&(
          <div style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
            <p className="label" style={{marginBottom:4}}>Revisión anterior</p>
            {reviewing.teacher_grade&&<p style={{margin:'0 0 4px',fontFamily:'Sora',fontWeight:900,color:'var(--brand)',fontSize:15}}>{reviewing.teacher_grade}</p>}
            <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6}} dangerouslySetInnerHTML={{__html:mdToHtml(reviewing.teacher_comment)}}/>
            {reviewing.teacher_voice&&<audio controls src={reviewing.teacher_voice} style={{width:'100%',height:36,marginTop:8,display:'block'}}/>}
          </div>
        )}

        {/* Review form */}
        <p className="label" style={{marginBottom:10}}>{reviewing.status==='reviewed'?'✏️ Actualizar revisión':'⭐ Calificar y comentar'}</p>

        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600}}>Calificación</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
          {GRADES.map(g=>(
            <button key={g} onClick={()=>setReviewForm(f=>({...f,grade:f.grade===g?'':g}))}
              style={{padding:'6px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',
                background:reviewForm.grade===g?'var(--brandDim)':'var(--bg3)',
                borderColor:reviewForm.grade===g?'var(--brand)':'var(--stroke)',
                color:reviewForm.grade===g?'var(--brand)':'var(--textMuted)'}}>
              {g}
            </button>
          ))}
        </div>

        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600}}>Comentario para el estudiante</p>
        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:8}}>Usa ~~tachado~~ para marcar errores específicos, **negrita** para resaltar, _cursiva_ para énfasis.</p>
        <RichTaskEditor
          id="teacher-review-editor"
          value={reviewForm.comment}
          onChange={v=>setReviewForm(f=>({...f,comment:v}))}
          placeholder="Escribe tu feedback… ~~esto estuvo mal~~ · **esto estuvo excelente** · Recuerda usar el artículo correcto…"
          rows={6}
        />
        {reviewForm.voice&&(
          <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg3)',borderRadius:8,border:'1px solid var(--stroke)'}}>
            <p style={{margin:'0 0 4px',fontSize:11,color:'var(--textMuted)',fontWeight:600}}>🎙️ Audio de feedback</p>
            <audio controls src={reviewForm.voice} style={{width:'100%',height:36}}/>
            <button onClick={()=>setReviewForm(f=>({...f,voice:null}))} style={{marginTop:4,background:'none',border:'none',color:'#ef4444',fontSize:11,cursor:'pointer',padding:0}}>✕ Eliminar audio</button>
          </div>
        )}
        <div style={{display:'flex',gap:8,marginTop:10,alignItems:'center'}}>
          <button onClick={tToggleRec} style={{flexShrink:0,padding:'8px 12px',borderRadius:8,border:`1.5px solid ${tRecording?'#ef4444':'var(--stroke)'}`,background:tRecording?'rgba(239,68,68,.1)':'var(--bg3)',color:tRecording?'#ef4444':'var(--textMuted)',cursor:'pointer',fontSize:13,fontWeight:600}}>
            {tRecording?`⏹ ${tFmtSecs(tRecSecs)}`:'🎙️'}
          </button>
          <Btn full onClick={sendReview} disabled={busy||tRecording||(!reviewForm.grade&&!reviewForm.comment&&!reviewForm.voice)}>
            {busy?'Enviando…':'📤 Enviar revisión al estudiante'}
          </Btn>
          <Btn cls="btn-ghost" onClick={()=>{setReviewing(null);setReviewForm({grade:'',comment:'',voice:null});tStopRec();}}>Cancelar</Btn>
        </div>
      </>
    );
  }

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>setAdding(v=>!v)}>+ Nueva tarea</Btn>}>📋 Tareas</SectionTitle>

      {/* Create custom task */}
      {adding&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:14}}>
          <p className="label">Tarea personalizada</p>
          <Select value={form.studentId} onChange={e=>setForm({...form,studentId:e.target.value})}>
            <option value="">-- Estudiante o grupo --</option>
            {groups.length>0&&<option disabled>── Grupos ──</option>}
            {groups.map(g=><option key={'g'+g.id} value={`group:${g.id}`}>👫 {g.name}</option>)}
            {groups.length>0&&<option disabled>── Estudiantes ──</option>}
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </Select>
          <Input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Título de la tarea *"/>
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:8,marginTop:2,fontWeight:600}}>INSTRUCCIÓN</p>
          <RichTaskEditor
            id="teacher-task-create"
            value={form.instruction}
            onChange={v=>setForm({...form,instruction:v})}
            placeholder="Escribe la instrucción detallada… El estudiante la verá exactamente así."
            rows={5}
          />
          <div style={{display:'flex',gap:8,alignItems:'center',margin:'8px 0 4px'}}>
            <button onClick={cToggleRec} style={{flexShrink:0,padding:'7px 12px',borderRadius:8,border:`1.5px solid ${cRecording?'#ef4444':'var(--stroke)'}`,background:cRecording?'rgba(239,68,68,.1)':'var(--bg3)',color:cRecording?'#ef4444':'var(--textMuted)',cursor:'pointer',fontSize:13,fontWeight:600}}>
              {cRecording?`⏹ ${Math.floor(cRecSecs/60)}:${String(cRecSecs%60).padStart(2,'0')}`:'🎙️ Grabar audio'}
            </button>
            {form.voice&&<button onClick={()=>setForm(f=>({...f,voice:null}))} style={{background:'none',border:'none',color:'#ef4444',fontSize:12,cursor:'pointer'}}>✕ Quitar audio</button>}
          </div>
          {form.voice&&<audio controls src={form.voice} style={{width:'100%',height:36,marginBottom:6,display:'block'}}/>}
          <p style={{fontSize:11,color:'var(--textMuted)',margin:'10px 0 4px',fontWeight:600}}>FECHA LÍMITE (opcional)</p>
          <Input type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})} style={{marginBottom:10}}/>
          {/* Image picker -- hasta 3 imagenes */}
          <p style={{fontSize:11,color:'var(--textMuted)',margin:'10px 0 4px',fontWeight:600}}>IMÁGENES (opcional, máx. 3)</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
            {form.images.map((img,i)=>(
              <div key={i} style={{position:'relative',width:72,height:72}}>
                <img src={img} alt="" style={{width:72,height:72,objectFit:'cover',borderRadius:8,border:'1px solid var(--stroke)'}}/>
                <button onClick={()=>setForm(f=>({...f,images:f.images.filter((_,j)=>j!==i)}))
                  } style={{position:'absolute',top:-6,right:-6,background:'#ef4444',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',color:'#fff',fontSize:11,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>&#215;</button>
              </div>
            ))}
            {form.images.length<3&&(
              <label style={{width:72,height:72,border:'2px dashed var(--stroke)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--textMuted)',fontSize:22}}>
                📷
                <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
                  const file=e.target.files?.[0]; if(!file)return;
                  if(file.size>600000){alert('La imagen es muy grande. Máximo 600KB.');e.target.value='';return;}
                  const reader=new FileReader();
                  reader.onload=ev=>{ setForm(f=>({...f,images:[...f.images,ev.target.result]})); e.target.value='';};
                  reader.readAsDataURL(file);
                }}/>
              </label>
            )}
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={createTask} disabled={cRecording||!form.studentId||!form.title||(!form.instruction.trim()&&!form.voice)}>Asignar tarea</Btn>
            <Btn cls="btn-ghost" onClick={()=>{setAdding(false);cStopRec();setForm(f=>({...f,voice:null}));}}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {tasks.length===0&&!adding&&(
        <p style={{color:'var(--textMuted)',textAlign:'center',padding:32,fontSize:13}}>No hay tareas aún. Las tareas de temas aparecen aquí cuando el estudiante las entrega.</p>
      )}

      {/* Task list grouped by student */}
      {[...new Set(tasks.map(t=>t.student_name||t.student_id))].map(sName=>{
        const sTasks=tasks.filter(t=>(t.student_name||t.student_id)===sName);
        const hasReady=sTasks.some(t=>t.status==='ready_review');
        const isOpen=openStudent[sName]!==undefined?openStudent[sName]:hasReady;
        return(
          <div key={sName} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--bg2)',borderRadius:10,cursor:'pointer',border:`1px solid ${hasReady?'var(--strokeBrand)':'var(--stroke)'}`}}
              onClick={()=>setOpenStudent(o=>({...o,[sName]:!isOpen}))}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{sName}</span>
                {hasReady&&<Badge color="#60a5fa">👀 Por revisar</Badge>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,color:'var(--textMuted)'}}>{sTasks.length} tarea{sTasks.length!==1?'s':''}</span>
                <span style={{color:'var(--textMuted)'}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>
            {isOpen&&(
              <div style={{paddingLeft:8,marginTop:4}}>
                {['ready_review','pending','reviewed'].map(status=>{
                  const group=sTasks.filter(t=>t.status===status);
                  if(!group.length)return null;
                  const si=SI[status];
                  return(
                    <div key={status} style={{marginBottom:8}}>
                      <p className="label" style={{color:si.c,marginBottom:4}}>{si.l}</p>
                      {group.map(t=>(
                        <Card key={t.id} style={{marginBottom:6,borderColor:t.status==='ready_review'?'rgba(96,165,250,.3)':undefined}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                                <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{t.title}</p>
                                {parseInt(t.is_custom)===1
                                  ?<span style={{fontSize:10,fontWeight:700,color:'#a78bfa',background:'rgba(167,139,250,.1)',border:'1px solid rgba(167,139,250,.3)',borderRadius:999,padding:'1px 6px'}}>PERSONALIZADA</span>
                                  :<span style={{fontSize:10,fontWeight:700,color:'#60a5fa',background:'rgba(96,165,250,.08)',border:'1px solid rgba(96,165,250,.25)',borderRadius:999,padding:'1px 6px'}}>TEMA</span>
                                }
                              </div>
                              {t.submission_text&&(
                                <p style={{margin:'3px 0 0',fontSize:12,color:'var(--textSub)',lineHeight:1.4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>
                                  {t.submission_text.replace(/\*\*|__|~~|_/g,'').slice(0,110)}{t.submission_text.length>110?'…':''}
                                </p>
                              )}
                              {t.teacher_grade&&<p style={{margin:'3px 0 0',fontSize:11,color:'var(--brand)',fontWeight:700}}>⭐ {t.teacher_grade}</p>}
                            </div>
                            <div style={{flexShrink:0}}>
                              <div style={{display:'flex',gap:4,flexDirection:'column',alignItems:'flex-end'}}>
                              {(t.status==='ready_review'||t.status==='reviewed')&&(
                                <Btn sm cls={t.status==='ready_review'?'btn-primary':'btn-ghost'}
                                  onClick={()=>{setReviewing(t);setReviewForm({grade:t.teacher_grade||'',comment:t.teacher_comment||''});}}>
                                  {t.status==='ready_review'?'Revisar →':'✏️ Editar'}
                                </Btn>
                              )}
                              {parseInt(t.is_custom)===1&&(t.status==='pending'||t.status==='ready_review')&&(
                                <Btn sm cls="btn-ghost" onClick={()=>openEditTask(t)}
                                  style={{fontSize:11}}>
                                  ✏️ Editar
                                </Btn>
                              )}
                              {parseInt(t.is_custom)===1&&t.status==='pending'&&(
                                <Btn sm cls="btn-ghost" onClick={()=>deleteTask(t)}
                                  style={{color:'#ef4444',borderColor:'rgba(239,68,68,.3)',fontSize:11}}>
                                  🗑️ Borrar
                                </Btn>
                              )}
                              </div>
                            </div>
                          </div>
                        </Card>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)'}}>{q.title}</p>

                <span style={{color:'var(--brand)'}}>→</span>
              </div>
            </Card>
          ))}
        </div>
      )}
    </>
  );
}

function TTopics({user,data,onRefresh}){
  const topics=data.topics||[],students=data.students||[];
  const canEdit=!!(user?.canEditTopics);
  const [open,setOpen]=React.useState(null);
  const [assigning,setAssigning]=React.useState(null);
  const [search,setSearch]=React.useState('');
  const [filterLevel,setFilterLevel]=React.useState('');
  const [assignTargets,setAssignTargets]=React.useState([]);
  const [assignOpts,setAssignOpts]=React.useState({quiz:true,summary:true,task:true});
  const [nq,setNQ]=React.useState({q:'',opts:['','',''],correct:0,feedback:''});
  const [editingQId,setEditingQId]=React.useState(null);
  // Teacher content editing (only if canEdit)
  const [editingContent,setEditingContent]=React.useState(null); // topicId
  const [contentForm,setContentForm]=React.useState({canvaUrl:'',taskTitle:'',taskInstruction:''});
  const saveContent=async(topicId)=>{
    const t=topics.find(x=>x.id===topicId);
    if(!t)return;
    await api('topics',{action:'update',id:topicId,name:t.name,level:t.level||'',
      canvaUrl:contentForm.canvaUrl,taskTitle:contentForm.taskTitle,taskInstruction:contentForm.taskInstruction});
    setEditingContent(null);onRefresh();
  };

  const addQ=async(topicId,qCount)=>{
    if(!nq.q.trim())return;
    const validOpts=nq.opts.filter(o=>o.trim());
    if(validOpts.length<2){alert('Mínimo 2 opciones');return;}
    if(editingQId){
      await api('topics',{action:'update_question',id:editingQId,...nq,opts:validOpts});
      setEditingQId(null);
    } else {
      if((qCount||0)>=10){alert('Este tema ya tiene 10 preguntas');return;}
      await api('topics',{action:'add_question',topicId,...nq,opts:validOpts,sortOrder:0});
    }
    setNQ({q:'',opts:['','',''],correct:0,feedback:''});onRefresh();
  };

  const toggleAssignTarget=id=>setAssignTargets(t=>t.includes(id)?t.filter(x=>x!==id):[...t,id]);
  const assign=async()=>{
    if(!assignTargets.length)return;
    for(const sid of assignTargets){
      await api('topics',{action:'assign',topicId:assigning,studentId:sid,
        assignQuiz:assignOpts.quiz?1:0,assignSummary:assignOpts.summary?1:0,assignTask:assignOpts.task?1:0,assignedBy:user?.id||'teacher'});
    }
    setAssigning(null);setAssignTargets([]);setAssignOpts({quiz:true,summary:true,task:true});onRefresh();
  };
  const unassignDirect=async(topicId,studentId)=>{
    if(!confirm('⚠️ ¿Desasignar este tema? Se borrarán todas las respuestas del quiz y la tarea del estudiante. Esta acción no se puede deshacer.'))return;
    await api('topics',{action:'unassign',topicId,studentId});onRefresh();
  };

  const isReady=t=>!!(t.canva_url&&t.task_title&&(t.questions?.length||0)>0);

  // Filter (show all topics, including incomplete ones)
  const q=search.toLowerCase();
  const filtered=topics.filter(t=>
    (!filterLevel||t.level===filterLevel||(!t.level&&filterLevel==='Otros'))&&
    (!q||t.name.toLowerCase().includes(q)||(t.level||'').toLowerCase().includes(q))
  );

  // Group by level
  const grouped={};
  filtered.forEach(t=>{const lv=t.level||'Otros';if(!grouped[lv])grouped[lv]=[];grouped[lv].push(t);});

  const LevelPill=({level})=>level?(
    <span style={{fontSize:11,fontWeight:700,background:`${LEVEL_COLORS[level]||'#94a3b8'}22`,border:`1.5px solid ${LEVEL_COLORS[level]||'#94a3b8'}55`,color:LEVEL_COLORS[level]||'#94a3b8',borderRadius:999,padding:'2px 9px'}}>{level}</span>
  ):null;

  return(
    <>
      <SectionTitle>🎯 Temas ({topics.length})</SectionTitle>

      {/* Assign panel -- sticky so it stays visible while scrolling through topics */}
      {assigning&&(
        <div style={{position:'sticky',top:0,zIndex:100,marginBottom:12,background:'var(--bg0)',borderRadius:'var(--radiusL)',padding:2}}>
        <Card style={{borderColor:'var(--brandBorder)',boxShadow:'0 8px 32px rgba(0,0,0,.6)',background:'var(--bg2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <p className="label" style={{margin:0}}>Asignar tema</p>
            <p style={{margin:0,fontSize:12,color:'var(--brand)',fontWeight:700,fontFamily:'Sora'}}>
              {topics.find(t=>t.id===assigning)?.name}
            </p>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
            {[{k:'summary',label:'📄 Resumen'},{k:'quiz',label:'🎯 Quiz'},{k:'task',label:'📋 Tarea'}].map(({k,label})=>(
              <button key={k} onClick={()=>setAssignOpts(o=>({...o,[k]:!o[k]}))}
                style={{padding:'4px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:600,
                  background:assignOpts[k]?'var(--brandDim)':'transparent',
                  borderColor:assignOpts[k]?'var(--brand)':'var(--stroke)',
                  color:assignOpts[k]?'var(--brand)':'var(--textMuted)'}}>
                {assignOpts[k]?'✓ ':''}{label}
              </button>
            ))}
          </div>
          {/* Group quick-select buttons */}
          {(data.groups||[]).filter(g=>(g.memberIds||[]).length>0).map(g=>(
            <button key={'g'+g.id}
              onClick={()=>setAssignTargets(prev=>{
                const ids=g.memberIds.map(String);
                const allIn=ids.every(id=>prev.map(String).includes(id));
                return allIn?prev.filter(id=>!ids.includes(String(id))):[...new Set([...prev,...g.memberIds])];
              })}
              style={{marginBottom:8,padding:'4px 12px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',fontWeight:700,
                background:(g.memberIds||[]).every(id=>assignTargets.map(String).includes(String(id)))?'rgba(167,139,250,.15)':'transparent',
                borderColor:(g.memberIds||[]).every(id=>assignTargets.map(String).includes(String(id)))?'#a78bfa':'var(--stroke)',
                color:(g.memberIds||[]).every(id=>assignTargets.map(String).includes(String(id)))?'#a78bfa':'var(--textMuted)'}}>
              👫 {g.name}
            </button>
          ))}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
            {students.map(s=>(
              <button key={s.id} onClick={()=>toggleAssignTarget(s.id)}
                style={{padding:'5px 11px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',
                  background:assignTargets.includes(s.id)?'var(--brandDim)':'transparent',
                  borderColor:assignTargets.includes(s.id)?'var(--brand)':'var(--stroke)',
                  color:assignTargets.includes(s.id)?'var(--brand)':'var(--textMuted)'}}>
                {s.name}
              </button>
            ))}
            <button onClick={()=>setAssignTargets(students.map(s=>s.id))}
              style={{padding:'5px 11px',borderRadius:999,border:'1.5px solid var(--stroke)',background:'transparent',color:'var(--textMuted)',fontSize:12,cursor:'pointer'}}>
              Todos
            </button>
          </div>
          {assignTargets.length>0&&<p style={{fontSize:12,color:'var(--brand)',marginBottom:8}}>{assignTargets.length} estudiante{assignTargets.length!==1?'s':''} seleccionado{assignTargets.length!==1?'s':''}</p>}
          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={assign} disabled={!assignTargets.length}>Asignar</Btn>
            <Btn full cls="btn-ghost" onClick={()=>{setAssigning(null);setAssignTargets([]);setAssignOpts({quiz:true,summary:true,task:true});}}>Cancelar</Btn>
          </div>
        </Card>
        </div>
      )}

      {/* Search + filter */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder={`🔍 Buscar entre ${topics.length} temas…`}
          style={{flex:1,minWidth:140,background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none',transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor='var(--brandBorder)'}
          onBlur={e=>e.target.style.borderColor='var(--stroke)'}/>
        <select value={filterLevel} onChange={e=>setFilterLevel(e.target.value)}
          style={{background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13,cursor:'pointer',outline:'none'}}>
          <option value="">Todos</option>
          {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
      </div>

      {filtered.length===0&&<Card style={{textAlign:'center',padding:32}}><p style={{color:'var(--textMuted)'}}>{search||filterLevel?'Sin resultados.':'El admin aún no ha creado temas.'}</p></Card>}

      {[...LEVELS].filter(lv=>grouped[lv]?.length>0).map(lv=>(
        <div key={lv} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span style={{fontFamily:'Sora',fontWeight:900,fontSize:13,color:LEVEL_COLORS[lv]||'#94a3b8'}}>{lv}</span>
            <span style={{fontSize:11,color:'var(--textMuted)'}}>{grouped[lv].length} tema{grouped[lv].length!==1?'s':''}</span>
            <div style={{flex:1,height:1,background:`${LEVEL_COLORS[lv]||'#94a3b8'}33`}}/>
          </div>
          {grouped[lv].map(t=>{
            const isOpen=open===t.id;
            const qCount=t.questions?.length||0;
            const assigned=t.assignedStudents||[];
            // Filter to only this teacher's students
            const myAssigned=assigned.filter(s=>students.some(st=>st.id===s.student_id));
            const ready=isReady(t);
            const missing=[];
            if(!t.canva_url)missing.push('resumen');
            if(!t.task_title)missing.push('tarea');
            if(qCount===0)missing.push('preguntas');
            return(
              <Card key={t.id} style={{marginBottom:6,borderColor:!ready?'#f59e0b44':undefined}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer'}} onClick={()=>setOpen(isOpen?null:t.id)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                      <LevelPill level={t.level||'Otros'}/>
                      <p style={{margin:0,fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{t.name}</p>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      {!ready&&<Badge color="#f59e0b">⚠️ Falta: {missing.join(', ')}</Badge>}
                      {t.canva_url&&<Badge color="#60a5fa">📄 Resumen</Badge>}
                      {t.task_title&&<Badge color="#a78bfa">📋 Tarea</Badge>}
                      <Badge color={qCount===10?'var(--brand)':qCount>0?'#f59e0b':'#ef4444'}>❓ {qCount}/10</Badge>
                      {myAssigned.length>0&&<Badge color="var(--brand)">👤 {myAssigned.length}</Badge>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    {canEdit&&<button onClick={e=>{e.stopPropagation();if(editingContent===t.id){setEditingContent(null);}else{setEditingContent(t.id);setContentForm({canvaUrl:t.canva_url||'',taskTitle:t.task_title||'',taskInstruction:t.task_instruction||''});setOpen(t.id);}}} title="Editar contenido" style={{background:editingContent===t.id?'var(--brandDim)':'none',border:`1.5px solid ${editingContent===t.id?'var(--brand)':'var(--stroke)'}`,borderRadius:8,cursor:'pointer',color:editingContent===t.id?'var(--brand)':'var(--textMuted)',fontSize:12,padding:'4px 8px',fontWeight:600}}>✏️ Editar</button>}
                    <Btn sm cls="btn-ghost" onClick={e=>{e.stopPropagation();setAssigning(t.id);setAssignTargets([]);setAssignOpts({quiz:true,summary:true,task:true});}}>+ Asignar</Btn>
                    <span style={{color:'var(--textMuted)',padding:'4px 4px'}}>{isOpen?'▲':'▼'}</span>
                  </div>
                </div>
                {isOpen&&(
                  <div style={{borderTop:'1px solid var(--stroke)',marginTop:10,paddingTop:10}}>
                    {/* Assigned students for this teacher */}
                    {myAssigned.length>0&&(
                      <div style={{marginBottom:12}}>
                        <p className="label" style={{marginBottom:6}}>👤 Asignado a tus estudiantes</p>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {myAssigned.map(s=>(
                            <div key={s.student_id} style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg3)',border:'1px solid var(--stroke)',borderRadius:999,padding:'3px 8px 3px 10px'}}>
                              <span style={{fontSize:12,color:'var(--text)'}}>{s.student_name}</span>
                              <button onClick={()=>unassignDirect(t.id,s.student_id)} title="Desasignar"
                                style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:14,lineHeight:1,padding:'0 2px'}}>×</button>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* Summary -- open in new tab */}
                    {t.canva_url&&(
                      <div style={{marginBottom:14}}>
                        <p className="label" style={{marginBottom:6}}>📄 Resumen</p>
                        <a href={t.canva_url} target="_blank" rel="noopener noreferrer"
                          style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg3)',border:'1px solid var(--strokeBrand)',borderRadius:10,padding:'12px 16px',textDecoration:'none',cursor:'pointer',transition:'opacity .15s'}}
                          onMouseEnter={e=>e.currentTarget.style.opacity='.8'}
                          onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                          <span style={{fontSize:22}}>📄</span>
                          <div>
                            <p style={{margin:0,fontWeight:700,fontSize:13,color:'var(--brand)'}}>Ver resumen completo</p>
                            <p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>Se abrirá en una nueva pestaña</p>
                          </div>
                          <span style={{marginLeft:'auto',color:'var(--brand)',fontSize:16}}>↗</span>
                        </a>
                      </div>
                    )}
                    {/* Task instruction preview -- read-only, same as student view */}
                    {t.task_title&&(
                      <div style={{marginBottom:14}}>
                        <p className="label" style={{marginBottom:6}}>📋 Tarea: {t.task_title}</p>
                        {t.task_instruction&&(
                          <div style={{background:'var(--bg3)',borderRadius:10,padding:'10px 13px',fontSize:13,color:'var(--text)',lineHeight:1.6}}
                            dangerouslySetInnerHTML={{__html:sanitizeHtml(t.task_instruction)}}/>
                        )}
                        <p style={{fontSize:11,color:'var(--textMuted)',marginTop:6,fontStyle:'italic'}}>Vista previa -- el estudiante puede responder desde su perfil</p>
                      </div>
                    )}
                    {/* Teacher content editor */}
                    {canEdit&&editingContent===t.id&&(
                      <div style={{background:'var(--bg3)',border:'1px solid var(--strokeBrand)',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
                        <p className="label" style={{marginBottom:8}}>✏️ Editar contenido</p>
                        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>URL Resumen (Canva)</p>
                        <Input value={contentForm.canvaUrl} onChange={e=>setContentForm(f=>({...f,canvaUrl:e.target.value}))} placeholder="https://www.canva.com/..."/>
                        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,marginTop:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Título de tarea</p>
                        <Input value={contentForm.taskTitle} onChange={e=>setContentForm(f=>({...f,taskTitle:e.target.value}))} placeholder="Ej: Write a paragraph about..."/>
                        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,marginTop:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Instrucción de tarea</p>
                        <RichEditor value={contentForm.taskInstruction} onChange={v=>setContentForm(f=>({...f,taskInstruction:v}))} placeholder="Instrucción detallada (opcional)"/>
                        <div style={{display:'flex',gap:8,marginTop:10}}>
                          <Btn full onClick={()=>saveContent(t.id)}>💾 Guardar</Btn>
                          <Btn full cls="btn-ghost" onClick={()=>setEditingContent(null)}>Cancelar</Btn>
                        </div>
                      </div>
                    )}
                    {/* Questions preview */}
                    <p className="label">❓ Preguntas ({qCount}/10)</p>
                    {t.questions?.map((q,i)=>(
                      <div key={q.id} style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
                          <div className="quiz-q-html" style={{margin:'0 0 3px',color:'var(--text)',fontWeight:600,flex:1}} dangerouslySetInnerHTML={{__html:`${i+1}. ${sanitizeHtml(q.question)}`}}/>
                          {canEdit&&<button onClick={()=>{if(confirm('¿Eliminar esta pregunta?'))api('topics',{action:'delete_question',id:q.id}).then(onRefresh);}} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:13,padding:'0 2px',flexShrink:0}}>🗑</button>}
                        </div>
                        {[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e].filter(o=>o&&o.trim()).map((o,j)=>(
                          <p key={j} style={{margin:'2px 0',color:j===parseInt(q.correct)?'var(--brand)':'var(--textSub)',fontSize:11}}>{j===parseInt(q.correct)?'✓':''} {['A','B','C','D','E'][j]}. {o}</p>
                        ))}
                        {q.feedback&&<p style={{margin:'6px 0 0',fontSize:11,color:'#f59e0b',fontStyle:'italic',borderTop:'1px solid var(--stroke)',paddingTop:5,whiteSpace:'pre-wrap'}}>💬 {q.feedback}</p>}
                      </div>
                    ))}
                    {/* Add question form (teacher editor) */}
                    {canEdit&&qCount<10&&(
                      <div style={{background:'var(--bg3)',border:'1px solid var(--stroke)',borderRadius:8,padding:'10px 12px',marginTop:8}}>
                        <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:8,fontWeight:700}}>➕ Nueva pregunta</p>
                        <RichEditor value={nq.q} onChange={v=>setNQ(f=>({...f,q:v}))} placeholder="Enunciado de la pregunta…" minHeight={60}/>
                        <div style={{marginTop:6}}>
                          {nq.opts.map((o,oi)=>(
                            <div key={oi} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                              <button onClick={()=>setNQ(f=>({...f,correct:oi}))}
                                style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${nq.correct===oi?'var(--brand)':'var(--stroke)'}`,background:nq.correct===oi?'var(--brand)':'transparent',cursor:'pointer',flexShrink:0}}/>
                              <input value={o} onChange={e=>setNQ(f=>({...f,opts:f.opts.map((x,i)=>i===oi?e.target.value:x)}))}
                                placeholder={`Opción ${['A','B','C','D','E'][oi]}`}
                                style={{flex:1,background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'5px 8px',color:'var(--text)',fontSize:12}}/>
                              {oi>=2&&<button onClick={()=>setNQ(f=>({...f,opts:f.opts.filter((_,i)=>i!==oi),correct:Math.min(f.correct,f.opts.length-2)}))} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:14}}>×</button>}
                            </div>
                          ))}
                          {nq.opts.length<5&&<button onClick={()=>setNQ(f=>({...f,opts:[...f.opts,'']}))} style={{fontSize:11,color:'var(--brand)',background:'none',border:'none',cursor:'pointer',marginBottom:6,padding:0}}>+ opción</button>}
                        </div>
                        <input value={nq.feedback} onChange={e=>setNQ(f=>({...f,feedback:e.target.value}))}
                          placeholder="Feedback (opcional)" style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'5px 8px',color:'var(--text)',fontSize:12,marginTop:4,boxSizing:'border-box'}}/>
                        <div style={{marginTop:8}}>
                          <Btn sm full onClick={()=>addQ(t.id,qCount)} disabled={!nq.q.trim()}>Guardar pregunta</Btn>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      ))}
    </>
  );
}
function TSummaries({user,data,onRefresh}){
  const summaries=data.summaries||[],students=data.students||[];
  const [assigning,setAssigning]=React.useState(null);
  const [selected,setSelected]=React.useState([]);
  const [adding,setAdding]=React.useState(false);
  const [form,setForm]=React.useState({title:'',topic:'',canvaUrl:''});
  const save=async()=>{
    if(!form.title||!form.topic||!form.canvaUrl)return;
    await api('summaries',{action:'create',...form,teacherId:user.id});
    setAdding(false);setForm({title:'',topic:'',canvaUrl:''});onRefresh();
  };
  const assign=async()=>{await api('summaries',{action:'assign',summaryId:assigning.id,studentIds:selected});setAssigning(null);setSelected([]);onRefresh();};
  const byTopic=summaries.reduce((acc,s)=>{(acc[s.topic]=acc[s.topic]||[]).push(s);return acc},{});
  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>setAdding(true)}>+ Agregar</Btn>}>📚 Banco de Resúmenes</SectionTitle>
      {adding&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <Input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Título (ej: Present Simple)"/>
          <Input value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})} placeholder="Categoría (ej: Grammar)"/>
          <Input value={form.canvaUrl} onChange={e=>setForm({...form,canvaUrl:e.target.value})} placeholder="Link de Canva (PDF)"/>
          <div style={{display:'flex',gap:8}}><Btn full onClick={save}>Guardar</Btn><Btn full cls="btn-ghost" onClick={()=>setAdding(false)}>Cancelar</Btn></div>
        </Card>
      )}
      {assigning&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:14}}>
          <p className="label">Asignar: {assigning.title}</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {students.filter(s=>!assigning.assignedTo?.includes(s.id)).map(s=>(
              <button key={s.id} onClick={()=>setSelected(p=>p.includes(s.id)?p.filter(x=>x!==s.id):[...p,s.id])} style={{padding:'5px 10px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',background:selected.includes(s.id)?'var(--brandDim)':'transparent',borderColor:selected.includes(s.id)?'var(--brand)':'var(--stroke)',color:selected.includes(s.id)?'var(--brand)':'var(--textMuted)'}}>{s.name}</button>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}><Btn full cls="btn-blue" onClick={assign} disabled={!selected.length}>Asignar</Btn><Btn full cls="btn-ghost" onClick={()=>{setAssigning(null);setSelected([]);}}>Cancelar</Btn></div>
        </Card>
      )}
      {summaries.length===0&&!adding&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32}}>No hay resúmenes aún. Agrega el primero.</p>}
      {Object.entries(byTopic).map(([topic,items])=>(
        <div key={topic} style={{marginBottom:20}}>
          <p className="label">{topic}</p>
          {items.map(s=>(
            <Card key={s.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{flex:1}}>
                  <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)'}}>{s.title}</p>
                  <p style={{margin:'0 0 6px',color:'var(--textMuted)',fontSize:11,wordBreak:'break-all'}}>{s.canva_url}</p>
                  {s.assignedTo&&s.assignedTo.length>0&&(
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {s.assignedTo.map(sid=>{const st=students.find(x=>x.id===sid);return st?<span key={sid} onClick={()=>api('summaries',{action:'unassign',summaryId:s.id,studentId:sid}).then(onRefresh)} style={{background:'var(--brandDim)',border:'1px solid var(--brand)',color:'var(--brand)',borderRadius:999,padding:'2px 8px',fontSize:11,cursor:'pointer'}}>✓ {st.name} ×</span>:null;})}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',gap:6,marginLeft:8}}>
                  <Btn sm cls="btn-ghost" onClick={()=>{setAssigning(s);setSelected([]);}}>+ Asignar</Btn>
                  <Btn sm cls="btn-danger" onClick={()=>api('summaries',{action:'delete',id:s.id}).then(onRefresh)}>🗑</Btn>
                </div>
              </div>
            </Card>
          ))}
        </div>
      ))}
    </>
  );
}


function TResources({user,data,onRefresh}){
  const students=data.students||[];
  const resources=data.resources||[];
  const groups=(data.groups||[]).filter(g=>(g.memberIds||[]).some(id=>students.find(s=>String(s.id)===String(id))));
  const [selStudent,setSelStudent]=React.useState('');
  const [adding,setAdding]=React.useState(false);
  const [editing,setEditing]=React.useState(null); // resource id being edited
  const [form,setForm]=React.useState({title:'',url:'',type:'website',studentId:'',deadline:''});
  const [editForm,setEditForm]=React.useState({title:'',url:'',type:'website',deadline:''});
  const isGroupSel=selStudent.startsWith('group:');
  const groupSel=isGroupSel?(data.groups||[]).find(g=>String(g.id)===selStudent.replace('group:','')):null;
  const groupMemberIds=groupSel?.memberIds||[];
  const myResources=selStudent&&!isGroupSel?resources.filter(r=>String(r.student_id)===String(selStudent))
    :isGroupSel?resources.filter(r=>groupMemberIds.map(String).includes(String(r.student_id))):[];
  const add=async()=>{
    if(!form.title||!form.url||!selStudent){alert('Selecciona un estudiante o grupo primero');return;}
    if(isGroupSel){
      await Promise.all(groupMemberIds.map(sid=>api('resources',{action:'create',teacherId:user.id,...form,studentId:sid,sortOrder:0,deadline:form.deadline||null})));
    } else {
      await api('resources',{action:'create',teacherId:user.id,...form,studentId:selStudent,sortOrder:myResources.length,deadline:form.deadline||null});
    }
    setAdding(false);setForm({title:'',url:'',type:'website',studentId:'',deadline:''});onRefresh();
  };
  const saveEdit=async(id)=>{
    const r=await api('resources',{action:'update',id,title:editForm.title,url:editForm.url,type:editForm.type,deadline:editForm.deadline||null});
    if(r?.ok){
      setEditing(null);
      onRefresh();
    }
  };
  const del=async id=>{if(!confirm('¿Eliminar este recurso?'))return;await api('resources',{action:'delete',id});onRefresh();};
  const RTYPE={'website':'🌐 Sitio web','video':'🎬 Video','podcast':'🎙️ Podcast','doc':'📄 Documento','exercise':'✏️ Ejercicio','other':'📎 Otro'};

  const deadlineStatus=(deadline)=>{
    if(!deadline)return null;
    const today=new Date(); today.setHours(0,0,0,0);
    const d=new Date(deadline+'T00:00:00');
    const diff=Math.ceil((d-today)/(864e5));
    if(diff<0)return{label:'Venció',color:'#64748b'};
    if(diff===0)return{label:'Hoy',color:'#ef4444'};
    if(diff<=3)return{label:`${diff}d`,color:'#f97316'};
    return{label:`${diff}d`,color:'#f59e0b'};
  };

  return(
    <>
      <SectionTitle action={selStudent&&<Btn sm onClick={()=>setAdding(true)}>+ Agregar</Btn>}>🔗 Recursos</SectionTitle>
      <Select value={selStudent} onChange={e=>{setSelStudent(e.target.value);setAdding(false);}}>
        <option value="">-- Estudiante o grupo --</option>
        {groups.length>0&&<option disabled>── Grupos ──</option>}
        {groups.map(g=><option key={'g'+g.id} value={`group:${g.id}`}>👫 {g.name}</option>)}
        {groups.length>0&&<option disabled>── Estudiantes ──</option>}
        {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
      </Select>
      {!selStudent&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32,fontSize:13}}>Selecciona un estudiante para ver y gestionar sus recursos.</p>}
      {selStudent&&adding&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <p className="label">Nuevo recurso</p>
          <Select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
            {Object.entries(RTYPE).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </Select>
          <Input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Título"/>
          <Input value={form.url} onChange={e=>setForm({...form,url:e.target.value})} placeholder="URL (https://?)"/>
          <div style={{marginBottom:10}}>
            <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>📅 Deadline (opcional -- para ver antes de una clase)</p>
            <Input type="date" value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})}/>
          </div>
          <div style={{display:'flex',gap:8}}><Btn full onClick={add}>Guardar</Btn><Btn full cls="btn-ghost" onClick={()=>setAdding(false)}>Cancelar</Btn></div>
        </Card>
      )}
      {selStudent&&myResources.length===0&&!adding&&(
        <p style={{color:'var(--textMuted)',textAlign:'center',padding:24,fontSize:13}}>Este estudiante no tiene recursos asignados.</p>
      )}
      {selStudent&&myResources.map(r=>{
        const ds=deadlineStatus(r.deadline);
        const isEditing=editing===r.id;
        return(
          <Card key={r.id} style={{marginBottom:6,borderColor:isEditing?'var(--brandBorder)':ds&&ds.color!=='#64748b'?`${ds.color}55`:'var(--stroke)'}}>
            {!isEditing?(
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1}}>
                  <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{RTYPE[r.type]?.split(' ').slice(0,1)[0]||'📎'} {r.title}</p>
                  <a href={r.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'#60a5fa',wordBreak:'break-all',display:'block',marginBottom:2}}>{r.url?.length>50?r.url.slice(0,50)+'…':r.url}</a>
                  {r.deadline&&(
                    <p style={{margin:'4px 0 0',fontSize:11,color:ds?.color||'var(--textMuted)',fontWeight:600}}>
                      📅 Deadline: {fmt(r.deadline)}{ds?` · ${ds.label}`:''}
                    </p>
                  )}
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button onClick={()=>{setEditing(r.id);setEditForm({title:r.title,url:r.url,type:r.type,deadline:r.deadline||''});}}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:13,padding:'2px 4px'}}>✏️</button>
                  <Btn sm cls="btn-danger" onClick={()=>del(r.id)}>🗑</Btn>
                </div>
              </div>
            ):(
              <div>
                <p className="label" style={{marginBottom:10}}>Editar recurso</p>
                <Select value={editForm.type} onChange={e=>setEditForm({...editForm,type:e.target.value})}>
                  {Object.entries(RTYPE).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </Select>
                <Input value={editForm.title} onChange={e=>setEditForm({...editForm,title:e.target.value})} placeholder="Título"/>
                <Input value={editForm.url} onChange={e=>setEditForm({...editForm,url:e.target.value})} placeholder="URL (https://?)"/>
                <div style={{marginBottom:10}}>
                  <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>📅 Deadline (opcional)</p>
                  <Input type="date" value={editForm.deadline} onChange={e=>setEditForm({...editForm,deadline:e.target.value})}/>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <Btn full onClick={()=>saveEdit(r.id)}>💾 Guardar</Btn>
                  <Btn cls="btn-ghost" onClick={()=>setEditing(null)}>Cancelar</Btn>
                </div>
              </div>
            )}
          </Card>
        );
      })}
    </>
  );
}


function TPlan({user,data,onRefresh}){
  const students=data.students||[];
  const plans=data.plans||[];
  const myStudentIds=new Set(students.map(s=>s.id));
  const myPlans=plans.filter(p=>p.teacher_id===user.id||p.teacher_id==user.id||myStudentIds.has(p.student_id));
  const [creating,setCreating]=React.useState(false);
  const [editingPlan,setEditingPlan]=React.useState(null);
  const [open,setOpen]=React.useState(null);
  const [newComp,setNewComp]=React.useState('');
  const emptyComps=['','',''];
  const [form,setForm]=React.useState({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});
  const [cycles,setCycles]=React.useState([]);
  const [loadingCycles,setLoadingCycles]=React.useState(false);
  const dragItem=React.useRef(null);
  const dragOverItem=React.useRef(null);

  const handleDragStart=(i)=>{dragItem.current=i;};
  const handleDragEnter=(i)=>{dragOverItem.current=i;};
  const handleDrop=async()=>{
    const from=dragItem.current;
    const to=dragOverItem.current;
    if(from===null||to===null||from===to){dragItem.current=null;dragOverItem.current=null;return;}
    const nc=[...form.competencies];
    const dragged=nc.splice(from,1)[0];
    nc.splice(to,0,dragged);
    setForm(f=>({...f,competencies:nc}));
    dragItem.current=null;dragOverItem.current=null;
    const allHaveIds=nc.every(c=>typeof c==='object'&&c.id);
    if(allHaveIds){
      await api('study_plans',{action:'reorder_competencies',order:nc.map((c,i)=>({id:c.id,sortOrder:i}))});
    }
  };
  const handleDropInView=async(comps)=>{
    const from=dragItem.current;
    const to=dragOverItem.current;
    if(from===null||to===null||from===to){dragItem.current=null;dragOverItem.current=null;return;}
    const nc=[...comps];
    const dragged=nc.splice(from,1)[0];
    nc.splice(to,0,dragged);
    dragItem.current=null;dragOverItem.current=null;
    await api('study_plans',{action:'reorder_competencies',order:nc.map((c,i)=>({id:c.id,sortOrder:i}))});
    onRefresh();
  };

  const loadCycles=async(studentId)=>{
    if(!studentId)return;
    setLoadingCycles(true);
    const r=await api('students',{action:'get_cycles',studentId});
    setCycles(Array.isArray(r)?r:[]);
    setLoadingCycles(false);
  };

  const save=async()=>{
    if(editingPlan){
      const lbl=form.cycleName&&form.cycleId?fmtCycleLabel(form.cycleName,cycles.find(c=>String(c.id)===String(form.cycleId))?.start,cycles.find(c=>String(c.id)===String(form.cycleId))?.end):(form.cycleName||'');
      await api('study_plans',{action:'update_objective',id:editingPlan,objective:form.objective,cycleLabel:lbl});
      if(form.cycleId&&form.cycleName) await api('students',{action:'update_cycle_name',cycleId:form.cycleId,name:form.cycleName});
      // Update existing competencies by id, add brand-new ones (no id)
      const ops=form.competencies.map(c=>{
        const isObj=typeof c==='object';
        const desc=isObj?c.description:c;
        const cid=isObj?c.id:null;
        if(!desc||!desc.trim())return null;
        if(cid) return api('study_plans',{action:'update_competency',id:cid,description:desc});
        return api('study_plans',{action:'add_competency',planId:editingPlan,description:desc,sortOrder:99});
      }).filter(Boolean);
      await Promise.all(ops);
      setEditingPlan(null);setCreating(false);
      setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});
      onRefresh();return;
    }
    if(!form.studentId){alert('Selecciona un estudiante');return;}
    if(!form.cycleId){alert('Selecciona un ciclo');return;}
    if(!form.objective){alert('Escribe el objetivo general del ciclo');return;}
    const cycle=cycles.find(c=>String(c.id)===String(form.cycleId));
    const label=fmtCycleLabel(form.cycleName,cycle?.start,cycle?.end);
    // Save cycle name
    if(form.cycleName&&cycle){
      await api('students',{action:'update_cycle_name',cycleId:cycle.id,name:form.cycleName});
    }
    const res=await api('study_plans',{action:'create',studentId:form.studentId,teacherId:user.id,cycleLabel:label,objective:form.objective,cycleId:form.cycleId});
    const planId=res.id;
    const comps=form.competencies.map(c=>typeof c==='object'?c.description:c).filter(c=>c&&c.trim());
    await Promise.all(comps.map((c,i)=>api('study_plans',{action:'add_competency',planId,description:c,sortOrder:i})));
    setCreating(false);setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});onRefresh();
  };

  const toggle=async(id,achieved)=>{await api('study_plans',{action:'toggle_competency',id,achieved:!achieved});onRefresh();};
  const addComp=async(planId)=>{if(!newComp.trim())return;await api('study_plans',{action:'add_competency',planId,description:newComp,sortOrder:99});setNewComp('');onRefresh();};
  const deletePlan=async(p)=>{if(!window.confirm(`¿Eliminar el study plan de ${students.find(s=>s.id===p.student_id)?.name||'este estudiante'}? Esto eliminará también las competencias.`))return;await api('study_plans',{action:'delete',id:p.id});onRefresh();};

  const [openStudent,setOpenStudent]=React.useState(null);

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>{setCreating(true);setEditingPlan(null);setForm({studentId:'',cycleId:'',cycleName:'',objective:'',competencies:emptyComps});}} >+ Crear</Btn>}>🗺️ Study Plans</SectionTitle>
      {creating&&!editingPlan&&(
        <Card style={{borderColor:'var(--strokeBrand)'}}>
          <p className="label">Nuevo Study Plan</p>
          {(
            <Select value={form.studentId} onChange={e=>{setForm({...form,studentId:e.target.value,cycleId:'',cycleName:''});loadCycles(e.target.value);}}>
              <option value="">-- Estudiante --</option>
              {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
          )}
          {(form.studentId||editingPlan)&&(
            <>
              <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>📅 Selecciona el ciclo:</p>
              {loadingCycles?(
                <p style={{color:'var(--textMuted)',fontSize:12,padding:8}}>Cargando ciclos…</p>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
                  {cycles.map(c=>{const cs=cycleStatus(c.start,c.end);const sel=String(form.cycleId)===String(c.id);return(
                    <button key={c.id} onClick={()=>setForm({...form,cycleId:String(c.id),cycleName:c.name||''})}
                      style={{textAlign:'left',padding:'10px 12px',borderRadius:10,border:`1.5px solid ${sel?'var(--brand)':'var(--stroke)'}`,background:sel?'var(--brandDim)':'var(--bg3)',cursor:'pointer'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <p style={{margin:0,fontSize:13,color:sel?'var(--brand)':'var(--text)',fontWeight:600}}>{fmtCycleLabel(c.name,c.start,c.end)}</p>
                        <span style={{fontSize:11,fontWeight:700,color:cs.color,background:cs.bg,padding:'2px 8px',borderRadius:999,flexShrink:0,marginLeft:8}}>{cs.label}</span>
                      </div>
                    </button>
                  );})}
                  {cycles.length===0&&<p style={{color:'var(--textMuted)',fontSize:12}}>Este estudiante no tiene ciclos creados aún.</p>}
                </div>
              )}
            </>
          )}
          {form.cycleId&&(
            <>
              <Input value={form.cycleName} onChange={e=>setForm({...form,cycleName:e.target.value})} placeholder='Nombre del ciclo (ej: "Building Confidence in English")'/>
              {form.cycleName&&<p style={{color:'var(--textMuted)',fontSize:11,marginBottom:8,fontStyle:'italic'}}>{fmtCycleLabel(form.cycleName,cycles.find(c=>String(c.id)===form.cycleId)?.start,cycles.find(c=>String(c.id)===form.cycleId)?.end)}</p>}
              <Input value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})} placeholder="Objetivo general del ciclo…" rows={2}/>
              <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>Competencias a alcanzar:</p>
              {form.competencies.map((c,i)=>{
                const isObj=typeof c==='object';
                const val=isObj?c.description:c;
                const cId=isObj?c.id:null;
                return(
                  <div key={cId||i} draggable onDragStart={()=>handleDragStart(i)} onDragEnter={()=>handleDragEnter(i)} onDragEnd={handleDrop} onDragOver={e=>e.preventDefault()} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                    <span style={{color:'var(--textMuted)',fontSize:16,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                    <Input value={val} onChange={e=>{const nc=[...form.competencies];nc[i]=isObj?{...c,description:e.target.value}:e.target.value;setForm({...form,competencies:nc});}} placeholder={`Competencia ${i+1}…`} style={{margin:0,flex:1}}/>
                    <button onClick={async()=>{if(cId&&window.confirm('¿Eliminar esta competencia?')){await api('study_plans',{action:'delete_competency',id:cId});onRefresh();}setForm(f=>({...f,competencies:f.competencies.filter((_,j)=>j!==i)}));}} style={{flexShrink:0,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>✕</button>
                  </div>
                );
              })}
              {form.competencies.length<10&&<Btn sm cls="btn-ghost" onClick={()=>setForm(f=>({...f,competencies:[...f.competencies,'']}))}>+ Agregar competencia</Btn>}
            </>
          )}
          <div style={{display:'flex',gap:8,marginTop:8}}><Btn full onClick={save} disabled={!form.cycleId&&!editingPlan}>Guardar</Btn><Btn full cls="btn-ghost" onClick={()=>{setCreating(false);setEditingPlan(null);}}>Cancelar</Btn></div>
        </Card>
      )}
      

      {students.map(s=>{
        const sPlans=plans.filter(p=>String(p.student_id)===String(s.id));
        if(sPlans.length===0)return null;
        const isOpen=openStudent===s.id;
        return(
          <div key={s.id} style={{marginBottom:6,borderRadius:12,border:'1px solid var(--stroke)',overflow:'hidden',background:'var(--surface)'}} >
            <div onClick={()=>setOpenStudent(isOpen?null:s.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',userSelect:'none'}} >
              <span style={{fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:14,flex:1}} >{s.name}</span>
              <span style={{fontSize:12,color:'var(--textMuted)',marginRight:6}} >{sPlans.length} plan{sPlans.length!==1?'es':''}</span>
              <span style={{color:'var(--textMuted)',fontSize:12}} >{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen&&sPlans.map(p=>{
              const isOpenP=open===p.id||editingPlan===p.id;
              const pName=p.cycle_name||(p.cycle_label?.replace(/^Cycle\s*--\s*/,'').replace(/\s*\(.*$/,'').trim())||(p.cycle_label||'Sin etiqueta');
              const pDates=p.cycle_start&&p.cycle_end?`${fmtCycleDate(p.cycle_start)} – ${fmtCycleDate(p.cycle_end)}`:'';
              const done2=p.competencies?.filter(c=>parseInt(c.achieved)===1).length||0;
              const tot2=p.competencies?.length||0;
              return(
                <div key={p.id} style={{borderTop:'1px solid var(--stroke)',padding:'12px 14px',background:'var(--bg3)'}} >
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}} >
                    <div style={{flex:1,cursor:'pointer'}} onClick={()=>{if(editingPlan===p.id)return;setOpen(isOpenP?null:p.id);}}>
                      <p style={{margin:'0 0 1px',fontFamily:'Sora',fontWeight:700,color:'var(--text)',fontSize:13}}>{pName}</p>
                      {pDates&&<p style={{margin:'0 0 2px',fontSize:11,color:'var(--textMuted)'}}>{pDates}</p>}
                      <p style={{margin:'0 0 3px',color:'var(--textMuted)',fontSize:12,lineHeight:1.4}}>{p.objective}</p>
                      <span style={{fontSize:11,color:'var(--textMuted)'}}>{done2}/{tot2} competencias</span>
                    </div>
                    <div style={{display:'flex',gap:5,marginLeft:8}} >
                      <Btn sm cls={editingPlan===p.id?'btn-primary':'btn-ghost'} onClick={e=>{e.stopPropagation();if(editingPlan===p.id){setEditingPlan(null);return;}const ec=p.competencies&&p.competencies.length>0?p.competencies.map(c=>({...c})):emptyComps.map(t=>({description:t,id:null,achieved:false}));const cn=p.cycle_name||(p.cycle_label?.replace(/^Cycle\s*--\s*/,'').replace(/\s*\(.*$/,'').trim())||'';setForm({studentId:p.student_id,cycleId:String(p.cycle_id||''),cycleName:cn,objective:p.objective,competencies:ec});setEditingPlan(p.id);setOpen(p.id);}}>✏️</Btn>
                      <Btn sm cls="btn-danger" onClick={e=>{e.stopPropagation();deletePlan(p);}}>🗑</Btn>
                      <button onClick={e=>{e.stopPropagation();if(editingPlan===p.id)return;setOpen(isOpenP?null:p.id);}} style={{background:'none',border:'none',color:isOpenP?'var(--textMuted)':'var(--brand)',cursor:'pointer',fontSize:isOpenP?14:11,fontWeight:isOpenP?400:600,padding:'2px 6px',whiteSpace:'nowrap'}} >{isOpenP?'▲':`${done2}/${tot2} ✓ Marcar competencias →`}</button>
                    </div>
                  </div>
                  {isOpenP&&(
                    <div>
                      {editingPlan===p.id?(
                        <>
                          <Input value={form.cycleName} onChange={e=>setForm({...form,cycleName:e.target.value})} placeholder='Nombre del ciclo…'/>
                          <Input value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})} placeholder="Objetivo general…"/>
                          <p style={{color:'var(--textMuted)',fontSize:12,margin:'8px 0 4px'}}>Competencias:</p>
                          {form.competencies.map((c,i)=>{const isObj=typeof c==='object';const val=isObj?c.description:c;const cId=isObj?c.id:null;return(
                            <div key={cId||i} draggable onDragStart={()=>handleDragStart(i)} onDragEnter={()=>handleDragEnter(i)} onDragEnd={handleDrop} onDragOver={e=>e.preventDefault()} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                              <span style={{color:'var(--textMuted)',fontSize:16,cursor:'grab',flexShrink:0,userSelect:'none'}}>⠿</span>
                              <Input value={val} onChange={e=>{const nc=[...form.competencies];nc[i]=isObj?{...c,description:e.target.value}:e.target.value;setForm({...form,competencies:nc});}} placeholder={`Competencia ${i+1}…`} style={{margin:0,flex:1}}/>
                              <button onClick={async()=>{if(cId&&window.confirm('¿Eliminar esta competencia?')){await api('study_plans',{action:'delete_competency',id:cId});onRefresh();}setForm(f=>({...f,competencies:f.competencies.filter((_,j)=>j!==i)}));}} style={{flexShrink:0,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>✕</button>
                            </div>
                          );})}
                          {form.competencies.length<10&&<Btn sm cls="btn-ghost" onClick={()=>setForm(f=>({...f,competencies:[...f.competencies,'']}))}>+ Agregar</Btn>}
                          <div style={{display:'flex',gap:8,marginTop:10}}>
                            <Btn full onClick={save}>💾 Guardar</Btn>
                            <Btn full cls="btn-ghost" onClick={()=>setEditingPlan(null)}>Cancelar</Btn>
                          </div>
                        </>
                      ):(
                        <>
                          {p.competencies?.map((c,ci)=>{
                            const ach=parseInt(c.achieved)===1;
                            return(
                            <div key={c.id} draggable onDragStart={()=>handleDragStart(ci)} onDragEnter={()=>handleDragEnter(ci)} onDragEnd={()=>handleDropInView(p.competencies)} onDragOver={e=>e.preventDefault()} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,borderRadius:8,background:ach?'rgba(20,184,166,.07)':'var(--surface)',border:`1px solid ${ach?'rgba(20,184,166,.3)':'var(--stroke)'}`,overflow:'hidden'}}>
                              <span style={{color:'var(--textMuted)',fontSize:16,cursor:'grab',flexShrink:0,userSelect:'none',padding:'10px 4px 10px 10px'}}>⠿</span>
                              <div onClick={()=>toggle(c.id,ach)} style={{display:'flex',alignItems:'center',gap:8,flex:1,cursor:'pointer',padding:'10px 10px 10px 2px'}}>
                                <div style={{width:22,height:22,borderRadius:999,border:`2px solid ${ach?'var(--brand)':'var(--stroke)'}`,background:ach?'var(--brand)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:900,color:'#fff',lineHeight:1}}>{ach?'✓':''}</div>
                                <span style={{flex:1,fontSize:13,color:ach?'var(--textMuted)':'var(--text)',textDecoration:ach?'line-through':'none',opacity:ach?.7:1}}>{c.description}</span>
                                <span style={{fontSize:11,flexShrink:0,fontWeight:600,color:ach?'var(--brand)':'var(--textMuted)',background:ach?'rgba(20,184,166,.12)':'var(--bg3)',padding:'2px 8px',borderRadius:999,border:`1px solid ${ach?'rgba(20,184,166,.3)':'var(--stroke)'}`}}>{ach?'✓ Lograda':'Marcar ✓'}</span>
                              </div>
                            </div>
                            );
                          })}
                          <div style={{display:'flex',gap:6,marginTop:8}} >
                            <Input value={newComp} onChange={e=>setNewComp(e.target.value)} placeholder="Nueva competencia…" style={{margin:0,flex:1}}/>
                            <Btn sm onClick={()=>addComp(p.id)}>+</Btn>
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
      {plans.length===0&&!creating&&<p style={{color:'var(--textMuted)',textAlign:'center',padding:32}} >No hay study plans aún.</p>}
    </>
  );
}


function TMovements({user,data,onRefresh}){
  const mvs=data.movements||[],students=data.students||[];
  const [adding,setAdding]=React.useState(false);
  const [form,setForm]=React.useState({studentId:'',cancelledDate:'',reason:''});
  const [reschedId,setReschedId]=React.useState(null);
  const [rf,setRF]=React.useState({newDate:'',newTime:'',agreementNote:''});
  const [busy,setBusy]=React.useState(false);

  const create=async()=>{
    if(!form.studentId||!form.cancelledDate)return;
    const s=students.find(x=>x.id===form.studentId);
    const leftTok=(s?.tokensMax||2)-(s?.tokensUsed||0);
    if(leftTok<=0&&!confirm(`⚠️ ${s?.name} no tiene tokens disponibles en este ciclo. ¿Registrar de todas formas?`))return;
    setBusy(true);
    await api('movements',{action:'create',teacherId:user.id,...form,registeredBy:user.name||'teacher'});
    setBusy(false);
    setAdding(false);
    setForm({studentId:'',cancelledDate:'',reason:''});
    onRefresh();
  };

  const resched=async()=>{
    if(!rf.newDate)return;
    setBusy(true);
    await api('movements',{action:'reschedule',id:reschedId,...rf});
    setBusy(false);
    setReschedId(null);
    setRF({newDate:'',newTime:'',agreementNote:''});
    onRefresh();
  };

  const deleteMov=async(id,status)=>{
    const msg=status==='pending'
      ?'¿Eliminar este movimiento? Se devolverá el token al estudiante.'
      :'¿Eliminar este movimiento?';
    if(!confirm(msg))return;
    await api('movements',{action:'delete',id});
    onRefresh();
  };

  const pend=mvs.filter(m=>m.status==='pending');
  const done=mvs.filter(m=>m.status==='rescheduled');
  const expired=mvs.filter(m=>m.status==='expired');

  const daysLeft=(expiresAt)=>Math.max(0,Math.ceil((new Date(expiresAt)-new Date())/(864e5)));

  // Find which movement is being rescheduled (to show context)
  const reschedMov=mvs.find(m=>m.id===reschedId);
  const reschedStudent=reschedMov?students.find(x=>x.id===reschedMov.student_id)||{name:reschedMov.student_name||'?'}:null;

  return(
    <>
      <SectionTitle action={<Btn sm onClick={()=>{setAdding(v=>!v);setReschedId(null);}}>+ Registrar cancelación</Btn>}>🗓️ Movimientos</SectionTitle>

      {/* Form: register cancelled class */}
      {adding&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:14}}>
          <p className="label">Registrar clase cancelada</p>
          <p style={{fontSize:12,color:'var(--textMuted)',marginBottom:10,lineHeight:1.5}}>
            Al registrar, se descuenta automáticamente un token del ciclo actual del estudiante.
          </p>
          <Select value={form.studentId} onChange={e=>setForm({...form,studentId:e.target.value})}>
            <option value="">-- Estudiante --</option>
            {students.map(s=>{
              const left=(s.tokensMax||2)-(s.tokensUsed||0);
              return <option key={s.id} value={s.id}>{s.name} ({left} token{left!==1?'s':''} disponible{left!==1?'s':''})</option>;
            })}
          </Select>
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:4,fontWeight:600}}>FECHA DE LA CLASE CANCELADA</p>
          <Input type="date" value={form.cancelledDate} onChange={e=>setForm({...form,cancelledDate:e.target.value})}/>
          <Input value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} placeholder="Motivo (opcional)" rows={2}/>
          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={create} disabled={busy||!form.studentId||!form.cancelledDate}>
              {busy?'Registrando…':'🗓️ Registrar y descontar token'}
            </Btn>
            <Btn cls="btn-ghost" onClick={()=>setAdding(false)}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Form: assign new date */}
      {reschedId&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:14}}>
          <p className="label">Confirmar reagendamiento</p>
          {reschedMov&&(
            <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:12}}>
              <p style={{margin:'0 0 2px',fontWeight:700,color:'var(--text)'}}>{reschedStudent?.name}</p>
              <p style={{margin:0,color:'var(--textMuted)'}}>Clase original: {fmt(reschedMov.cancelled_date)}</p>
            </div>
          )}
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:4,fontWeight:600}}>NUEVA FECHA</p>
          <Input type="date" value={rf.newDate} onChange={e=>setRF({...rf,newDate:e.target.value})}/>
          <Input value={rf.newTime} onChange={e=>setRF({...rf,newTime:e.target.value})} placeholder="Hora (ej: 3:00 PM -- opcional)"/>
          <Input value={rf.agreementNote} onChange={e=>setRF({...rf,agreementNote:e.target.value})} placeholder="Nota del acuerdo… (opcional)" rows={2}/>
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:10,lineHeight:1.5}}>
            No se descuenta token adicional -- ya se descontó al registrar la cancelación.
          </p>
          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={resched} disabled={busy||!rf.newDate}>
              {busy?'Guardando…':'✅ Confirmar acuerdo'}
            </Btn>
            <Btn cls="btn-ghost" onClick={()=>setReschedId(null)}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {/* Pending */}
      {pend.length>0&&(
        <>
          <p className="label" style={{color:'#f97316'}}>⏳ Pendientes de reagendar ({pend.length})</p>
          {pend.map(m=>{
            const s=students.find(x=>x.id===m.student_id)||{name:m.student_name||'?'};
            const d=daysLeft(m.expires_at);
            const urgent=d<=7;
            return(
              <Card key={m.id} style={{borderColor:urgent?'rgba(239,68,68,.4)':'rgba(249,115,22,.3)',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div>
                    <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)'}}>{s.name}</p>
                    <p style={{margin:0,color:'var(--textMuted)',fontSize:12}}>Clase del {fmt(m.cancelled_date)}</p>
                    {m.reason&&<p style={{margin:'2px 0 0',color:'var(--textMuted)',fontSize:11,fontStyle:'italic'}}>"{m.reason}"</p>}
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
                    <span style={{display:'block',fontFamily:'Sora',fontWeight:900,fontSize:20,color:urgent?'#ef4444':'#f97316'}}>{d}d</span>
                    <span style={{fontSize:10,color:'var(--textMuted)'}}>para expirar</span>
                  </div>
                </div>
                <p style={{margin:'0 0 8px',fontSize:11,color:'var(--textMuted)'}}>
                  {urgent?'⚠️ Urgente -- ':''}Expira el {fmt(m.expires_at)}
                </p>
                <div style={{display:'flex',gap:6}}>
                  <Btn sm onClick={()=>{setReschedId(m.id);setRF({newDate:'',newTime:'',agreementNote:''});setAdding(false);}}>
                    📅 Asignar nueva fecha
                  </Btn>
                  <Btn sm cls="btn-danger" onClick={()=>deleteMov(m.id,'pending')}>🗑</Btn>
                </div>
              </Card>
            );
          })}
        </>
      )}

      {/* Rescheduled */}
      {done.length>0&&(
        <>
          <p className="label" style={{marginTop:pend.length?14:0}}>✅ Acuerdos confirmados ({done.length})</p>
          {done.map(m=>{
            const s=students.find(x=>x.id===m.student_id)||{name:m.student_name||'?'};
            return(
              <Card key={m.id} style={{borderColor:'var(--strokeBrand)',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div>
                    <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--text)'}}>{s.name}</p>
                    <p style={{margin:0,color:'var(--textMuted)',fontSize:12}}>Clase original: {fmt(m.cancelled_date)}</p>
                  </div>
                  <Badge color="var(--brand)">Reagendada</Badge>
                </div>
                <div style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:10,padding:'10px 12px',marginBottom:8}}>
                  <p style={{margin:'0 0 2px',fontWeight:700,color:'var(--brand)',fontSize:13}}>
                    📅 {fmt(m.new_date)}{m.new_time&&<> · <ClassTime date={m.new_date} time={m.new_time}/></>}
                  </p>
                  {m.agreement_note&&<p style={{margin:'3px 0 0',color:'var(--textSub)',fontSize:12,fontStyle:'italic'}}>"{m.agreement_note}"</p>}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <p style={{margin:0,fontSize:11,color:'var(--textMuted)'}}>Registrado por: {m.registered_by}</p>
                  <Btn sm cls="btn-danger" onClick={()=>deleteMov(m.id,'rescheduled')}>🗑</Btn>
                </div>
              </Card>
            );
          })}
        </>
      )}

      {/* Expired */}
      {expired.length>0&&(
        <>
          <p className="label" style={{marginTop:14,color:'#64748b'}}>⏰ Expiradas ({expired.length})</p>
          {expired.map(m=>{
            const s=students.find(x=>x.id===m.student_id)||{name:m.student_name||'?'};
            return(
              <div key={m.id} style={{marginBottom:6,padding:'10px 14px',borderRadius:12,border:'1px solid var(--stroke)',background:'var(--surface)',opacity:.7}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <p style={{margin:'0 0 2px',fontFamily:'Sora',fontWeight:700,color:'var(--textMuted)',fontSize:13}}>{s.name}</p>
                    <p style={{margin:0,color:'var(--textMuted)',fontSize:12}}>Clase del {fmt(m.cancelled_date)} · Venció {fmt(m.expires_at)}</p>
                  </div>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <Badge color="#64748b">Expirada</Badge>
                    <Btn sm cls="btn-danger" onClick={()=>deleteMov(m.id,'expired')}>🗑</Btn>
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {mvs.length===0&&!adding&&(
        <Card style={{textAlign:'center',padding:32}}>
          <p style={{fontSize:24,marginBottom:8}}>✅</p>
          <p style={{color:'var(--textMuted)'}}>No hay movimientos registrados.</p>
        </Card>
      )}
    </>
  );
}
