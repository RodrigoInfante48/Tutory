// --- ADMIN TO-DO LIST --------------------------------------
function ATodos({data,onRefresh}){
  const todos=data.todos||[];
  const [showDone,setShowDone]=React.useState(false);
  const [doneTodos,setDoneTodos]=React.useState([]);
  const [loadingDone,setLoadingDone]=React.useState(false);

  const pending=todos.filter(t=>!parseInt(t.is_done));

  const loadDone=async()=>{
    setLoadingDone(true);
    const r=await api('todos','','&done=1').catch(()=>[]);
    setDoneTodos(Array.isArray(r)?r:[]);
    setLoadingDone(false);
  };

  React.useEffect(()=>{ if(showDone) loadDone(); },[showDone]);

  const markDone=async(id)=>{
    await api('todos',{action:'mark_done',id});
    onRefresh();
  };
  const markUndone=async(id)=>{
    await api('todos',{action:'mark_undone',id});
    onRefresh();
    loadDone();
  };
  const del=async(id)=>{
    await api('todos',{action:'delete',id});
    onRefresh();
    if(showDone) loadDone();
  };

  const TYPE_STYLE={
    delete_event:{emoji:'🗑️',color:'#ef4444',label:'Eliminar evento'},
    add_invite:   {emoji:'📩',color:'#86ef86',label:'Enviar invite'},
    general:      {emoji:'📋',color:'#94a3b8',label:'General'},
  };

  const fmtTs=ts=>{if(!ts)return'';const d=new Date(ts.replace(' ','T')+'Z');return d.toLocaleDateString('es-CO',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});};

  const TodoCard=({t,done})=>{
    const sty=TYPE_STYLE[t.type]||TYPE_STYLE.general;
    return(
      <div style={{display:'flex',gap:10,padding:'12px 14px',borderRadius:12,background:done?'var(--surface)':'var(--bg3)',border:`1px solid ${done?'var(--stroke)':sty.color+'44'}`,marginBottom:8,opacity:done?.6:1,transition:'opacity .2s'}}>
        <span style={{fontSize:20,flexShrink:0,marginTop:2}}>{sty.emoji}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
            <span style={{fontSize:10,fontWeight:700,color:sty.color,textTransform:'uppercase',letterSpacing:.5,background:sty.color+'18',borderRadius:4,padding:'1px 6px'}}>{sty.label}</span>
            <span style={{fontSize:10,color:'var(--textMuted)'}}>{fmtTs(t.created_at)}</span>
          </div>
          <p style={{margin:0,fontSize:13,color:done?'var(--textMuted)':'var(--text)',lineHeight:1.55,textDecoration:done?'line-through':''}}>{t.text}</p>
          {t.student_email&&!done&&(
            <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:11,color:'var(--textMuted)'}}>✉️ Correo:</span>
              <span style={{fontSize:11,fontWeight:700,color:'var(--brand)',fontFamily:'monospace'}}>{t.student_email}</span>
              <button onClick={()=>navigator.clipboard?.writeText(t.student_email)}
                style={{fontSize:10,background:'var(--brandDim)',border:'1px solid var(--brandBorder)',color:'var(--brand)',borderRadius:4,padding:'1px 6px',cursor:'pointer'}}>
                Copiar
              </button>
            </div>
          )}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
          {!done&&<button onClick={()=>markDone(t.id)} style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',color:'var(--brand)',borderRadius:8,padding:'5px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ Listo</button>}
          {done&&<button onClick={()=>markUndone(t.id)} style={{background:'var(--surface)',border:'1px solid var(--stroke)',color:'var(--textMuted)',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer'}}>↩ Reabrir</button>}
          <button onClick={()=>del(t.id)} style={{background:'none',border:'1px solid var(--stroke)',color:'#ef4444',borderRadius:8,padding:'4px 8px',fontSize:11,cursor:'pointer'}}>🗑</button>
        </div>
      </div>
    );
  };

  return(
    <>
      <SectionTitle>✅ To-Do ({pending.length} pendiente{pending.length!==1?'s':''})</SectionTitle>

      {pending.length===0&&(
        <Card style={{textAlign:'center',padding:32}}>
          <p style={{fontSize:28,marginBottom:8}}>🎉</p>
          <p style={{color:'var(--textMuted)',fontSize:13}}>No hay tareas pendientes. ¡Todo al día!</p>
        </Card>
      )}

      {pending.map(t=><TodoCard key={t.id} t={t} done={false}/>)}

      <div style={{marginTop:16}}>
        <button onClick={()=>setShowDone(v=>!v)}
          style={{background:'none',border:'none',color:'var(--textMuted)',fontSize:12,cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted',textUnderlineOffset:3}}>
          {showDone?'Ocultar completadas':'Ver tareas completadas'}
        </button>
      </div>

      {showDone&&(
        <div style={{marginTop:12}}>
          {loadingDone&&<p style={{color:'var(--textMuted)',fontSize:13}}>Cargando…</p>}
          {!loadingDone&&doneTodos.length===0&&<p style={{color:'var(--textMuted)',fontSize:13}}>No hay tareas completadas aún.</p>}
          {doneTodos.map(t=><TodoCard key={t.id} t={t} done={true}/>)}
        </div>
      )}
    </>
  );
}

// --- ADMIN ANALYTICS ---------------------------------------
function AAnalytics({data}){
  const students=data.students||[];
  const results=data.results||[];
  const topics=data.topics||[];
  const plans=data.plans||[];
  const movements=data.movements||[];
  const activity=data.activity||{};
  const allActivity=[...(activity.teacher||[]),...(activity.student||[])];

  // -- Paquetes --
  const pkgCount=students.reduce((acc,s)=>{acc[s.pkg]=(acc[s.pkg]||0)+1;return acc;},{});
  const pkgOrder=['Starter','Essential','Progress','Intensive','Master'];
  const pkgColors={Starter:'#64748b',Essential:'#3b82f6',Progress:'#8b5cf6',Intensive:'#f97316',Master:'#f59e0b','Power⚡':'#ec4899','Flex4🎯':'#14b8a6','Flex8🎯':'#14b8a6','Flex12🎯':'#14b8a6','Flex16🎯':'#14b8a6','Flex20🎯':'#14b8a6'};

  // -- Ciclos por vencer / activos --
  const expiring=students.filter(s=>s.cycle?.expiring).length;
  const payPending=students.filter(s=>s.paymentPending).length;
  const active=students.filter(s=>s.isActive!==false).length;

  // Retencion: estudiantes con ciclo activo hace +3 ciclos (aprox >90 dias)
  const retained=students.filter(s=>{
    if(!s.cycleStartYear)return false;
    const start=new Date(`${s.cycleStartYear}-${String(s.cycleStartMonth||1).padStart(2,'0')}-01`);
    const diffDays=(new Date()-start)/(1000*60*60*24);
    return diffDays>90;
  }).length;

  // -- Actividad ultimos 7 dias --
  const weekAgo=new Date(Date.now()-7*24*60*60*1000);
  const recentActivity=allActivity.filter(a=>new Date(a.created_at)>weekAgo);
  const activeStudentsWeek=new Set(recentActivity.filter(a=>a.actor_role==='student').map(a=>a.actor_id)).size;

  // -- Quiz performance --
  const byTopic=topics.map(t=>{
    // count answers from activity or results -- use results scores
    const topicResults=results.filter(r=>r.quizTitle===t.name);
    const avgScore=topicResults.length>0?Math.round(topicResults.reduce((a,r)=>a+(r.score/r.total*100),0)/topicResults.length):null;
    return{name:t.name,count:t.questionCount||0,avgScore,attempts:topicResults.length};
  }).filter(t=>t.attempts>0).sort((a,b)=>b.attempts-a.attempts).slice(0,8);

  // -- Tareas --
  const totalMovements=movements.length;
  const pendingMovements=movements.filter(m=>m.status==='pending').length;

  // -- Study plans completion --
  const totalPlans=plans.length;
  const plansWithComps=plans.filter(p=>p.competencies?.length>0);
  const avgCompAchieved=plansWithComps.length>0
    ?Math.round(plansWithComps.reduce((a,p)=>{
        const done=p.competencies.filter(c=>c.achieved).length;
        return a+(p.competencies.length>0?done/p.competencies.length*100:0);
      },0)/plansWithComps.length)
    :null;

  // -- Activity last 30 days by type --
  const monthAgo=new Date(Date.now()-30*24*60*60*1000);
  const monthActivity=allActivity.filter(a=>new Date(a.created_at)>monthAgo);
  const actByType=monthActivity.reduce((acc,a)=>{acc[a.type]=(acc[a.type]||0)+1;return acc;},{});
  const topActTypes=Object.entries(actByType).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const actTypeLabels={'quiz_set_complete':'Quiz completado','summary_viewed':'Resumen visto','chispa_message':'Mensaje Practice',
    'content_assigned':'Contenido asignado','task_submitted':'Tarea lista','competency_achieved':'Competencia lograda',
    'study_plan_created':'Plan creado','resource_viewed':'Recurso visto','login':'Login'};

  const StatCard=({label,value,sub,color,warn})=>(
    <div style={{flex:'1 1 calc(50% - 6px)',minWidth:130,background:'var(--surface)',border:`1px solid ${warn?'rgba(249,115,22,.4)':'var(--stroke)'}`,borderRadius:14,padding:'14px 16px'}}>
      <p style={{margin:'0 0 3px',fontFamily:'Sora',fontWeight:900,fontSize:28,color:color||(warn?'#f97316':'var(--brand)')}}>{value}</p>
      <p style={{margin:0,fontSize:11,fontWeight:700,color:'var(--textMuted)',textTransform:'uppercase',letterSpacing:'.06em',lineHeight:1.3}}>{label}</p>
      {sub&&<p style={{margin:'4px 0 0',fontSize:11,color:'var(--textSub)'}}>{sub}</p>}
    </div>
  );

  const Bar=({pct,color})=>(
    <div style={{flex:1,height:8,background:'var(--bg3)',borderRadius:99,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:color||'var(--brand)',borderRadius:99,transition:'width .6s'}}/>
    </div>
  );

  return(
    <>
      <SectionTitle>📊 Analytics</SectionTitle>

      {/* KPIs principales */}
      <p className="label">Estudiantes</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:16}}>
        <StatCard label="Total activos" value={active} sub={`${retained} con +3 ciclos`}/>
        <StatCard label="Pago pendiente" value={payPending} warn={payPending>0} sub={payPending>0?'Requieren atención':undefined}/>
        <StatCard label="Ciclos por vencer" value={expiring} warn={expiring>0} color={expiring>0?'#f97316':undefined}/>
        <StatCard label="Activos esta semana" value={activeStudentsWeek} sub="con alguna actividad"/>
      </div>

      {/* Distribución de paquetes */}
      <p className="label">Distribución por paquete</p>
      <Card style={{marginBottom:14}}>
        {pkgOrder.filter(p=>pkgCount[p]>0).map(p=>{
          const count=pkgCount[p]||0;
          const pct=active>0?Math.round(count/active*100):0;
          return(
            <div key={p} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:700,color:pkgColors[p]}}>{PKG[p]?.icon||''} {p}</span>
                <span style={{fontSize:12,color:'var(--textMuted)'}}>{count} estudiante{count!==1?'s':''} · {pct}%</span>
              </div>
              <Bar pct={pct} color={pkgColors[p]}/>
            </div>
          );
        })}
        {Object.keys(pkgCount).length===0&&<p style={{color:'var(--textMuted)',fontSize:13,textAlign:'center',padding:8}}>Sin estudiantes registrados</p>}
      </Card>

      {/* Retención estimada */}
      <p className="label">Retención</p>
      <Card style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:13,color:'var(--text)'}}>Estudiantes con más de 3 ciclos</span>
          <span style={{fontFamily:'Sora',fontWeight:900,fontSize:18,color:'var(--brand)'}}>{active>0?Math.round(retained/active*100):0}%</span>
        </div>
        <Bar pct={active>0?Math.round(retained/active*100):0}/>
        <p style={{margin:'6px 0 0',fontSize:11,color:'var(--textMuted)'}}>{retained} de {active} estudiantes activos</p>
      </Card>

      {/* Actividad del mes */}
      {topActTypes.length>0&&(
        <>
          <p className="label">Actividad últimos 30 días ({monthActivity.length} eventos)</p>
          <Card style={{marginBottom:14}}>
            {topActTypes.map(([type,count])=>{
              const maxCount=topActTypes[0][1];
              return(
                <div key={type} style={{marginBottom:9}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:12,color:'var(--textSub)'}}>{actTypeLabels[type]||type}</span>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--brand)'}}>{count}</span>
                  </div>
                  <Bar pct={Math.round(count/maxCount*100)} color="rgba(134,239,134,.6)"/>
                </div>
              );
            })}
          </Card>
        </>
      )}

      {/* Quiz performance por tema */}
      {byTopic.length>0&&(
        <>
          <p className="label">Rendimiento en quizzes por tema</p>
          <Card style={{marginBottom:14}}>
            {byTopic.map(t=>{
              const col=t.avgScore>=70?'var(--brand)':t.avgScore>=50?'#f59e0b':'#ef4444';
              return(
                <div key={t.name} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,gap:8}}>
                    <span style={{fontSize:12,color:'var(--text)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
                    <span style={{fontSize:12,fontWeight:700,color:col,flexShrink:0}}>{t.avgScore}% · {t.attempts} intento{t.attempts!==1?'s':''}</span>
                  </div>
                  <Bar pct={t.avgScore} color={col}/>
                </div>
              );
            })}
          </Card>
        </>
      )}

      {/* Study plans */}
      {totalPlans>0&&(
        <>
          <p className="label">Study Plans</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:16}}>
            <StatCard label="Planes creados" value={totalPlans} color="#a78bfa"/>
            {avgCompAchieved!==null&&<StatCard label="Competencias logradas" value={`${avgCompAchieved}%`} color="#a78bfa" sub="promedio entre planes"/>}
          </div>
        </>
      )}

      {/* Movimientos */}
      {totalMovements>0&&(
        <>
          <p className="label">Movimientos de clase</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:16}}>
            <StatCard label="Total registrados" value={totalMovements} color="#f59e0b"/>
            <StatCard label="Por resolver" value={pendingMovements} warn={pendingMovements>0} color={pendingMovements>0?'#f97316':undefined}/>
          </div>
        </>
      )}
    </>
  );
}

// -- MARKDOWN RENDERER -----------------------------------------
function renderMd(text,viewerRole){
  if(!text) return null;
  // Detect Google Calendar links -- only show button to teacher/admin
  const CAL_MARKER='🗓️ Agregar a Google Calendar:\n';
  if(text.includes(CAL_MARKER)){
    const parts=text.split(CAL_MARKER);
    const before=parts[0];
    const urlAndAfter=parts[1]||'';
    const url=urlAndAfter.split('\n')[0].trim();
    const after=urlAndAfter.slice(url.length);
    const isStudent=viewerRole==='student';
    return(
      <span>
        {renderMd(before,viewerRole)}
        {!isStudent&&(
          <a href={url} target="_blank" rel="noopener"
            style={{display:'inline-flex',alignItems:'center',gap:6,marginTop:6,background:'rgba(134,239,134,.15)',border:'1px solid rgba(134,239,134,.35)',color:'#86ef86',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,textDecoration:'none',lineHeight:1}}>
            🗓️ Agregar a Google Calendar
          </a>
        )}
        {after&&renderMd(after,viewerRole)}
      </span>
    );
  }
  // Escape HTML first
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html=esc
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.+?)__/g,'<u>$1</u>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:rgba(0,0,0,.15);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.9em">$1</code>')
    .replace(/(https?:\/\/[^\s<>&"']+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer" style="color:var(--brand);text-decoration:underline;word-break:break-all;">$1</a>')
    .replace(/\n/g,'<br/>');
  // Render [ZOOM_BTN:url] markers as "Join Zoom Class" button
  const ZOOM_BTN_RE=/\[ZOOM_BTN:(https?:\/\/[^\]]+)\]/;
  if(ZOOM_BTN_RE.test(text)){
    const parts=text.split(ZOOM_BTN_RE);
    return(
      <span>
        {parts.map((p,i)=>i%2===0
          ?renderMd(p,viewerRole)
          :<a key={i} href={p} target="_blank" rel="noopener"
            style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:10,background:'#2D8CFF',color:'#fff',borderRadius:12,padding:'11px 20px',fontSize:14,fontWeight:800,textDecoration:'none',lineHeight:1,boxShadow:'0 3px 12px rgba(45,140,255,.5)',letterSpacing:'.01em',fontFamily:'inherit'}}>
            📹 Join Zoom Class
          </a>
        )}
      </span>
    );
  }
  // Render [img:base64] markers
  const IMG_RE=/\[img:([^\]]+)\]/g;
  if(IMG_RE.test(text)){
    const parts=text.split(/\[img:([^\]]+)\]/);
    return(
      <span>
        {parts.map((p,i)=>i%2===0
          ?renderMd(p,viewerRole)
          :<img key={i} src={p} alt="imagen" style={{maxWidth:'100%',borderRadius:8,marginTop:6,marginBottom:6,display:'block'}}/>
        )}
      </span>
    );
  }
  return <span dangerouslySetInnerHTML={{__html:html}}/>;
}

// -- CHAT INPUT WITH FORMATTING TOOLBAR ------------------------
const EMOJI_LIST=['😊','😂','😍','🥰','😎','🤔','😅','😭','🙏','👍','👎','❤️','🔥','✅','⚡','🎉','🥳','💪','👏','🌟','🙌','💡','📚','✍️','🗣️','📝','🎯','🚀','💬','👀','🤣','😴','😬','🤗','🫡','💯','🫶','🙈','🤦','🤷'];
function ChatInput({value,onChange,onSend,sending,placeholder='Escribe un mensaje…',onImage,onVoice}){
  const ref=React.useRef(null);
  const [showFormat,setShowFormat]=React.useState(false);
  const [showEmoji,setShowEmoji]=React.useState(false);
  const [recording,setRecording]=React.useState(false);
  const [recSeconds,setRecSeconds]=React.useState(0);
  const mediaRecRef=React.useRef(null);
  const chunksRef=React.useRef([]);
  const timerRef=React.useRef(null);

  // Auto-resize textarea as user types
  React.useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,160)+'px';
  },[value]);

  // Timer counter while recording
  React.useEffect(()=>{
    if(!recording){clearInterval(timerRef.current);return;}
    setRecSeconds(0);
    timerRef.current=setInterval(()=>setRecSeconds(s=>s+1),1000);
    return()=>clearInterval(timerRef.current);
  },[recording]);

  // Auto-stop at 5 minutes
  React.useEffect(()=>{if(recSeconds>=300)stopRecording();},[recSeconds]);

  const stopRecording=()=>{
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive')mediaRecRef.current.stop();
    setRecording(false);
  };

  const toggleRecording=async()=>{
    if(recording){stopRecording();return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      const mr=new MediaRecorder(stream,{mimeType});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType});
        if(blob.size>5000000){alert('El audio es muy largo. Máximo ~5 minutos.');return;}
        const reader=new FileReader();
        reader.onload=ev=>onVoice(ev.target.result);
        reader.readAsDataURL(blob);
      };
      mr.start();
      mediaRecRef.current=mr;
      setRecording(true);
    }catch(e){alert('No se pudo acceder al micrófono. Verifica los permisos del navegador.');}
  };

  const fmtSecs=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const wrap=(before,after,sample)=>{
    const el=ref.current;
    if(!el) return;
    const s=el.selectionStart,e=el.selectionEnd;
    const sel=value.slice(s,e)||sample;
    const next=value.slice(0,s)+before+sel+after+value.slice(e);
    onChange(next);
    setTimeout(()=>{el.focus();el.setSelectionRange(s+before.length,s+before.length+sel.length);},0);
  };

  const onKey=e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend();}
    if(e.ctrlKey||e.metaKey){
      if(e.key==='b'){e.preventDefault();wrap('**','**','texto');}
      if(e.key==='i'){e.preventDefault();wrap('_','_','texto');}
      if(e.key==='u'){e.preventDefault();wrap('__','__','texto');}
      if(e.key==='s'||e.key==='d'){e.preventDefault();wrap('~~','~~','texto');}
    }
  };

  const Tb=({onClick,title,children,active})=>(
    <button onClick={onClick} title={title}
      style={{background:active?'var(--brandDim)':'none',border:`1px solid ${active?'var(--brand)':'var(--stroke)'}`,
        borderRadius:6,cursor:'pointer',padding:'4px 9px',fontSize:13,fontWeight:700,
        color:active?'var(--brand)':'var(--text)',lineHeight:1.3,minWidth:28,textAlign:'center'}}>
      {children}
    </button>
  );

  return(
    <div style={{borderTop:'1px solid var(--stroke)',background:'var(--surface)',position:'relative',overflow:'visible'}}>
      {/* Format toolbar — toggleable, hidden by default on mobile */}
      {showFormat&&(
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'6px 10px',borderBottom:'1px solid var(--stroke)',flexWrap:'wrap',background:'var(--bg3)'}}>
          <Tb onClick={()=>wrap('**','**','texto')} title="Negrilla (Ctrl+B)"><strong>B</strong></Tb>
          <Tb onClick={()=>wrap('_','_','texto')} title="Cursiva (Ctrl+I)"><em>I</em></Tb>
          <Tb onClick={()=>wrap('__','__','texto')} title="Subrayado (Ctrl+U)"><u>U</u></Tb>
          <Tb onClick={()=>wrap('~~','~~','texto')} title="Tachado"><s>S</s></Tb>
          <Tb onClick={()=>wrap('`','`','código')} title="Código"><code style={{fontSize:11}}>{'<>'}</code></Tb>
          <span style={{fontSize:10,color:'var(--textMuted)',marginLeft:4}}>Shift+Enter = nueva línea</span>
        </div>
      )}
      {/* Input row */}
      <div style={{display:'flex',alignItems:'flex-end',gap:6,padding:'8px 10px',position:'relative',overflow:'visible'}}>
        {/* Format toggle */}
        <button onClick={()=>setShowFormat(v=>!v)} title="Formato"
          style={{background:showFormat?'var(--brandDim)':'none',border:`1px solid ${showFormat?'var(--brand)':'var(--stroke)'}`,
            borderRadius:8,cursor:'pointer',padding:'7px 9px',fontSize:14,color:showFormat?'var(--brand)':'var(--textMuted)',
            flexShrink:0,lineHeight:1}}>
          Aa
        </button>
        {/* Image button -- only for teacher/admin */}
        {onImage&&(
          <>
            <input id="chat-img-input" type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
              const file=e.target.files?.[0]; if(!file)return;
              if(file.size>600000){alert('La imagen es muy grande. Máximo 600KB.');e.target.value='';return;}
              const reader=new FileReader();
              reader.onload=ev=>{ onImage(ev.target.result); e.target.value=''; };
              reader.readAsDataURL(file);
            }}/>
            <button onClick={()=>document.getElementById('chat-img-input').click()} title="Enviar imagen"
              style={{background:'none',border:'1px solid var(--stroke)',borderRadius:8,cursor:'pointer',
                padding:'7px 9px',fontSize:16,color:'var(--textMuted)',flexShrink:0,lineHeight:1}}>
              📷
            </button>
          </>
        )}
        {/* Emoji picker */}
        <div style={{position:'relative',flexShrink:0}}>
          <button onClick={()=>setShowEmoji(v=>!v)} title="Emoji"
            style={{background:showEmoji?'var(--brandDim)':'none',border:`1px solid ${showEmoji?'var(--brand)':'var(--stroke)'}`,
              borderRadius:8,cursor:'pointer',padding:'7px 9px',fontSize:16,lineHeight:1,color:'var(--text)'}}>
            😊
          </button>
          {showEmoji&&(
            <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:0,zIndex:9999,
              background:'var(--bg2)',border:'1px solid var(--stroke)',borderRadius:12,
              padding:10,display:'flex',flexWrap:'wrap',gap:3,width:272,
              boxShadow:'0 -4px 24px rgba(0,0,0,.35)',maxHeight:180,overflowY:'auto'}}>
              {EMOJI_LIST.map(e=>(
                <button key={e} onClick={()=>{
                  const el=ref.current;
                  if(el){const s=el.selectionStart;const next=value.slice(0,s)+e+value.slice(s);onChange(next);setTimeout(()=>{el.focus();el.setSelectionRange(s+e.length,s+e.length);},0);}
                  else onChange(value+e);
                  setShowEmoji(false);
                }} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,padding:'3px 4px',borderRadius:6,lineHeight:1,transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
                onMouseLeave={e=>e.currentTarget.style.background='none'}>{e}</button>
              ))}
            </div>
          )}
        </div>
        {/* Textarea — auto-resize, native emoji keyboard on mobile */}
        <textarea ref={ref} value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey}
          placeholder={placeholder} rows={1}
          inputMode="text"
          style={{flex:1,background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:20,
            padding:'9px 14px',color:'var(--text)',fontSize:14,resize:'none',fontFamily:'inherit',
            lineHeight:1.5,outline:'none',overflow:'hidden',minHeight:38,maxHeight:160,
            transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor='var(--brandBorder)'}
          onBlur={e=>e.target.style.borderColor='var(--stroke)'}/>
        {/* Mic button — voice notes, shown only when onVoice is provided */}
        {onVoice&&(
          <button onClick={toggleRecording}
            title={recording?'Toca para enviar nota de voz':'Grabar nota de voz'}
            style={{background:recording?'#ef4444':'none',
              border:`1.5px solid ${recording?'#ef4444':'var(--stroke)'}`,
              borderRadius:'50%',width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',flexShrink:0,transition:'background .2s,border-color .2s'}}>
            {recording
              ?<span style={{fontSize:11,color:'#fff',fontWeight:700,fontFamily:'monospace',lineHeight:1}}>{fmtSecs(recSeconds)}</span>
              :<span style={{fontSize:18,lineHeight:1}}>🎙️</span>
            }
          </button>
        )}
        {/* Send button — paper plane style */}
        <button onClick={onSend} disabled={!value.trim()||sending||recording} title="Enviar (Enter)"
          style={{background:value.trim()&&!sending&&!recording?'var(--brand)':'var(--bg3)',border:'none',
            borderRadius:'50%',width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',
            cursor:value.trim()&&!sending&&!recording?'pointer':'default',flexShrink:0,
            transition:'background .2s,transform .1s',transform:value.trim()&&!sending&&!recording?'scale(1)':'scale(.9)'}}>
          {sending
            ?<span style={{fontSize:16}}>⏳</span>
            :<span style={{fontSize:18,lineHeight:1}}>👌🏽</span>
          }
        </button>
      </div>
    </div>
  );
}

// -- CHAT BUBBLE -----------------------------------------------
const REACTION_QUICK=['💚','👌🏽'];
const REACTION_MORE=['❤️','😂','😮','😢','🔥','👍','👎','🎉','💪','🙏'];

function ChatBubble({m,isMe,canDelete,canEdit,onDelete,onEdit,nameColor,viewerRole,reactorId,onReact,cancelCtx=null}){
  const [editing,setEditing]=React.useState(false);
  const [editVal,setEditVal]=React.useState(m.message);
  const [saving,setSaving]=React.useState(false);
  const [bump,setBump]=React.useState(false); // micro-animation on double click
  const normalizeReactions=r=>{
    if(!r||typeof r!=='object')return{};
    const out={};
    Object.entries(r).forEach(([e,v])=>{out[e]=Array.isArray(v)?v:Object.values(v||{});});
    return out;
  };
  const [localReactions,setLocalReactions]=React.useState(()=>normalizeReactions(m.reactions));
  const fmt=ts=>{if(!ts)return'';const d=new Date(ts.replace(' ','T')+'Z');return d.toLocaleDateString('es-CO',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});};

  // Sync reactions when message updates
  React.useEffect(()=>setLocalReactions(normalizeReactions(m.reactions)),[JSON.stringify(m.reactions)]);

  const save=async()=>{
    if(!editVal.trim())return;
    setSaving(true);
    await onEdit(m.id,editVal.trim());
    setEditing(false);setSaving(false);
  };

  // Double-click: cycle through 💚 → 👌🏽 → none
  const handleDoubleClick=async()=>{
    if(!reactorId||editing)return;
    setBump(true);setTimeout(()=>setBump(false),300);
    const CYCLE=['💚','👌🏽'];
    // Find current reaction of this user
    let current=null;
    for(const e of CYCLE){
      const arr=Array.isArray(localReactions[e])?localReactions[e]:Object.values(localReactions[e]||{});
      if(arr.includes(reactorId)){current=e;break;}
    }
    const next=current===null?CYCLE[0]:current===CYCLE[0]?CYCLE[1]:null;
    // Optimistic update
    setLocalReactions(prev=>{
      const nx={...prev};
      Object.keys(nx).forEach(e=>{nx[e]=Array.isArray(nx[e])?nx[e]:Object.values(nx[e]||{});nx[e]=nx[e].filter(r=>r!==reactorId);if(!nx[e].length)delete nx[e];});
      if(next){if(!nx[next])nx[next]=[];nx[next]=[...nx[next],reactorId];}
      return nx;
    });
    if(onReact)await onReact(m.id,next||'__remove__');
  };

  const bubbleBg=isMe?'#16a34a':'var(--bg3)';
  const textColor=isMe?'#f0fdf4':'var(--text)';
  const metaColor=isMe?'rgba(240,253,244,.6)':'var(--textMuted)';
  const hasReactions=Object.keys(localReactions).some(e=>{const r=localReactions[e];return Array.isArray(r)?r.length>0:Object.keys(r||{}).length>0;});

  // --- CLASS_CANCEL card ---
  const cancelMatch=m.message&&/^\[CLASS_CANCEL:(\{[\s\S]*\})\]$/.exec(m.message.trim());
  if(cancelMatch){
    let cd=null;
    try{cd=JSON.parse(cancelMatch[1]);}catch(e){}
    if(cd){
      const fmtDate=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});};
      const fmtTime=t=>{if(!t)return'';const[h,mi]=t.split(':');const hh=parseInt(h);return`${hh>12?hh-12:hh}:${mi} ${hh>=12?'pm':'am'}`;};
      const CANCELLED_STATUSES=['cancelled_by_student','cancelled_no_impact','cancelled_teacher','cancelled_admin'];
      const liveSession=(cancelCtx?.classSessions||[]).find(s=>String(s.id)===String(cd.id));
      const alreadyCancelled=cancelCtx?.cancelledIds?.has(String(cd.id))||(liveSession?CANCELLED_STATUSES.some(st=>liveSession.status===st):false);
      return(
        <div style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',marginBottom:10}}>
          <div style={{background:'var(--surface)',border:'1.5px solid var(--brandBorder)',borderRadius:14,padding:'10px 14px',maxWidth:'82%',minWidth:200}}>
            <p style={{fontSize:10,fontWeight:800,color:'var(--brand)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.05em'}}>📅 Clase para cancelar</p>
            <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:'0 0 1px'}}>{fmtDate(cd.scheduledDate)}</p>
            <p style={{fontSize:12,color:'var(--textMuted)',margin:'0 0 8px'}}>{fmtTime(cd.scheduledTime)}</p>
            {cancelCtx&&!alreadyCancelled&&(
              <button onClick={()=>cancelCtx.onOpenCancel({
                  session:{id:cd.id,scheduled_date:cd.scheduledDate,scheduled_time:cd.scheduledTime,status:cd.status||'scheduled',new_date:cd.newDate||null,new_time:cd.newTime||null,_affectsMin:cd.affectsMin},
                  cycleStart:cd.cycleStart,cycleEnd:cd.cycleEnd,min:cd.min
                })}
                style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,padding:'6px 14px',color:'#ef4444',fontSize:12,fontWeight:700,cursor:'pointer',width:'100%',textAlign:'center'}}>
                🚫 Cancelar esta clase
              </button>
            )}
            {cancelCtx&&alreadyCancelled&&(
              <p style={{fontSize:12,color:'var(--brand)',fontWeight:700,margin:0}}>✓ Cancelación registrada</p>
            )}
            {!cancelCtx&&(
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:4}}>
                <p style={{fontSize:11,color:'var(--textMuted)',margin:0}}>📤 Enviado al estudiante</p>
                {canDelete&&(
                  <button onClick={()=>onDelete(m.id)}
                    style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'#ef4444',padding:'1px 4px'}}>
                    🗑 Eliminar
                  </button>
                )}
              </div>
            )}
            <p style={{margin:'6px 0 0',fontSize:10,color:'var(--textMuted)',textAlign:isMe?'right':'left'}}>{fmt(m.created_at)}</p>
          </div>
        </div>
      );
    }
  }

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',marginBottom:hasReactions?16:10,position:'relative'}}>
      <div style={{position:'relative',maxWidth:'78%'}}>
        <div
          onDoubleClick={handleDoubleClick}
          style={{background:bubbleBg,borderRadius:isMe?'14px 14px 3px 14px':'14px 14px 14px 3px',
            padding:'8px 12px',boxShadow:'0 1px 3px rgba(0,0,0,.12)',
            cursor:reactorId&&!editing?'default':'default',
            transform:bump?'scale(1.04)':'scale(1)',transition:'transform .15s ease',
            userSelect:'none'}}>
          {m.sender_name&&(
            <p style={{margin:'0 0 3px',fontSize:11,fontWeight:800,color:isMe?'rgba(255,255,255,.85)':nameColor||'var(--brand)',letterSpacing:'.02em'}}>{m.sender_name}</p>
          )}
          {editing?(
            <div>
              <textarea value={editVal} onChange={e=>setEditVal(e.target.value)} rows={3} autoFocus
                style={{width:'100%',background:'rgba(0,0,0,.2)',border:'1px solid rgba(240,253,244,.3)',borderRadius:6,padding:'6px 8px',color:textColor,fontSize:13,resize:'none',fontFamily:'inherit',boxSizing:'border-box'}}/>
              <div style={{display:'flex',gap:6,marginTop:6}}>
                <button onClick={save} disabled={saving} style={{background:'rgba(0,0,0,.2)',border:'none',borderRadius:6,padding:'4px 10px',color:textColor,fontSize:12,fontWeight:700,cursor:'pointer'}}>{saving?'…':'✓ Guardar'}</button>
                <button onClick={()=>{setEditing(false);setEditVal(m.message);}} style={{background:'none',border:'none',borderRadius:6,padding:'4px 8px',color:metaColor,fontSize:12,cursor:'pointer'}}>Cancelar</button>
              </div>
            </div>
          ):(
            <><p style={{margin:0,fontSize:13,color:textColor,lineHeight:1.55,userSelect:'text'}}>{renderMd(m.message,viewerRole)}</p>
            {m.image_data&&(
              <img src={m.image_data} alt="imagen" onClick={()=>window.open(m.image_data,'_blank')}
                style={{maxWidth:'100%',borderRadius:8,marginTop:6,display:'block',cursor:'zoom-in'}}/>
            )}
            {m.voice_data&&(
              <audio controls src={m.voice_data}
                style={{marginTop:6,width:'100%',height:36,display:'block'}}/>
            )}</>
          )}
          <p style={{margin:'4px 0 0',fontSize:10,color:metaColor,textAlign:isMe?'right':'left'}}>
            {fmt(m.created_at)}{parseInt(m.is_edited)===1?' · editado':''}
          </p>
        </div>
      </div>
      {/* Reaction bubbles below message */}
      {hasReactions&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:4,
          justifyContent:isMe?'flex-end':'flex-start'}}>
          {Object.entries(localReactions).map(([emoji,r])=>{
            const reactors=Array.isArray(r)?r:Object.values(r||{});
            if(!reactors.length)return null;
            const iMine=reactors.includes(reactorId);
            return(
              <button key={emoji} onClick={()=>react(emoji)} title={reactors.join(', ')}
                style={{background:iMine?'var(--brandDim)':'var(--bg3)',
                  border:`1.5px solid ${iMine?'var(--brand)':'var(--stroke)'}`,
                  borderRadius:999,padding:'2px 8px',cursor:'pointer',display:'flex',
                  alignItems:'center',gap:4,fontSize:13,lineHeight:1}}>
                <span>{emoji}</span>
                {reactors.length>1&&<span style={{fontSize:11,fontWeight:700,color:iMine?'var(--brand)':'var(--textMuted)'}}>{reactors.length}</span>}
              </button>
            );
          })}
        </div>
      )}
      {/* Edit/Delete actions */}
      {!editing&&(canDelete||canEdit)&&(
        <div style={{display:'flex',gap:4,marginTop:3}}>
          {canEdit&&<button onClick={()=>setEditing(true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--textMuted)',padding:'1px 4px'}}>✏️ Editar</button>}
          {canDelete&&<button onClick={()=>onDelete(m.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'#ef4444',padding:'1px 4px'}}>🗑 Eliminar</button>}
        </div>
      )}
    </div>
  );
}

// -- SHARED MESSAGES COMPONENT ---------------------------------
function Messages({user,data,role,initialStudent,onRefresh}){
  const students=data.students||[];
  const unreadMap=data.msgUnreadMap||{};
  const getUnread=s=>unreadMap[String(s.id)]||0;
  const [selSid,setSelSid]=React.useState(initialStudent||'');
  const [thread,setThread]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [msg,setMsg]=React.useState('');
  const [sending,setSending]=React.useState(false);
  const [broadcastMsg,setBroadcastMsg]=React.useState('');
  const [broadcastIds,setBroadcastIds]=React.useState([]);
  const [broadcastSending,setBroadcastSending]=React.useState(false);
  const [broadcastDone,setBroadcastDone]=React.useState(false);
  const [tab,setTab]=React.useState('chat');
  const [showCancelPicker,setShowCancelPicker]=React.useState(false);
  const [showQuickReplies,setShowQuickReplies]=React.useState(false);
  const [customTemplates,setCustomTemplates]=React.useState(()=>{try{return JSON.parse(localStorage.getItem('leap_quick_replies')||'[]');}catch(e){return[];}});
  const [editingTemplate,setEditingTemplate]=React.useState(null); // {id,label,text,isNew}
  const chatEndRef=React.useRef(null);

  // Admin display name from localStorage
  const [adminName,setAdminName]=React.useState(()=>localStorage.getItem('leap_admin_name')||'Sebas');
  const senderName=role==='admin'?adminName:(user?.name||'Profe');

  // Open to initialStudent if provided
  React.useEffect(()=>{if(initialStudent)setSelSid(initialStudent);},[initialStudent]);

  const loadThread=async(sid)=>{
    if(!sid)return;
    setLoading(true);
    const r=await api('chispa',{action:'get_thread',studentId:sid});
    setThread(Array.isArray(r)?r:[]);
    setLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:'smooth'}),100);
    // Mark student messages as read and refresh badge immediately
    await api('chispa',{action:'mark_read_teacher',studentId:sid,role}).catch(()=>{});
    if(onRefresh) onRefresh();
  };

  React.useEffect(()=>{if(selSid)loadThread(selSid);},[selSid]);
  React.useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[thread]);

  // Fast silent poll while chatting -- 2s
  React.useEffect(()=>{
    if(!selSid)return;
    const iv=setInterval(async()=>{
      if(!selSid)return;
      const r=await api('chispa',{action:'get_thread',studentId:selSid}).catch(()=>null);
      if(r&&Array.isArray(r)){
        const hasNew=r.some(m=>m.sender==='student'&&!parseInt(m[role==='admin'?'read_by_admin':'read_by_teacher']));
        setThread(prev=>{
          if(prev.length!==r.length||JSON.stringify(prev.map(m=>m.id+m.message))!==JSON.stringify(r.map(m=>m.id+m.message)))
            return r;
          return prev;
        });
        // Si llegaron mensajes nuevos mientras el chat está abierto, marcarlos leídos y refrescar badge
        if(hasNew){
          await api('chispa',{action:'mark_read_teacher',studentId:selSid,role}).catch(()=>{});
          if(onRefresh) onRefresh();
        }
      }
    },2000);
    return()=>clearInterval(iv);
  },[selSid]);

  const sendMsg=async()=>{
    if(!msg.trim()||!selSid||sending)return;
    setSending(true);
    await api('chispa',{action:'send_message',studentId:selSid,sender:'teacher',senderName,message:msg.trim()});
    setMsg('');
    await loadThread(selSid);
    setSending(false);
  };
  const sendMsgWithImg=async(imgSrc)=>{
    if(!selSid||sending)return;
    setSending(true);
    await api('chispa',{action:'send_message',studentId:selSid,sender:'teacher',senderName,message:'',imageData:imgSrc});
    setMsg('');
    await loadThread(selSid);
    setSending(false);
  };
  const sendMsgWithVoice=async(voiceSrc)=>{
    if(!selSid)return;
    await api('chispa',{action:'send_message',studentId:selSid,sender:'teacher',senderName,message:'',voiceData:voiceSrc});
    await loadThread(selSid);
  };

  const deleteMsg=async(id)=>{
    if(!confirm('¿Eliminar este mensaje?'))return;
    await api('chispa',{action:'delete_message',id});
    setThread(t=>t.filter(m=>String(m.id)!==String(id)));
  };

  const editMsg=async(id,newText)=>{
    await api('chispa',{action:'edit_message',id,message:newText});
    setThread(t=>t.map(m=>String(m.id)===String(id)?{...m,message:newText,is_edited:'1'}:m));
  };

  const sendBroadcast=async()=>{
    if(!broadcastMsg.trim()||broadcastIds.length===0||broadcastSending)return;
    setBroadcastSending(true);
    await api('chispa',{action:'broadcast',studentIds:broadcastIds,message:broadcastMsg.trim(),senderName,sender:'teacher'});
    setBroadcastMsg('');setBroadcastIds([]);setBroadcastDone(true);
    setTimeout(()=>setBroadcastDone(false),3000);
    setBroadcastSending(false);
  };

  const toggleBroadcastId=(id)=>setBroadcastIds(ids=>ids.includes(id)?ids.filter(x=>x!==id):[...ids,id]);
  const allSelected=broadcastIds.length===students.length;

  // Quick replies helpers
  const sendQuickReply=async(template)=>{
    if(!selSid||sending)return;
    const stu=students.find(s=>String(s.id)===String(selSid));
    const firstName=stu?.name?.split(' ')[0]||stu?.name||'';
    const todayStr=new Date().toISOString().slice(0,10);
    const sess=(data.classSessions||[]).filter(cs=>String(cs.student_id)===String(selSid)&&cs.status==='scheduled'&&cs.scheduled_date>=todayStr).sort((a,b)=>a.scheduled_date.localeCompare(b.scheduled_date))[0];
    // Zoom URL: prefer session's teacher zoom (most specific), then look up from student's teacherZooms map
    const teacherZooms=stu?.teacherZooms||{};
    const sessTeacherId=sess?.teacher_id?String(sess.teacher_id):null;
    const zoomUrl=
      sess?.teacher_zoom_url||                              // COALESCE from DB (new_teacher_zoom_url → st.zoom_url → t.zoom_url)
      sess?.zoom_url||                                      // direct session zoom
      (sessTeacherId&&teacherZooms[sessTeacherId])||        // student-teacher pair zoom for next session's teacher
      teacherZooms[String(stu?.teacherId)]||                // student-teacher pair zoom for primary teacher
      Object.values(teacherZooms).find(z=>z)||             // any zoom URL configured for this student
      '';
    let text=template.text.replace(/\{studentName\}/g,firstName);
    if(zoomUrl){
      text=text.replace(/\{zoomUrl\}/g,zoomUrl);
    } else {
      // No zoom URL found — remove the button marker entirely
      text=text.replace(/\[ZOOM_BTN:\{zoomUrl\}\]/g,'').trim();
    }
    setSending(true);
    await api('chispa',{action:'send_message',studentId:selSid,sender:'teacher',senderName,message:text});
    setSending(false);
    setShowQuickReplies(false);
    await loadThread(selSid);
  };
  const saveCustomTemplate=(tpl)=>{
    const updated=tpl.isNew
      ?[...customTemplates,{id:Date.now().toString(),label:tpl.label,text:tpl.text}]
      :customTemplates.map(t=>t.id===tpl.id?{...t,label:tpl.label,text:tpl.text}:t);
    setCustomTemplates(updated);
    localStorage.setItem('leap_quick_replies',JSON.stringify(updated));
    setEditingTemplate(null);
  };
  const deleteCustomTemplate=(id)=>{
    if(!confirm('¿Eliminar esta respuesta rápida?'))return;
    const updated=customTemplates.filter(t=>t.id!==id);
    setCustomTemplates(updated);
    localStorage.setItem('leap_quick_replies',JSON.stringify(updated));
  };

  // Send a CLASS_CANCEL card to the selected student
  const sendCancelSession=async(sess)=>{
    if(!selSid||sending)return;
    const stu=students.find(s=>String(s.id)===String(selSid));
    const stuPkg=stu?.pkg||'Essential';
    const allSess=(data.classSessions||[]).filter(cs=>String(cs.student_id)===String(selSid));
    const cycleSess=allSess.filter(cs=>cs.cycle_id===sess.cycle_id);
    const SKIP=['holiday_no_impact','cancelled_no_impact'];
    const totalCycleCount=cycleSess.filter(cs=>!SKIP.includes(cs.status)).length;
    const cycleMin=sess.pkg_snapshot?(PLAN_RULES[sess.pkg_snapshot]?.min||PLAN_RULES[stuPkg]?.min||8):(PLAN_RULES[stuPkg]?.min||8);
    const effectiveMin=stuPkg==='Power⚡'?Math.max(0,totalCycleCount-8):cycleMin;
    const otherTaken=cycleSess.filter(cs=>String(cs.id)!==String(sess.id)&&parseInt(cs.counts_as_taken)===1).length;
    const affectsMin=otherTaken<effectiveMin;
    const cd={id:String(sess.id),scheduledDate:sess.scheduled_date,scheduledTime:sess.scheduled_time,status:sess.status,cycleStart:sess.cycle_start||null,cycleEnd:sess.cycle_end||null,min:effectiveMin,affectsMin,newDate:sess.new_date||null,newTime:sess.new_time||null};
    setSending(true);
    await api('chispa',{action:'send_message',studentId:selSid,sender:'teacher',senderName,message:`[CLASS_CANCEL:${JSON.stringify(cd)}]`});
    setSending(false);
    setShowCancelPicker(false);
    await loadThread(selSid);
  };

  // Sender name colors for non-self messages
  const NAME_COLORS=['#6366f1','#f59e0b','#10b981','#ec4899','#8b5cf6','#14b8a6'];
  const nameColor=(name)=>{let h=0;for(const c of(name||''))h=(h*31+c.charCodeAt(0))%NAME_COLORS.length;return NAME_COLORS[h];};

  return(
    <>
      <SectionTitle>💬 Mensajes</SectionTitle>
      {/* Admin name setting */}
      {role==='admin'&&(
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'8px 12px',background:'var(--bg3)',borderRadius:10,border:'1px solid var(--stroke)'}}>
          <span style={{fontSize:12,color:'var(--textMuted)',whiteSpace:'nowrap'}}>Tu nombre en el chat:</span>
          <input value={adminName} onChange={e=>{setAdminName(e.target.value);localStorage.setItem('leap_admin_name',e.target.value);}}
            style={{flex:1,background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'5px 10px',color:'var(--text)',fontSize:13,outline:'none'}}
            placeholder="Ej: Sebas"/>
        </div>
      )}
      {/* Tab switcher */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {['chat','broadcast'].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:'6px 16px',borderRadius:999,border:'1.5px solid',fontSize:12,fontWeight:700,cursor:'pointer',
              background:tab===t?'var(--brand)':'transparent',
              borderColor:tab===t?'var(--brand)':'var(--stroke)',
              color:tab===t?'#fff':'var(--textMuted)'}}>
            {t==='chat'?'💬 Chat 1:1':'📢 Broadcast'}
          </button>
        ))}
      </div>

      {tab==='chat'&&(
        <>
          <Select value={selSid} onChange={e=>{setSelSid(e.target.value);setThread([]);}} style={{marginBottom:10}}>
            <option value="">-- Seleccionar estudiante --</option>
            {[...students].sort((a,b)=>(getUnread(b)>0?1:0)-(getUnread(a)>0?1:0)).map(s=><option key={s.id} value={s.id}>{getUnread(s)>0?`🔴 ${s.name} (${getUnread(s)} nuevo${getUnread(s)>1?'s':''})`:`${s.name}`}</option>)}
          </Select>
          {selSid&&(
            <Card style={{padding:0,overflow:'hidden'}}>
              <div style={{height:'calc(100dvh - 320px)',minHeight:240,overflowY:'auto',padding:'12px 12px 4px',display:'flex',flexDirection:'column'}}>
                {loading&&<p style={{textAlign:'center',color:'var(--textMuted)',fontSize:12,padding:16}}>Cargando…</p>}
                {!loading&&thread.length===0&&<p style={{textAlign:'center',color:'var(--textMuted)',fontSize:12,padding:16}}>Sin mensajes aún.</p>}
                {thread.map(m=>{
                  const isMe=m.sender!=='student';
                  const isMine=isMe&&(m.sender_name===senderName||(role==='admin'));
                  // Permissions: teacher can delete own, admin can edit+delete all
                  const canDel=role==='admin'||(role==='teacher'&&isMe&&m.sender_name===senderName);
                  const canEdit=role==='admin';
                  return(
                    <ChatBubble key={m.id} m={m} isMe={isMe} viewerRole={role}
                      canDelete={canDel} canEdit={canEdit}
                      onDelete={deleteMsg} onEdit={editMsg}
                      nameColor={nameColor(m.sender_name)}
                      reactorId={`${role}:${senderName}`}
                      onReact={async(id,emoji)=>{
                        await api('chispa',{action:'react_message',id,emoji,reactor:`${role}:${senderName}`});
                        await loadThread(selSid);
                      }}/>
                  );
                })}
                <div ref={chatEndRef}/>
              </div>
              {/* Cancel-class picker + Quick replies */}
              {(()=>{
                const todayStr=new Date().toISOString().slice(0,10);
                const upcomingSess=(data.classSessions||[]).filter(cs=>String(cs.student_id)===String(selSid)&&cs.status==='scheduled'&&cs.scheduled_date>=todayStr).sort((a,b)=>a.scheduled_date.localeCompare(b.scheduled_date)||(a.scheduled_time||'').localeCompare(b.scheduled_time||''));
                const fmtDate=d=>{if(!d)return'?';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short'});};
                const fmtTime=t=>{if(!t)return'';const[h,mi]=t.split(':');const hh=parseInt(h);return`${hh>12?hh-12:hh}:${mi} ${hh>=12?'pm':'am'}`;};
                return(
                  <>
                    {/* Button row */}
                    <div style={{borderTop:'1px solid var(--stroke)',padding:'6px 10px',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>

function AGroups({data,onRefresh}){
  const students=data.students||[];
  const teachers=data.teachers||[];
  const groups=data.groups||[];

  // -- Creation state --
  const [creating,setCreating]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const blankMember=()=>({name:'',pin:'',email:'',pkg:'Progress'});
  const [form,setForm]=React.useState({
    name:'',teacherIds:[],pkg:'Progress',
    cycleStart:'',cycleEnd:'',paymentDate:'',
    members:[blankMember(),blankMember()],
  });
  const [formSlots,setFormSlots]=React.useState([]);
  const [slotDay,setSlotDay]=React.useState('1');
  const [slotTime,setSlotTime]=React.useState('15:00');

  // -- Group operation state --
  const [openG,setOpenG]=React.useState(null);
  const [groupOp,setGroupOp]=React.useState(null); // 'schedule'|'pastcycle'|'manualsession'
  const [opSlots,setOpSlots]=React.useState([]);
  const [opSlotDay,setOpSlotDay]=React.useState('1');
  const [opSlotTime,setOpSlotTime]=React.useState('15:00');
  const [opPastForm,setOpPastForm]=React.useState({start:'',end:''});
  const [opManualForm,setOpManualForm]=React.useState({date:'',time:'',status:'taken',notes:''});
  const [opSaving,setOpSaving]=React.useState(false);
  const [slotDur,setSlotDur]=React.useState(50);

  const toggleT=id=>setForm(f=>({...f,teacherIds:f.teacherIds.includes(id)?f.teacherIds.filter(x=>x!==id):[...f.teacherIds,id]}));
  const addSlot=()=>{
    const d=parseInt(slotDay);
    if(formSlots.find(s=>s.day===d&&s.time===slotTime)){alert('Ya hay clase ese día a esa hora');return;}
    setFormSlots(v=>[...v,{day:d,time:slotTime,duration:slotDur||50}].sort((a,b)=>a.day-b.day));
  };
  const addOpSlot=()=>{
    const d=parseInt(opSlotDay);
    if(opSlots.find(s=>s.day===d&&s.time===opSlotTime)){alert('Ya hay clase ese día a esa hora');return;}
    setOpSlots(v=>[...v,{day:d,time:opSlotTime}].sort((a,b)=>a.day-b.day));
  };
  const updateMember=(i,field,val)=>setForm(f=>({...f,members:f.members.map((m,mi)=>mi===i?{...m,[field]:val}:m)}));
  const addMember=()=>setForm(f=>({...f,members:[...f.members,blankMember()]}));
  const removeMember=i=>setForm(f=>({...f,members:f.members.filter((_,mi)=>mi!==i)}));

  const saveGroup=async()=>{
    if(!form.name){alert('Ingresa el nombre del grupo');return;}
    if(formSlots.length===0){alert('Ingresa al menos un horario');return;}
    if(!form.cycleStart||!form.cycleEnd){alert('Ingresa las fechas del ciclo');return;}
    for(const m of form.members){
      if(!m.name||String(m.pin).length!==4){alert(`Nombre y PIN de 4 dígitos requeridos para todos los miembros`);return;}
    }
    setSaving(true);
    const primaryTeacher=form.teacherIds[0]||'';
    const [sy,sm,sd]=form.cycleStart.split('-').map(Number);
    const createdIds=[];
    const createdCycleIds={}; // studentId -> cycleId
    // Create each member as a student (returns id + cycleId)
    for(const m of form.members){
      const r=await api('students',{action:'create',
        name:m.name,pin:String(m.pin),email:m.email||'',pkg:form.pkg,
        teacherId:primaryTeacher,teacherIds:form.teacherIds,
        cycleStart:form.cycleStart,cycleEnd:form.cycleEnd,
        cycleStartDay:sd,cycleStartMonth:sm,cycleStartYear:sy,
        paymentDate:form.paymentDate||null,
      });
      if(r?.error){alert(`Error creando a ${m.name}: ${r.error}`);setSaving(false);return;}
      if(r?.id){
        createdIds.push(r.id);
        if(r.cycleId) createdCycleIds[r.id]=r.cycleId;
      }
    }
    // Save schedule then generate sessions (sequential per member)
    for(const sid of createdIds){
      await api('schedule',{action:'save_schedule',studentId:sid,slots:formSlots});
      const cycleId=createdCycleIds[sid];
      if(cycleId){
        const gr=await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId,cycleEnd:form.cycleEnd});
        if(gr?.sessions_generated===0) console.warn('0 sessions generated for',sid,'cycleId',cycleId);
      } else {
        // Fallback: look up cycle
        const cyclesR=await api('students',{action:'get_cycles',studentId:sid});
        const cycle=(Array.isArray(cyclesR)?cyclesR:[]).find(c=>c.start===form.cycleStart);
        if(cycle?.id) await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId:cycle.id,cycleEnd:form.cycleEnd});
        else console.error('No cycle found for',sid,'cycleStart',form.cycleStart);
      }
    }
    // Create group and link all members
    await api('groups',{action:'create',name:form.name,memberIds:createdIds});
    setSaving(false);
    setCreating(false);
    setForm({name:'',teacherIds:[],pkg:'Progress',cycleStart:'',cycleEnd:'',paymentDate:'',members:[blankMember(),blankMember()]});
    setFormSlots([]);
    onRefresh();
    alert(`✅ Grupo "${form.name}" creado con ${createdIds.length} miembros`);
  };

  // Apply schedule change to all group members
  const applyScheduleToGroup=async(g)=>{
    if(opSlots.length===0){alert('Agrega al menos un horario');return;}
    setOpSaving(true);
    for(const sid of g.memberIds){
      await api('schedule',{action:'save_schedule',studentId:sid,slots:opSlots});
      // Regenerate future sessions
      const cyclesR=await api('students',{action:'get_cycles',studentId:sid});
      const today=new Date().toISOString().slice(0,10);
      const current=(Array.isArray(cyclesR)?cyclesR:[]).find(c=>c.start<=today&&c.end>=today);
      if(current?.id){
        await api('class_sessions',{action:'cancel_future_from_schedule_change',studentId:sid,fromDate:today}).catch(()=>{});
        await api('class_sessions',{action:'generate_from_date',studentId:sid,cycleId:current.id,fromDate:today}).catch(()=>{});
      }
    }
    setOpSaving(false);setGroupOp(null);setOpSlots([]);onRefresh();
    alert('✅ Horario actualizado para todos los miembros del grupo');
  };

  // Add past cycle to all group members
  const applyPastCycleToGroup=async(g)=>{
    if(!opPastForm.start||!opPastForm.end){alert('Ingresa fechas de inicio y fin');return;}
    setOpSaving(true);
    for(const sid of g.memberIds){
      const r=await api('students',{action:'create_cycle',studentId:sid,cycleStart:opPastForm.start,cycleEnd:opPastForm.end});
      if(r?.cycleId){
        if(opSlots.length>0){
          await api('schedule',{action:'save_schedule',studentId:sid,slots:opSlots});
          await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId:r.cycleId});
          // Restore current schedule
          const schedR=await api('schedule','',`&student_id=${sid}`).catch(()=>[]);
          const orig=Array.isArray(schedR)?schedR.map(x=>({day:x.day_of_week,time:x.class_time})):[];
          await api('schedule',{action:'save_schedule',studentId:sid,slots:orig});
        } else {
          await api('class_sessions',{action:'generate_cycle',studentId:sid,cycleId:r.cycleId});
        }
      }
    }
    setOpSaving(false);setGroupOp(null);setOpPastForm({start:'',end:''});setOpSlots([]);onRefresh();
    alert('✅ Ciclo pasado creado para todos los miembros');
  };

  // Add manual session to all group members
  const applyManualSessionToGroup=async(g)=>{
    if(!opManualForm.date||!opManualForm.time){alert('Ingresa fecha y hora');return;}
    setOpSaving(true);
    for(const sid of g.memberIds){
      const cyclesR=await api('students',{action:'get_cycles',studentId:sid}).catch(()=>[]);
      const cycles=Array.isArray(cyclesR)?cyclesR:[];
      const cycle=cycles.find(c=>c.start<=opManualForm.date&&c.end>=opManualForm.date);
      if(!cycle){alert(`No hay ciclo para esa fecha en uno de los miembros`);setOpSaving(false);return;}
      await api('class_sessions',{action:'add_manual',studentId:sid,cycleId:cycle.id,
        date:opManualForm.date,time:opManualForm.time,status:opManualForm.status,notes:opManualForm.notes||null});
    }
    setOpSaving(false);setGroupOp(null);setOpManualForm({date:'',time:'',status:'taken',notes:''});onRefresh();
    alert('✅ Sesión agregada a todos los miembros');
  };

  const deleteGroup=async(g)=>{
    const withStudents=g.memberIds?.length>0;
    const msg=withStudents
      ?`¿Disolver el grupo "${g.name}"? Los estudiantes quedarán sin grupo (no se eliminan).`
      :`¿Eliminar el grupo "${g.name}"?`;
    if(!confirm(msg))return;
    await api('groups',{action:'delete',id:g.id});
    onRefresh();
  };

  return(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <SectionTitle style={{margin:0}}>👫 Grupos</SectionTitle>
        <Btn sm onClick={()=>setCreating(true)}>+ Nuevo grupo</Btn>
      </div>

      {/* Create group form */}
      {creating&&(
        <Card style={{borderColor:'var(--strokeBrand)',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <p className="label" style={{margin:0}}>👫 Nuevo grupo</p>
            <button onClick={()=>setCreating(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--textMuted)',fontSize:18}}>×</button>
          </div>

          {/* Group name */}
          <Input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nombre del grupo (ej: Sara & Diego)"/>

          {/* Package + teachers */}
          <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
            <div style={{flex:'1 1 140px'}}>
              <p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>PAQUETE</p>
              <select value={form.pkg} onChange={e=>setForm(f=>({...f,pkg:e.target.value}))}
                style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}>
                {Object.keys(PKG).map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
          </div>
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600}}>PROFE(S)</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {teachers.map(t=><button key={t.id} onClick={()=>toggleT(t.id)}
              style={{padding:'5px 10px',borderRadius:999,border:'1.5px solid',fontSize:12,cursor:'pointer',
                background:form.teacherIds.includes(t.id)?'var(--brandDim)':'transparent',
                borderColor:form.teacherIds.includes(t.id)?'var(--brand)':'var(--stroke)',
                color:form.teacherIds.includes(t.id)?'var(--brand)':'var(--textMuted)'}}>{t.name}</button>)}
          </div>

          {/* Cycle dates */}
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>INICIO CICLO</p>
              <input type="date" value={form.cycleStart} onChange={e=>setForm(f=>({...f,cycleStart:e.target.value}))}
                style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
            <div style={{flex:1}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>FIN CICLO</p>
              <input type="date" value={form.cycleEnd} onChange={e=>setForm(f=>({...f,cycleEnd:e.target.value}))}
                style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
          </div>
          <div style={{marginBottom:12}}>
            <p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>FECHA DE PAGO (opcional)</p>
            <input type="date" value={form.paymentDate} onChange={e=>setForm(f=>({...f,paymentDate:e.target.value}))}
              style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
          </div>

          {/* Schedule */}
          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6,fontWeight:600}}>🗓️ HORARIO COMPARTIDO</p>
          {formSlots.length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
              {formSlots.map(sl=>(
                <div key={`${sl.day}-${sl.time}`} style={{display:'flex',alignItems:'center',gap:4,background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:999,padding:'3px 10px 3px 12px'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--brand)'}}>{DAYS_FULL[sl.day]} · {sl.time}</span>
                  <button onClick={()=>setFormSlots(v=>v.filter(x=>!(x.day===sl.day&&x.time===sl.time)))} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:15,lineHeight:1,padding:'0 2px'}}>×</button>
                </div>
              ))}
            </div>

          <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:14,flexWrap:'wrap'}}>
            <div style={{flex:'1 1 100px'}}>
              <select value={slotDay} onChange={e=>setSlotDay(e.target.value)}

                {Object.entries(DAYS_FULL).map(([d,n])=><option key={d} value={d}>{n}</option>)}
              </select>
            </div>
            <div style={{flex:'1 1 90px'}}>
              <input type="time" value={slotTime} onChange={e=>setSlotTime(e.target.value)}
                style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
            </div>
            <div style={{flex:'1 1 110px'}}>
              <select value={slotDur||50} onChange={e=>setSlotDur(parseInt(e.target.value))}

            <Btn sm onClick={addSlot}>+ Día</Btn>
          </div>

          <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:8,fontWeight:600}}>👤 MIEMBROS DEL GRUPO</p>

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <div style={{flex:'2 1 140px'}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>NOMBRE</p>

                <div style={{flex:'1 1 80px'}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>PIN</p>
                  <input value={m.pin} onChange={e=>updateMember(i,'pin',e.target.value)} placeholder="4 dígitos" maxLength={4}
                    style={{width:'100%',boxSizing:'border-box',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
                <div style={{flex:'2 1 160px'}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>EMAIL</p>
                  <input value={m.email} onChange={e=>updateMember(i,'email',e.target.value)} placeholder="email@..." type="email"
                    style={{width:'100%',boxSizing:'border-box',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
              </div>
            </div>
          ))}
          <button onClick={addMember} style={{width:'100%',background:'none',border:'1.5px dashed var(--stroke)',borderRadius:10,padding:'8px',cursor:'pointer',color:'var(--textMuted)',fontSize:13,marginBottom:12}}>+ Agregar miembro</button>

          <div style={{display:'flex',gap:8}}>
            <Btn full onClick={saveGroup} disabled={saving}>{saving?'Creando…':'✅ Crear grupo'}</Btn>
            <Btn cls="btn-ghost" onClick={()=>setCreating(false)}>Cancelar</Btn>
          </div>
        </Card>
      )}

      {groups.length===0&&!creating&&(
        <Card style={{textAlign:'center',padding:32}}>
          <p style={{fontSize:28,marginBottom:8}}>👫</p>
          <p style={{color:'var(--textMuted)',fontSize:13}}>No hay grupos creados aún.</p>
          <p style={{color:'var(--textMuted)',fontSize:12,marginTop:4}}>Los grupos comparten horario, ciclos y sesiones. Cada miembro tiene su propio portal.</p>
        </Card>
      )}

      {groups.map(g=>{
        const isOpen=openG===g.id;
        const gStudents=students.filter(s=>g.memberIds?.includes(s.id));
        return(
          <Card key={g.id} style={{marginBottom:10,borderColor:isOpen?'var(--strokeBrand)':'var(--stroke)'}}>
            <div onClick={()=>setOpenG(isOpen?null:g.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
              <div>
                <p style={{margin:'0 0 4px',fontFamily:'Sora',fontWeight:700,fontSize:14,color:'var(--text)'}}>{g.name}</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {gStudents.map(s=>(
                    <span key={s.id} style={{background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:999,padding:'2px 10px',fontSize:12,fontWeight:600,color:'var(--brand)'}}>
                      {s.name}
                    </span>
                  ))}
                </div>
              </div>
              <span style={{color:'var(--textMuted)',fontSize:14,flexShrink:0,marginLeft:8}}>{isOpen?'▲':'▼'}</span>
            </div>

            {isOpen&&(
              <div style={{borderTop:'1px solid var(--stroke)',marginTop:12,paddingTop:12}}>
                {/* Group-wide operations */}
                <p style={{fontSize:11,fontWeight:700,color:'var(--textMuted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Operaciones del grupo — aplican a todos los miembros</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                  <Btn sm cls={groupOp==='schedule'?'btn-primary':'btn-ghost'} onClick={()=>setGroupOp(groupOp==='schedule'?null:'schedule')}>🗓️ Cambiar horario</Btn>
                  <Btn sm cls={groupOp==='teacher'?'btn-primary':'btn-ghost'} onClick={()=>setGroupOp(groupOp==='teacher'?null:'teacher')}>👩‍🏫 Cambiar profe</Btn>
                  <Btn sm cls={groupOp==='pastcycle'?'btn-primary':'btn-ghost'} onClick={()=>setGroupOp(groupOp==='pastcycle'?null:'pastcycle')}>📅 Ciclo pasado</Btn>
                  <Btn sm cls={groupOp==='manualsession'?'btn-primary':'btn-ghost'} onClick={()=>setGroupOp(groupOp==='manualsession'?null:'manualsession')}>➕ Sesión manual</Btn>
                  <Btn sm cls="btn-danger" onClick={()=>deleteGroup(g)}>🗑 Disolver</Btn>
                </div>

                {/* Schedule change panel */}
                {groupOp==='teacher'&&(
                  <Card style={{marginTop:8,borderColor:'var(--strokeBrand)'}}>
                    <p style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:10}}>👩‍🏫 Cambiar profe(s) del grupo</p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                      {teachers.map(t=>{
                        const curIds=gStudents[0]?.teacherIds||(gStudents[0]?.teacherId?[gStudents[0].teacherId]:[]);
                        return(
                          <label key={t.id} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',background:curIds.includes(t.id)?'rgba(99,102,241,.1)':'var(--surface)',border:'1px solid '+(curIds.includes(t.id)?'var(--brand)':'var(--stroke)'),borderRadius:8,cursor:'pointer',fontSize:13,color:'var(--text)',fontWeight:curIds.includes(t.id)?700:400}}>
                            <input type="checkbox" defaultChecked={curIds.includes(t.id)} data-teacherid={t.id} className={`grp-t-${g.id}`} style={{accentColor:'var(--brand)'}}/> {t.name}
                          </label>
                        );
                      })}
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <Btn full onClick={async()=>{
                        const checked=[...document.querySelectorAll(`.grp-t-${g.id}:checked`)].map(el=>el.dataset.teacherid);
                        if(!checked.length)return;
                        for(const ms of gStudents){
                          const ms2=students.find(x=>x.id===ms.id)||ms;
                          await api('students',{action:'update',...ms2,teacherIds:checked,teacherId:checked[0]});
                        }
                        setGroupOp(null);onRefresh();
                      }}>💾 Guardar</Btn>
                      <Btn cls="btn-ghost" onClick={()=>setGroupOp(null)}>Cancelar</Btn>
                    </div>
                  </Card>
                )}
                {groupOp==='schedule'&&(
                  <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px',marginBottom:12,border:'1px solid var(--stroke)'}}>
                    <p className="label" style={{marginBottom:8}}>🗓️ Nuevo horario (reemplaza el actual desde hoy)</p>
                    {opSlots.length>0&&(
                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                        {opSlots.map(sl=>(
                          <div key={`${sl.day}-${sl.time}`} style={{display:'flex',alignItems:'center',gap:4,background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:999,padding:'3px 10px 3px 12px'}}>
                            <span style={{fontSize:12,fontWeight:700,color:'var(--brand)'}}>{DAYS_FULL[sl.day]} · {sl.time}</span>
                            <button onClick={()=>setOpSlots(v=>v.filter(x=>!(x.day===sl.day&&x.time===sl.time)))} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:15,lineHeight:1,padding:'0 2px'}}>×</button>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap',marginBottom:10}}>
                      <select value={opSlotDay} onChange={e=>setOpSlotDay(e.target.value)}
                        style={{flex:'1 1 100px',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}>
                        {Object.entries(DAYS_FULL).map(([d,n])=><option key={d} value={d}>{n}</option>)}
                      </select>
                      <input type="time" value={opSlotTime} onChange={e=>setOpSlotTime(e.target.value)}
                        style={{flex:'1 1 90px',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
                      <Btn sm onClick={addOpSlot}>+ Día</Btn>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <Btn full onClick={()=>applyScheduleToGroup(g)} disabled={opSaving}>{opSaving?'Aplicando…':'✅ Aplicar a todos'}</Btn>
                      <Btn cls="btn-ghost" onClick={()=>setGroupOp(null)}>Cancelar</Btn>
                    </div>
                  </div>
                )}

                {/* Past cycle panel */}
                {groupOp==='pastcycle'&&(
                  <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px',marginBottom:12,border:'1px solid var(--stroke)'}}>
                    <p className="label" style={{marginBottom:8}}>📅 Agregar ciclo pasado a todos</p>
                    <div style={{display:'flex',gap:8,marginBottom:10}}>
                      <div style={{flex:1}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>INICIO</p>
                        <input type="date" value={opPastForm.start} onChange={e=>setOpPastForm(f=>({...f,start:e.target.value}))}
                          style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
                      <div style={{flex:1}}><p style={{fontSize:10,color:'var(--textMuted)',marginBottom:3,fontWeight:600}}>FIN</p>
                        <input type="date" value={opPastForm.end} onChange={e=>setOpPastForm(f=>({...f,end:e.target.value}))}
                          style={{width:'100%',background:'var(--inputBg)',border:'1px solid var(--stroke)',borderRadius:'var(--radius)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/></div>
                    </div>
                    <p style={{fontSize:11,color:'var(--textMuted)',marginBottom:6}}>Horario diferente para este ciclo (opcional):</p>
                    {opSlots.length>0&&(
                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                        {opSlots.map(sl=>(
                          <div key={`${sl.day}-${sl.time}`} style={{display:'flex',alignItems:'center',gap:4,background:'var(--brandDim)',border:'1px solid var(--brandBorder)',borderRadius:999,padding:'3px 10px 3px 12px'}}>
                            <span style={{fontSize:12,fontWeight:700,color:'var(--brand)'}}>{DAYS_FULL[sl.day]} · {sl.time}</span>
                            <button onClick={()=>setOpSlots(v=>v.filter(x=>!(x.day===sl.day&&x.time===sl.time)))} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:15,lineHeight:1,padding:'0 2px'}}>×</button>
                          </div>
                        ))}
                      </div>

                    <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap',marginBottom:10}}>
